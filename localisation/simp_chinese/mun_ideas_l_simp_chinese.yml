 #National Spirits
 CZE_taticek_of_czechoslovakia: "马萨里克老爹"
 CZE_taticek_of_czechoslovakia_desc: "托马斯·马萨里克，常被称为“塔季切克·马萨里克”（意为“父亲”或“祖国之父”），自捷克斯洛伐克建国以来便一直是民族的支柱。当人们认为组建联合政府绝无可能、政治僵局难以打破时，马萨里克总能一次次创造政治的奇迹，帮助捷克斯洛伐克发展壮大。即便退休后，他对政治领导层的意见与建议仍被视为命令，而非忠告。"
 CZE_industrialists_veto: "工业家的反对"
 CZE_industrialists_veto_desc: "工业家们掌控着[CZE.GetNameDef]许多最大的企业集团，在该国政治中拥有相当大的影响力。在经济政策问题上，他们的诉求不容忽视；而经济动员则是他们最强烈抵制的一类措施。"
 CZE_agrarian_politics_1: "农业政治"
 CZE_agrarian_politics_1_desc: "尽管我国也算得上是工业国，但农场主和农民在许多政党中都有相当大的政治影响力。他们往往会影响经济政策决策，成为进一步推动工业进步的持续政治障碍。"
 CZE_directorate_of_fortification_works_no_gd_idea: "防御工事局"
 CZE_directorate_of_fortification_works_no_gd_idea_desc: "被称为ROP的$CZE_directorate_of_fortification_works_no_gd_idea$是主管监督全国筑防进展的管理机构。"
 CZE_czech_corporatism: "捷式社团主义"
 CZE_broken_shield: "破碎之盾"
 CZE_redirected_fortification_council_funds: "重新分配防御预算"
 CZE_army_readiness_1: "无准备的军队"
 CZE_army_readiness_1_desc: "军队的战备状态不仅取决于战场上的兵力和装备。面对威胁时，对自身准备工作的信心，以及国内政治和工业领袖的支持同样重要。拥有作战手段是一回事，能否有效作战则是另一回事。"
 CZE_army_readiness_3: "做好准备的军队"
 CZE_army_readiness_3_desc: "军队的战备状态不仅取决于战场上的兵力和装备。面对威胁时，对自身准备工作的信心，以及国内政治和工业领袖的支持同样重要。拥有作战手段是一回事，能否有效作战则是另一回事。"
 CZE_ready_for_anything_idea: "为一切做好准备"
 CZE_sudeten_german_quandary: "苏台德困境"
 CZE_sudeten_german_quandary_desc: "虽然大多数苏台德地区的民众只希望能在现有政府框架下获得更多自治权。但如果其他德意志国家企图吞并该地区的任何部分，许多苏台德政党及其支持者很可能会迅速成为第五纵队。"
 CZE_sudeten_german_quandary_modifier_tt: "§Y被动效果§!：\n如果与我们接壤的§Y[AUS.GetFlag][AUS.GetNonIdeologyName]§!、§Y[GER.GetFlag][GER.GetNonIdeologyName]§!或任何其他[BAY.GetFlag]§Y德意志国家§!正当化或获得对我们的§R战争目标§!，而§Y[69.GetName]§!、§Y[972.GetName]§!或§Y[74.GetName]§!由我们控制：\n -（§Y控制的所有苏台德地区§!）：\n    添加§Y$CZE_sudetenland_paramilitaries_modifier$§!，其效果为：\n       $MODIFIER_LOCAL_INTEL_TO_ENEMIES$：§R+10%§!\n       $MODIFIERS_ARMY_CORE_DEFENCE_FACTOR$：§R-10.0%§!\n       $modifier_state_repair_speed_bunker_factor$：§R-10.00%§!\n\n - 该§Y效果§!只会触发一次"
 CZE_sudeten_challenge: "苏台德挑战"
 CZE_sudeten_challenge_desc: "苏台德地区近期准军事组织的活动，让国际社会许多人认为当前针对我们的侵略行动是正当的！要说服世界改变这一看法还需要时间。"
