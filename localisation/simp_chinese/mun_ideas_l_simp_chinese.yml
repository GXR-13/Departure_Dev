 #Dynamic Modifiers National Spritits
 CZE_ceskoslovenska_armada_dynamic_modifier: "捷克斯洛伐克军队"
 CZE_ceskoslovenska_armada_dynamic_modifier_desc: "军队建立于奥匈帝国捷克部队和捷克斯洛伐克军团退伍兵的灰烬中。两者的传统仍影响着这支军队的运作方式。"
 CZE_ceskoslovenske_letectvo_dynamic_modifier: "捷克斯洛伐克空军"
 CZE_ceskoslovenske_letectvo_dynamic_modifier_desc: "飞机也许不能时刻做好准备，但我们的飞行员可以。面对来自各方的潜在空中威胁，我们必须让天空成为我们的海洋。每个飞行员都必须顶三个用。"
 CZE_a_divided_nation_dynamic_modifier: "分裂的国家"
 CZE_a_divided_nation_dynamic_modifier_desc: "[CZE.GetAdjective]作为一个保护境内所有人的多元国家，在中欧独树一帜。然而，大萧条改变了这种情况。经济上的困难让政府成为众矢之的。这种怨恨现在深深分裂了国家。"
 CZE_skoda_works_dynamic_modifier: "斯柯达工厂"
 CZE_skoda_works_dynamic_modifier_desc: "斯柯达公司涵盖了我们所有重工业领域的生产、建设和投资。它的影响力在我国几乎是无限的。"
 CZE_ceskoslovenske_alecne_lodstvo_dynamic_modifier: "捷克斯洛伐克海军"
 #Dynamic State Modifiers
 CZE_sudetenland_german_state_modifier: "苏台德分离主义"
 CZE_sudetenland_german_state_modifier_desc: "近期的经济困难对苏台德的工业造成了冲击，导致当地人民将其不幸归咎于[ROOT.getname]政府。"
 CZE_tesinko_polish_state_modifier: "波兰分离主义"
 CZE_czech_state_modifier: "捷克熟练工人短缺"
 CZE_czech_state_modifier_desc: "20世纪经济的快速发展对以农业为主的捷克人口造成了很大压力。要找到具备技能的合格捷克劳动者来填补岗位空缺十分困难。因此必须采取措施，帮助年轻的捷克公民为适应现代经济不断变化的需求做好准备。"
