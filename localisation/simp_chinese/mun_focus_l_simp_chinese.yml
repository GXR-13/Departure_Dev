l_simp_chinese:
 #Shortcuts
 CZE_military_path_shortcut: "武装部队"
 CZE_economic_path_shortcut: "经济"
 CZE_diplomacy_path_shortcut: "外交"
 CZE_fort_path_shortcut: "防御工事"
 CZE_skoda_priority_shortcut_name: "斯柯达优先事项"
 CZE_political_path_shortcut: "政治"
 # Č does show when scrolling through focuses, but not in the detailed focus view title (does work in the description though)
 CZE_coalition_building: "建立联合政府"
 CZE_coalition_building_desc: "选举后形成的联合政府若想有效运作，必须加强其成员间的团结。。随着扬·马利彼得近期辞去总理职务，联合政府为巩固自身支持基础将面临更大压力。"
 CZE_merge_the_paramilitaries: "整合准军事组织"
 CZE_merge_the_paramilitaries_desc: "我们的准军事组织分散于多个团体。若希望在军事上发挥作用，就必须促使它们合并。"
 CZE_integrated_paramilitaries: "整合准军事组织"
 CZE_integrated_paramilitaries_desc: "军方可能对此不满，但将这些组织整合入正规军，将在关键时刻为我们提供更多后备力量。"
 CZE_wielding_the_hammer: "挥舞重锤"
 CZE_wielding_the_hammer_desc: "我们应当善用国民议会中的绝对多数优势，显著加快当前的立法进程。眼下，整顿立法秩序已成为一项迫在眉睫的任务。"
 CZE_emergency_measures: "紧急措施"
 CZE_emergency_measures_desc: "通过实施紧急措施来应对我国面临的诸多危机，同时借助其中部分举措，密切监控那些可能对政府意识形态不忠的人员。如此一来，我们将能更从容地应对国家所面临的各种挑战。"
 CZE_king_of_the_castle: "城堡里的国王"
 CZE_king_of_the_castle_desc: "我们都知道当前究竟是谁在掌控政府。在动荡时期，我们应撕下伪装，让$CZE_edvard_benesh$直接领导政局。国家安全正取决于此。"
 CZE_closer_ties_with_the_moderate_germany_parties: "团结苏台德党派当中的温和派"
 CZE_closer_ties_with_the_moderate_germany_parties_desc: "一些苏台德地区的政党愿意与我们的联合政府合作，并在政府中寻求更深合作。让我们加深这些纽带。"
 CZE_complete_reconciliation: "全面和解"
 CZE_complete_reconciliation_desc: "我们已为建立信任架设桥梁。现在，是时候与同胞实现全面和解了。"
 CZE_complete_reconciliation_cooldown_flag: "已完成国策§Y$CZE_closer_ties_with_the_moderate_germany_parties$§!"
 CZE_complete_reconciliation_cooldown_flag_tt: "当前天数：[?CZE_complete_reconciliation_cooldown_flag:days|Y0]"
 CZE_bastion_of_liberty: "自由堡垒"
 CZE_bastion_of_liberty_desc: "过去十年，我们是莱茵河以东少有的真正多元国家之一。让人民永远记住这一点。"
 CZE_standing_against_the_storm: "直面风暴"
 CZE_standing_against_the_storm_desc: "尽管我们存在不足，准备也许不够充分，我们将迎难而上，直面任何风暴。"
 CZE_truth_prevails: "真理必胜"
 CZE_truth_prevails_desc: "即使面对巨大挑战和几乎不可能的任务，我们国家的座右铭“真理必胜”终将兑现。追求真理，倾听真理，真理终将胜出。"
 CZE_negotiations_with_the_autonomous_bloc: "与自治集团的谈判"
 CZE_negotiations_with_the_autonomous_bloc_desc: "贝奈斯在国民议会中走狗众多，如果我们想建立一个不会将权力拱手让给前者的联合政府，我们就必须与自治集团合作。但要赢得他们的全面支持，将付出巨大代价。"
 CZE_slovakia_autonomy_agreement: "斯洛伐克自治协议"
 CZE_slovakia_autonomy_agreement_desc: "自治派集团与我们联合政府合作的代价，是与政府签署自治协议。这代价虽重，但若不守约，后果更严重。"
 CZE_slovakia_autonomy_agreement_tt: "§Y[RUT.getname]§!将希望获得与我们给予§Y[SLO.getname]§!相同的联邦协议！"
 CZE_slovakia_autonomy_agreement_2_tt: "选择该国策后，$CZE_the_autonomous_bloc_demands$将被延迟§Y35天§!。"
 CZE_topple_the_king: "削弱那个“国王”"
 CZE_topple_the_king_desc: "作为总统，$CZE_edvard_benesh$对政府的影响力过于庞大，在国会中有大量忠于他的人。如今条件成熟，是时候在上议院中削弱他的势力了。"
 CZE_comprise_with_the_carpathians: "与喀尔巴阡妥协"
 CZE_comprise_with_the_carpathians_desc: "鲁塞尼亚区域正推动类似于我们给予[SLO.getnamedef]的联邦化协议。这将严重削弱我们在该区域甚至在[9.getname]的权力。与其完全让步，不如通过协商达成妥协。"
 CZE_the_rut_demands_add_35_CZE_comprise_with_the_carpathians_tt: "选择该国策后，$CZE_the_rut_demands$将被延迟§Y35天§!。"
 CZE_cut_carpathia_loose: "放弃对喀尔巴阡的主张"
 CZE_cut_carpathia_loose_desc: "斯洛伐克已成联邦制国家，鲁塞尼亚希望得到相似安排。虽然难以接受，但若试图压制他们可能事与愿违。也许我们应顺其所愿。"
 CZE_compromise_with_the_veteran_agrarian: "与守旧的农民联盟妥协"
 CZE_compromise_with_the_veteran_agrarian_desc: "守旧的农民联盟是我们打入日益增长的城市选民群体的一大障碍。我们需要与他们妥协，以达成我们的目标。"
 CZE_reorient_the_broad_coalition: "调整联合政府"
 CZE_reorient_the_broad_coalition_desc: "联合政府在我国长期执政。但是联合政府中囊括的政党过多，使得它难以运转。现在是调整政治方向和各部门政策的时候了。"
 CZE_leverage_sokol: "索科尔运动"
 CZE_leverage_sokol_desc: "数十年来，索科尔运动在国内力行健康与体能训练。当危机来临，我们可借其提供的准军事训练和人员补充。"
 CZE_urbanist_policies: "走城市路线"
 CZE_deepend_ties_with_the_trademans: "深化与商人党的关系"
 CZE_deepend_ties_with_the_trademans_desc: "商人党在城市中产选民中颇受欢迎。若授权并与他们合作，我们在城市选区将会有所突破，同时也不至于疏远乡村基础。"
 CZE_apart_but_togather: "分治但团结"
 CZE_apart_but_togather_desc: "我们的地区自治程度前所未有，但集体力量更为强大，我们已做好应对一切挑战的准备。"
 CZE_contact_henlein: "接触亨莱因"
 CZE_contact_henlein_desc: "$CZE_konrad_henlein$多年来一直是我们政府的棘手问题。但鉴于国际形势变化，是时候与之启动对话了。"
 CZE_contact_henlein_cooldown_flag: "已完成国策：§Y$CZE_no_compromise_with_the_sdp$§!"
 CZE_contact_henlein_cooldown_flag_tt: "当前天数：[?CZE_contact_henlein_cooldown_flag:days|Y0]"
 CZE_contact_henlein_focus_warning_tt: "完成§Y$CZE_no_compromise_with_the_sdp$§!之后，我们需等待§Y350§!天才可选择该§Y国策§!。"
 CZE_contact_henlein_focus_order_warning_tt: "如果在完成该§Y国策§!后我们完成了§Y$CZE_no_compromise_with_the_sdp$§!，§Y$CZE_konrad_henlein$§!将退休。"
 CZE_no_compromise_with_the_sdp: "继续排斥苏台德德意志人党"
 CZE_no_compromise_with_the_sdp_desc: "苏台德德意志人党对我们的联合政府无任何益处，他们只会带来政治冲突和抹黑。为了营造良好的施政环境，应继续将其排除在联合政府之外。"
 CZE_no_compromise_with_the_sdp_cooldown_flag: "已完成国策§Y$CZE_contact_henlein$§!"
 CZE_no_compromise_with_the_sdp_cooldown_flag_tt: "当前天数：[?CZE_no_compromise_with_the_sdp_cooldown_flag:days|Y0]"
 CZE_no_compromise_with_the_sdp_focus_warning_tt: "如果我们完成了§Y$CZE_contact_henlein$§!，需要等待§Y350§!天后才能选择该§Y国策§!。"
 # CZE_economic_integration: "Economic Integration"
 # CZE_economic_integration_desc: "Why stop at a customs union? Economic integration will further grow our economies and ensure our future is an affluent one for all members."
 CZE_form_a_federation: "组建联邦"
 CZE_form_a_federation_desc: "中欧联邦梦想不再遥远。我们可以建立它，成为民主巨人，具备抵御列强，并独立发展的力量！"
 CZE_bend_the_bars: "$ITA_bend_the_bars$"
 CZE_bend_the_bars_desc: "$GER_european_confederation_desc$"
 CZE_reassure_the_army: "安抚军队"
 CZE_reassure_the_army_desc: "军方对我们近期的决策和政策日益焦虑。是时候向他们保证，无论政府如何，他们都不会被抛弃。"
 CZE_outreach_to_the_western_powers: "进一步争取西方列强"
 CZE_outreach_to_the_western_powers_desc: "西方民主国家口头支持我们，但我们需要实质性进展，确保关键时刻他们不只是空谈。"
 CZE_demand_guarantees: "要求更强的保障"
 CZE_demand_guarantees_desc: "即便我们已有条约与联盟，我们也需确保在危机时刻同伴不会背弃我们。我们需要比承诺更可靠的保障。"
 CZE_guardian_of_central_europe: "中欧民主守护者"
 CZE_guardian_of_central_europe_desc: "我们如今可作为中欧民主的监督者，为无力自保的国家提供守护，坚定民主精神。"
 CZE_central_european_faction: "中欧霸主"
 CZE_central_european_faction_desc: "虽然我们主张自强而非依赖外力，但重要的是不要过度扩张。也许现在是放眼外部影响力的时候了。"
 CZE_strike_at_the_heart_of_bolshevism: "[THIS.GetAntiSovietFocusName]"
 CZE_strike_at_the_heart_of_bolshevism_1: "打击布尔什维主义的心脏"
 CZE_strike_at_the_heart_of_bolshevism_2: "控制东翼"
 CZE_strike_at_the_heart_of_bolshevism_desc: "[SOV.GetNameDef]的扩张对欧洲和我国构成生存威胁。我们必须成为抵御他们的屏障。"
 CZE_destroy_the_fascist_threats: "摧毁法西斯威胁"
 CZE_destroy_the_fascist_threats_desc: "[CZE_get_fascist_threats_desc]"
 CZE_destroy_the_fascist_threats_desc_enemy_ger: "我们都清楚谁才是欧洲和平最大的威胁。[GER.getnamedefCAP]必须尽早遏制，不能再拖延下去。倘若无人愿意出手，那就由我们来担当此任。"
 CZE_destroy_the_fascist_threats_desc_backup: "为保障我国安全，至关重要的是，周边国家不得奉行扩张主义论调——这类论调迟早会将矛头对准我们。"
 CZE_peace_on_our_time: "我们时代的和平"
 CZE_peace_on_our_time_desc: "长久以来，我们在欧洲外交舞台上被边缘化。如今再也不会如此！我们可以独立自主，设定自己的议程，不论是和平还是战争。"
 CZE_reach_out_for_military_assistance: "请求军事援助"
 CZE_free_tuka: "释放$CZE_vojtech_tuka$"
 CZE_free_tuka_desc: "$CZE_vojtech_tuka$的刑期已满，我们不必再找借口延长羁押。相反，我们可以按期释放他，并将他纳入政府中任用。让他在我们控制下工作，总好过让他同我们作对。"
 CZE_grow_the_anglo_czechoslovak_prague_credit_bank: "盎格鲁-捷克斯洛伐克银行"
 CZE_grow_the_anglo_czechoslovak_prague_credit_bank_desc: "盎格鲁‑捷克信贷银行一直是我们工业的推动力。若无其资金支持，我们将无法维持如今的出口业务规模。在纽约设立分行、加深与[ENG.GetNameDef]的联系，将使银行获得进一步发展，也将让[ENG.getname]在我们的国家存续上拥有一定利益关联。"
 CZE_feeding_the_alligator: "喂饱鳄鱼"
 CZE_feeding_the_alligator_desc: "[GER.getname]对苏台德地区的觊觎已威胁到我们国家的生存。如果我们给予他们想要的，或许他们会放我们一马，对吧？"
 CZE_complete_capitulation: "完全投降"
 CZE_complete_capitulation_desc: "我们还有什么选择？我们无法抵挡即将来临的风暴。或许趁我们还有一点谈判余地，与[GER.getnamedef]达成协议，他们便会在我们的独立之下允许我们作为其附庸存在。"
 CZE_stabilize_the_protectorate: "稳定保护国"
 CZE_stabilize_the_protectorate_desc: "保护国局势远非稳定。我们必须努力说服民众接受我们的政权合法性，并证明我们有能力照顾他们的需求。"
 CZE_stabilize_the_protectorate_unretire_henlein_tt: "从§Y[ROOT.getname]§!聘用退休的§Y$CZE_konrad_henlein$§!。"
 CZE_full_faith_in_hacha: "完全信任哈查"
 CZE_full_faith_in_hacha_desc: "$CZE_emil_hacha$比$CZE_emanuel_moravec$更受人民尊重。他的执政可能存在疑点，但比起换掉一个受欢迎的象征性人物，维持现状更明智。"
 CZE_moravecs_bohemia: "莫拉维茨的波希米亚"
 CZE_moravecs_bohemia_desc: "有传言称$CZE_emil_hacha$正在试图破坏我们的新政府。如果我们希望在现有条件下取得发展，就需要一位与宗主国意识形态一致的领导人。"
 CZE_form_the_government_army: "成立政府军"
 CZE_form_the_government_army_desc: "若我们国家要成功，就必须组建一支新军队，避免旧军队的问题。其领导层必须与政府意识形态一致。"
 CZE_forced_administration_of_companies: "强制接管企业"
 CZE_forced_administration_of_companies_desc: "尽管已有严格监管，仍有部分公司在我们的控制之外运作。是时候将它们强制纳入行政体系了。"
 CZE_revisit_custom_union_talks: "重启关税同盟谈判"
 CZE_revisit_custom_union_talks_desc: "与部分邻国的关税谈判进展不佳，是时候重启谈判，推动区域间建立关税同盟。"
 CZE_revisit_custom_union_talks_tt: "我们仍可通过其他§Y手段§!说服他们加入我们。"
 CZE_revisit_custom_union_talks_2_tt: "他们更可能接受加入我们联邦的要求"
 CZE_reintegrate_cross_border_rail_connections: "改善跨境铁路"
 CZE_reintegrate_cross_border_rail_connections_desc: "改善与邻国之间的铁路连接，有助于提升关系，特别是在我们希望加强经济合作时更显重要。"
 CZE_reintegrate_cross_border_rail_connections_flag: "跨境铁路连接已改善"
 CZE_vonapo_20: "VONAPO 20"
 CZE_vonapo_20_desc: "我们并非唯一发现[GER.GetNameDef]威胁上升的国家。因此我们拟定计划，与[SOV.GetNameDef]合作收集情报以便更好地挫败[GER.GetAdjective]的野心。"
 CZE_increase_funding_from_moscow: "请求[SOV.capital.GetCapitalVictoryPointName]给予资金支持"
 CZE_increase_funding_from_moscow_desc: "[ROOT.GetCommunistParty]的资金极度紧张，以至于只能靠代表薪资支付办公楼费用。要想发展，就必须请求[SOV.GetNameDef]增加资助，以扩大发行报纸、招募新成员。"
 CZE_zdenek_fierlinger_tt: "任命顾问§Y$CZE_zdenek_fierlinger$§!"
 CZE_expand_the_communist_press: "扩大共产党新闻宣传"
 CZE_expand_the_communist_press_desc: "我们的报纸《红色法律》可以吸引那些平时不读报的人，我们非常需要扩充财源。"
 CZE_anti_rearmament_propaganda: "反扩军宣传"
 CZE_anti_rearmament_propaganda_desc: "我们主要对手——法西斯[GER.GetNonIdeologyName]政府垮台后，我们可以利用此事证明我们对反扩军立场的正确性。"
 CZE_anti_democratic_propaganda: "反民主宣传"
 CZE_anti_democratic_propaganda_desc: "要为我们的党争取更多支持，就必须揭示共和国前几届政府的失败，并向民众表明我们本可以如何妥善地应对局势。"
 CZE_form_workers_brigades: "组建工人民兵"
 CZE_form_workers_brigades_desc: "我们所解放的工人必须准备好参与斗争。他们虽非正规士兵，但仍可在工程等专业领域贡献力量。"
 CZE_kohler_faction: "科勒的派系"
 CZE_kohler_faction_desc: "布鲁诺·科勒的派系认为，必须通过暴力推翻资产阶级，才能建立成功的捷克斯洛伐克共产主义政权。"
 CZE_gottwald_faction: "戈特瓦尔德的派系"
 CZE_gottwald_faction_desc: "|斯大林主义者克莱门特·戈特瓦尔德忠于莫斯科，他们认为捷克斯洛伐克共产主义政权应仿照苏联模式。"
 CZE_zapotocky_faction: "扎波托茨基的派系"
 CZE_zapotocky_faction_desc: "共产党创始人什梅拉尔与扎波托茨基主张更温和的政策。相比戈特瓦尔德，他们的路线更能赢得[CZE.GetAdjective]全体人民的支持。"
 CZE_ally_with_moderate_socialists: "与温和社会主义者合作"
 CZE_ally_with_moderate_socialists_desc: "并非所有国家都能选举共产主义政权，也不是所有国家都支持[SOV.GetLeader]。因此，我们不应回避与温和派合作。"
 CZE_democracies_willing_to_join_faction_tt: "§Y民主国家将更愿意加入我们的共产主义阵营。§!"
 CZE_limited_cooperation: "与[SOV.GetLeader]有限合作"
 CZE_limited_cooperation_desc: "尽管意识形态不同，[SOV.GetNameDef]仍可能出于务实考虑与我们达成合作，哪怕一边与我们做交易，一边在报纸上抨击我们。"
 CZE_denounce_stalinism: "谴责斯大林主义"
 CZE_denounce_stalinism_desc: "斯大林的暴政玷污了共产主义名声。我们应采取军事手段解放被这类政权压迫的人民。"
 CZE_country_leader_has_ideology_stalinism_tt: "国家领导人意识形态为§Y$stalinism$§!"
 CZE_cooperate_with_tito: "与铁托合作"
 CZE_cooperate_with_tito_desc: "[YUG.GetNameDefCap]的共产主义实践路线与我们类似，也致力于红旗下的多民族团结。在共同挑战下，我们应在军事和政治事务上展开合作。"
 CZE_reduce_divided_nation_cost_tt: "降低大多数§Y分裂的国度§!的决议的花费和持续时间"
 CZE_balkan_union: "扩张联盟"
 CZE_balkan_union_desc: "尽管本地区更多国家拥抱共产主义，但若无深度合作，我们难以抵抗强权。结成联盟是实现这一目标最有效方式。"
 CZE_cooperation_with_the_ussr: "与[SOV.GetLeader]合作"
 CZE_cooperation_with_the_ussr_desc: "即便党内亲[SOV.GetNameDef]分子已亲眼看到苏联集体化的失败，他们仍认同苏联的经验值得借鉴。与其合作，可分析其得失，为[ROOT.GetNameDef]制订合适政策。"
 CZE_exchange_military_expertise: "军事经验交流"
 CZE_exchange_military_expertise_desc: "[SOV.GetNameDefCap]与大多数列强一样，也在战术方面积累了丰富经验。我们应请求其分享经验，并同时向他们分享我国的经验。"
 CZE_pressure_romania: "向罗马尼亚施压"
 CZE_pressure_romania_desc: "[ROM.GetNameDefCap]若与敌人结盟，将威胁我们的与[SOV.GetNameDef]间的联系，并可能为敌人提供石油。在[SOV.GetAdjective]支持下，我们或能在不开战的前提下使其屈服。"
 CZE_facility_in_state_tt: "若该$STATE|Y$尚无§Y实验设施§!，则在此$STATE|Y$建设§G1座§!$FACILITY_TYPE|Y$"
 CZE_spread_the_revolution: "输出革命"
 CZE_spread_the_revolution_desc: "[ROOT.GetNameDef]革命成功后，应当鼓励国外无产阶级争取自由，我们可在其中提供支持。"
 CZE_agrarian_reform: "重建土地局"
 CZE_agrarian_reform_desc: "被解散的土地局原负责农业用地的再分配。现在是时候恢复其职能，推动更大规模的土地改革了。"
 CZE_realign_the_church: "国家无神论"
 CZE_realign_the_church_desc: "宗教在[CZE.GetAdjective]人民之间长期制造分裂。我们应当限制宗教对国家事务（如教育与媒体）的影响，建立统一社会。"
 CZE_create_a_secret_police_branch: "成立秘密警察部门"
 CZE_create_a_secret_police_branch_desc: "为保障国家稳定，必须防范内外敌人。人民需要时间适应我们的新制度，尤其在制度尚在完善之时。"
 CZE_promote_urbanization: "$ARG_promote_urbanization$"
 CZE_promote_urbanization_desc: "如今我们已经建立了高效的公有农场，我们可以开始实施计划，吸引一些农村人口到城市，提高那里的生产力。"
 CZE_confiscate_church_lands: "没收教会土地"
 CZE_confiscate_church_lands_desc: "教会拥有的土地与财富远超其需求。我们应效仿农业改革，将部分土地再分配。"
 CZE_change_the_narrative: "改变叙事"
 CZE_change_the_narrative_desc: "尽管教会此前并未支持我们的革命，但若我们能将其价值观与我方政权相结合，或许能为新政权赢得更多支持。"
 CZE_the_second_fortification_program: "启动第二轮防御工事计划"
 CZE_the_second_fortification_program_desc: "第一轮防御工事建设为后续工程打下了基础。为了国家安全，我们必须立即启动第二阶段建设计划，强化防线。"
 CZE_redirect_the_fortification_councils_funds: "重新分配防御预算"
 CZE_redirect_the_fortification_councils_funds_desc: "防御工事工程极大消耗了我们的经济资源。这些资金用于资助其他项目会更好。反正军队已拥有足够的防御资源。"
 CZE_jachymov_uranium_mine: "亚希莫夫铀矿"
 CZE_jachymov_uranium_mine_desc: "亚希莫夫矿场曾是铀与其他矿产的重要来源，但在物理学取得更新进展前，铀的用途一直很少。"
 CZE_skoda_internal_competition: "鼓励内部竞争"
 CZE_skoda_internal_competition_desc: "在像斯柯达这样庞大的公司中，很难让所有员工始终保持最佳状态。鼓励内部竞争将极大地提升工厂员工的工作表现。"
 CZE_skoda_max_optimization_tt: "§Y斯科达优先计划§!的最大优化等级将提升至7。"
 CZE_skoda_increase_cooperation: "增强斯柯达内部合作"
 CZE_skoda_increase_cooperation_desc: "通过加强跨工厂合作，我们可以提高整体绩效，同时也能促进技能和经验的分享。"
 CZE_skoda_fast_optimization_tt: "当前§Y斯柯达优先计划§!£GFX_prod_eff_cap 优化等级正逐步提升，直到最大等级：§G+100.0%§!"
 CZE_master_of_armaments: "军备大师"
 CZE_master_of_armaments_desc: "自奥匈帝国时代起，斯柯达工厂便是我国最大的武器制造商。其专业性和经验在国内无出其右。现在是时候赋予其“军备大师”的称号了。"
 CZE_only_the_best_is_good_enough: "只有最好的才配得上"
 CZE_only_the_best_is_good_enough_desc: "斯柯达工厂一直秉持勤奋与创新精神。其创始人始终坚持：“只有最好的，才配得上我们的客户！”当下，这句话比以往任何时候都更有说服力。"
 CZE_an_industrial_legacy: "工业遗产"
 CZE_an_industrial_legacy_desc: "国家工业已被我们推向历史新高。如今，我们自豪地继承这份伟大遗产，昂首迈入无与伦比的工业强国行列。"
 CZE_powerhouse_of_europe: "欧洲的动力舱"
 CZE_powerhouse_of_europe_desc: "我们的工业现在是世界羡慕的对象。我们必须确保能源部门能够正常供应。"
 CZE_supply_fighters_for_allies: "向盟友提供战斗机"
 CZE_supply_fighters_for_allies_desc: "[FRA.GetAdjective]和[ENG.GetAdjective]政府非常担心[GER.GetAdjective]空军在战争爆发后会迅速击溃他们的防御并轰炸其城市。因此，增强他们的空军力量或许能让他们更有信心遏制[GER.GetAdjective]的扩张，减少人员损失。"
 CZE_allies_more_likely_to_defend_us_tt: "§Y同盟国更有可能在我们反对德国在苏台德地区的扩张主义时支持我们。§!"
 CZE_allies_more_likely_to_defend_us_2_tt: "§Y同盟国更有显著可能在我们反对德国在苏台德地区的扩张主义时支持我们。§!"
 CZE_allies_more_likely_to_defend_us_3_tt: "§Y同盟国更有些许可能在我们反对德国在苏台德地区的扩张主义时支持我们。§!"
 CZE_establish_the_state_defense_guard: "建立国防卫队"
 CZE_german_nonagressionpact: "豪斯霍费尔–克罗夫塔协定"
 CZE_german_nonagressionpact_desc: "与[GER.GetNameDef]的互不侵犯条约谈判已经进行了一段时间，但在[SOV.GetNameDef]出现不稳定迹象并暴露其扩张意图后谈判中止。既然[GER.GetNameDef]当前正被其他敌人牵制，我们应尝试重启这些谈判。"
 CZE_revive_the_czechoslovak_legion_dynamic: "[CZE_revive_the_czechoslovak_legion]"
 CZE_revive_the_czechoslovak_legion_default: "重建捷克斯洛伐克军团"
 CZE_revive_the_czechoslovak_legion_communist: "建立志愿者组织"
 CZE_revive_the_czechoslovak_legion_dynamic_desc: "世界再次动荡不安，我们的英勇战士已准备好保卫[ROOT.GetNameDef]。正如历史所证明的，保卫家园有时需要在国外作战，我们应再次动员愿意远行的战士，他们正是为了保卫家园才出征的。"
 CZE_revive_the_czechoslovak_legion_nsb_tt: "§Y$CZE_legacy_of_the_czechoslovak_legion_army_spirit$§!将由§Y军队精神§!转换为§Y国家精神§!"
 CZE_state_sponsored_recruitment_for_spain: "国家资助出征西班牙的征兵"
 CZE_state_sponsored_recruitment_for_spain_desc: "一场新冲突爆发，而[ROOT.GetNameDef]的经验丰富的志愿战士或许能决定其走向。我们应支持与我们政策一致的派系，并从中学习现代战争的经验。"
 CZE_support_spain_reward_tt: "§Y若西班牙内战中某派系获得我们的志愿兵，在其胜利或失败时会产生后续效果。§!"
 CZE_profit_off_the_spanish_civil_war: "从西班牙内战中牟利"
 CZE_profit_off_the_spanish_civil_war_desc: "西班牙内战正成为列强间的代理人战争。我们不应该派遣我方军队冒险卷入这样的冲突。相反，不如趁机通过武器销售发展工业，如果能向交战双方同时出售武器就好了。"
 CZE_skoda_sell_weapons_to_SPR_tt: "解锁决议：§Y秘密向西班牙的内战派系出售武器§!"
 CZE_placate_benes_faction: "向贝奈斯的派系妥协"
 CZE_placate_benes_faction_desc: "$CZE_milan_hodza$需要面对一个现实：他担任外交部长的表现极差。$CZE_edvard_benesh$已准备好与农民联盟的支持者联手，只要$CZE_milan_hodza$放弃外交部长职务，就愿意支持他继续担任总理。"
 CZE_claim_lands_of_the_bohemian_crown: "宣称波希米亚王冠领地"
 CZE_claim_lands_of_the_bohemian_crown_desc: "由于我们国家在过去几个世纪处于多个帝国的边缘地带，边界多由战争决定，而非居民意愿。现在是时候纠正这些历史错误了。"
 CZE_demand_katowice: "索要[762.GetName]"
 CZE_demand_katowice_desc: "控制[762.GetName]不仅意味着恢复旧边界，也能削弱[POL.GetAdjective]对[72.GetName]的主张。"
 CZE_fight_over_silesia: "为西里西亚而战"
 CZE_fight_over_silesia_desc: "西里西亚理应属于[ROOT.GetAdjective]，但不宜与[66.owner.GetNameDef]爆发全面战争。我们应发动大规模边境冲突，以展示实力，若[66.owner.GetNameDef]不愿防守，我们或许能不战而胜。"
 CZE_dismantle_poland: "肢解[POL.GetNonIdeologyName]"
 CZE_dismantle_poland_desc: "[POL.GetNameDef]没有保卫自己的能力，已不适合作为我方与敌人之间的缓冲国。我们应增强自身，而非依赖他国防御。"
 CZE_proclaim_the_restoration_of_bohemia: "宣布波希米亚王国复辟"
 CZE_proclaim_the_restoration_of_bohemia_desc: "故土已经收复，我们现在可以重建波希米亚的荣耀，着手整合新领土。"
 CZE_integrate_lost_territories: "整合一度失去的领土"
 CZE_integrate_lost_territories_desc: "历史上的波希米亚王国疆域从波罗的海延伸至亚得里亚海，是时候借助这段历史，整合我们的新领土了。"
 CZE_deepen_ties_with_puppet_kingdoms: "加深与傀儡王国的纽带"
 CZE_deepen_ties_with_puppet_kingdoms_desc: "尽管我们已确立势力范围，但要从这些附属国获得最大利益，还需进一步增强影响力。"
 CZE_poland_alliance_monarchist: "与[POL.GetNonIdeologyName]的协议"
 CZE_poland_alliance_monarchist_desc: "$CZE_ally_poland_desc$"
 CZE_a_strong_poland: "强大的[POL.GetNonIdeologyName]"
 CZE_a_strong_poland_desc: "[POL.GetNameDef]拥有东欧最强的军队之一，有潜力成为有价值的盟友。"
 CZE_mend_balkan_relations: "修复巴尔干关系"
 CZE_facilitate_a_strong_hungary: "扶持强大的匈牙利"
 CZE_facilitate_a_strong_hungary_desc: "[HUN.GetNameDef]自独立以来与我方关系不稳，但战争逼近，我们或许能趁机促其倾向我方事业。"
 CZE_subjegate_romania: "以[HUN.GetAdjective]的宣称施压罗马尼亚"
 CZE_subjegate_romania_desc: "我方的[HUN.GetAdjective]傀儡对[ROM.GetNameDef]的领土要求是一个有力筹码。若威胁让[HUN.GetNameDef]提出对[ROM.GetAdjective]领土的主张并加以援助，我们或许能迫使[ROM.GetNameDef]低头。"
 CZE_demanded_overlordship_HUN: "征服匈牙利"
 CZE_demanded_overlordship_ROM: "征服罗马尼亚"
 CZE_integrate_hungary: "整合前奥地利领土"
 CZE_integrate_hungary_desc: "我们已建立强大的势力范围，如能整合扩张后的[HUN.GetName]及其他领土，便可重建奥匈帝国的疆域，但这次由[ROOT.GetAdjective]主导。"
 CZE_subjegate_serbia: "征服[YUG.GetName]"
 CZE_subjegate_serbia_desc: "[YUG.GetName]已不再是南部有效的缓冲国。继斯洛文尼亚后，我们应进一步扩张。"
 CZE_strike_the_eastern_threat: "打击东方威胁"
 CZE_strike_the_eastern_threat_desc: "[SOV.GetName]虚伪地批评我方政体来掩饰其帝国野心，他们正对[CZE.GetName]构成生存威胁。"
 CZE_assist_austria: "保护[AUS.GetName]"
 CZE_assist_austria_desc: "保持[AUS.GetNameDef]的中立对我们的国家安全至关重要。与[AUS.GetAdjective]的边境是我们防御体系中最薄弱的环节之一。其经济也可能被敌人利用，我们绝不能允许这种事发生。"
 CZE_return_to_democracy: "重返民主"
 CZE_return_to_democracy_desc: "国内已稳定，人民逐渐意识到军事独裁已不再适用。因此现在是时候举行选举，将权力交还给民主的民选政府了。"
 CZE_cooperate_with_the_allies: "与同盟国合作"
 CZE_cooperate_with_the_allies_desc: "随着地区局势日趋稳定，是时候修复与传统盟友的关系了。"
 CZE_eliminate_austrian_defeatists: "击败[AUS.GetAdjective]投降派"
 CZE_eliminate_austrian_defeatists_desc: "[AUS.GetNameDefCap]已失去自保意志。若我们不及时干预，敌人将兵临城下。"
 CZE_the_legacy_of_ottokar: "奥托卡的遗产"
 CZE_the_legacy_of_ottokar_desc: "传说中的奥托卡二世将波希米亚扩展至奥地利和亚得里亚海。他能做到，是因奥地利贵族支持。我们亦应争取奥地利人的支持，不论贵贱。"
 CZE_demand_the_istrian_peninsula: "索要伊斯特拉半岛"
 CZE_demand_the_istrian_peninsula_desc: "[ROOT.GetNameDefCap]作为内陆国，这一地理限制长期制约着我们的贸易与国家影响力。我们不能再任由经济受制于邻国，必须坚定地争取通往亚得里亚海的出海通道。"
 CZE_demand_slovenia: "索要斯洛文尼亚"
 CZE_demand_slovenia_desc: "斯洛文尼亚曾是奥地利帝国的重要部分。既然我们已控制旧帝国的核心领土，我们必须再次寻求收复他们的故土。"
 CZE_demand_overlordship_of_yugoslav_league: "索要对[YUG.GetAdjective]联盟的宗主权"
 CZE_demand_overlordship_of_yugoslav_league_desc: "[YUG.GetName]也知道，在多民族国家中地方自治有其必要。但他们的联盟已无力自保，我们必须让[YUG.GetNameDef]认识到这一点，并允许我们进行干预。"
 CZE_expand_the_rome_protocols: "扩大罗马协定"
 CZE_expand_the_rome_protocols_desc: "我国新政府在理念上与[ITA.capital.GetCapitalVictoryPointName]远比与[GER.capital.GetCapitalVictoryPointName]更为一致。考虑到两国在奥地利问题上的分歧，加入罗马议定书或许能增强[ITA.GetNameDef]维持其当前路线的信心，而不至于倒向[GER.GetNameDef]。"
 CZE_prague_protocols: "布拉格议定"
 CZE_soviet_alliance: "扩大1935年同盟条约"
 CZE_soviet_alliance_desc: "我们与[SOV.GetNameDef]现行的联盟条约含糊不清，无法确保他们会在我们遭受攻击时出手干预。因此，如果我们想保障安全，必须与他们重新达成更明确的协议。"
 CZE_airlift_soviet_support: "空运苏联援军"
 CZE_airlift_soviet_support_desc: "我们与[SOV.GetAdjective]无陆地边界，因此提出用空运投送[SOV.GetAdjective]援军的想法。虽然此类规模前所未有，但能避免[SOV.GetAdjective]军队经过他国领土。"
 CZE_unlocks_volunteer_transport_raid_tt: "解锁§Y突袭§!：\n在§Y[73.GetName]§!为苏联志愿军打开空中通道"
 CZE_intervene_in_the_ussr: "干涉[SOV.GetAdjective]内战"
 CZE_intervene_in_the_ussr_desc: "[SOV.GetNameDef]再次动荡，虽然我们曾经支持的旧皇室不会归来，但若能扶植一个更友好的政权，也不可错过良机。"
 CZE_forgive_trading_debts: "豁免贸易债务"
 CZE_forgive_trading_debts_desc: "经济危机和大萧条使部分潜在盟友对我国欠债累累。我们可豁免这些债务，并补偿受影响的本国公司，以修复双边关系。"
 CZE_improve_balkan_trade_relations: "改善与巴尔干的贸易关系"
 CZE_improve_balkan_trade_relations_desc: "我们争取巴尔干国家的最大筹码就是经济实力。若能出资改善他们的经济，将有助于争取其合作。"
 CZE_ally_austria: "联合[AUS.GetName]"
 CZE_ally_austria_desc: "[AUS.GetNameDef]在几年前几乎被纳粹暴徒颠覆政权，如今应当意识到与[ROOT.GetNameDef]合作的潜在好处。"
 CZE_demand_the_czech_corridor: "要求捷克走廊"
 CZE_demand_the_czech_corridor_desc: "在我们逐步将小协约国建设为一个真正同盟的过程中，一个日益显现的现实是：一旦爆发冲突，向盟国调动军队或接收其部队都将变得异常困难。如果能够拥有一条连接我国与[YUG.GetNameDef]的领土走廊——正如世界大战后曾有人提议的那样——那么我们的安全将得到加强，贸易也将获得保障。"
 CZE_ally_hungary: "联合[HUN.GetName]"
 CZE_ally_hungary_desc: "尽管[CZE.GetNonIdeologyName]与[HUN.GetNonIdeologyName]之间的关系自建国以来充满冲突，但他们最近展现出成为宝贵盟友的潜力。"
 CZE_ally_yugoslavia: "联合[YUG.GetName]"
 CZE_ally_yugoslavia_desc: "[YUG.GetNameDefCap]近年来在经济上举步维艰，但其战略资源与地理位置仍不容忽视。"
 CZE_protect_neutrality: "保护中立国家"
 CZE_protect_neutrality_desc: "第一次世界大战清楚表明，在敌人的虎视眈眈下中立是徒劳的。保护这些国家意味着在敌人扩张时迫使他们面对两线作战，而不是任由其分而治之。"
 CZE_if_cooperate_with_moderate_socialists_completed_tt: "若已完成§Y与温和社会主义者合作§!："
 CZE_mutual_protection_agreement_with_switzerland: "与[SWI.GetNonIdeologyName]签署保护协定"
 CZE_mutual_protection_agreement_with_switzerland_desc: "我们与[SWI.GetNameDef]正致力于构建一种状态：任何入侵都将付出无法承受的代价。通过合作，我们能组织出一支不仅能防御，更能反击的军队。"
 CZE_exchange_technology: "开展科研合作"
 CZE_exchange_technology_desc: "尽管巴尔干拥有丰富自然资源，但缺乏殖民地或先进工业。因此，各国在各自专长领域展开科研合作至关重要。"
 CZE_demand_corridor_to_ussr: "索要一条通往[SOV.GetAdjective]的走廊"
 CZE_demand_corridor_to_ussr_desc: "如果[POL.GetNameDef]拒绝合作，我们就必须采取更强硬的手段，确保通往[SOV.GetName]盟友的通道。"
 CZE_ally_poland: "联合[POL.GetName]"
 CZE_ally_poland_desc: "波兰-苏联战争尚在记忆中，西方威胁日益上升，[POL.GetNameDef]同样在寻求安全。我们必须劝说[POL.GetAdjective]人认清，中立无法自保，是时候加入我们了。"
 CZE_realize_the_polish_czechoslovak_confederation: "实现联邦制"
 CZE_realize_the_polish_czechoslovak_confederation_desc: "[POL.GetNameDef]虽奋勇抗敌，终究战败。其流亡政府如今萌生与我国合并的想法。若能联合执政，我们将以此新国家号召[POL.GetAdjective]人民解放我们共同的家园。"
 CZE_integrate_western_ukrainians: "整合乌克兰西部"
 CZE_integrate_western_ukrainians_desc: "[CZE.GetNameDef]境内的乌克兰人获得了大量协助和自治，我们现在可以着手将新获得的土地整合为乌克兰行省。"
 CZE_ally_russia: "联合[SOV.GetNonIdeologyName]"
 CZE_ally_russia_desc: "如今[SOV.GetNameDef]的政府与我们更加接近，我们可以尝试深化与其前任政府签订的模糊协议。"
 CZE_claim_ukraine: "建立友好的乌克兰政权"
 CZE_claim_ukraine_desc: "乌克兰是[SOV.GetNameDef]的重要组成部分，若我们掌控该地，便能建立一个强有力的缓冲国。"
 CZE_strengthen_the_little_entente: "成立小协约国"
 CZE_strengthen_the_little_entente_desc: "小协约国最初是为牵制[HUN.GetNonIdeologyName]而组建的，但它有潜力发展为拥有强大军队的真正联盟。"
 CZE_seek_french_leadership: "寻求[FRA.GetAdjective]领导地位"
 CZE_seek_french_leadership_desc: "尽管是我们发起建立该联盟，但显然[FRA.GetNonIdeologyName]的军队将是任何联盟的重要补充。即便要让出领导权也值得。"
 CZE_increase_food_and_resource_imports: "增加食品与资源进口"
 CZE_increase_food_and_resource_imports_desc: "我们新盟友的农业产业发达，已经不再需要大力补贴本国农业。廉价进口资源可为我们省钱，也能刺激盟友经济。"
 CZE_double_down_on_heavy_industry: "加倍发展重工业"
 CZE_double_down_on_heavy_industry_desc: "新签署的联盟协议允许我们专注于武器等竞争力强的工业。产能过剩时，也可用于出口获利。"
 CZE_neutralize_the_hungarian_threat: "削弱[HUN.GetAdjective]威胁"
 CZE_neutralize_the_hungarian_threat_desc: "[HUN.GetNameDefCap]若站在敌人一方，将严重干扰我们与南方盟友之间的联系，即便《特里亚农条约》限制了其军力，我们也不能掉以轻心。"
 CZE_cancel_anti_hungary_focus: "在[GER.GetAdjective]干预后退让"
 CZE_ally_romania: "联合[ROM.GetName]"
 CZE_ally_romania_desc: "[ROM.GetNameDefCap]是本地区少有的自给自足国家之一，他们拥有食品和宝贵的石油资源。与其结盟不仅能促进资源互通，也能让敌人失去这些重要战略物资。"
 CZE_divide_germany: "分裂德国"
 CZE_divide_germany_desc: "[GER.GetNameDef]的威胁难以单独应对，因此我们应寻求那些也担心[GER.GetAdjective]扩张，并有意愿采取先发制人行动的盟友。"
 CZE_if_FRA_ally_tt: "若§Y法国为君主制国家§!且尚未加入他方阵营："
 CZE_if_POL_ally_tt: "若完成§Y强大的波兰§!，并从[POL.GetNonIdeologyName]获得独立保障："
 CZE_revolutionary_brigades: "成立革命旅"
 CZE_revolutionary_brigades_desc: "我们那些曾为[ROOT.GetNameDef]作战的革命者，应当被进一步整合进正规军中。"
 CZE_recruit_communist_exiles: "招募流亡的共产党人"
 CZE_recruit_communist_exiles_desc: "[ROOT.capital.GetCapitalVictoryPointName]长期以来是革命者的避风港，我们的新政府可加以利用。"
 CZE_destabilize_potential_adversaries: "破坏潜在敌国的稳定"
 CZE_destabilize_potential_adversaries_desc: "这些流亡者对其祖国的了解甚至胜过间谍。我们必须善用这类知识来策划解放行动。"
 CZE_nationalize_key_industries: "国有化银行与矿产"
 CZE_nationalize_key_industries_desc: "矿产为我们工业提供原材料，而工业再将其锻造成战争武器。在危机时刻，政府应当完全掌控原材料供应，不应落入金融家和工业家的手中。"
 CZE_rehabilitate_the_army: "整编军队"
 CZE_rehabilitate_the_army_desc: "[CZE.GetAdjective]军队的大多数将领曾在捷克斯洛伐克军团服役，曾于内战中对抗苏联。必须确保他们忠于[CZE.GetAdjective]的新政府。"
 CZE_unlock_civil_war_army_generals_tt: "重新召集在内战中流失的指挥官"
 CZE_recruit_ideologically_aligned_generals: "招募意识形态可靠的将领"
 CZE_recruit_ideologically_aligned_generals_desc: "我们必须调整军官培训机制，引入理解新时代价值观的新一代军官。"
 CZE_recruit_communist_generic_general_tt: "获得一名共产主义将领。"
 CZE_purge_two_random_commanders_tt: "随机清洗两名指挥官。"
 CZE_czechoslovak_union: "捷克斯洛伐克联盟"
 CZE_czechoslovak_union_desc: "[CZE.GetNameDef]必须赋予地方更高自治权，以便根据各地实际调整共产主义体制。"
 CZE_continue_industrial_relocation_schemes: "继续兵工厂迁移计划"
 CZE_continue_industrial_relocation_schemes_desc: "为了国家安全，必须继续将易受攻击的工厂转移至内陆安全地区。关键产业不可陷于险地。"
 CZE_continue_industrial_relocation_schemes_tt: "移除§Y1座军用工厂§!"
 CZE_continue_industrial_relocation_schemes_2_tt: "§R这些工厂需要重建。§!"
 CZE_establish_a_armament_factory_in_uhersky_brod: "建立乌赫尔布罗德兵工厂"
 CZE_establish_a_armament_factory_in_uhersky_brod_desc: "乌赫尔布罗德兵工厂是一家专门生产和设计步兵及飞机使用的自动武器的军工厂。我们计划将它打造成世界范围内在该领域最先进的工厂。"
 CZE_appeal_to_the_castle: "请求“城堡”支持"
 CZE_appeal_to_the_castle_desc: "捷克斯洛伐克的“城堡”集团指的是一个支持总统的庞大的、由有影响力的组织和人士构成的网络。这种势力同时又使总统能够施加比其有限的宪法职责所赋予的更大的影响力。争取这个团体的支持将极大提升我们在角逐领导地位的优势。"
 CZE_petition_the_nobles: "请愿贵族"
 CZE_petition_the_nobles_desc: "[ROOT.GetNameDef]的贵族虽已失去头衔，但依然在[ROOT.GetAdjective]影响深远。争取他们的支持能为我们带来合法性与资源。"
 CZE_unify_the_fascist_parties: "统一法西斯党派"
 CZE_unify_the_fascist_parties_desc: "当前的法西斯派系支离破碎，极端党派无法获得广泛支持。为了国家团结，有必要统一他们，并提出一个能吸引更广泛群众的愿景。"
 CZE_pro_rearmament_propaganda: "宣传重整军备"
 CZE_pro_rearmament_propaganda_desc: "为加强中央政府，必须凸显当今世界局势之脆弱。这将激发民众支持强军政策。"
 CZE_align_nationalist_parties: "联合捷克民族主义党派"
 CZE_align_nationalist_parties_desc: "尽管应争取所有[ROOT.GetAdjective]人支持，但不可否认，传统捷克民族主义政党在政治上最具影响力，是我们最容易争取的对象。"
 CZE_align_slovak_catholics: "联合斯洛伐克的天主教党派"
 CZE_align_slovak_catholics_desc: "斯洛伐克当前支持度较高的党派为天主教党与民族主义党。尽管与民族主义者合作困难，但我们也许能争取到天主教派。"
 CZE_jozef_tiso_tt: "任命顾问§Y$CZE_jozef_tiso$§!"
 CZE_align_catholic_parties: "与捷克斯洛伐克人民党结盟"
 CZE_align_catholic_parties_desc: "捷克斯洛伐克人民党及其他天主教政党曾是奥匈帝国君主制体系的传统支持力量，现在是时候争取让他们回归这一立场了。"
 CZE_restore_the_monarchy: "恢复君主制"
 CZE_restore_the_monarchy_desc: "在为新体制铺平道路后，我们可以向人民正式提出计划。推举的国王$CZE_karel_schwarzenberg$是[ROOT.GetAdjective]人，相较过去由[AUS.GetAdjective]君主主导，更具亲和力。"
 CZE_semi_constitutional_monarchy: "半君主立宪制"
 CZE_semi_constitutional_monarchy_desc: "君主选定后，宪法也应调整。尽管有人主张集权，但显然君主无法独自统治国家，因此保留部分现有体制以辅佐政务较为合理。"
 CZE_restore_noble_titles: "恢复贵族头衔"
 CZE_restore_noble_titles_desc: "共和国成立后贵族被废黜，如今我们应凭借他们的合作而恢复其头衔。我们同时可以授予那些为[ROOT.GetAdjective]不断奋斗的英雄官员荣誉头衔。"
 CZE_restore_the_austro_hungarian_customs_union: "恢复帝国的关税同盟"
 CZE_restore_the_austro_hungarian_customs_union_desc: "奥匈帝国不可否认的优势之一是其对我国工业的贸易壁垒较小，重建这一联盟将是把其他前成员国纳入我们势力范围的第一步。"
 CZE_customs_union: "关税同盟"
 CZE_catholic_focus: "重视天主教"
 CZE_catholic_focus_desc: "尽管胡斯派是[ROOT.GetAdjective]历史的重要组成部分，但许多人仍信奉天主教。提升其社会地位将增强他们对我们政权的支持。"
 CZE_hussite_legacy: "胡斯派遗产"
 CZE_hussite_legacy_desc: "胡斯派不仅倡导更接近新教的信仰，也以其宗教宽容而著称，与那些为镇压异端发动战争的暴君截然不同。"
 CZE_align_with_germany: "与[GER.GetNonIdeologyName]结盟"
 CZE_align_with_germany_desc: "[GER.GetNameDef]的新政府或许依旧具有扩张主义倾向，但他们在结盟对象和抨击目标上的选择可能更加务实。我们应努力成为他们愿意合作的一方。"
 CZE_rally_against_germany: "号召反对[GER.GetNonIdeologyName]"
 CZE_rally_against_germany_desc: "捷克斯洛伐克人民曾为争取独立而英勇奋斗，如今我们必须号召全民共同捍卫这份来之不易的独立。"
 CZE_integrate_sudeten_germans: "整合苏台德"
 CZE_integrate_sudeten_germans_desc: "苏台德内部的分裂对任何人都无益。我们必须着手倾听他们的诉求，并解决相关问题。如此一来，那些独立主义者的借口也将难以站得住脚。"
 CZE_cooperate_with_the_sdp: "与苏台德德意志人党合作"
 CZE_cooperate_with_the_sdp_desc: "尽管苏台德德意志人党目前是个不稳定因素，但如果给予适当鼓励——比如让其加入执政联盟，他们或许会选择顺从。"
 CZE_revive_the_december_bloc: "重建十二月集团"
 CZE_revive_the_december_bloc_desc: "曾反对爱德华·贝奈斯出任总统的法西斯、少数族裔和右翼政党联盟“十二月集团”应被恢复，作为现政府的替代方案。"
 CZE_revert_1926_anti_military_laws: "撤销1927年反军事法案"
 CZE_revert_1926_anti_military_laws_desc: "在$CZE_radola_gajda$政变未遂后，军队与宪兵被剥夺了投票权及其他特权。在当前的动荡时代，军队处于至关重要的位置，因此我们应取消这些限制，弥合军队与政治之间的隔阂。"
 CZE_bop_to_fascism_support_tt: "将§Y$CZE_bop_army_readiness$§!数值的三分之一转换为对法西斯的支持："
 CZE_power_to_the_military: "权力归于军队"
 CZE_power_to_the_military_desc: "如今没有任何资源可以浪费在国家防御之外。让掌权者理解军队的需求是当务之急，而最直接的方式便是组建军政府。"
 CZE_militarize_the_associations: "军事化协会组织"
 CZE_militarize_the_associations_desc: "[CZE.GetNameDef]境内众多协会可在全民动员前，向公民传授称为士兵所需的技能，为国家防御贡献力量。"
 CZE_aggressive_foreign_policy: "激进的外交政策"
 CZE_aggressive_foreign_policy_desc: "信赖脆弱的条约时代已经结束。为了国家安全，我们必须果断行动，哪怕需要重大牺牲。"
 CZE_work_with_germany: "与[GER.GetNameDef]合作"
 CZE_work_with_germany_desc: "既然苏台德问题已解决，[GER.GetNameDef]或许能意识到[ROOT.GetNameDef]作为盟友的价值。"
 CZE_control_the_associations: "控制协会组织"
 CZE_control_the_associations_desc: "[CZE.GetNonIdeologyName]内存在各种组织，从职业协会到兴趣小组、体育社团。控制这些组织，就等于掌控了社会的很大一部分。"
 CZE_diversify_bata: "多元化巴塔"
 CZE_diversify_bata_desc: "巴塔公司是一个大型消费品企业，可协助我们构建资源供应链，为我们提供稀缺关键原料。"
 CZE_devaluate_the_koruna: "贬值克朗"
 CZE_devaluate_the_koruna_desc: "对于一个依赖出口的国家而言，强势货币反而是一种风险。削弱克朗的币值虽有短期痛苦，但从长远来看，将带来更大经济利益。"
 CZE_continue_the_central_bohemia_plan: "中部波西米亚工业计划"
 CZE_continue_the_central_bohemia_plan_desc: "继续在中部地区扩大工业有助于实现规模经济。从国家安全角度看，使工业中心远离边境同样是明智之举。"
 CZE_balance_industrial_invevestments: "平衡工业发展"
 CZE_balance_industrial_invevestments_desc: "忽视[9.getname]与[75.getname]以外地区发展，正是我们国家在上世纪30年代初分裂的原因之一。发展边缘地区的工业将有助于全国一体化。"
 CZE_expand_prf_science_facilities: "扩建查理大学法学院科研设施"
 CZE_expand_prf_science_facilities_desc: "查理大学法学院的科研设施中聚集着一批才华横溢的人才，他们正等待着一个能够实现更大作为的机会。扩充该部门并促使其与政府合作是提升我国研究水平的良好开端。"
 CZE_raise_more_industrial_funds: "提高工业拨款"
 CZE_raise_more_industrial_funds_desc: "从奥匈帝国时期至今，工业一直是国家的核心。只要政府提供充足资金，动荡的欧洲也无法阻碍我国工业蓬勃发展。"
 CZE_skoda_priority_focus_info_tt: "部分§Y国策§!需要我国处于特定的£GFX_CZE_skoda_text_icon §Y斯柯达优先事项§!国策状态下才能完成。此类国策会通过一个与所需£GFX_CZE_skoda_text_icon §Y斯柯达优先事项§!对应的小图标进行标注。"
 CZE_joint_stock_schemes: "合资企业模式"
 CZE_joint_stock_schemes_desc: "当传统融资渠道不足时，合资企业提供了宝贵的增长机会。继续运用这种方式将推动经济持续发展。"
 CZE_the_slovak_arrow: "斯洛伐克之箭"
 CZE_the_slovak_arrow_desc: "建设连接两大城市的高速列车，不仅能增强国家自豪感，还可借机改善铁路基础设施。"
 CZE_finish_double_tracking_efforts: "铁路双轨化"
 CZE_finish_double_tracking_efforts_desc: "完成次级铁路的双轨化工作，可显著提高运输能力，改善中小城市之间的连通性。"
 CZE_realize_motorway_proposals: "实现高速公路提案"
 CZE_realize_motorway_proposals_desc: "政府已收到若干改善全国公路网络的高速公路计划，是时候付诸实践，让道路交通更高效。"
 CZE_build_additional_rail_stations: "建设新的火车站"
 CZE_build_additional_rail_stations_desc: "新建铁路提升了运量，但现有车站承载能力有限。扩建车站将有助于提升人流与物流效率。"
 CZE_build_additional_rail_stations_focus_cost_tt: "采取§Y$CZE_devaluate_the_koruna$§!可将此国策的所需时间缩短至§G35§!天。"
 CZE_grow_ckd_secondary_facilities: "CKD附属设施"
 CZE_grow_ckd_secondary_facilities_desc: "捷克摩拉维亚-科尔本-丹历（CKD）有许多较小的附属工厂，这些工厂生产发电机之类的重要工业产品。扩建这些工厂将有助于发展我们的重工业。"
 CZE_bolster_domestic_construction: "加强国内建筑业"
 CZE_bolster_domestic_construction_desc: "自大战结束独立以来，我国建筑业持续增长。向中型建筑承包商提供更多投资，将进一步推动建设能力提升。"
 CZE_invest_in_vhht: "投资VHHT"
 CZE_invest_in_vhht_desc: "维特科维采矿业与冶金（VHHT）是一家在全国拥有多个金属加工厂的公司。投资并扩建该公司将有助于我们在金属生产的许多领域取得进步。"
 CZE_expand_vitkovice_ironworks: "扩建维特科维采钢铁厂"
 CZE_expand_vitkovice_ironworks_desc: "维特科维采钢铁厂是[74.getname]重要的铁产基地。进行扩建将显著提高产量。"
 CZE_expand_central_bohemian_mines: "扩建中波希米亚矿区"
 CZE_expand_central_bohemian_mines_desc: "我国中部的煤矿对能源安全至关重要，我们必须尽快扩大开采规模。"
 CZE_increase_bauxite_imports: "增加铝土矿进口"
 CZE_increase_bauxite_imports_desc: "我国铝资源匮乏，但通过先进炼制工艺并增加铝土矿进口，国内也可实现一定程度的铝产。这样有助于缓解资源短缺。"
 CZE_merge_the_oil_companies: "整合石油企业"
 CZE_merge_the_oil_companies_desc: "当前的石油公司多为围绕少数油井设立的小型企业。若将其合并并纳入国家掌控，将可提升产能，资源利用更高效。"
 CZE_expand_trinec_ironworks: "特日内茨钢铁厂"
 CZE_expand_trinec_ironworks_desc: "特日内茨钢铁厂自成立以来就是[72.getname]的工业巨头。进一步投资将为国家资源供应带来丰厚回报。"
 CZE_consolidate_mining_operations: "整合采矿运营"
 CZE_consolidate_mining_operations_desc: "通过整合采矿公司管理，优化资源配置，将使矿产开采与技术研究效率更高。"
 CZE_expand_praga: "与普拉加公司签约"
 CZE_expand_praga_desc: "普拉加公司长期为军工产业供应关键部件。给予其更多订单，有助于其进一步发展。"
 CZE_shrink_educational_disparities: "缩小教育差距"
 CZE_shrink_educational_disparities_desc: "农村地区教育资源远不如城市，我们应通过大规模教育项目改善这一差距。"
 CZE_kickstart_rapid_rearmanent: "启动快速军备重整"
 CZE_kickstart_rapid_rearmanent_desc: "尽管商界与政界可能反对，我们必须立即展开军备建设。周边国家早已暗中扩军，我们不能再坐视不管。"
 CZE_keep_focus_on_weapon_exports: "继续专注武器出口"
 CZE_keep_focus_on_weapon_exports_desc: "武器出口是我们摆脱经济危机的支柱产业。贸然转向将造成政治与经济风险，当前稳定路线仍是最优选择。"
 CZE_force_the_industrialists_hand: "强迫工业资本家配合"
 CZE_force_the_industrialists_hand_desc: "财团与工业家长期制约我们的重整军备。是时候以国家意志替他们做出选择了。"
 CZE_embrace_corporatism: "采纳社团主义"
 CZE_embrace_corporatism_desc: "如果我们愿意在政策上做出让步，就能说服企业家支持重启军备扩张。这种互利妥协符合国家利益。"
 CZE_expand_existing_armory_plants: "扩建现有兵工厂"
 CZE_expand_existing_armory_plants_desc: "迁移我们现有的兵工厂将是一项代价高昂却收益有限的投资。不如直接扩建现有工厂，同时提升产能与研发能力。哪怕这些工厂位于在战时易受敌人攻击的地点。"
 CZE_expand_skoda_offices: "扩张斯柯达办事处"
 CZE_expand_skoda_offices_desc: "国际办事处是斯柯达武器销售的命脉。应当将其扩张到更多地区。"
 CZE_skoda_office_unlock_tt: "解锁决议：§Y建立武器销售办公室§!"
 CZE_complete_the_power_grid: "完成电网建设"
 CZE_complete_the_power_grid_desc: "我国农村地区电网落后，已成为经济发展的障碍。必须尽快改善。"
 CZE_build_the_slapy_reservoir: "建设斯拉皮水库"
 CZE_build_the_slapy_reservoir_desc: "在斯拉皮修建水坝将提升该地区的电力供应与经济机会。新增发电能力将推动区域工业增长。"
 CZE_diversify_refinery_processes: "多样化精炼工艺"
 CZE_diversify_refinery_processes_desc: "我们的油井有能力产出各种石油副产品，但缺乏必要的技术。若能投入科研，将实现该产业的突破。"
 CZE_enlarge_smaller_wells: "扩建小型油井"
 CZE_enlarge_smaller_wells_desc: "尽管规模较小，这些油井仍具更高潜力。只需投入时间与资源，即可大幅提升产量。"
 CZE_develop_sudetenland_resources: "开发苏台德地区的资源"
 CZE_develop_sudetenland_resources_desc: "苏台德地区拥有丰富资源，但尚未被充分开采。在此建立更多矿场将是极具回报的投资。"
 CZE_grow_tatras_capabilities: "增强塔特拉斯工厂"
 CZE_grow_tatras_capabilities_desc: "塔特拉斯工厂目前的小型坦克部门拥有一些新颖的生产设计。给予他们更多资源，将使其在装甲设计方面持续取得进展。"
 CZE_bailout_moser: "拯救莫塞尔公司"
 CZE_bailout_moser_desc: "大萧条使莫塞尔公司陷入困境。我们需要对其进行援助，重开工厂，让被裁员的工人重新上岗。"
 CZE_merge_skodas_consumer_good_plants: "合并斯柯达的消费品工厂"
 CZE_merge_skodas_consumer_good_plants_desc: "斯柯达拥有许多零散的消费品工厂，缺乏集中管理。整合这些工厂将优化生产，并带来总体性提升。"
 CZE_giant_of_central_europe_industry: "工业巨头"
 CZE_giant_of_central_europe_industry_desc: "我们达到了过去被认为不可能的高度——如今我们是欧洲的工业巨人！"
 CZE_continue_armed_force_reform: "继续武装部队改革"
 CZE_continue_armed_force_reform_desc: "按计划推进军队现代化，并将军事区域重新划归各省指挥部，可在潜在冲突中实现更高效的协调。"
 CZE_air_force_officer_recruitment: "空军军官招募"
 CZE_air_force_officer_recruitment_desc: "各地飞行俱乐部与空军预备军官学校合作，提供飞行课程与实弹训练，以满足后备军官的关键需求。"
 CZE_national_defense_act: "国防法案"
 CZE_national_defense_act_desc: "该法案包括一切旨在应对威胁或攻击国家主权、统一和安全的军事及其他手段，由国家安全最高委员会监督执行。"
 CZE_car_and_oil_rationing: "汽车与石油配给"
 CZE_car_and_oil_rationing_desc: "限制私车使用并在必要时征用，有助于集中汽车与石油资源用于军需生产。"
 CZE_expand_airfield_capacity: "扩建机场设施"
 CZE_expand_airfield_capacity_desc: "第三航空局已规划新机场与机库，用于飞机操作、维修与储存，并为新组建的中队与地勤人员建设宿舍。"
 CZE_trust_in_old_guard: "信任老一代飞行员"
 CZE_trust_in_old_guard_desc: "我们坚定地信任那些曾参加大战的老飞行员，他们将把空战经验传授给新一代。"
 CZE_expand_the_aero_clubs: "扩大飞行俱乐部"
 CZE_expand_the_aero_clubs_desc: "飞行俱乐部为国家持续输送飞行人才，应进一步扩大其规模。"
 CZE_invest_in_the_smaller_air_plants: "投资中小型航空工厂"
 CZE_invest_in_the_smaller_air_plants_desc: "投资新兴小型飞机制造商，可为老牌企业引入竞争，也有助于满足更广泛的生产需求。"
 CZE_continue_avia_expansion: "继续扩张阿维亚"
 CZE_continue_avia_expansion_desc: "对阿维亚的投资将提供进一步增强其生产能力所需的额外设备；这有助于提升高需求机体的生产效率。"
 CZE_increase_military_aeronautical_institute_funding: "增加航空科研资金"
 CZE_increase_military_aeronautical_institute_funding_desc: "通过建设航空研究与测试机构附属设施，将更深入了解空气动力学，推进飞机设计的改进。"
 CZE_air_training_abroad: "空军出国训练"
 CZE_air_training_abroad_desc: "派遣学员前往友好国家的空军系统，将带来宝贵的跨国经验与技术视角。"
 CZE_establish_air_defense_zones: "建立防空区"
 CZE_establish_air_defense_zones_desc: "我们可以在关键区域和工厂部署高射炮，并通过地方通信枢纽设立防空区，以优化防空精准度。"
 CZE_establish_air_defense_zones_enable_tt: "解锁§Y防空区§!"
 CZE_establish_air_defense_zones_tt: "静态高射炮命中率：§G+10%§!"
 CZE_the_air_is_our_sea: "天空即我们的海"
 CZE_the_air_is_our_sea_desc: "在系统训练基础上，让飞行员勇敢自信地翱翔：“我们没有出海口与远洋舰队，但天空即我们的海。”"
 CZE_bring_kramer_and_lobel_under_state_control: "国有化克拉默勒布尔"
 CZE_bring_kramer_and_lobel_under_state_control_desc: "通过将克拉默勒布尔收归国有，我们可以确保关键电气设备和无线电配件的持续研发与按时交付。"
 CZE_second_to_none: "无与伦比"
 CZE_second_to_none_desc: "我国航空工业日益精进，只需进一步研究，我们的飞机设计将超越全球任何对手！"
 CZE_diversify_airframe_production: "多样化机体生产"
 CZE_diversify_airframe_production_desc: "我们不能仅依靠战斗机掌握制空权，还需发展其他飞机与大型机体，应对多种任务需求。"
 CZE_projekt_l_52: "L-52项目"
 CZE_projekt_l_52_desc: "喷气发动机技术是未来军事飞行器的发展方向。虽然该技术尚不成熟，但若我们着手开发专属项目并为其设计专用机体，就能走在时代前沿。"
 CZE_fund_vladimir_mandl_research: "资助弗拉基米尔·曼德尔的研究"
 CZE_fund_vladimir_mandl_research_desc: "法律学者$CZE_vladimir_mandl$热衷于火箭技术。若我们提供资源协助其将理论转化为实用技术，国家将大有裨益。"
 CZE_mobilize_the_reserves: "动员预备役"
 CZE_mobilize_the_reserves_desc: "我国边境的紧张局势正在恶化。我们必须根据动员令，征召预备役人员和预先选定的军事专家入伍。"
 CZE_three_kings: "三王行动"
 CZE_three_kings_desc: "官方支援抵抗组织将极大提升其对敌破坏力，并可能直接辅助前线作战。"
 CZE_form_the_state_defense_guard: "建立国防卫队"
 CZE_form_the_state_defense_guard_desc: "国防卫队的组建使我们拥有了一个专门负责守卫我国漫长边境的组织。由于该卫队的成员是按军队标准组织和训练的，他们将成为抵御任何边境入侵的第一道防线。"
 CZE_expand_the_horska_divisions: "扩编山地师"
 CZE_expand_the_horska_divisions_desc: "我国地形多为丘陵与高原，训练有素的山地作战部队将在复杂地形中发挥关键作用。"
 CZE_develop_horska_artillery: "研发山地火炮"
 CZE_develop_horska_artillery_desc: "改造现有火炮，使其轻便易拆卸，可确保山地与丘陵地区部队拥有充足火力支援。"
 CZE_develop_horska_artillery_tech_tt: "解锁§Y山地火炮§!\n§Y火炮（山地）§!\n攻击：§G+10%§!\n移动：§G+10%§!\n§Y火炮（丘陵）§!\n攻击：§G+10%§!\n移动：§G+10%§!"
 CZE_bribery_investigations: "贿赂调查"
 CZE_bribery_investigations_desc: "收到匿名信反映士兵伙食与待遇问题，部分军需官涉嫌不当行为。我们必须在此事扩大前及时解决。"
 CZE_bribery_investigations_remove_effect_tt: "完成国策“§Y$CZE_bribery_investigations$§!”后将移除该国家精神。"
 CZE_opl_exercises: "高射炮防御演练"
 CZE_opl_exercises_desc: "通过组织高射炮防御演练，可提升部队协同与机动性，从而增强整体作战能力与安全。"
 CZE_rapid_response_divisions: "快速部队"
 CZE_rapid_response_divisions_desc: "外国军队已展示出高机动单位的战术优势，我们也应组建类似部队，以便评估其实战价值。"
 CZE_redouble_tank_development_efforts: "加倍装甲研发努力"
 CZE_redouble_tank_development_efforts_desc: "当前轻型坦克设计落后于欧洲主流使用者。我们必须加倍努力，迎头赶上。"
 CZE_rearmed_and_retooled: "重整军备，翻新武装"
 CZE_rearmed_and_retooled_desc: "现有重型底盘具备现代化潜力，应继续优化设计，以满足装甲部队未来扩编所需。"
 CZE_establish_the_fall_backlines: "构建后备防线"
 CZE_establish_the_fall_backlines_desc: "我们需要面对现实，部分防线终将崩溃。一旦发生，那么提前准备的后备阵地，将成为胜败分水岭。"
 CZE_establish_the_fall_backlines_masterful_delay_tactic_tt: "\n启用战术：§Y$tactic_masterful_delay$§!"
 CZE_anti_tank_development: "反坦克火炮研发"
 CZE_anti_tank_development_desc: "随着敌军装甲部队扩张，改进我们的反坦克火炮迫在眉睫。能否用野战炮对抗坦克，将决定敌我胜负。"
 CZE_anti_tank_development_tech_tt: "解锁§Y反坦克改进§!\n§Y火炮§!穿甲深度：§G+5%§!\n§Y支援火炮§!穿甲深度：§G+5%§!\n§Y反坦克§!穿甲深度：§G+5%§!\n§Y支援反坦克§!穿甲深度：§G+5%§!"
 CZE_recon_in_force: "强化侦察"
 CZE_recon_in_force_tech_tt: "解锁§Y强化侦察§!\n§Y侦察部队§!：生命值§G+5§!\n侦察效率§G+10%§!"
 CZE_recon_in_force_desc: "让我们的侦察兵在刺探敌军防线时与敌人接触，是获取情报的宝贵方式。"
 CZE_integrate_fortification_engineers: "整合筑垒工程师"
 CZE_integrate_fortification_engineers_desc: "筑垒工程师不进行永久防御工事施工时，应迅速转为前线支援，他们将帮助部队建立临时防御设施。"
 CZE_integrate_fortification_engineers_tech_tt: "解锁§Y整合筑垒工程师§!\n§Y工兵连§!：\n堑壕§G+10%§!。\n§Y（堡垒）§!\n防御§G+10%§!"
 CZE_concealment_efforts: "伪装措施"
 CZE_concealment_efforts_desc: "敌军广泛使用攻击与侦察机，伪装网等隐蔽手段已成必需。我们必须加强伪装保障部队安全。"
 CZE_concealment_efforts_tech_tt: "解锁§Y改进伪装网§!\n§Y步兵（森林）§!\n防御：§G+10%§!"
 CZE_elevate_the_vsv: "提升战争学院"
 CZE_elevate_the_vsv_desc: "作为国家军队的大脑，陆军总参谋部肩负着极其重要的国家责任。因此，总参谋部的军官不仅要有卓越的专业训练，还需具备可靠性、自制力、圆滑处事的能力与高尚品格。"
 CZE_continue_with_snejdareks_plan_dynamic: "[CZE_continue_with_snejdareks_plan]"
 CZE_continue_with_snejdareks_plan_default: "继续施内达雷克的计划"
 CZE_continue_with_snejdareks_plan_no_snejdareks: "继续推行静态防御计划"
 CZE_continue_with_snejdareks_plan_dynamic_desc: "建立有效防御网络可防止敌军出其不意的渗透，为转守为攻提供保护和坚实基础。"
 CZE_go_with_vojcechovskys_plan_dynamic: "[CZE_go_with_vojcechovskys_plan]"
 CZE_go_with_vojcechovskys_plan_default: "采纳卢扎的计划"
 CZE_go_with_vojcechovskys_plan_no_luza: "主动防御学说"
 CZE_go_with_vojcechovskys_plan_dynamic_desc: "静态防御的劣势在于无法机动。一旦被突破，就无法再用于进攻，只能作为残留设施被动防守。"
 CZE_improve_the_current_officer_pool: "改善现有军官队伍"
 CZE_improve_the_current_officer_pool_desc: "我们将提拔那些在监督和协调上级与基层之间表现突出的人员，他们的素养有能力成为我军的骨干力量。"
 CZE_elevate_slovak_officers: "提拔斯洛伐克军官"
 CZE_elevate_slovak_officers_desc: "我们将国策提拔斯洛伐克籍军官，以便该地区能彰显在军中的存在。通过适当降低其地区申请门槛，我们预计未来能增强军队凝聚力。"
 CZE_promote_moravec_writings: "推广莫拉维茨的著作"
 CZE_promote_moravec_writings_desc: "尽管莫拉维茨的《士兵与时间》和《国家防卫》引发争议，他的新作《我国在中欧的军事战略地位》却在欧洲多国媒体上被广泛讨论。我们应支持他继续研究，巩固其在军事政策与历史上的专业地位。"
 CZE_lessons_of_war: "战争的教训"
 CZE_lessons_of_war_desc: "经过与对等对手的实战后，我们可将这些经验用于改进最高指挥系统——实战教训无可替代。"
 CZE_lessons_of_war_i_had_war_with_major_flag: "曾与主要国家交战"
 CZE_for_the_homeland: "为祖国而战"
 CZE_for_the_homeland_desc: "我军已整装待命，信心十足，随时准备保卫祖国、迎接一切挑战。"
 CZE_the_lions_roar: "狮吼"
 CZE_the_lions_roar_desc: "捷克斯洛伐克雄狮的象征，体现了我军最崇高的品质：勇气、力量与英雄主义。世人终将目睹我军所向披靡的精神。"
 CZE_diversify_our_specialists: "多元化专业部队"
 CZE_diversify_our_specialists_desc: "我们的兵种专业化领域需要多元化，不应只专注于山地部队。战争的战场远不止山岭与高地。"
 CZE_merge_the_financial_and_state_guard: "合并财政卫队与国防卫队"
 CZE_merge_the_financial_and_state_guard_desc: "随着国防卫队的建立，财政卫队已无存在必要。将其合并入国防卫队，将迅速提升卫队的兵力。"
 CZE_merge_the_financial_and_state_guard_tt: "解锁：§Y整合财政卫队§!\n§Y宪兵队§!：生命值 §G+5§!"
 CZE_logistics_beyond_the_sudetes: "苏台德之外的后勤"
 CZE_logistics_beyond_the_sudetes_desc: "若我们希望在苏台德山区之外展开战斗，必须学习长距离后勤的运作方式——这与本土作战完全不同。"
 CZE_logistics_beyond_the_sudetes_tt: "解锁：§Y改进补给库§!\n§Y后勤连§!：补给消耗：§G-10%§!"
 CZE_expand_the_river_monitor_fleet: "扩大浅水重炮舰舰队"
 CZE_expand_the_river_monitor_fleet_desc: "我国浅水重炮舰舰队的规模名列欧洲之最，对内陆防御起着重要作用。扩大其规模将极大提升其效能。"
 CZE_the_tvp_project: "通用坦克项目"
 CZE_the_tvp_project_desc: "军方提议开展通用坦克计划，研发国产坦克设计。部分拥有丰富坦克制造经验的厂商对此表示浓厚兴趣。"
 CZE_expand_the_land_department_of_vtu: "扩建军事技术研究所陆军部门"
 CZE_expand_the_land_department_of_vtu_desc: "扩建军事技术研究所陆军部门将为其提供更多硬件资源与试验场，增强未来装备研发能力。"
 CZE_department_two_expansion: "第二局"
 CZE_department_two_expansion_desc: "我们的情报机构——第二局，需要更多资源以更有效地保障国家安全，对抗敌国间谍活动。这也可能推动机构内特定部门的扩建。"
 CZE_military_intelligence: "军事情报部门"
 CZE_military_intelligence_desc: "军事情报是情报体系核心之一。加大投入将带来巨大回报。"
 CZE_air_intelligence: "空军情报部门"
 CZE_air_intelligence_desc: "掌握敌方空军数量是赢得空战的关键。在空中交战时，了解敌军航空力量至关重要。"
 CZE_within_the_eagles_nest: "潜伏鹰巢"
 CZE_within_the_eagles_nest_desc: "若能在敌人据点外部署大量间谍与破坏者，将极大增强我军能力。在第二局协助下，我们在这些地区的情报网络可以发展壮大。"
 CZE_restart_naval_gun_production: "重启舰炮生产"
 CZE_restart_naval_gun_production_desc: "斯柯达工厂曾是奥匈帝国最大的舰炮设计商和生产商。重启舰炮生产将为重启国内海军生产开辟机会。"
 CZE_restart_naval_gun_production_tt: "§Y斯柯达优先事项§!的海军重心§Y激活§!"
 CZE_reform_the_naval_detachment: "重建海军部队"
 CZE_reform_the_naval_detachment_desc: "由于先前将其并入陆军，海军部队早已解散。当前局势使重建该部队成为必要。"
 CZE_build_2_dockyards_when_we_have_coast_tt: "将立即在我们控制的随机一个沿海§Y地区§!建造§G2§!§Y海军船坞§!。"
 CZE_skoda_naval_yards: "斯柯达海军造船厂"
 CZE_skoda_naval_yards_desc: "重新获得出海口后，我们可借助仍在本土的技术专家，重启奥匈帝国旧有海军工业。启用本土造船厂应为优先事项。"
 CZE_build_3_dockyards_when_we_have_coast_tt: "将立即在我们控制的随机一个沿海§Y地区§!建造§G3§!§Y海军船坞§!。"
 CZE_legacy_of_the_kriegsmarine: "奥匈帝国海军的遗产"
 CZE_legacy_of_the_kriegsmarine_desc: "作为奥匈帝国海军的延续，我们仍具备建造大型战舰的能力，应继续发扬此项传统。"
 CZE_build_off_old_ganz_danubius_designs: "利用冈茨多瑙的旧设计"
 CZE_build_off_old_ganz_danubius_designs_desc: "重启格龙兹·道努比乌什的巡洋舰的旧设计，有助于新舰船开发。许多相关专家仍居住在我国境内。"
 CZE_modernize_trieste_designs: "的里雅斯特设计的现代化"
 CZE_modernize_trieste_designs_desc: "通过利用奥匈海军旧有的小型战列舰设计，我们将更好地了解如何建造这一型号的舰船。"
 CZE_leverage_gunboat_experience: "利用炮舰设计经验"
 CZE_leverage_gunboat_experience_desc: "我们在炮舰设计上的经验可被用于驱逐舰的研发。我们的现有技术基础将加快设计进程。"
 CZE_revive_kraljevica_designs: "重启克拉列维察设计"
 CZE_revive_kraljevica_designs_desc: "结合我们的炮艇知识与克拉列维察的旧设计，我们可以重启这一类驱逐舰的建造。"
 CZE_wolfs_of_bohemia: "波希米亚之狼"
 CZE_wolfs_of_bohemia_desc: "鉴于我国内仍保有潜艇建造经验，建立我们自己的“狼群”并非难事。"
 CZE_raider_lineage: "突袭传统"
 CZE_raider_lineage_desc: "奥匈帝国海军军官留下了丰富的突袭战经验，我们应加以利用。"
 CZE_a_modern_navy: "现代海军"
 CZE_a_modern_navy_desc: "随着我们在海军技术上的进步，现在我们终于可以宣称自己拥有了一支现代化的强大海军。"
 CZE_build_1_dockyards_when_we_have_coast_tt: "若控制任一沿海§Y地区§!，立即建造§G1§!个§Y海军船坞§!"
 CZE_naval_aviation: "海军航空兵"
 CZE_naval_aviation_desc: "航母及舰载机似乎是未来海战的发展方向。我们必须投入时间研发海战的新领域。"
 CZE_across_the_atlantic: "跨越大西洋"
 CZE_across_the_atlantic_desc: "高效的海军必须具备跨洋投送能力。我们必须打造能够远距离部署的海军。"
 CZE_joint_equipment_designs: "联合装备设计"
 CZE_joint_equipment_designs_desc: "[ROOT.GetNameDef]与[GER.GetNameDef]都处于坦克与飞机设计的前沿，各有擅长领域，我们应互通有无，以便各自专注于最擅长的方向。"
 CZE_negotiate_sphere_of_influence: "就势力范围开展谈判"
 CZE_negotiate_sphere_of_influence_desc: "[ROOT.GetNameDef]的军事资源对[GER.GetAdjective]联盟极具价值。我们理应要求一定的领土作为回报。"
 CZE_set_up_polish_puppet_state: "设立南[POL.GetAdjective]傀儡国"
 CZE_set_up_polish_puppet_state_desc: "既然[GER.GetNameDef]有意在波兰设立傀儡政权，我们显然也应考虑做同样的事情。"
 CZE_usurp_the_mantle: "宣称帝位"
 CZE_usurp_the_mantle_desc: "随着我们王国的疆域从波罗的海延伸至亚得里亚海，并统治着昔日区域强权奥地利的领土，我们现在可以宣称自己是神圣罗马帝国的合法继承者。"
 CZE_austro_hungary_puppets: "所有国策所需的§Y附属国§!"
 CZE_decrease_autonomy_tier: "所有§Y$autonomy_dominion$§!或§Y$autonomy_puppet$§!附属国失去一级自治度。"
 #Exile Focus
 CZE_prepare_for_exile: "准备流亡"
 CZE_prepare_for_exile_desc: "国家应秘密协助政治领袖流亡海外，并建立流亡政府。"
 CZE_joins_government_in_exile_tt: "加入§Y流亡政府§!"
 CZE_infiltrate_collaborationist_organizations: "渗透合作者"
 CZE_administrative_chaos_tt: "§Y$CZE_enter_exile$§!完成后，对§Y专员辖区§!的影响："
 CZE_infiltrate_collaborationist_organizations_desc: "将忠于流亡政府的[ROOT.GetAdjective]人士安插到合作者组织听起来或许奇怪，但这是削弱他们并掌握其活动情报的理想方式。"
 CZE_enter_exile: "流亡国外"
 CZE_enter_exile_desc: "如今潜在盟友终于开始与[GER.GetAdjective]这条鳄鱼作战，我们的政府可以开始准备，争取夺回主权。"
 CZE_refused_exile: "拒绝接纳[ROOT.GetName]"
 CZE_contact_the_czech_and_slovak_legion: "联系捷克与斯洛伐克军团"
 CZE_contact_the_czech_and_slovak_legion_desc: "勇敢的[ROOT.GetAdjective]人已逃往[POL.GetNameDef]与[FRA.GetNameDef]继续为一个自由的[CZE.GetName]而战，我们应与这些部队取得联系并协调行动。”"
 CZE_skoda_priority_shortcut_finder: "斯柯达优先事项"
 CZE_skoda_priority_shortcut_finder_desc: "这就是目前斯柯达的优先事项"
 #Decision unlock TT
 CZE_decision_unlock: "解锁决议："
 CZE_demand_regime_change_tt: "$CZE_decision_unlock$§Y要求政权更迭§!"
 CZE_propose_unification_tt: "$CZE_decision_unlock$§Y邀请国家加入捷克斯洛伐克联盟§!"
 CZE_integrate_nation_tt: "$CZE_decision_unlock$§Y整合国家§!"
 ###############################################
 #Germany
 GER_integrate_czech_manufacturers: "整合捷克制造商"
 GER_integrate_czech_manufacturers_desc: "波希米亚的工业蕴含着丰富的制造技术与资源。将捷克制造商整合进我们的生产体系，将极大提升军备工业。此举合情合理。"
 GER_integrate_czech_manufacturers_no_aat_tt: "§G启用§!§Y设计公司§!：\n§Y$CZE_skoda_works_german_organization$§!，§Y$CZE_bohmische_mahrische_maschinenfabrik_ag_german_organization$§!，§Y$CZE_zlin_aircraft_organization$§!，和§Y$CZE_ceska_zbrojovka_uhersky_brod_organization$§!"
 CZE_unlocks_sokolov_raid_pfot_tt: "解锁对§Y法尔克诺夫§!的§Y空降兵突袭§!行动。"
