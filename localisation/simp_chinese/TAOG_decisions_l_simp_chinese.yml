 ast_support_for_comrades_idea_improved_desc: "$ast_support_for_comrades_idea$"
 idea_AST_civil_war_on_their_own: "依靠我们自己"
 idea_AST_civil_war_on_their_own_desc: "我们必须独自打赢这场战争。"
 ast_foreign_communist_influence_idea: "境外共产主义影响"
 ast_foreign_communist_influence_idea_desc: "来自澳大利亚的共产主义者正在影响我们！"
