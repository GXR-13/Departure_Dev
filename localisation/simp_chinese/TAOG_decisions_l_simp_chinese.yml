 SIA_limited_war_cat: "有限战争"
 SIA_limited_war_cat_desc: "我们不能指望在公开战争中战胜该区域的大国——现在还不能。通过一场场目标有限的战役，逐块推进我们的诉求，我们将在不断壮大自身实力的同时，逐步削弱他们的阵地。"
 SIA_start_limited_war_indochina: "在印度支那发动对[FROM.GetName]的有限战争"
 SIA_start_limited_war_indochina_tt_main: "开始针对§Y[FROM.GetName]§!的§Y有限战争§!。\n控制属于§Y[FROM.GetName]§!的高亮地区，我们将可以在不升级为全面战争的情况下夺取这些地区。\n§R若投降进度损失超过 [?var:global.limited_war_surrender_threshold|%.0]，我方将输掉本场有限战争§!\n\n§R输掉有限战争可能导致我方必须归还此前征服的领土§!"
 SIA_start_limited_war_rejoin_faction: "我们将暂时离开当前的阵营，并在§Y有限战争§!结束后重新加入该阵营。"
 SIA_start_limited_war_can_join_faction: "我们将可以在§Y有限战争§!结束后重新加入阵营"
 is_not_engaged_in_a_limited_war: "未参与§Y有限战争§!"
 SIA_limited_war_indochina: "[SIA_GetLimitedWarTarget]"
 SIA_limited_war_indochina_desc: "控制所有高亮地区以赢得§Y有限战争§!，并在不升级为全面战争的情况下将其纳入版图。\n§R投降进度超过[?var:global.limited_war_surrender_threshold|%.0]将导致我们输掉这场有限战争§!"
 SIA_limited_war_indochina_target: "针对§Y[?var:limited_war_target.GetName]§!的§Y有限战争§!"
