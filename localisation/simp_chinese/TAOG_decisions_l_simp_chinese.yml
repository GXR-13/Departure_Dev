 SIA_public_credit_repayment: "公共信贷偿还"
 SIA_public_credit_repayment_tt: "我们将一次性偿还全部公共信贷，以承受巨大的临时§Y消费品§!惩罚为代价，消除所有债务。"
 idea_SIA_deficit_spending: "赤字财政"
 idea_SIA_deficit_spending_desc: "政府正在入不敷出地开支，将借来的资金注入一项加速建设计划。工业上的收益是真实的，但账单终将到期。"
 SIA_print_additional_money: "印更多钱"
 SIA_print_additional_money_tt: "我们会为日本印更多钱。"
 SIA_appeal_to_industrialists: "拉拢实业家"
 SIA_implement_industrialists_reforms_countdown: "推行工业改革"
 SIA_implement_industrialists_reforms_countdown_trigger: "建造§Y2座民用工厂§!（不包括通过国策和贸易获得的工厂）"
 SIA_appeal_to_industrialists_tt: "我们将获得实业家的支持。\n\n他们将在内战中为我们提供帮助，给予我们额外的装备。但他们期望我们在掌权后的§Y720天§!内，通过在内战结束时已有的工厂基础上再建造§Y2§!座额外的§Y民用工厂§!来扩大工业基础（不包括通过国策或贸易获得的工厂）。\n\n若未能做到，将导致§Y稳定性§!和§Y战争支持度§!下降。\n\n内战开始时，我们将获得："
 SIA_seek_support_from_constitutional_monarchists: "争取立宪君主派支持"
 SIA_implement_constitutionalist_reforms_countdown: "推行宪政改革"
 SIA_seek_support_from_constitutional_monarchists_tt: "我们将获得立宪君主派的支持。\n\n他们将在内战中为我们提供帮助，增派额外部队。但他们期望我们在掌权后的§Y720天§!内完成§Y$SIA_a_constitutional_monarchy$§!国策，以维持君主立宪制。\n\n若未能做到，将导致§Y稳定性§!和§Y战争支持度§!下降。"
 SIA_appeal_to_rural_people: "争取农村民众支持"
 SIA_appeal_to_rural_people_tt: "我们将获得农村民众的支持。\n\n他们将在内战中为我们提供帮助，给予民兵部队。但他们期望我们在掌权后的§Y720天§!内，通过完成§Y$SIA_mechanization_of_agriculture$§!或§Y$SIA_reduction_of_agricultural_yield_taxes$§!国策，来通过有利的农业政策作为回报。\n\n若未能做到，将导致§Y稳定性§!和§Y战争支持度§!下降。\n\n内战开始时，我们将获得："
 SIA_implement_rural_reforms_countdown: "推行农村改革"
 SIA_implement_absolutist_reforms_countdown: "推行专制改革"
 SIA_seek_support_from_absolutists_monarchists: "争取专制君主派支持"
 SIA_seek_support_from_absolutists_monarchists_tt: "我们将获得专制君主派的支持。\n\n他们将在内战中为我们提供帮助，增派额外部队。但他们期望我们在掌权后的§Y720天§!内完成§Y$SIA_an_absolute_monarchy$§!国策，以恢复绝对君主制。\n\n若未能做到，将导致§Y稳定性§!和§Y战争支持度§!下降。"
 SIA_appeal_to_navy_clique: "争取海军派系支持"
 SIA_appeal_to_navy_clique_countdown: "推行海军改革"
 SIA_appeal_to_navy_clique_tt: "我们将获得海军派系的支持。\n\n他们将在内战中为我们提供帮助，给予我们全部海军和一支海军陆战队师。但他们期望我们在掌权后的§Y720天§!内完成§Y$SIA_thonburi_class_coastal_defense_ship$§!国策，以通过有利的海军政策作为回报。\n\n若未能做到，将导致§Y稳定性§!和§Y战争支持度§!下降。\n\n内战开始时，我们将获得：\n§Y我们的整支海军§!\n§Y皇家泰国海军陆战队§!特种师\n§Y海军陆战队§!科技"
 SIA_appeal_for_support_cat: "争取支持"
 SIA_appeal_for_support_cat_desc: "没有哪个政治运动能单凭自己成功。君主派、立宪派、军人和平民，各自对国家的一部分拥有影响力。必须小心培植他们的支持，我们才有力量在时机到来之时果断行动。"
 SIA_demand_independence: "要求§Y[FROM.GetName]§!从§Y[FROM.OVERLORD.GetNameDef]§!独立"
 SIA_demand_independence_VIN: "要求释放§Y[VIN.GetName]§!"
 SIA_demand_independence_VIN_tt: "我们会要求[VIN.GetName]的控制者给他们自由"
 SIA_demand_independence_LAO: "要求释放§Y[LAO.GetName]§!"
 SIA_demand_independence_LAO_tt: "我们会要求[LAO.GetName]的控制者给他们自由"
 SIA_demand_independence_CAM: "要求释放§Y[CAM.GetName]§!"
 SIA_demand_independence_CAM_tt: "我们会要求[CAM.GetName]的控制者给他们自由"
 SIA_invite_to_adc: "邀请§Y[FROM.GetName]§!加入我们的阵营"
 SIA_asian_democratic_compact_cat: "亚洲民主协定"
 SIA_asian_democratic_compact_cat_desc: "亚洲人民有权自治。作为亚洲自决的旗手，我们可以向殖民列强施压，迫使其交出所控制的国家。"
 SIA_khana_ratsadon_cat: "人民党"
 SIA_khana_ratsadon_cat_desc: "终结了绝对君主制的人民党并非铁板一块。其军方派与文官派对国家各有愿景，两者间的紧张关系潜藏于每一项决策之下。务必维持两派满意，否则联合政府恐将分崩离析。"
 SIA_army_navy_reform_cat: "陆军与海军"
 SIA_army_navy_reform_cat_desc: "陆军和海军争夺着同一池有限的资源。在两军之间转移资金是一场持续的平衡术，每一次重新分配都会影响对方的战备状态。"
 SIA_divert_army_funds_to_navy_toggle: "[SIA_GetDivertingArmyFundsToNavyTitle]"
 SIA_divert_army_funds_to_navy_toggle_tt: "[SIA_GetDivertingArmyFundsToNavyTT]"
 SIA_divert_army_funds_to_navy_toggle_do: "将陆军资金转拨给海军"
 SIA_divert_army_funds_to_navy_toggle_do_tt: "我们将把部分陆军资金转拨给海军，以加速其发展。"
 SIA_divert_army_funds_to_navy_toggle_undo: "停止将陆军资金转拨给海军"
 SIA_divert_army_funds_to_navy_toggle_undo_tt: "我们不再将部分陆军资金划拨给海军。"
 SIA_standing_our_ground_mission: "坚持我方立场"
 SIA_standing_our_ground_mission_tt: "我们必须为自由而战！"
 SIA_sway_generals_to_seri_thai_tt: "我们已争取到的那批将军将在内战爆发时加入自由泰人一方，而非参与效忠者叛乱。"
 SIA_sway_general_cw_scale_tt: "内战中的我方支持度提升§Y5%§!\n若支持度超过§Y80%§!，则可避免内战，我方将兵不血刃地夺取政权"
 SIA_sway_luang_chawengsaksongkhram_to_seri_thai: "拉拢銮·差勇萨颂堪"
 SIA_sway_luang_chawengsaksongkhram_to_seri_thai_desc: "将銮·差勇萨颂堪争取到自由泰人阵营。若成功，内战爆发时他将站在我们一边。"
 SIA_sway_aditya_dibabha_to_seri_thai: "拉拢阿提贴·阿帕"
 SIA_sway_aditya_dibabha_to_seri_thai_desc: "将阿提贴·阿帕争取到自由泰人阵营。若成功，内战爆发时他将站在我们一边。"
 SIA_sway_mangkorn_phromyothi_to_seri_thai: "拉拢芒功·伏龙育提"
 SIA_sway_mangkorn_phromyothi_to_seri_thai_desc: "将芒功·伏龙育提争取到自由泰人阵营。若成功，内战爆发时他将站在我们一边。"
 SIA_sway_luang_haansongkhram_to_seri_thai: "拉拢銮·汉颂堪"
 SIA_sway_luang_haansongkhram_to_seri_thai_desc: "将銮·汉颂堪争取到自由泰人阵营。若成功，内战爆发时他将站在我们一边。"
 SIA_sway_charun_rattanakun_seriroengrit_to_seri_thai: "拉拢差伦·拉达那恭·社里龙里"
 SIA_sway_charun_rattanakun_seriroengrit_to_seri_thai_desc: "将差伦·拉达那恭·社里龙里争取到自由泰人阵营。若成功，内战爆发时他将站在我们一边。"
 SIA_sway_phichit_kriangsakphichit_to_seri_thai: "拉拢披集·江沙披集"
 SIA_sway_phichit_kriangsakphichit_to_seri_thai_desc: "将披集·江沙披集争取到自由泰人阵营。若成功，内战爆发时他将站在我们一边。"
 SIA_sway_jira_wichitsongkhram_to_seri_thai: "拉拢集拉·威集颂堪"
 SIA_sway_jira_wichitsongkhram_to_seri_thai_desc: "将集拉·威集颂堪争取到自由泰人阵营。若成功，内战爆发时他将站在我们一边。"
 SIA_sway_phin_choonhavan_to_seri_thai: "拉拢屏·春哈旺"
 SIA_sway_phin_choonhavan_to_seri_thai_desc: "将屏·春哈旺争取到自由泰人阵营。若成功，内战爆发时他将站在我们一边。"
 SIA_sway_tiang_sirikhan_to_seri_thai: "拉拢提昂·西里坎"
 SIA_sway_tiang_sirikhan_to_seri_thai_desc: "将提昂·西里坎争取到自由泰人阵营。若成功，内战爆发时他将站在我们一边。"
 SIA_khana_ratsadon_dummy_military: "军队政变风险"
 SIA_khana_ratsadon_dummy_military_tt: "若我们过于激怒军队，他们将发动政变。为了避免内战，我们不要让§Y$idea_SIA_military_rebellious$§!持续太长时间。"
 SIA_khana_ratsadon_dummy_military_desc: "军方在人民党拥有强大势力。他们不会批准有损其利益的政策，但会支持推动国家的军事化。"
 SIA_khana_ratsadon_military_coup_mission: "军队正计划推翻政府！"
 SIA_khana_ratsadon_military_coup_mission_desc: "军队认为当前的政府政策对其利益构成了威胁。若不提高他们的地位，他们将积极计划推翻政府。"
 SIA_khana_ratsadon_dummy_civilian: "文官派政变风险"
 SIA_khana_ratsadon_dummy_civilian_tt: "若我们过于激怒文官派，他们将发动政变。为了避免内战，我们不要让§Y$idea_SIA_civilian_rebellious$§!持续太长时间。"
 SIA_khana_ratsadon_dummy_civilian_desc: "文官派在人民党拥有强大势力。他们不会批准有损其利益的政策，但会支持推动国家的民主化、文官化。"
 SIA_khana_ratsadon_civilian_coup_mission: "文官派正计划推翻政府！"
 SIA_khana_ratsadon_civilian_coup_mission_desc: "文官派认为当前的政府政策对其利益构成了威胁。若不提高他们的地位，他们将积极计划推翻政府。"
 SIA_promote_civilian_wing: "拉拢文官派"
 SIA_promote_civilian_wing_desc: "通过全力投入到文官派的土地改革、司法和宪法议程中，我们可以赢得比里派系的感激。然而，这种偏袒并非无人察觉：军官团会心生不满，而在尘埃落定前，对日常行政的干扰将使我们付出沉重的代价。"
 SIA_promote_military_wing: "拉拢军方派"
 SIA_promote_military_wing_desc: "通过纵容军官的要求并炫耀武装力量，我们可以赢得披汶派系的青睐。然而，这种偏袒并非无人察觉：重组会使军队的日常工作陷入混乱，而在尘埃落定前，对日常行政的干扰将使我们付出沉重的代价。这是一种粗暴的手段，只适用于将该派系从叛乱的边缘拉回来。"
 SIA_cultivate_civilian_wing: "扶植文官派"
 SIA_cultivate_civilian_wing_desc: "王室局指令使我们得以耐心而持续地争取文官的支持。没有突然的偏袒激起反弹，只有缓慢而稳定的工作——通过一次次的让步，逐步赢得比里派系的支持。这是一条漫长的道路，但我们可以随心所欲地走下去。"
 SIA_cultivate_military_wing: "扶植军方派"
 SIA_cultivate_military_wing_desc: "王室局指令使我们得以耐心而持续地争取军方的支持。没有突然的偏袒激起反弹，只有缓慢而稳定的工作——通过一次次的让步，逐步赢得军官团的支持。这是一条漫长的道路，但我们可以随心所欲地走下去。"
 SIA_end_factionalism_mission: "维系联合政府"
 SIA_end_factionalism_mission_desc: "人民党的两派均坚定支持政府。如果能让双方在§Y270§!天内保持§G全力支持§!，两派之间的纷争便可永远平息。若任何一方的热情出现动摇，就必须从头再来。"
