 INS_militias_railway_pemuda_mission: "铁路青年团要求参战"
 INS_revolution_planning_cat: "地下革命"
 INS_revolution_planning_hq: "在[FROM.GetName]建立革命总部"
 INS_revolution_planning_hq_desc: "我们将在[FROM.GetName]设立民兵总部，作为我们在群岛各地的民兵基地的中央指挥机构。我们的总部及其周边地区将成为渗透行动的优先目标，并将牢牢处于我们的掌控之下。"
 INS_revolution_planning_hq_tt: "已建造最多§Y3§!个革命总部"
 INS_revolution_planning_hq_DONE: "革命总部"
 INS_revolution_planning_hq_DONE_desc: "这里是我们的革命总部，民兵在此报到。一旦我们宣布独立，该地区将处于我们的控制之下。"
 INS_revolution_planning_hq_DONE_trigger_tt: "只能建立一个总部"
 INS_revolution_planning_envoy_DONE_trigger_tt: "无法在同一地区建立多个基地"
 INS_revolution_planning_envoy_DONE: "[FROM.GetName]的民兵基地"
 INS_has_revolutionary_hq: "已建立革命总部"
 INS_revolution_planning_influence_state: "在[FROM.GetName]建立民兵基地"
 INS_revolution_planning_influence_state_desc: "我们将派遣民兵前往[FROM.GetName]建立民兵基地，以确保当地革命者能与总部保持联系，并在我们宣布独立后更便于开展行动。"
 INS_revolution_planning_cat_map_name: "选择一个地区来管理民兵活动"
 INS_state_revolution_hq_tt: "一旦我们宣布独立，该地区将由我们控制"
