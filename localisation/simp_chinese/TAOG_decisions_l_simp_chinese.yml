 AST_call_on_fascists: "[GET_AST_CALL_ON_FASCISTS]"
 AST_call_on_fascists_desc: "作为一个支持者甚少的小型运动，澳大利亚优先运动常常入不敷出。然而，拥有相似理念的外国团体已表示愿意资助我们的雄心，为我们持续前进提供了解决方案。"
 AST_call_on_japanese_fascists: "呼吁日本法西斯援助"
 AST_call_on_foreign_fascists: "呼吁外国法西斯援助"
 AST_a_convenient_disaster: "适当的灾难"
 AST_a_convenient_disaster_desc: "无论澳大利亚优先党如何受到欢迎，保守派总会抵制该团体的意识形态。要让澳大利亚优先党成功掌权，可能需要比常规选举更具冲击力的事件——一个能让政府陷入混乱的事件。\n\n我们本身没有能力制造此类事件，但我们的外国法西斯支持者却有。通过帮助我们上台，外国法西斯分子将在[AST.GetName]获得一个盟友。"
 AST_a_convenient_disaster_tt: "\n该事件将颠覆现任政府，最终使§Y[AST.GetFascistParty]§!成为执政党。"
 AST_a_convenient_disaster_flag: "§Y堪培拉空难§!已通过§Y适当的灾难§!决议触发。"
