 SIA_war_fervor_cat: "战争热情"
 SIA_war_fervor_cat_desc: "民众对战争的渴望必须小心驾驭。一旦失控，战争狂热将反噬自身——一个煽动了好战精神却不能加以引导的政府，可能会沦为这股情绪的下一个目标。"
