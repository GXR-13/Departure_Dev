l_simp_chinese:
 HOL_recall_conrad_helfrich: "从东印度召回康拉德·赫尔弗里赫"
 HOL_recall_conrad_helfrich_desc: "在此紧迫时刻，我们必须将祖国置于一切之上。康拉德·赫尔弗里赫，身为荷兰皇家海军最优秀的海军上将，必须返回荷兰。"
 INS_is_taking_volksraad: "目前正在人民议会通过一项法律"
 INS_volksraad_cat: "人民议会"
 INS_volksraad_cat_desc: "人民议会于1918年成立，是试图在东印度群岛推行民主制度的一项举措，也是所谓“伦理政策”实施的一部分。议会席位由荷兰和印度尼西亚官员共同担任，通过不同方式选拔产生。尽管荷兰保留无条件否决权，但人民议会仍可向政府提交动议案和法律草案。"
 INS_volksraad_allow_language_in_schools: "允许在学校使用印尼语"
 INS_volksraad_allow_language_in_schools_desc: "在东印度群岛，接受高等教育的机会主要限于荷兰人和会说荷兰语的印尼富裕阶层，因为荷兰语是高等教育使用的唯一教学语言。人民议会中一项关于开设印度尼西亚语学校的动议目前正等待总督做出决定。"
 INS_volksraad_allow_language_in_government: "允许在政府使用印尼语"
 INS_volksraad_allow_language_in_government_desc: "东印度群岛的政府职位，包括人民议会的职位，均要求精通荷兰语，这导致人民议会中的许多成员，尤其是本土社区的代表，质疑其民主的有效性。他们已提出一项议案，坚持认为政府职位应尽可能由会说印尼语的人担任。"
 INS_volksraad_remove_education_quotas: "废除教育配额制度"
 INS_volksraad_remove_education_quotas_desc: "东印度群岛现行的教育体系采用教育配额制，规定必须招收一定数量的印度尼西亚学生和一定数量的荷兰学生。这在人民议会中一直存在争议，普遍认为这不公地偏向荷兰人。虽然我们可以任由人民议会就如何改革这一制度争论多年，但或许彻底废除配额制更值得考虑。"
 INS_volksraad_reduce_rubber_export_tax: "降低私营橡胶出口税"
 INS_volksraad_reduce_rubber_export_tax_desc: "目前，对私营公司出口橡胶征收的税率极高，使我们得以维持市场垄断。然而，由于私营种植园难以运营，这已导致部分地区经济停滞。在政策实施之初，这被认为是值得的，但大萧条引发的国际保护主义已使我国的橡胶出口经济利润大幅缩水。或许降低这项赋税以刺激经济是值得考虑的。"
 INS_volksraad_knil_rank_limit: "通过军衔反歧视法"
 INS_volksraad_knil_rank_limit_desc: "虽然并无明文规定禁止印尼本土人士在荷兰皇家东印度陆军晋升，但存在一条不成文的规定，导致即便表现最为出色的军事人员也无法晋升至上校以上的军衔。人民议会中的多个党派一直在向政府施压，要求认可表现优异的印尼军官所做出的努力。"
 INS_volksraad_legalize_displaying_flag: "合法化红白旗展示"
 INS_volksraad_legalize_displaying_flag_desc: "目前，“印度尼西亚”的红白旗因与民族主义、反殖民组织有关联而被禁止公开展示。将其展示合法化，或许能表明我们愿意合作的意向，并可能阻止整个群岛范围内民族主义者的持续激进倾向。"
 INS_volksraad_education_subsidies_for_indonesians: "向非荷兰居民开放教育补贴"
 INS_volksraad_education_subsidies_for_indonesians_desc: "人民议会内部一直就向东印度群岛荷兰学生提供的补贴和奖学金展开争论。人民议会中多位本土社区代表认为，这一制度应扩大至所有学生，不论其背景如何。此举虽花费不菲，但能为我们赢得民众不少好感。"
 INS_volksraad_indonesian_national_language: "采纳印度尼西亚语为官方语言"
 INS_volksraad_indonesian_national_language_desc: "印度尼西亚语已逐渐成为群岛许多地区的通用语言，连接了不同文化间的语言隔阂。随着印度尼西亚语如今在教育及政府职位中被允许使用，许多人民议会议员一直在请愿，要求在法律上承认其作为殖民地的官方语言，与荷兰语享有同等地位。"
 INS_volksraad_official_flag: "正式确立印度尼西亚国旗"
 indonesia_volksraad_official_flag_effect_tt: "我们的国旗将更改为红白旗。"
 INS_volksraad_official_flag_desc: "人民议会中推动自治的动议最终获得成功，数年前尚被称为荷属东印度的国家，如今已成为印度尼西亚自治领。我们的国旗应当相应调整，以反映这些变化。"
