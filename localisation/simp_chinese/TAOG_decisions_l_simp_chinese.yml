 INS_soetardjo_petition: "苏达乔请愿等待批准中"
 INS_soetardjo_petition_desc: "苏塔尔乔呼吁的圆桌会议已召开，会议得出结论，[INS.GetNameDef]必须满足一系列经济要求以确保自给自足。我们必须向这些目标展现出明确进展，否则[HOL.GetNameDef]最终将推翻决议以维持现状。"
 INS_soetardjo_petition_refresh_tt: "重新激活任务：§Y苏达乔请愿等待批准中§!，任务限时为§Y120天§!。"
 INS_soetardjo_pending: "人民议会辩论《苏塔尔乔自治请愿书》"
 INS_soetardjo_pending_desc: "苏塔尔乔是人民议会中以领导和平民族主义运动而闻名的议员。他目前正在组织一项请愿，要求给予[INS.GetNameDef]更多自治权，并呼吁在荷兰与印度尼西亚代表之间召开圆桌会议，以商讨印度尼西亚人希望作为荷兰联邦一部分实现自治的意愿。目前，该请愿正在人民议会内部进行辩论。待这些辩论结束后，我们必须决定如何回应，而这份请愿的后果意义重大。"
 INS_flag_legalized: "展示红白旗是合法的"
 INS_owned_states_at_game_start_tt: "所有印度尼西亚地区"
 INS_win_condition_base_republic_warning: "击垮东印度群岛"
 INS_win_condition_base_republic_warning_desc: "我们必须继续战斗，招募平民，并确保每一位印度尼西亚人心中的火焰持续燃烧。一旦我们推翻东印度群岛的统治，[HOL.GetNameDef]将别无选择，只能投降。"
 INS_win_condition_base_republic_real: "击垮东印度群岛"
 INS_win_condition_base_republic_real_desc: "我们必须继续战斗，招募平民，并确保每一位印度尼西亚人心中的火焰持续燃烧。一旦我们推翻东印度群岛的统治，[HOL.GetNameDef]将别无选择，只能投降。"
 will_complete_when_conditions_met_tt: "满足前置条件后将自动选择。"
 INS_militias_cat: "人民武装"
 INS_militias_basic_summon: "动员平民"
 INS_militias_basic_summon_desc: "我们将招募对印度尼西亚独立充满热情的青年和学生，加入人民安全军作为武装民兵。"
 INS_militias_kris_repayment: "人民奉献力量民兵要求投资苏拉威西"
