 AST_australasia_flag: "§Y澳大拉西亚§!已成立"
 AST_australia_formables_category: "澳大拉西亚"
 AST_australia_formables_category_desc: "尽管[AST.GetName]的根脉始终将我们与遥远的南方相连，但我们的臂膀已伸得又长又远，使他人再也无法将我们对全球事务的看法置于不顾。我们开始扩张，并将不断扩张，而一个新的国名将昭示这一点。我们将自[AST.GetName]的茧中破出，展翅翱翔，让世界为之赞叹与认可，以我们的色彩与纹章命名为南方的新国度——澳大拉西亚。"
