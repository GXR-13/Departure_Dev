 AST_aid_australian_military_construction_desc: "英国尚未做好战争准备。通过援助澳大利亚的军事建设，我们可以缓解他们的急躁情绪。"
 AST_japanese_war_mission: "对日战争"
 AST_japanese_war_mission_desc: "澳大利亚不想独自面对其强敌——[JAP.GetNameDef]。他们正敦促我们迈出第一步，尽早解决这场迫在眉睫的冲突。"
