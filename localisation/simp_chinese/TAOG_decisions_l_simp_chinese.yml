 INS_is_deescalating_tt: "目前未在执行降低激化度的任务。"
 INS_escalate_the_conflict: "加剧冲突"
 INS_escalate_the_conflict_desc: "我们将组织与敌方部队的暴动和小规模冲突，以提高紧张局势和升级，为后续更严厉的行动减少国际监督奠定基础。"
 INS_escalate_the_conflict_HOL: "$INS_escalate_the_conflict$"
 INS_escalate_the_conflict_HOL_desc: "$INS_escalate_the_conflict_desc$"
 INS_deescalate_the_conflict: "请求国际调解"
 INS_deescalate_the_conflict_2: "下令停火"
 INS_deescalate_the_conflict_desc: "荷兰人不会跟我们诚意谈判。在他们眼里，我们仍然是叛乱分子，是需要镇压的麻烦，而不是一个值得认真对待的国家。但世界上的大国则是另一回事，海牙不能那么轻易地打发它们。我们将呼吁国际社会调停，借助外部压力促成我方声音无法达成的结果。"
 INS_deescalate_the_conflict_2_desc: "我们的突袭已见成效。殖民驻军领教了我们的实力，海牙也知道我们并未屈服。但每一次打击都让荷兰有新的理由派遣更多兵力和舰船，而我们尚未准备好面对公开战争。命令将传至各指挥官：暂停开火。下一次打击的时间将由我们自行决定，而不是听由荷兰向我们的挑衅。"
 INS_renville_tt_HOL: "§W§Y[USA.GetFlag][USA.GetNameDefCap]§!将向我们发出最后通牒。如果我们不投降并从印度尼西亚撤出，他们将对我们§R宣战§!。§!"
 INS_renville_wont_happen_neutral_tt: "冲突将在美国谈判结束前结束，他们将无法进行干预。"
 INS_renville_explain_USA_tt: "如果冲突未在§Y365天§!内解决：\n\n"
 INS_renville_timer_mission_republic: "伦维尔号协议待决"
 INS_renville_timer_mission_HOL: "$INS_renville_timer_mission_republic$"
 INS_national_revolution_peace_negotiation: "谈判让[FROM.GetName]撤军"
 indonesia_reduce_escalation_1_effect_tooltip_for_min_4: "降低激化程度§G1§!，最低§Y4§!。"
 INS_ongoing_influence_process: "尚未建立民兵基地"
 INS_current_revolution_strength_3_tt: "该地区当前存在§G高度§!民兵活动。"
 INS_current_revolution_strength_0_tt: "该地区目前没有任何民兵活动。"
 INS_has_spent_points_trigger_tt: "无法建立更多民兵基地"
 INS_national_revolution_cat: "印度尼西亚民族革命"
 INS_national_revolution_cat_desc: "经历了350年的荷兰暴政后，如今我们已掌握局面，宣布独立。荷兰不承认我们的权威，依然将东印度群岛作为其殖民地进行统治，并将我们视为罪犯。\n\n我们必须继续掌控更多地区和重要城市，并从内部推翻荷兰政府。但我们必须谨慎行事，未经周密策划不能过于激进，冒险的行为可能会招致荷兰的军事行动。"
 INS_national_revolution_cat_map: "发动佯攻起义"
 INS_national_revolution_dutch_cat: "东印度革命民兵"
 INS_national_revolution_dutch_cat_desc: "东印度群岛的革命分子已非法宣布独立，并依靠民兵武装控制了该地区多处地域。尽管我们已尽最大努力，但因当地民兵数量庞大，我们始终未能重建对这些区域的控制。\n\n我们必须在他们控制更多城市、进一步破坏东印度群岛行政稳定之前阻止他们。虽然这很极端，但若他们继续如此行事，军事手段或许将不可避免。"
 INS_HOL_revolution_not_going_well_tt: "§R没有巴达维亚，我们就无法统治东印度群岛，除了与革命者谈判和平协议外别无选择。§!"
 INS_gradual_escalation_republic: "态势逐步升级"
 INS_gradual_escalation_HOL: "态势逐步升级"
 INS_gradual_escalation_republic_desc: "荷兰人的报复在我们每一次袭击后都变得更加严厉，他们的巡逻队推进到了几个月前就已经放弃的地区。我们的指挥官报告说，在那些早就被认为已经平定的地方，战斗变得更激烈了，而我们的伤亡增长速度比征兵人员补充的速度还要快。冲突已蔓延至去年尚属平静的省份。"
 INS_gradual_escalation_HOL_desc: "来自我们各驻扎地的报告一周比一周糟糕。叛军在据信不活动的区域发动袭击，巴达维亚的军事指挥部要求采取前所未有的严厉措施。在海牙，每次内阁会议上主张耐心的人都越来越少。"
 INS_national_revolution_republic_win_ins_tt: "[INS.GetAdjective]共和派民兵将§G事实控制§!该地区，冲突将以§G共和派胜利§!告终。"
 INS_national_revolution_republic_win_hol_tt: "[INS.GetAdjective]共和派民兵将§R事实控制§!该地区，冲突将以§R共和派胜利§!告终。"
 INS_national_revolution_dutch_cat_map: "查看民兵占领的地区"
 INS_take_batavia: "夺取爪哇控制权"
 INS_take_batavia_desc: "荷兰人的贪婪使他们几乎只投资于爪哇，而忽略了东部诸岛，这使爪哇成为整个殖民地的致命弱点。这将是他们倒台的关键！我们必须将兵力投入爪哇岛，摧毁荷兰人的通讯和补给网络，让东印度群岛的行政机构无法运转。"
 INS_hold_batavia_HOL: "守卫爪哇"
 INS_hold_batavia_HOL_desc: "共和军已开始行动，将其大部分兵力转移至爪哇，试图控制整个岛屿。我们必须继续抵抗，他们的行动风险极大，一旦失败，我们就有了推翻他们政权的机会。"
 INS_militias_moestopo_mission: "穆斯托波要求凭借其军功获得晋升"
 INS_militias_pki_uprising_mission: "共产党起义不可避免"
 INS_pacific_revolution_cat: "太平洋革命"
 INS_instigate_in_country: "煽动[FROM.GetName]革命"
 INS_instigate_in_country_desc: "我们的革命并未随着最后一名殖民士兵被逐出[ROOT.GetAdjective]土地而结束。[FROM.GetName]的工人与农民仍遭受着我们曾挣脱的同样枷锁，如今他们正将我们视为压迫者能被击败的明证。我们将派遣鼓动者深入他们中间，分发传单，资助他们的工会，并煽动不满的火焰，直至革命条件成熟。"
 INS_launch_revolution: "号召革命"
 INS_launch_revolution_desc: "[FROM.GetName]的条件已经成熟。我们的特工报告工厂与田间的不满情绪日益增长，当地党支部已准备行动。此刻已到号召[FROM.GetName]的工人与农民奋起夺取他们应得的一切了。"
 INS_anti_colonialist_bonus: "在[FROM.GetName]传播反殖民主义情绪"
 INS_anti_colonialist_bonus_desc: "[FROM.GetName]的人民为外国主子的利益而辛劳，被迫服务于非己之利。我们将提醒他们，屈服是一种选择，他们的主人也并不像他们表面那样强大。"
 INS_revolutionary_sentiment: "与[FROM.GetAdjective]革命者合作"
 INS_revolutionary_sentiment_desc: "[FROM.GetName]内部已有一些人自发投身于这项事业。他们缺乏组织与资源，却不乏信念。通过与这些团体协作，我们能加速现有秩序的崩溃，即便由此引发的不稳定会在短期内使国家更难以治理。"
 INS_arm_militias: "武装地方[FROM.GetAdjective]民兵"
 INS_arm_militias_desc: "传单与演说所能推动的革命进程终究有限。时机到来时，我们在[FROM.GetName]的同志必须能够战斗。剩余的武器与补给将被偷运给同情我们的民兵，这样反动的势力将面对一支武装的民众，而非毫无防卫之力的人民。"
 INS_arm_militias_tt: "如果内战爆发，共产党将获得额外的师。"
 INS_propoganda_mission: "通过[FROM.GetName]传播共产主义"
 INS_propoganda_mission_desc: "党的组织者将被派往[FROM.GetName]各地，建立读书会，在工会中招募成员，并将革命的信息带到村庄。我们今天播下的种子，不久便将结出果实。"
 INS_abandon_mission: "放弃任务"
 INS_abandon_mission_desc: "我们的资源并非无限，而[FROM.GetNameDef]的斗争所需要的远超过我们目前所能提供的。我们将撤回我们的代理人，并把我们的努力转向最需要的地方。"
