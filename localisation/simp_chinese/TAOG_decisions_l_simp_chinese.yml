 SIA_release_contigency_funds: "释放应急资金"
 SIA_release_contigency_funds_tt: "§Y$idea_SIA_contingency_funds$§!追加效果\n"
 SIA_release_contigency_funds_tt2: "§Y[?var:SIA_contingency_funds]§!个月。到期后资金将消失。我们在和平时积累资金的时间越长，战时资金持续的时间就越长。"
 has_released_contingency_funds: "已释放应急资金"
 AST_election_approaching_cat: "选举临近"
 AST_election_approaching_cat_desc: "一届政府刚刚安顿好，下一次选举就已临近。民主党派正争先恐后地寻求一切能提高支持率的手段，盼望着在投票站开启、票箱装满选票之时，这足以确保胜利。"
 AST_final_reforms_mission: "最终改革"
 AST_final_reforms_mission_desc: "凭借稳定的领导、保守的倾向和对英国的忠诚，澳大利亚联合党巩固了支持，使连任的可能性日渐增大。为维持公众支持，其领导人必须加快改革。\n\n§Y激活期间效果：§!\n§W（§Y民主§!国策）：\n完成时间减少§Y7§!天§!"
 AST_final_reforms_effect_tt: "\n§Y$AST_final_reforms_mission$§!激活期间效果（§Y180§!天）："
 AST_labor_campaign_tour_mission: "工党巡回竞选"
 AST_labor_campaign_tour_mission_desc: "在其代表每一个公民的使命中，澳大利亚工党对帝国主义和澳大利亚对帝国的忠诚采取了不同的视角。国内需求将放在首位，外国利益不应再被优先考虑。\n\n为了向当前执政党和选民传达这一信息，澳大利亚工党将启动一场全国性的巡回竞选。\n\n§Y激活期间效果：§!\n§W每日§Y澳大利亚工党§!选票增长：§G+0.05§!§!"
 AST_labor_campaign_tour_effect_tt: "\n§Y$AST_labor_campaign_tour_mission$§!激活期间效果（§Y180§!天）：\n每日§Y澳大利亚工党§!选票增长：§G+0.05§!\n\n§Y180§!天后效果："
 AST_election_season_cat: "选举季"
 AST_election_season_cat_desc: "一届政府刚刚安顿好，下一届就准备接替其位置。此时已很难做什么来左右公众支持，尽管这并不会阻止各党派尝试。不到最后一刻，一切尚未结束，而那一天将在投票箱前到来。"
 AST_election_countdown: "选举倒计时"
 AST_election_countdown_desc: "距离投票站开启只剩数日。\n\n§W$AST_expected_election_winner_tt$§!"
 AST_government_formation_period: "政府组建期"
 AST_government_formation_period_desc: "每个党派都希望有权制定自己的政策，但如果特定局势需要，一个国民团结政府可能是最合理的选择。\n\n§W§Y激活期间效果：§!\n£GFX_trigger_yes $AST_election_recently_concluded$\n\n$AST_ruling_party$可以组建一个§Y国民团结政府§!。\n\n在澳大利亚国策树中的民主选举窗口组建§Y国民团结政府§!。§!"
 AST_war_is_coming_cat: "战争将至"
 AST_war_is_coming_cat_desc: "紧张局势正在加剧，澳大利亚官员和民众都开始意识到，无论政策或意愿如何回避，战争或许都无法避免。\n\n我们必须召开内阁会议，以决定遭受入侵时的应对程序。但在会议之前，或许值得采取某些可能无法获得全体内阁成员同意的行动。"
 AST_seize_civilian_industry: "征用民用工业"
 AST_seize_civilian_industry_desc: "尽管消费品对我国的公民和经济都至关重要，但无法回避的事实是，战时会有更迫切的需求。战争即将来临，我们必须做好准备。"
 AST_scorch_the_north: "焦土北方"
 AST_scorch_the_north_desc: "如果我们怀疑北方有入侵的可能，有多种方法可以挫败这种进攻，尽管这需要付出代价。焦土政策会阻碍我国北方各州的发展，但这或许正是抵御侵略者所必需的。"
 AST_scorch_the_north_tt: "§Y北方地区被登陆时的效果：§!"
 AST_the_brisbane_line: "布里斯班防线"
 AST_the_brisbane_line_desc: "[AST.GetName]的国防能力可能不足以完全抵御外来侵略。通过采取优先加强关键领土防御的政策，而不是对所有地区进行薄弱防御，我们可以确保国内最发达和人口最多的区域仍处在我们控制之下。\n\n尽管这一政策无疑会遭到那些反对任何形式妥协的人的反对，但政府有责任引导[AST.GetName]走向合理的道路。"
 AST_summon_the_cabinet_mission: "召集内阁"
 AST_summon_the_cabinet_mission_desc: "召集外交官、官员和军事理论家到堪培拉；必须讨论发生入侵的可能性。"
 AST_summon_the_cabinet_tt1: "\n此事件将颠覆现任政府，可能导致其§Y崩溃§!。"
 AST_australian_accusations_modifier: "澳大利亚的指控"
 AST_cabinet_trust_cat: "内阁信任度"
 AST_cabinet_trust_increase_tt: "\n§G增加§!§Y内阁信任度§!\n"
 AST_cabinet_trust_decrease_tt: "\n§R减少§!§Y内阁信任度§!\n"
 AST_cabinet_trust_remove_tt: "§G移除§!§Y内阁信任度精神§!"
 AST_australian_comforts_fund: "£BoP_right_texticon 澳大利亚慰军基金"
 AST_australian_comforts_fund_desc: "政府将通过投资澳大利亚慰军基金来纪念堪培拉空难的一位遇难者，该基金的积极工作者之一正是这位遇难者的遗孀。\n\n该基金旨在通过向士兵们提供军队口粮和个人装备之外的补给品，来缓解他们在战场上度过的时光。因此，投资也将有助于战事。"
 AST_eminent_successors: "£BoP_right_texticon 杰出的继任者"
 AST_eminent_successors_desc: "堪培拉空难的部分遇难者是备受尊敬的政府官员。虽然无法弥补他们遭遇的可怕命运，但任命几位杰出的继任者或许能够稳定政府，并恢复公众和部长们的信任。"
 AST_critics_to_shame: "£BoP_right_texticon 让批评者蒙羞"
 AST_critics_to_shame_desc: "堪培拉空难影响了整个国家，哀悼之情触及每一位澳大利亚人。在这样的时刻，总有人试图趁火打劫。我们将揭露那些最聒噪的批评者——他们的批评实质上是企图破坏秩序。"
 AST_approach_the_independents: "£BoP_left_texticon 争取独立人士"
 AST_approach_the_independents_desc: "政府已不稳定，因为人们对其引领澳大利亚走出近期动荡的信心日渐丧失。通过争取独立人士，或许能说服他们认识到，更换政府才是最佳选择。"
 AST_a_sound_voice: "£BoP_left_texticon 可靠的声音"
 AST_a_sound_voice_desc: "在此政治动荡时期，一个充满自信的声音似乎赢得了澳大利亚人民的信任。这会是[AST.GetName]未来领导人的声音吗？"
 AST_challenge_government_narrative: "£BoP_left_texticon 挑战政府叙事"
 AST_challenge_government_narrative_desc: "政府就堪培拉空难所公布的细节似乎不同寻常，难免引发信息可能被隐瞒的猜测。一位经验丰富的澳大利亚皇家空军飞行员，怎会在理想的飞行条件下坠毁？必须要求政府给出答案。"
 AST_make_a_common_enemy: "制造共同敌人"
 AST_make_a_common_enemy_desc: "随着堪培拉空难中遇难官员的离去，不信任的声音日益增多。坠机事件的异常情况助长了对外国势力介入的猜疑，而这并非唯一缘由——毕竟，没有什么比共同的敌人更能团结人心。"
 AST_make_a_common_enemy_tt: "§R事件可能效果：§!"
 AST_ensure_cabinet_loyalty: "确保内阁忠诚"
 AST_ensure_cabinet_loyalty_desc: "只要内阁多数投票支持现任政府，不信任动议的威胁就毫无危险。我们将确保内阁的忠诚。"
 AST_castle_crumbling_mission: "大厦将倾"
 AST_castle_crumbling_mission_desc: "澳大利亚在惨痛的堪培拉空难后仰赖其领导者的指引。现任政府在失去内阁官员后是否仍值得公众信任？或者更换领导层才是最佳选择？"
