 AST_big_business_request_ongoing_flag: "大企业协定§Y进行中§!"
 AST_naval_expansion: "$NOR_alt_dem_naval_expansion$"
 AST_naval_expansion_desc: "作为[ROOT.GetFascistParty]推行有利于商界政策的回报，主要商业领袖已同意投资于符合党内目标的工业改革。\n\n如果[AST.GetName]想要在面对拥有更强海军力量的敌人时有一线生机，就必须扩充舰队。在有限时间内，所有人员都将投身船坞工作，以确保舰船产量提升。"
 AST_factory_conversions: "工厂转换"
 AST_factory_conversions_desc: "为了让[ROOT.GetFascistParty]推行对他们有利的政策，作为交换，主要商界人士已同意投资符合该党目标的工业改革。\n\n国防工业必须被优先考虑，因此澳大利亚的工厂必须进行改造以支持它。"
 AST_land_development: "土地开发"
 AST_land_development_desc: "为了让[ROOT.GetFascistParty]推行对他们有利的政策，作为交换，主要商界人士已同意投资符合该党目标的工业改革。\n\n[ROOT.GetName]过多的土地仍未工业化且发展不足。通过开发这些地区，我们将使其适宜进行建设。"
 AST_electrical_grid_expansions: "电网扩建"
 AST_electrical_grid_expansions_desc: "为了让[ROOT.GetFascistParty]推行对他们有利的政策，作为交换，主要商界人士已同意投资符合该党目标的工业改革。\n\n通过扩展我们的电网，我们可以促进不依赖进口的国内能源生产。"
 AST_factory_investments: "工厂投资"
 AST_factory_investments_desc: "为了让[ROOT.GetFascistParty]推行对他们有利的政策，作为交换，主要商界人士已同意投资符合该党目标的工业改革。\n\n如果我们想确保在冲突时期军用与民用物资都保持充足，就需要扩展我们的工业产能。"
 AST_develop_port_kemla_steel_medium_decision: "建造第二座肯布拉港高炉"
 AST_develop_port_kemla_steel_medium_decision_desc: "肯布拉港仅凭一座高炉便始终运作良好，但需求的增长让我们或许需要建造第二座。这将使该地区的钢铁产量大致翻一番。"
 AST_prospect_pilbara_iron_decision: "开放皮尔巴拉地区进行采矿"
 AST_prospect_pilbara_iron_decision_desc: "皮尔巴拉地区拥有巨大的铁矿石储量，位居世界前列。然而，在这个国家极其偏远的地区，开发这一资源所需的投资将是巨大的……但反过来，其利润也将同样巨大。"
 AST_scale_up_pilbara_mines_steel_decision: "扩大皮尔巴拉矿区"
 AST_scale_up_pilbara_mines_steel_decision_desc: "既然皮尔巴拉地区已开放大规模开采，现在是让投资流入的时候了！"
 AST_pilbara_mining_tt: "向§Y$STATE_870$§!开放进一步的勘探，将解锁一项可重复执行的决议，可以无限地提高钢铁产量。"
 AST_scale_up_middleback_mines_steel_decision_1: "扩大艾恩诺布矿场"
 AST_scale_up_middleback_mines_steel_decision_1_desc: "尽管艾恩诺布矿场已运营一段时间，但随着铁矿石需求的不断增长，现在是时候在此地扩大我们的投入了。"
 AST_scale_up_middleback_mines_steel_decision_2: "开放铁君主矿场"
 AST_scale_up_middleback_mines_steel_decision_2_desc: "艾恩诺布矿场已无法满足我们的需求，幸运的是中背山脉富含铁矿。是时候建立我们迄今为止最大的矿山了！"
 AST_scale_up_middleback_mines_steel_decision_3: "开放铁亲王矿场"
 AST_scale_up_middleback_mines_steel_decision_3_desc: "战争使得对金属的需求达到了史无前例的高度，而中背山脉仍能持续提供供应。"
 AST_expand_iron_mining_tt: "同时拥有§Y$AST_exports_for_economic_recovery$§!和§Y$AST_within_reach$§!将使我们能够开发§Y$STATE_870$§!的皮尔巴拉地区，释放近乎无限的§Y钢铁§!资源。我们可以利用这一点来推动我们的经济发展。"
 AST_develop_port_kemla_steel_tt: "这将使我们能够采用§Y建造第二座肯拉港高炉§!决议，从而显著提升我们的§Y钢铁§!产量。"
 AST_develop_middleback_tt: "这将解锁三项决议，以发展我们在§Y$STATE_519$§!的§Y钢铁§!生产"
 AST_expand_planned_extraction_pilbara_tt: "§Y$AST_planned_extraction$§!将开启对§Y$STATE_870$§!的皮尔巴拉地区的开发，以此将获得近乎取之不尽的§Y钢铁§!资源。我们可将其用于推动本国经济发展。"
 AST_ireland_weapon_smuggling_cat: "武装爱尔兰人"
 AST_smuggle_arms_to_ireland: "向爱尔兰走私武器"
 AST_smuggle_arms_to_ireland_desc: "我们必须为爱尔兰人提供对抗英国人所需的武器。"
 AST_smuggle_arms_to_ireland_ongoing_flag: "武器走私§Y进行中§!"
 AST_smuggle_arms_to_northern_ireland: "向北爱尔兰走私武器"
 AST_smuggle_arms_to_northern_ireland_desc: "如果我们能确保北爱尔兰的武器供应充足，并与爱尔兰建立足够的联系，我们将能使其在英国介入之前完成与爱尔兰的统一。"
