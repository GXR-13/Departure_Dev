 SIA_start_limited_war_malaysia_burma: "对[FROM.GetName]发动有限战争"
 SIA_new_territories_administration_cat: "新领土管理"
 SIA_new_territories_administration_cat_desc: "征服仅仅是个开始。我们所取得的领土必须加以治理、开发和保卫，才能成为国家持久的一部分，而不至于变成招致重新征服的累赘。"
 SIA_finish_the_triangular_defense_network: "完成三角防御网络"
 SIA_finish_the_triangular_defense_network_desc: "随着北方与南方的两座要塞完工，我们可以将它们与曼谷连为一体，构建一个三角防御网络。即便其中一处失守，其余两处仍可正常运作。"
