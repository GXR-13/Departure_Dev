 SIA_use_abandoned_french_tools_desc: "法国人在我们被占领的领土上留下了一些重型设备，我们可以自己使用。"
 SIA_fortress_saigon: "西贡要塞"
 SIA_fortress_saigon_desc: "我们新帝国的北部将由河内负责守卫。其北面环山，前有红河，地理位置极佳，足以阻挡任何入侵者。"
 SIA_fortress_hanoi: "河内要塞"
 SIA_fortress_hanoi_desc: "帝国南方将由西贡保卫。这座要塞城市将作为曼谷的守护者，保护[ROOT.GetName]湾免受入侵。"
