 AST_communism_support_text: "[?party_popularity_100@communism|Y]%共产主义支持度"
 AST_union_control_1_cat: "工会控制"
 AST_union_control_1_cat_desc: "我们的工会成员已开始在全澳大利亚普通民众中动员支持。我们可以渗透每个州的立法机构，从内部为共产党领导的政府建立支持。这将耗费大量政治权力，并可能动摇国家的稳定。\n\n新卫队退伍军人正密切注视着我们的一举一动，如果政府未能及时行动，或国家变得过于动荡，这场冲突可能会将整个国家彻底撕裂。\n\n共产主义支持率：[?party_popularity_100@communism|Y]§Y%§!\n\n§R若稳定度降至40%以下，或退伍军人叛乱计时结束，内战将爆发。§!"
 AST_union_control_1_cat_name: "选择争取工会支持的地点"
 AST_union_control_1_map_area_name: "仍可施加影响的地区"
 AST_nationalizing_cat: "国有化"
 AST_union_control_2_cat: "工会控制"
 AST_union_control_2_cat_desc: "[ROOT.GetNonIdeologyName]的工人推翻了自己的压迫者，不是为了眼睁睁看着帝国主义列强继续将我们海外的同志禁锢于锁链之中。将共产主义传播到我们边界之外，不仅是意识形态的目标，更是战略上的必要。我们必须在海洋彼岸煽起革命之火，为那些将挣脱帝国主义枷锁的人们带去希望和资源，直至旧秩序再无立足之地。"
 AST_union_control_2_foreign_cat: "镇压共产主义"
 AST_union_control_tt: "工会必须在澳大利亚各州建立势力，然而新卫队退伍军人正在努力阻止共产主义的传播。"
 AST_seize_local_leadership_in_state_major: "夺取[FROM.GetName]的地方领导权"
 AST_seize_local_leadership_in_state_mid: "夺取[FROM.GetName]的地方领导权"
 AST_seize_local_leadership_in_state_low: "夺取[FROM.GetName]的地方领导权"
 AST_seize_local_leadership_in_queensland: "夺取昆士兰的地方领导权"
 AST_union_strike: "组织罢工"
 AST_union_strike_desc: "我们的工人走出工作场所，要求更好的条件和权利。这肯定会给政府带来新的改革压力。"
 AST_veterans_revolt: "退伍军人叛乱"
 AST_veterans_revolt_desc: "军队中有许多反共分子，其中不少人曾是法西斯团体的成员。他们憎恨共产主义，宁愿拿起武器也不愿看到共产主义上台。\n如果我们发动革命拖得太久，或让稳定降得过低，他们就会自行采取行动来阻止革命发生。"
 AST_organize_in_nation: "渗透§Y[FROM.GetName]§!的工会"
 AST_organize_in_nation_desc: "劳工运动无国界。通过向同志网络输送资源，我们可以在[FROM.GetName]的工会内部安插共产主义组织者，从工人阶级内部为革命建立基层支持。"
 AST_civil_war_in_nation: "煽动§Y[FROM.GetName]§!革命"
 AST_civil_war_in_nation_desc: "我们播下的种子已到了结果的时刻。[FROM.GetName]的共产主义支持率已增长到公开革命触手可及的地步。有了资金、鼓动者和精心把握时机的一推，我们就能将民众的不满转化为武装起义，让[FROM.GetName]向其应有的工人国家再迈进一步。"
 AST_take_it_to_foreign_streets: "组织国际工人团结游行"
 AST_take_it_to_foreign_streets_desc: "工人没有国界。我们将发起一场协调一致的国际运动，将澳大利亚的共产主义组织者派往每一个我们影响力已扎根的国家的街头，重振当地运动，让革命之火熊熊燃烧。"
 AST_take_it_to_foreign_streets_tt: "将所有已被渗透国家的境外共产主义影响持续时间延长60天。"
 AST_raj_locked_tt: "在新西兰、马来亚、缅甸、菲律宾和印度尼西亚全部落入共产主义统治之前，不能以印度为目标。"
 AST_supply_arms_to_nation: "向§Y[FROM.GetName]§!提供武器"
 AST_supply_arms_to_nation_desc: "我们将向我们的同志提供武器"
 AST_strikes_tt: "只有在罢工进行期间，你才能完成§Y$AST_workers_educational_association$§!、§Y$AST_off_leash$§!、§Y$AST_a_national_housing_commission$§!、§Y$AST_guaranteed_employment$§!和§Y$AST_equal_pay$§!。"
 AST_nationalization: "启动国有化"
 AST_nationalizing_process_tt: "启用§Y启动国有化§!决议，施加§Y国有化进行中§!。这是完成以下国策所必需的，并在完成§Y公众的澳大利亚§!后移除。§R任何未选择的国策将被锁定！§!"
 AST_nationalization_underway_tt: "§Y国有化进行中§!\n工厂产出：§R-30%§!\n船坞产出：§R-30%§!"
 AST_nationalizing_process_ends_tt: "§R选取该国策会锁定以上所有国策！§!"
