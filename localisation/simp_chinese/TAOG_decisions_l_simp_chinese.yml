 SIA_war_fervor_coup_dummy_desc: "如果民众对战争的渴望无处宣泄，其矛头终将无可避免地转向我们。"
 SIA_urge_restraint: "缓解局势"
 SIA_war_fervor_coup: "迫在眉睫的政变"
 SIA_modify_cultural_mandates: "$idea_SIA_thai_cultural_mandates$追加效果："
 SIA_mandate_1: "第一号公告"
 SIA_mandate_1_desc: "国家、人民与民族均应称为泰"
 SIA_mandate_1_tt: "§Y[THIS.GetName]§!将被称为§Y$SIA_thailand$§!"
 SIA_mandate_2: "第二号公告"
 SIA_mandate_2_desc: "泰国国民从事任何商业活动时，都必须考虑国家的利益与安全。\n\n泰国国民绝不可向外国人透露任何可能损害国家的信息。此类行为是对国家的背叛。\n\n泰国国民在未考虑泰国国家利益的情况下，不得担任外国人的代理人或代言人，在国际争端中不得表达意见或偏袒外国人。此类行为是对国家的背叛。\n\n泰国国民不得以危害国家之方式，秘密为外国人代购土地。此类行为是对国家的背叛。\n\n当有人背叛国家时，泰国国民有责任积极、迅速地加以制止。"
 SIA_mandate_3: "第三号公告"
 SIA_mandate_3_desc: "停止使用与民族名称不一致的称谓，或依据群体偏好来指称泰国国民。\n\n使用泰这一名称来指代所有泰国人民，不再进行细分。"
 SIA_mandate_4: "第四号公告"
 SIA_mandate_4_desc: "当看到国旗依政府惯例升降，或听到礼号或哨音，或收到升降旗信号时，应依照法规或习俗向国旗敬礼。\n\n当听到国歌奏响，无论是出于官方目的还是在任何仪式场合，参与者或出席者都应依照法规或习俗向国旗敬礼。\n\n若发现有人未给予应有的尊重，应予以劝诫，使其明白尊重国旗、国歌及王室颂歌的重要性。"
 SIA_mandate_5: "第五号公告"
 SIA_mandate_5_desc: "泰国国民应努力只食用由泰国产品制作的食物。\n\n泰国国民应努力只穿着由泰国产品制成的衣物。\n\n泰国国民应支持本国同胞在农业、商业、工业及其他职业领域的努力。\n\n泰国国民应使用并支持由政府或泰国人民建立的任何公共事业。\n\n依据本指令从事农业、商业、工业或其他职业的泰国国民，必须努力维持标准、提高质量，并诚信经营。"
 SIA_mandate_6: "第六号公告"
 SIA_mandate_6_desc: "国歌的作曲将采用普拉·真都里扬创作、并存档于艺术厅的版本\n\n国歌的作词将采用陆军提交的版本"
 SIA_mandate_7: "第七号公告"
 SIA_mandate_7_desc: "每位泰国国民必须帮助建设国家，任何有行动能力者必须从事稳定的职业。无业者对国家无益，不值得其他国民的尊重。"
 SIA_mandate_8: "第八号公告"
 SIA_mandate_8_desc: "关于王室颂歌，我们将缩短其歌词，并将暹罗一词替换为泰"
 SIA_mandate_9: "第九号公告"
 SIA_mandate_9_desc: "泰国国民必须颂扬、尊崇并敬重泰语，且应以说泰语为荣。\n\n泰国国民必须将学习国语视为良好公民的职责，并至少应具备读写能力；泰国人民亦应将协助与支持不会说泰语或无法读写泰语的公民学习泰语，视作自身的重要责任。\n\n泰国国民不得将出生地、居住地或地方口音视为区隔的标志。每个人都必须坚信，所有生为泰国人者皆拥有相同的泰人血脉，说相同的泰语。出生地或口音不造成任何区别。\n\n泰国国民必须将自身行为符合优秀泰国公民应有的标准视为职责，并敦促、指导那些尚不了解、不明白其作为泰王国好公民之责任的人认识这些职责。"
 SIA_mandate_10: "第十号公告"
 SIA_mandate_10_desc: "泰国国民不应在未穿着得体的情况下出现在公共集会、公共场所或城市范围内。不得体的着装包括：仅穿内衣、不穿衬衫，或仅裹缠腰布。\n\n泰国国民得体的着装应包括：在职位与场合允许时穿制服；得体的国际风格服饰；得体的传统服饰。"
 SIA_mandate_11: "第十一号公告"
 SIA_mandate_11_desc: "泰国国民应将时间划分为三部分。一部分用于工作，一部分用于个人活动，一部分用于休息与睡眠。这应有条理并遵循时间表，直至成为习惯。\n\n泰国国民应按以下方式安排日常个人活动：在固定时间用餐，每日不超过四次；睡眠约六至八小时。\n\n泰国国民应忠实履行工作职责，不气馁、不怠工。午间休息与午餐时间不应超过一小时。工作日结束后，应进行至少一小时的体育活动以锻炼身体，或从事其他活动，如园艺、照料宠物或植树。之后，淋浴并用晚餐。\n\n泰国国民应利用夜间空闲时间完成必要的工作，与家人朋友交谈，通过收听广播新闻或阅读以获取知识，或视情况从事其他娱乐或艺术活动"
 SIA_mandate_12: "第十二号公告"
 SIA_mandate_12_desc: "在公共场所或道路上，国民应协助并保护儿童、老人或残障者。\n\n凡遵守上述第一条的人，都被视为有教养者，值得泰国国民尊重。"
 SIA_movie_theater_cat: "$SIA_sala_chaloem_thai_movie_theater$"
 SIA_movie_theater_cat_desc: "银幕是现代国家最强大的工具之一。通过精心挑选的电影和宣传运动，政府可以塑造公众舆论，激发爱国主义，并压倒异议的声音。"
