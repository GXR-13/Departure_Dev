 idea_SIA_debt_repayment_desc: "赤字支出计划的代价正在显现。收入正被转用于偿还债权人，曾经通过借贷支撑的建设速度已无法维持。"
 idea_SIA_an_unceasy_alliance: "不稳定的同盟"
 idea_SIA_an_unceasy_alliance_desc: "联盟依旧存在，但裂痕已开始显现。政府内部的疑虑悄然将这个国家拉向一条更中立的道路。"
 idea_SIA_rural_support: "农村支持"
 idea_SIA_the_sacred_hierarchy: "神圣阶序"
 idea_SIA_order_discipline_and_unity: "秩序、纪律与团结"
 idea_SIA_constitutional_virtue: "宪政美德"
 idea_SIA_an_absolute_monarchy: "绝对君主制"
 idea_SIA_an_absolute_monarchy_desc: "所有政治权力归于王室。国王的话语即是法律，异议遭到镇压，王室威望的全部力量被用于国家动员。国王要求忠诚，军队是它的工具。"
 idea_SIA_a_constituional_monarchy: "君主立宪制"
 idea_SIA_a_constituional_monarchy_desc: "宪法框架界定了王权的界限，并确立了人民的权利。王室作为团结的象征而非绝对权威，国家因此更加稳定，更乐于接纳新思想，且与民主世界更为一致。"
 idea_SIA_restoring_order: "恢复秩序"
 idea_SIA_military_expansion_costs: "军事扩张花费"
 idea_SIA_a_modern_economy: "现代化经济"
 idea_SIA_death_to_communists: "消灭共产主义者"
 idea_SIA_death_to_communists_desc: "反共情绪在军队中蔓延，使我们在对抗中国共产党军队时占据优势。"
 idea_SIA_death_to_nationalists: "消灭民族主义者"
 idea_SIA_death_to_nationalists_desc: "反民族主义情绪在军队中蔓延，使我们在对抗中国民族主义军队时占据优势。"
 idea_SIA_breaking_the_burmese_line: "突破缅甸防线"
 idea_SIA_the_yellow_dossier: "黄皮档案"
 idea_SIA_the_yellow_dossier_desc: "关于国内工业状况的秘密报告迫使我们必须正视深植于体系中的低效问题。报告所要求的改革已在我们的工厂中初见成效，尽管由此引发的动荡也付出了相应代价。"
 idea_SIA_the_yellow_dossier_2: "$idea_SIA_the_yellow_dossier$"
 idea_SIA_the_yellow_dossier_2_desc: "$idea_SIA_the_yellow_dossier_desc$"
 idea_SIA_pacific_war_preparations: "太平洋战争准备"
 idea_SIA_a_race_against_time: "与时间赛跑"
 idea_SIA_overheated_economy: "经济过热"
 idea_SIA_overheated_economy_desc: "经济已被推至其自然极限之外。消费需求超出产能，建筑热潮因市场降温而停滞。"
 idea_SIA_ending_military_grift: "终结军方贪腐"
 idea_SIA_the_military_oversight_bureau: "$SIA_military_oversight_bureau$"
 idea_SIA_the_military_oversight_bureau_desc: "军事监察局为新晋指挥官设定更高标准，加速全体军官队伍专业能力的培养。"
 idea_SIA_public_credit_debt: "公共信贷债务"
 idea_SIA_public_credit_debt_desc: "国家的债务负担持续拖累经济，消耗了原本应投入生产和民用物品的资源。"
 idea_SIA_public_credit_debt_2: "$idea_SIA_public_credit_debt$偿还"
 idea_SIA_public_credit_debt_2_desc: "$idea_SIA_public_credit_debt_desc$"
 idea_SIA_revision_of_unequal_treaties: "修订不平等条约"
 idea_SIA_purged_military: "清洗军队"
 idea_SIA_purged_military_desc: "被视为政治不可靠的军官被撤职，导致军队缺乏经验丰富的领导层，阻碍了组织工作以及剩余部队的发展。"
 SIA_khana_ratsadon_inlay_title: "人民党"
 SIA_civilian_wing_label: "文官派"
 SIA_military_wing_label: "军方派"
 SIA_wing_state_full_support: "§G全力支持§!"
 SIA_wing_state_slight_support: "§G轻度支持§!"
 SIA_wing_state_neutral: "§Y中立§!"
 SIA_wing_state_opposition: "§R反对§!"
 SIA_wing_state_rebellious: "§R叛逆§!"
 SIA_civilian_wing_history_tt: "人民党的文官派由进步行政官员和技术官僚领导，其中以§Y比里·帕侬荣§!为代表。在法国学习法律后，比里带着土地改革、国家经济规划以及真正赋予普通民众权力的宪政民主抱负归国。\n\n文官派总体上§G支持发展§!，主张在教育、基础设施和工业方面进行投资。他们质疑过度的军事支出，并警惕任何可能演变为强人独裁的动向。要获得他们的支持，最有效的办法是实施国家现代化并捍卫宪制政府。"
 SIA_military_wing_history_tt: "人民党的军方派由自视为革命真正守护者的陆军军官主导。其中最富野心的代表人物是§Y銮披汶·颂堪§!上校，他对欧洲民族主义运动的推崇愈发强烈。\n\n军方派§G支持重整军备§!，并倾向于建立一个强势、中央集权的国家。他们质疑比里的经济理念，认为那属于危险的激进思想，且不愿忍受文官在国防议题上的干涉。要获得他们的忠诚，最有效的办法是增加军费投入和推行展示国家力量的政策。"
 idea_SIA_wing_promotion_disruption: "派系重组动荡"
 idea_SIA_wing_promotion_disruption_desc: "公开偏袒人民党中的某一派系，已使政府失去平衡。受冷落的一方消极怠工，军队日常运作陷入混乱，在新格局稳固之前，普通行政事务也将步履维艰。"
 idea_SIA_military_wing_unrest: "军方派反叛"
 idea_SIA_military_wing_unrest_desc: "军官们的耐心再度耗尽。夺权未果之后，军方派系转而通过破坏、开小差以及公然拒绝合作来发泄怒火。在叛乱分子被镇压之前，军队的战斗力将持续瓦解。"
 idea_SIA_civilian_wing_unrest: "文官派反叛"
 idea_SIA_civilian_wing_unrest_desc: "比里·帕侬荣的派系再度对政府失去信心。在第二次夺权尝试被拒后，文官派系转向罢工、官僚阻挠与城市鼓动。在各方情绪平复之前，经济将陷入停滞，国家也将变得难以治理。"
 idea_SIA_unwavering_civilian_support: "坚定不移的文官支持"
 idea_SIA_unwavering_civilian_support_desc: "随着军方派系解散，合法性问题得以解决，文官政府再无挑战者。摆脱军队干涉之后，比里和他的技术官僚们以旧政府从未能企及的热情，全身心投入到治国理政之中。"
 idea_SIA_unified_khana_ratsadon: "统一的人民党"
 idea_SIA_unified_khana_ratsadon_desc: "军方派与文官派之间的旧日纷争业已终结。随着人民党两派终于同心同德，政府得以发挥出前所未有的统一行动力。军人、行政官员与实业家如今已融为一体。"
