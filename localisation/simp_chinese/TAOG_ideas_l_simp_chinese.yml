 idea_INS_volksraad: "人民议会"
 idea_INS_volksraad_desc: "人民议会是荷兰于1918年依据“伦理政策”体系设立的议会机构，旨在建立一个半民主体制，以代表群岛内各个少数民族与文化群体。尽管其在理论上是民主性质的，但总督与荷兰王室拥有无条件的否决权。"
 INS_volksraad_custom_tt: "允许你雇佣§Y人民议会顾问§!\n允许你使用§Y人民议会决议§!"
 INS_great_depression: "大萧条"
 INS_great_depression_desc: "虽然大萧条对东印度群岛没有造成太多直接影响，但世界各国随后采取的保护主义政策对依赖橡胶和石油等原材料出口的东印度经济产生了毁灭性的影响。"
 INS_great_depression_tt: "§Y$INS_great_depression$§!追加效果："
 INS_dutch_east_indies: "管理失当的行政"
 INS_dutch_east_indies_desc: "东印度群岛是一个辽阔的群岛，涵盖了数百种不同的文化与语言，因此被视为一片治理极为困难的殖民地。各类独立运动、文化隔阂以及大萧条所带来的经济冲击，使得原本复杂的局面变得更加棘手，最终导致行政效率极其低下。1918年制定的“伦理政策”试图通过强制实施伦理劳动法规，并赋予少数群体一定的民主代表权，来缓解困境。然而，大萧条的爆发使得这些政策大多未能真正落实。"
 INS_dutch_east_indies_tt: "§Y$INS_dutch_east_indies$§!追加效果："
 INS_volksraad_tt: "§Y$INS_dutch_east_indies$§!追加效果："
 INS_royal_netherlands_east_indies_army_desc: "荷兰皇家东印度陆军是东印度群岛长期驻扎的军队，独立于荷兰运行。虽然该部队由欧洲士兵和印度尼西亚士兵共同组成，但群岛众多文化之间以及与荷兰之间的文化和语言隔阂，使得招募工作成为了一个困难且缓慢的过程。"
 idea_INS_netherlands_most_precious_jewel: "荷兰最珍贵的明珠"
 idea_INS_netherlands_most_precious_jewel_desc: "荷属东印度群岛作为荷兰的殖民地已有约350年历史，该殖民地的行政管理与荷兰政府紧密相连。东印度群岛常被称为“荷兰王冠上的明珠”，而荷兰也未曾表现出放松对其这颗珍贵明珠掌控的意愿。"
 INS_netherlands_most_precious_jewel_tt: "£GFX_trigger_no 可以将自治权提升到自由"
