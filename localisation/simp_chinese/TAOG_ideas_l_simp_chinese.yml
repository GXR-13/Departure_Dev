 AST_australian_culture_investments_idea_desc: "§W§Y当移除时§!：\n获得§Y家园情怀§!，其效果为\n稳定度：§G+10.00%§!\n战争支持度：§G+10.00%§!。§!\n"
 AST_a_sense_of_place: "家园情怀"
 AST_a_sense_of_place_desc: "国家认同是凝聚人民的纽带。在繁荣的文化之下，澳大利亚人已团结一致，决心抵抗任何可能威胁其边境的势力。"
 AST_a_sense_of_place_upgraded: "家园情怀"
 AST_a_sense_of_place_upgraded_desc: "曾经安静发展的民族认同感被赋予了更硬的棱角。这不再仅仅是对一片土地和一种生活方式的自豪——而是一种信念，即澳大利亚所建立的一切值得为之战斗，生活在南十字星下的男男女女也准备好这样做。"
