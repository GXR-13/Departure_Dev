 AST_anti_fascist_measures: "反法西斯措施"
 AST_anti_fascist_measures_desc: "法西斯主义尚未深入澳大利亚，民主力量希望它保持这种状态。英联邦调查处将监视和拘留所有可疑分子，以防止任何法西斯团体获得影响力。"
 ABDA_corps_expeditionnaire_spirit: "远征军"
 ABDA_corps_expeditionnaire_spirit_desc: "投入太平洋战场的法军在殖民服役中得到了磨练，习惯了在远离本土的艰苦条件下作战。他们在东南亚的作战经验使他们对日军的战术和地形有特别的了解，从而在敌军推进时展现出顽强的韧性。"
 ABDA_maintain_strategic_flexibility_spirit: "战略灵活性"
 ABDA_maintain_strategic_flexibility_spirit_desc: "美国的工业产出正被导向太平洋战场，船坞生产加速进行，以维持一支能够在整片海洋上投射力量的舰队。通过避免在任何单一战线上过度投入，美国确保其海军力量能够被部署到任何局势需要的地方。"
 AST_toe_the_line_spirit: "严守界线"
 AST_toe_the_line_spirit_desc: "国家号召做出牺牲，民众作出了回应。配给制、延长工作时间以及将民用生产转向国家事业，腾出了政府无法通过其他手段获取的资源。这是一项严苛的措施，并未得到所有人的拥护。"
