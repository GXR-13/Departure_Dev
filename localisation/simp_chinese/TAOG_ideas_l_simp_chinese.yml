 NZL_railways_board: "政府铁路局"
 NZL_railways_board_desc: "政府铁路局成立于1931年，旨在重组铁路部门，试图将决策权从政府部门中分离出来。然而，自成立以来，铁路网络几乎没有改善的迹象。要求政府废除该局并收回直接控制权的压力越来越大。"
 NZL_great_depression: "大萧条"
 NZL_great_depression_desc: "1929年的全球经济崩溃对以农业为主的新西兰经济造成了沉重打击。各国从新西兰购买的农产品减少，许多人因此失业，消费者的购买力降低，进而导致其他行业崩溃。多年的紧缩让这个国家渴望改变方向。"
 NZL_commonwealth_loyalty: "忠于英联邦"
 NZL_commonwealth_loyalty_desc: "新西兰仍然是英联邦的忠实成员，并保留国王作为合法的国家元首。新西兰的经济也高度融入了更广泛的帝国经济体系。"
