 AST_singapore_strategy_idea: "新加坡防御建设"
 AST_singapore_strategy_idea_desc: "应澳大利亚的要求，我们将努力改进新加坡的防御工事。毕竟，新加坡战略是太平洋防御政策的核心组成部分。\n\n§W§Y移除时§!（§Y新加坡§!）：\n 添加§G2§!座§Y空军基地§!。\n 添加§G2§!座§Y海军基地§!。\n 添加§G1§!座§Y海岸要塞§!。§!\n"
