 idea_SIA_civilian_full_support: "文治派：§G全面支持§!"
 idea_SIA_civilian_full_support_desc: "文官派坚定地支持政府。行政人员和技术管理贡献其专业知识，推动发展。"
 idea_SIA_civilian_slight_support: "文治派：轻度支持"
 idea_SIA_civilian_slight_support_desc: "文官派大体上支持政府。他们的合作带来了些许切实的好处。"
 idea_SIA_civilian_neutral: "文治派：中立"
 idea_SIA_civilian_neutral_desc: "文官派既不支持也不妨碍政府。行政机构在运转，但缺少真正政治同盟的推动。"
 idea_SIA_civilian_opposition: "文治派：反对"
 idea_SIA_civilian_opposition_desc: "文官派已转向反对政府。官员拖拖拉拉，预算分配不当，国家机器出现磨损。"
 idea_SIA_civilian_rebellious: "文治派：§R叛逆§!"
 idea_SIA_civilian_rebellious_desc: "文官派公开反对政府。动荡蔓延，政治决裂的威胁与日俱增。"
 idea_SIA_military_full_support: "军政派：§G全面支持§!"
 idea_SIA_military_full_support_desc: "军方派坚定地支持政府。军官们支持征兵和武器生产，将军队的资源用于国家目标。"
 idea_SIA_military_slight_support: "军政派：轻度支持"
 idea_SIA_military_slight_support_desc: "军方派大体上持合作态度。他们的支持为征兵和武器生产带来了些许改善，尽管未作出全面承诺。"
 idea_SIA_military_neutral: "军政派：中立"
 idea_SIA_military_neutral_desc: "军方派没有采取任何立场。军队履行职责时既不热情也不抵制，而是等待事态的发展。"
 idea_SIA_military_opposition: "军方派：反对"
 idea_SIA_military_opposition_desc: "军方派反对政府。军官们阻碍装备生产，对政府事业的支持从军中流失。"
 idea_SIA_military_rebellious: "军方派：§R叛逆§!"
 idea_SIA_military_rebellious_desc: "军方派即将公开反抗。征兵遭到破坏，武器生产受到影响，政变迫在眉睫。"
 idea_SIA_defenders_of_constitutional_liberty: "宪政自由的捍卫者"
 idea_SIA_civil_service_heroism_1: "护宪主义"
 idea_SIA_civil_service_heroism_1_desc: "文官派不负众望，其奉献精神与专业能力悄然加速了科研与地区发展的步伐。"
 idea_SIA_civil_service_heroism_2: "$idea_civil_service_heroism_1$"
 idea_SIA_civil_service_heroism_2_desc: "$idea_SIA_civil_service_heroism_1_desc$"
 idea_SIA_redirected_military_funds: "重新调配的军费"
 idea_SIA_thai_irredentism: "泰国领土收复主义"
 idea_SIA_oss_special_forces_training: "战略情报局特种部队训练"
 idea_SIA_seized_japanese_funds: "没收日本资金"
 idea_SIA_seized_japanese_funds_desc: "随着日本人的计划破产，他们留下的资金和储备现在归我们所用，从而推动了建设和工业产出的激增。"
 idea_SIA_oss_special_forces_training_desc: "我们的特工与战略情报局共同接受了破坏、渗透及空降行动训练。这些实战经验将我们的特种部队锤炼成了强有力的武器。"
 idea_SIA_sold_privy_purse_lands: "出售王室私产土地"
 idea_SIA_sold_privy_purse_lands_desc: "出售王室土地资产为地区注入了资本，缓解了经济压力，并释放了资源用于建设。"
 idea_SIA_war_fervor: "战争狂热"
 idea_SIA_bloodlusted_irredentism: "嗜血的领土收复主义"
 idea_SIA_bloodlusted_irredentism_desc: "领土野心已经酿成了更加激烈的情绪。军队怀着收复失地的信念而战斗，坚信那片土地本就属于他们。"
 idea_SIA_the_royal_police_counterweight: "王家警察的效忠"
 idea_SIA_civilian_technocrats_in_institutions: "文官技术官僚"
 idea_SIA_civilian_technocrats_in_institutions_desc: "关键政府机构内的文官专家提高了资源开采和政治任命落实的效率。"
 idea_SIA_yuvachon: "泰国青年团"
 idea_SIA_yuvachon_desc: "泰国青年团运动培养国家青年的军事纪律，建立了受过军事训练的人力池，并且激发了民族主义情绪。"
 idea_SIA_yuvachon_2: "$idea_SIA_yuvachon$"
 idea_SIA_yuvachon_2_desc: "$idea_SIA_yuvachon_desc$"
 idea_SIA_rebuilding_the_war_torn_economy: "重建饱受战争摧残的经济"
 idea_SIA_specialist_marine_forces: "特种海军陆战队"
 idea_SIA_specialist_marine_forces_desc: "一批特种两栖作战专家已经接受了跨海突击行动的培训和装备。"
 idea_SIA_rehabilitated_military: "改造军队"
 idea_SIA_desperate_gambit: "孤注一掷"
 idea_SIA_desperate_gambit_desc: "也许你还能从自己挖的坑里爬出来，努力吧！"
 idea_SIA_purged_senior_military: "高级军官被清洗"
 idea_SIA_purged_senior_military_desc: "被认为对政府构成威胁的高级军官已被免职。经验丰富的指挥官的流失对军队的凝聚力和职业发展造成了影响。"
 idea_SIA_cemented_control: "巩固的控制"
 idea_SIA_cemented_control_desc: "政府巩固了对国家机构的控制。政治反对派已被边缘化，权力机器现在稳定地掌握在政府手中。"
 idea_SIA_cemented_control_2: "根深蒂固的控制"
 idea_SIA_cemented_control_2_desc: "$idea_SIA_cemented_control_desc$"
 idea_SIA_cemented_control_3: "泰国战时义务法"
 idea_SIA_cemented_control_3_desc: "当战争威胁到王权与国家主权时，每一位体面的泰国人都有责任抵抗占领，无论是以武力还是其他方式。"
 idea_SIA_suspend_ordinary_legal_procedures: "暂停普通法律程序"
 idea_SIA_thai_cultural_mandates: "泰国文化公告"
 idea_SIA_military_humiliation: "军方的耻辱"
 idea_SIA_death_defiant: "无畏死亡"
 idea_SIA_death_defiant_desc: "我们已经是死人了。如果你能，就来拿走属于你的东西吧。"
 idea_SIA_songsuradet_ascendant_0: "颂素拉德定于一尊"
 idea_SIA_songsuradet_ascendant_0_desc: "在成功顶住政府的愤怒之后，颂素拉德将军巩固了自己的势力基础，并因此变得更加强大。如今他已成为所谓“不可触碰的人物”，声望过高、根基深厚，几乎无法被清除。\n他很可能会干预政府政策，通过拖慢决策来确保自己不会再次成为清洗目标。"
