 idea_SIA_pan_thaiism: "泛泰主义"
 idea_SIA_pan_thaiism_desc: "泛泰国主义意识形态认为，所有泰系民族都应该统一在一个国家之下。改意识形态推动国家扩张，通过进攻行动维持士气。"
