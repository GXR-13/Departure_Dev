 AST_advance_pacific_initiatives_jap_2_tt: "§Y[JAP.GetName]§!提供："
 AST_advance_pacific_initiatives_ins_2_tt: "§Y[INS.GetName]§!提供："
 AST_advance_pacific_initiatives_chi_2_tt: "§Y[CHI.GetName]§!提供："
 AST_advance_pacific_initiatives_2_tt: "\n如果与相关国家开战，建筑将被移除。"
 AST_pacific_initiatives_modifier: "外交倡议"
 AST_domestic_industry: "国内工业"
 AST_domestic_industry_desc: "我们不能依赖盟国的国防工业在战争来临时供应我们。我们必须扩大自己的工业，为即将到来的任何事情做好准备。"
 AST_a_democratic_bulwark: "民主堡垒"
 AST_a_democratic_bulwark_desc: "要同时抵御法西斯与共产主义的威胁，民主必须走在前列。政府将采取积极政策，并确保政客们的不满情绪可通过加入不同民主党派来疏导，而非转向有害的意识形态。"
 AST_the_pacific_pact: "太平洋协定"
 AST_the_pacific_pact_desc: "莱昂斯1934年推出的太平洋倡议，令澳大利亚与亚洲主要国家建立了直接外交联系，使我国不必再依附英国官员代为诉求本国利益。若能依托这份邦交关系，促成亚洲各国对澳大利亚保持不侵略立场，便达成了我国外交努力的最终目标。虽然这项任务充满挑战，但仍值得尝试。"
 AST_a_collapsing_league_of_nations: "摇摇欲坠的国际联盟"
 AST_a_collapsing_league_of_nations_desc: "国际联盟正在崩溃——这是一个善意的倡议，可惜植根于不切实际的希望。制裁政策很容易变成空洞的姿态，尤其是在没有武装力量可以压制不守规矩的国家时更是如此。我们的重新武装必须开始。"
 AST_department_of_munitions: "军需部"
 AST_department_of_munitions_desc: "为了确保前线士兵得到充分补给，我们需要加快军需品生产。设立军需部将使政府能够对国防生产进行更严格的监督。"
 AST_call_for_a_referendum: "举行全民公投"
 AST_call_for_a_referendum_desc: "我们希望加强联邦政府的权力，但必须先获得选民的支持。通过举行公投，我们可以征求公众的同意。"
 AST_rural_concessions: "农村让步"
 AST_rural_concessions_desc: "乡村党的农村代表获得的选票远不足以单独执政，但他们在澳大利亚政治中仍具有重要影响力。我们作为现任执政党可以获得额外支持。"
 AST_rural_concessions_tt: "\n§Y$AST_country_party_influence_uap$§!将增加国策完成时执政党的选票。"
 AST_solidarity_by_the_empire: "帝国的团结"
 AST_solidarity_by_the_empire_desc: "迄今为止，大英帝国在战争与和平时期都指引着我们。我们将继续重视其建议，并在应对潜在冲突的准备工作中与其合作。"
 AST_solidarity_by_the_empire_modifier: "帝国的团结"
 AST_wool_agreement: "羊毛协议"
 AST_wool_agreement_desc: "羊毛是澳大利亚最重要的出口商品之一，它不仅带来利润，也能改善与进口国的关系。然而英国要求获得全部羊毛，一方面用于军装生产，另一方面也用于与缺乏羊毛的国家进行外交谈判。我们将同意英国的要求。"
 AST_australian_war_cabinet: "澳大利亚战时内阁"
 AST_australian_war_cabinet_desc: "在英国的建议下，我们将设立自己的战时内阁。这样可以让政府专注于国家安全事务，从而提高决策效率。"
 AST_singapore_strategy: "新加坡战略"
 AST_singapore_strategy_desc: "新加坡战略是澳大利亚国防政策的核心部分。作为驻太平洋英国皇家海军的基地，新加坡本身具有极其重要的战略意义。我们应说服英国加强当地防御建设，同时强化澳大利亚海军实力。"
 AST_singapore_strategy_tt: "在§Y180§!天后（§Y新加坡§!）：\n增加 §G2§!级§Y空军基地§!\n增加 §G2§!级§Y海军基地§!。\n增加 §G1§!级§Y海岸要塞§!。"
 AST_british_war_cabinet: "英国战时内阁"
 AST_british_war_cabinet_desc: "战争已经爆发，英国成立了战时内阁以确保盟军战争行动的高效进行。他们邀请我们共同讨论相关事务，因此首相将前往参加会议并代表澳大利亚的利益。"
 potential_consequence_tt: "§Y潜在后果§!：\n"
 AST_british_pacific_fleet: "英国太平洋舰队"
 AST_british_pacific_fleet_desc: "英国在太平洋的存在对于遏制敌方舰队向南扩张至关重要。作为[Root.GetFactionName]的一员，我们将推动建立联合指挥体系，以保护沿海海域。"
 AST_all_dressed_up: "全副武装"
 AST_all_dressed_up_desc: "如果澳大利亚士兵为英国作战，那么英国的工厂就应当为他们提供装备。"
 AST_overseas_loyalties: "海外忠诚"
 AST_overseas_loyalties_desc: "我们将继续参与海外战争，再次证明对澳大利亚士兵而言，没有所谓的外国战场。战争不会降临到我们头上——是我们主动走向战争。"
 AST_the_ultimate_overseas_duty: "最终的海外责任"
 AST_the_ultimate_overseas_duty_desc: "英国首相对其职责管理不善，以至于自己的内阁大臣间都弥漫着不信任。孟席斯在出席英国战时内阁会议期间给人留下了极为强烈的印象，如今甚至有人提议，他或许确实是英国更好的选择。由他执掌英联邦大权，我们便可利用孟席斯对[AST.GetName]的忠诚，来提升我们的权威。"
 AST_the_ultimate_overseas_duty_tt: "\n§Y$AST_robert_menzies$§!担任§Y[ENG.GetNameDef]§!领导人时，我们可以通过§Y$AST_a_change_of_authority$§!国策成为§Y$autonomy_associated_dominion$§!。"
 AST_pleading_britain: "请求英国援助"
 AST_pleading_britain_desc: "战争显然即将来临，我们已不寒而栗。虽然不想冒犯我们的澳新军团精神和“矿工”们的声誉，但如果没有[ENG.GetName]的援助，澳大利亚的战争能力将迅速枯竭。总理应在方便时尽早致电[ENG.GetLeader]。"
 AST_bound_once_more: "再度联结"
 AST_bound_once_more_desc: "我们的道路曾分岔，但必将再度汇合。[ENG.GetNameDefCap]和[AST.GetName]都正经历国家变革，但由此产生的我们之间的距离，仅是一个无心且不利的副作用。至少在我们这边如此。我们将再度结盟，团结一致克服我们变革中国家的障碍。"
 AST_eng_to_ast_faction_tt: "§Y[ENG.GetName]§!和其附属国加入§Y[AST.GetFactionName]§!。"
 AST_faction_leader_tt: "成为§Y[AST.GetFactionName]§!阵营的领袖"
 AST_eng_as_faction_leader_tt: "\n（[ENG.GetFlag]§Y[ENG.GetName]§!）$AST_faction_leader_tt$"
 AST_australian_command: "澳大利亚指挥体系"
 AST_australian_command_desc: "即使在[ENG.GetNameDef]，澳大利亚防务的重要性也越来越明显。因此需要对联合部队进行重组。更多英国部队将被置于澳大利亚指挥之下，从而使战争行动更加高效。"
 AST_taking_the_helm: "掌舵前行"
 AST_taking_the_helm_desc: "随着我们在东南亚的影响力不断扩张，我们的海军力量必须壮大起来以捍卫它。我们应优先持续投资于澳大利亚皇家海军，并确立对东部海域的控制。"
 AST_eastern_focus: "东方焦点"
 AST_eastern_focus_desc: "如果英国的战争就是澳大利亚的战争，那么澳大利亚的战争同样也是英国的战争。日本入侵的威胁早已显而易见，我们不会再被动等待战争降临。我们将让日本见识到澳大利亚的决心，同时英国也将以最明确的方式证明自己的忠诚：对日本宣战。"
 AST_eastern_focus_tt: "\n该任务将允许§Y[ENG.GetNameDef]§!立即对§Y[JAP.GetNameDef]§!宣战，并且如果180天内未宣战则强制宣战。§Y[ENG.GetNameDefCap]§!可以通过投资澳大利亚国防建设来推迟任务的完成日期。"
 AST_holding_the_battlefield: "掌握战场"
 AST_holding_the_battlefield_desc: "许多澳大利亚士兵在海外战场阵亡，但他们的功绩却被算作英国的胜利。澳大利亚要求在与[ENG.GetNameDef]一同参与的和平会议上拥有更大的发言权，否则我们可能停止贡献力量。"
 AST_holding_the_battlefield_tt: "在与§Y[ENG.GetNameDef]§!的和平会议中，对§Y傀儡§!和§Y吞并国家§!行动的成本§Y降低§!。"
 AST_a_change_of_authority: "权威的改变"
 AST_a_change_of_authority_desc: "从一个顺从的臣属，澳大利亚已成长为一个受人尊敬、坚定自信的国家，是时候迈出最后一步，跻身世界强国之林了。作为[AST.GetFactionName]的领袖，朋友将尊敬我们，敌人将畏惧我们。扎根稳固、不屈不挠，澳大利亚决不屈服。"
 AST_a_change_of_authority_tt: "§Y[ROOT.GetName]§!现在可以自行宣战\n§Y[ROOT.GetName]§!现在可以拒绝参战请求\n§Y[ROOT.GetName]§!不再将任何和谈分数转移给宗主国"
 AST_reinforcements: "增援"
 AST_reinforcements_desc: "我们将为开发程度较低的北部地区建设防御设施和空军基地。"
 AST_weekly_stability_tt: "每周稳定度：§G+1.00%§!"
 AST_ending_overseas_conscription: "结束海外征兵"
 AST_ending_overseas_conscription_desc: "我们的士兵必须立即从海外战场撤回；本土更加需要他们。"
 AST_unlocking_conscription_1903_tt: "需要解锁§Y征兵法案§!。"
 AST_unlocking_further_conscription_tt: "对于§Y广泛征兵§!或§Y按要求服兵役§!，你还需要以下任一国策：§Y$AST_british_pact$§!（法西斯）、§Y$AST_refuse_british_wars$§!（法西斯）、§Y$AST_toe_the_line$§!（法西斯）、§Y$AST_from_picket_line_to_front_line$§!（共产主义）或§Y$AST_part_with_colonizer$§!（共产主义）。"
 AST_unlocking_conscription_tt: "如果你已§Y$AST_invoke_the_1903_defence_act$§!，将解锁所有剩余§Y征兵法案§!。"
 AST_an_uncle_for_father_figure: "长兄如父"
 AST_an_uncle_for_father_figure_desc: "我们缺乏现代化武器，因此将向[USA.GetName]寻求援助，请求他们为我们提供装备。"
 AST_seven_million_britishers: "七百万英国人"
 AST_seven_million_britishers_desc: "尽管[ENG.GetLeader]一直不愿给出明确承诺，我们仍将相信他以及英国在关键时刻会履行对[AST.GetNameDef]的义务。毕竟，我们只是七百万英国人。"
 AST_seven_million_britishers_reinforcements_tt: "\n§Y如果$AST_reinforcements$未完成§!："
 AST_seven_million_britishers_conscription_tt: "\n§Y如果$AST_ending_overseas_conscription$未完成§!："
 AST_seven_million_britishers_uncle_tt: "\n§Y如果$AST_an_uncle_for_father_figure$未完成§!："
 AST_we_endured: "我们挺过来了"
 AST_we_endured_desc: "最初，对即将到来的战争的预测令人不安，但正是这种危机感促使我们迅速扩张防御能力。我们坚持了下来，并将继续前进，现在我们完全致力于一个最终目标：赢得战争。"
 AST_under_the_rule_of_canberra: "在堪培拉统治之下"
 AST_under_the_rule_of_canberra_desc: "太平洋各国之间不断上升的紧张局势令人担忧，而英国正忙于自己的战争，其能够前来援助我们的可能性显得十分渺茫。如果我们重组英联邦，让太平洋与印度洋地区的国家直接由堪培拉管理，我们或许能够在同一战线下团结起来——即使没有[ENG.GetNameDef]也能做到。"
 AST_its_fight_work_or_perish: "战斗、工作，或灭亡"
 AST_its_fight_work_or_perish_desc: "战争已经开始，现在只剩下一件事：证明我们已经做好准备。"
 AST_no_foreign_battlefields: "拒绝外国战场"
 AST_no_foreign_battlefields_desc: "长久以来的期盼终于实现，政府正式宣布：任何公民都不会被强迫在外国战场服役。"
 AST_no_foreign_battlefields_modifier: "拒绝外国战场"
 AST_platypus_modifier: "国礼鸭嘴兽"
 AST_aerial_defense: "空中防御"
 AST_aerial_defense_desc: "即使我们无法建立与世界强国相匹敌的庞大海军，我们仍有能力维持一支足以与任何敌人抗衡的空军。"
 AST_ratify_westminster_adoption_act: "批准《威斯敏斯特法令》"
 AST_ratify_westminster_adoption_act_desc: "即便改动沿袭已久的国策会引发舆论争议，但批准《威斯敏斯特采纳法令》势在必行。今后哪些战争属于我们，将由我们自己决定。"
 AST_ratify_westminster_adoption_act_tt: "£GFX_trigger_no 可以拒绝战争召唤"
 AST_administer_the_mandate: "管理托管地"
 AST_administer_the_mandate_desc: "自1920年以来，我们根据国际联盟的授权管理新几内亚，而巴布亚也几乎从联邦成立起就成为[AST.GetName]的海外领地。因此，将巴布亚新几内亚东部地区纳入[AST.GetName]核心领土是顺理成章的。随着国际联盟解散，这样的联邦重组如今成为可能。"
 AST_a_rational_request: "合理的请求"
 AST_a_rational_request_desc: "新加坡战略在理论上成立，但也仅仅是理论。亨利·温特等人的警告是正确的：如果太平洋战争爆发，英国很可能被迫专注于欧洲战场。因此，依赖英国援助的战略并不可靠。我们将请求控制新加坡，以便由我们自己负责海域防御。"
 add_trait_to_theorist_tt: "为§Y理论家§!添加特质："
 AST_volunteers: "志愿兵"
 AST_volunteers_desc: "关键在于拥有选择权；能够拒绝参战并不意味着澳大利亚一定会拒绝。澳大利亚人应当有权在本土或海外为正义而战。"
 AST_until_the_tide_of_battle_swings: "直到战局逆转"
 AST_until_the_tide_of_battle_swings_desc: "我们将公开声明：对家门口的威胁视而不见的时代已经结束。我们拒绝继续将太平洋战争视为全球战争的次要战场。澳大利亚必须立即为可能的入侵做好准备。"
 AST_walls_and_whispers: "高墙与低语"
 AST_walls_and_whispers_desc: "固若金汤的防线配上接地气的耳目，为国家安全带来了巨大潜力。我们将着手在各处，为陆军与海岸防御打下更好基础，并在其中设立一个情报总部。"
 AST_united_states_as_our_keystone: "以美国为支柱"
 AST_united_states_as_our_keystone_desc: "我们理解英国所面临的困难，也明白力量分散的危险。但我们同样知道，即使澳大利亚沦陷，英国仍然可以继续战斗。因此我们决心：澳大利亚绝不能沦陷。我们将倾尽全力制定一项计划，并以美国作为核心支柱。"
 AST_liberty_loans: "自由贷款"
 AST_liberty_loans_desc: "凭借担任财政部长期间积累的经验，本·奇夫利已经证明自己具备管理战时经济的能力——甚至有人称他是国家历史上最伟大的财政部长。根据他的建议，我们将鼓励公民将多余收入转为储蓄，并投资战争债券。"
 AST_inevitably_independent: "无可避免的独立"
 AST_inevitably_independent_desc: "尽管澳大利亚联合党始终珍视英国公民身份，但[ENG.GetNameDef]对澳大利亚利益的漠不关心迫使我们不得不着手宣布独立并优先考虑自身的国防。如今，我们已不再需要远赴海外参加英国的战事，甚至连反保皇派也更倾向于听命行事；因此，扩大征兵规模将面临更小的阻力。"
 AST_bring_on_the_giant: "巨人请进门"
 AST_bring_on_the_giant_desc: "我们终于成为一个统一且自治的主权国家，我们的勇气即将经受考验。太平洋彼岸的国家似乎与我们利益相通，凭借其发达的军事工业，[USA.GetNameDef]可以向我们的部队租借其丰富的物资，极大地造福澳大利亚与该国自身。"
 AST_bring_on_the_giant_tt: "如果§Y[USA.GetNameDefCap]§!同意：\n 国家储备中增加§Y+50§!个§Y运输船§!。"
 AST_allied_after_all: "始终结盟"
 AST_allied_after_all_desc: "虽然澳大利亚独立是必然之举，但我们与旧主的一切合作不会就此终止。我们将一如既往地效忠于[ENG.GetFactionName]，但目标是在阵营内获得更大的影响力。"
 AST_the_pacific_resistance: "太平洋抵抗组织"
 AST_the_pacific_resistance_desc: "澳大利亚终于迎来了独立，我们脱离英国的诸多战事也是理所应当的。通过转而追求与[USA.GetNameDef]全方位密切合作，我们可以制定重视澳大利亚利益的联合指挥战略，同时独立地完全控制我们自己的国防工业及其扩张策略。"
 AST_the_pacific_resistance_tt1: "§Y澳大利亚§!加入§Y[USA.GetFactionName]§!。"
 AST_the_pacific_resistance_tt2: "§Y[USA.GetName]§!加入§Y太平洋抵抗组织§!。"
 AST_conscription_at_last: "最后的征兵"
 AST_conscription_at_last_desc: "独立尝起来很甜蜜，因为我们意识到我们现在有权优先考虑自己的国防——但这种权力也带来了责任。不应轻易增加强制征兵，但既然战争已经降临，这已变得必要。"
 AST_equal_training: "同等训练"
 AST_equal_training_desc: "与盟国的合作必须经过磨砺，而不能仅仅假设其能自动运作。澳大利亚将主动为[ROOT.GetFactionName]的国家组织联合训练营，并确保所有士兵都接受同样严格的训练。"
 AST_a_northern_barrier: "北部屏障"
 AST_a_northern_barrier_desc: "敌人正从北方袭来，他们可以首先肆意打击那些位于其前进道路上、毫无防备的小国，然后再陈兵于我方国门之前。如果我们能与[INS.GetNameDef]联合起来，构筑一道统一的屏障，或许我们还有机会将他们拒之门外。"
 AST_demand_resources: "要求资源"
 AST_demand_resources_desc: "秉承扩张主义信条的侵略者垂涎印度支那，不仅是为了领土本身，更是为了其拥有的资源。如果这些财富落入敌人之手，只会延长战争；而若由我们掌控，则能助其结束。我们将要求获得这些资源的控制权；如果持有者拒绝合作，他们便与敌人无异。"
 AST_demand_resources_tt: "解锁§Y$AST_resource_acquisition_cat$§!决议，要求分享东南亚国家的资源。"
 AST_reclaim_the_lost_territory: "收复失地"
 AST_reclaim_the_lost_territory_desc: "在大洋洲各殖民地联合成一个联邦的过程中，新西兰最终决定不参与。然而，自那时起，宪法始终将新西兰定义为澳大利亚联邦的潜在州之一，并允许其加入。我们将以此提醒我们的东部邻国，并主张当前的国际局势要求我们走向统一。"
 AST_reclaim_the_lost_territory_tt: "([NZL.GetFlag]§Y[NZL.GetName]§!)将其所有陆军、海军和空军移交给§Y[AST.GetNameDef]§!"
 AST_australia_first: "澳大利亚优先"
 AST_australia_first_desc: "中央党的极右活力是短暂的，随着该党于1935年解散而结束。然而，某种新的东西开始酝酿，源自商人和政治活动家威廉·约翰·迈尔斯的想法。倘若不主动造势凝聚民意，这份思潮便会如兴起时那般迅速消退。为此，我们必须主动采取行动。"
 AST_pankhurst_walsh: "阿德拉·潘克赫斯特"
 AST_pankhurst_walsh_desc: "在正式成立“澳大利亚优先运动”之际，我们应当任命阿德拉·潘克赫斯特·沃尔什担任主席。作为帝国澳大利亚妇女协会的创始人，潘克赫斯特·沃尔什在与伦敦妇女协会保持密切联系的同时，长期倡导英国公民身份的价值。这一价值将成为该运动的核心原则：与英国维持联系。"
 AST_stephensen: "P·R·斯蒂芬森"
 AST_stephensen_desc: "在正式成立“澳大利亚优先运动”之际，我们应当任命P·R·斯蒂芬森担任主席。作为威廉·约翰·迈尔斯的文学顾问，斯蒂芬森秉承其导师的孤立主义和民族主义观点。这些观点将形成该运动章程的两个核心原则：脱离英国独立和统一澳大利亚文化。"
 AST_stephensen_tt: "\n§Y澳大利亚优先运动§!主席的选择将决定未来可能的行动。"
 AST_a_growing_womens_guild: "不断壮大的妇女协会"
 AST_a_growing_womens_guild_desc: "自1928年成立以来，澳大利亚妇女帝国协会一直倡导劳资合作以解决国家经济问题。为了国家利益，公民应协助政府，而非与之对立。有潘克赫斯特·沃尔什担任“澳大利亚优先运动”的主席，我们便可通过其政治运动，将这一讯息传播得更远。"
 AST_realize_the_value_of_british_citizenship: "珍视大英公民身份"
 AST_realize_the_value_of_british_citizenship_desc: "[ENG.GetNameDefCap]对[AST.GetName]的宗主权，长久以来既是我国的保护伞，也是指路明灯。我们源自英国，也将留在英国——只要它仍对我们有用。"
 AST_the_bolsheviks_counterforce: "布尔什维克的对抗力量"
 AST_the_bolsheviks_counterforce_desc: "调查处几十年来一直在对各类颠覆组织的活动进行情报调查，其镇压左翼势力威胁的工作极具价值。即便澳大利亚优先运动的反对者刻意阻挠我们发展，也不能荒废该部门的本职工作。我们将渗透澳大利亚情报部门的关键岗位，确保国安机构始终以应对真正的国家安全威胁为首要任务。"
 AST_public_meetings_tt: "解锁§Y澳大利亚优先运动§!决议，可以动员成员并提高法西斯支持度。"
 AST_rile_up_veterans: "煽动老兵"
 AST_rile_up_veterans_desc: "大萧条伊始，一战老兵们便联合起来组成极右准军事团体，以对抗共产主义的兴起。即使那些团体后来解散了，其前成员也并未消失；澳大利亚优先运动将吸收他们，反共的火炬也将由此传承。"
 AST_eureka_stockade_monument_rally: "纪念尤利卡起义"
 AST_eureka_stockade_monument_rally_desc: "1854年的尤里卡栅栏战役中，澳大利亚金矿矿工因采矿许可证价格不合理及金矿税问题，与殖民地军队展开了激烈战斗。早在那时，民众对英国宗主统治的不满已然显露，而今这份情绪依旧未曾消减。我们将齐聚战役纪念碑前发起集会，呼吁脱离英国。"
 AST_australian_pivot_modifier: "澳大利亚的支点"
 AST_well-being_of_the_community: "社区福祉"
 AST_well-being_of_the_community_desc: "基督徒关于生活与家庭的理念，理应受到澳大利亚大众的高度珍视。然而，过去这些年惨淡的出生率，无疑表明这些理念尚未得到足够的尊崇。为了社群的福祉，我们将发起一场宣扬家庭生活的运动。"
 AST_covert_networks: "秘密网络"
 AST_covert_networks_desc: "借澳大利亚优先运动在调查局内部活动之机，我们应寻求与[ENG.GetNameDef]境内志同道合的运动开展跨境合作。我们与宗主国的同盟或将再发挥一种作用，让我们能隐秘地接触意识形态一致的盟友，并加强我们的情报能力。"
 AST_refuse_british_wars: "拒绝英国的战争"
 AST_refuse_british_wars_desc: "第一次世界大战中的加里波利战役，充分展示了[ENG.GetNameDef]对待我们远征军的鲁莽态度，使得以英国名义再进行一场海外征战的念头变得完全无法想象。澳大利亚人要求决不能再让鲜血在英军的指挥下流淌，这迫使政府采取行动；《威斯敏斯特法案》必须批准。"
 AST_walls_like_uluru: "如乌鲁鲁岩般的坚实城墙"
 AST_walls_like_uluru_desc: "澳大利亚自身便是一块大陆。若我们必须在没有帝国庇护的情况下自立，就必须建立我们自己的防线。海岸线将被加固，港口将被堡垒化；对任何觊觎我们国家的敌人，任何通道都将危机四伏。"
 AST_at_the_gates: "兵临城下"
 AST_at_the_gates_desc: "世界正走向战争，澳大利亚绝不能措手不及。国家的工厂和船坞必须加速运转。这不是为他人的冲突所做的准备，而是为我们自身的生存所做的准备。"
 AST_the_guild_for_the_war_effort: "战争动员协会"
 AST_the_guild_for_the_war_effort_desc: "澳大利亚帝国妇女协会本为效忠王室而建。其宗旨正被彻底转向。它所建立起的庞大组织网络，如今将把能量输送到战争工业、医院以及一个自力更生的澳大利亚的补给链之中。"
 AST_for_the_southern_cross: "为了南十字星"
 AST_for_the_southern_cross_desc: "南十字星不照耀不列颠。它照耀着我们。澳大利亚的身份认同是真实的，是赢得的，是值得捍卫的。一种新的民族自豪感正被铸造，它不是从伦敦借来的，也不是由遥远机构定义的，而是生长于此，在这片土地，在这片星空下。"
 AST_through_the_gates: "踏过城门"
 AST_through_the_gates_desc: "更紧迫的事务迫使各项事务让位。国防计划正在澳大利亚工业的全部力量支撑下进行扩展。新设施与现有设施一同拔地而起，产出目标向上修正，民用生产与军事必需之间的界限悄然消除。"
 AST_toe_the_line: "严守界线"
 AST_toe_the_line_desc: "澳大利亚人在繁荣年代所习惯的舒适，现在必须搁置一旁。配给制、更长的工作时间和服役号召，是独立的代价。那些响应号召的人将会发现，一个准备支持他们的国家。但对于那些认为牺牲是他人负担的人，国家将不会有多少耐心。"
 AST_crush_the_gates: "攻破城门"
 AST_crush_the_gates_desc: "扩军备战已经完成。澳大利亚工业现已处于全面战争状态，其产出完全投向国防力量的建设与投送。无论即将来临的是何种风暴，澳大利亚都将迎接它，我们不再是一个仓促动员、心不甘情不愿的自治领。"
 AST_national_defense: "国家防卫"
 AST_national_defense_desc: "通过有意识的投资和国家指导，澳大利亚已建立起足以维持自身防卫的工业基础。工厂与船坞在国家监督下运作，衡量其产出的不再是利润，而是国家的需求。"
 modify_AST_national_defense_tt: "§Y$AST_national_defense$§!追加效果："
 AST_nauru_pact: "瑙鲁协定"
 AST_nauru_pact_desc: "夺权的首要阻碍仍横亘眼前，独立之事看似遥遥无期，但谋求澳大利亚自治绝非仅关乎我方一己之利。为换取[GER.GetNameDef]在英国阻挠澳大利亚优先运动，或是日后澳洲脱离英联邦时为我们提供保障，我方承诺上台后，将归还他们失去的太平洋岛屿之一——瑙鲁。"
 AST_australian_culture_investments: "澳大利亚文化投资"
 AST_australian_culture_investments_desc: "斯蒂芬森通过其论文《澳大利亚文化基础》，影响了金迪沃罗巴克诗歌运动的形成，并阐明了一点：澳大利亚文化必须被置于优先地位。现行政府全然漠视文艺创作者的价值，而我们绝不会如此。我们将动员金迪沃罗巴克诗歌运动与澳大利亚优先运动的支持者，共同刺激本土文化发展。"
 AST_australian_culture_investments_tt: "\n§Y365§!天后："
 AST_australia_first_party_focus: "澳大利亚优先党"
 AST_australia_first_party_focus_desc: "澳大利亚优先运动成员已壮大到无法再阻止其前进的地步。是时候让澳大利亚公众迎接这个新注册、最响亮的民族主义声音了：澳大利亚优先党。"
 AST_australia_first_party_req_tt: "§Y澳大利亚优先党§!已成立。"
 AST_in_from_the_cold: "结束危险"
 AST_in_from_the_cold_desc: "澳大利亚优先及其支持者无需再躲藏。我们国家在历任政府领导下所遭受的虐待终于被揭露，现在是倾听新声音的时候了。"
 AST_absorb_the_uap: "吸纳澳大利亚联合党"
 AST_absorb_the_uap_desc: "尽管澳大利亚联合党始终秉持自由主义，但它也属于右翼政党。如今新政党掌舵，澳大利亚联合党的党员已然别无选择，只能转而支持现政府的施政纲领。我们将主动接洽该党核心骨干，吸纳其加入澳大利亚优先党。"
 AST_big_business_pact: "大企业协定"
 AST_big_business_pact_desc: "由于澳大利亚优先党旨在保护国内产业，它已在许多大企业巨头中找到了支持者。作为推行增加其利润的政策的交换，他们将支持我们的政治和军事目标。"
 AST_big_business_pact_tt: "\n解锁§Y大企业协定§!决议，影响工厂和建造目标。"
 AST_autarky: "自给自足"
 AST_autarky_desc: "依赖对外贸易是危险的，尤其是在冲突时期；澳大利亚工业必须被置于优先地位，而非被进口产品击败。只有限制我们的贸易法，才能保护国内经济，确保澳大利亚能够自给自足。"
 AST_energy_independence: "能源独立"
 AST_energy_independence_desc: "依赖对外贸易是危险的，尤其是在冲突时期；能源独立对于确保澳大利亚即使在最艰难时期也能正常运转至关重要。通过投资炼油厂，我们可以促进国内能源生产。"
 remove_2_offsite_dockyard: "移除§R2§!地图外§Y海军船坞§!。"
 AST_british_pact: "英澳协定"
 AST_british_pact_desc: "尽管最近从英联邦脱离，但继续与旧日母国合作，仍符合[AST.GetName]的利益。考虑到[ENG.GetNameDef]在全球兵力捉襟见肘，我们愿通过提供军事合作来分担其重担，这应当会受到赞赏。"
 AST_naurus_return_to_german_hands: "瑙鲁归还德国"
 AST_naurus_return_to_german_hands_desc: "如今澳大利亚优先党已完全执掌国家权柄，是时候兑现关于瑙鲁的承诺，同时要求德国盟友履行盟约义务了。[AST.GetName]终将挣脱英联邦的枷锁，彻底剥夺英国对本国事务的干涉权。"
 AST_naurus_return_to_german_hands_tt: "“§Y瑙鲁条约§!”将生效。"
 AST_naurus_return_to_german_hands_tt_2: "“§Y瑙鲁条约§!”生效中。"
 AST_the_winner_takes_it_all: "胜者通吃"
 AST_the_winner_takes_it_all_desc: "过去为了能与德国合作而牺牲瑙鲁岛是合理的，但如今已然不合时宜。我国的实力已充分彰显，理应向所罗门群岛与新西兰扩张势力，即便此举会进一步背弃《瑙鲁协定》也在所不惜。毕竟，所罗门群岛将成为又一块落入澳洲手中、脱离德国掌控的领地。"
 AST_resist_western_intruders: "抵抗西方入侵者"
 AST_resist_western_intruders_desc: "西方国家似乎被迫干涉太平洋事务，但这不能再继续下去了。在他们到达我们的海岸之前，我们将到达他们的海岸——以此证明[AST.GetName]不是一个屈从于他方要求的国家。"
 AST_invasion_preparation_tt: "登陆准备时间：§G-20.0%§!"
 AST_naval_invasion_penalty_tt: "登陆惩罚：§G-20.0%§!"
 AST_expand_the_fort: "扩建要塞"
 AST_expand_the_fort_desc: "西太平洋不是由[USA.GetNameDef]来支配的。美国声称拥有的岛屿属于东亚国家，随着澳大利亚影响力的增长，我们才应是那些岛屿的拥有者。"
 AST_integrate_the_fort: "整合要塞"
 AST_integrate_the_fort_desc: "自1920年以来，我们根据国际联盟的授权管理新几内亚，而巴布亚也几乎从联邦成立起就成为[AST.GetName]的海外领地。因此，将巴布亚新几内亚东部地区纳入[AST.GetName]核心领土是顺理成章的。这就是我们统一澳大利亚文化的下一步。"
 AST_defying_american_interference: "无视美国干涉"
 AST_defying_american_interference_desc: "[USA.GetNameDefCap]的阴影笼罩着我们，每当我们的行动不符合其利益时，它就威胁要进行干预。有了这样一个横跨太平洋的全球大国对[PHI.GetNameDef]的铁腕控制，东亚诸国将永远不会真正属于东亚。[AST.GetName]不会向任何外国入侵者的权威屈服——菲律宾将属于我们。"
 AST_the_pacific_garrison: "太平洋驻军"
 AST_the_pacific_garrison_desc: "虽然保护东南亚和太平洋符合英国的利益，但该地区距英国本土万里之遥。作为对英国在补给上支持的回报，我们将主动提出接手这片领土的防御指挥，使[ENG.GetNameDef]能将注意力转向别处。"
 AST_vichy_out_of_africa: "维希法国退出非洲"
 AST_vichy_out_of_africa_desc: "降服或联手维希法国，是[ENG.GetNameDef]的主要目标之一。作为善意的表示，[AST.GetName]将加入其中，并追击法属非洲殖民地，直到他们被征服。"
 AST_vichy_out_of_africa_tt1: "通过§Y维希法国退出非洲§!国策获得§Y维希法国§!在§Y非洲§!领土的宣称。\n"
 AST_vichy_out_of_africa_tt2: "通过§Y维希法国退出非洲§!决议获得§Y维希法国§!在§Y非洲§!领土的宣称。\n"
 AST_vichy_africa_claim_flag: "[AST.GetFlag]§Y[AST.GetName]§!对§Y维希法国§!所有§Y非洲§!领土的宣称被添加到§Y停止干涉§!。"
 AST_vichy_claim_tt: "[AST.GetFlag]§Y[AST.GetName]§!的宣称被添加到§Y停止干涉§!。"
 vichy_in_africa_trigger: "§Y维希法国§!：控制的任意地区：\n  位于§Y非洲§!"
 vichy_wargoal: "获得针对§Y维希法国§!的§Y吞并§!战争目标。"
 AST_britain_supplying_ships: "英国提供舰船"
 AST_britain_supplying_ships_desc: "从肩负起保卫英国盟国海岸线的重担以来，愈发明显的事实是，[ROOT.GetName]的舰队需要扩张。[ENG.GetNameDefCap]理当为我们提供舰船。"
 AST_hand_in_glove: "密切合作"
 AST_hand_in_glove_desc: "通过向北扩张，我们能够增强澳大利亚在东南亚外交与冲突事务中的影响力。我们已充分证明，在维护本国利益的同时，也能有效保障英国的利益。因此，[ENG.GetNameDef]应当明白，将其偏远领地交由我方管辖才是更为明智的选择。"
 AST_claim_french_indochina: "宣称法属印度支那"
 AST_claim_french_indochina_desc: "法国的命运未决，其殖民地的归属也悬而未决。其他国家或想将贪婪之手伸向法属印度支那，但它们绝对赢不过我们。"
 AST_undeniably_ours: "无可争议属于我们"
 AST_undeniably_ours_desc: "无论凭借何种谈判手段，我们都无法获得全部成果。维希法国如今已是风雨飘摇，其国界不过形同虚设。若放弃全面占领其领土的良机，实属不明智之举。战争的关键时刻，终于降临了。"
 AST_done_meddling: "停止干涉"
 AST_done_meddling_desc: "[AST.GetName]始终未忘故土之根，昂首挺胸，继续为英国而战。澳大利亚人向来值得信赖，但这并不意味着他们的奉献是理所应当的。当[AST.GetName]为[ENG.GetNameDef]浴血奋战之时，[ENG.GetNameDef]也必将为[AST.GetName]挺身而出。"
 AST_northern_advancement: "向北推进"
 AST_northern_advancement_desc: "尽管澳大利亚更愿意处理自己的政治事务，但除非我们展露獠牙，否则不要指望我们能不受干涉。[INS.GetNameDefCap]是一个与我们相似的国家——同样受害于那些不愿离开的欧洲闯入者。通过提出对领土的主张，我们发出明确的信号：太平洋国家不应受到干涉。"
 AST_soothing_australian_fears: "安抚澳大利亚的恐惧"
 AST_soothing_australian_fears_desc: "尽管一些政府官员认为澳大利亚与日本有合作的可能，但澳大利亚公众并不这么认为。在对日本入侵恐惧了这么久之后，与这个潜在的侵略者携手对大多数人来说是难以接受的。因此，我们将通过备战来安抚他们的恐惧。"
 AST_soothing_australian_fears_tt: "\n§Y180§!天后："
 AST_dividing_the_pacific: "瓜分太平洋"
 AST_dividing_the_pacific_desc: "“澳大利亚优先”倡导与[JAP.GetNameDef]和平相处，将日本——与大多数澳大利亚公民不同——定义为潜在的太平洋盟友，而非时刻存在的威胁。随着[AST.GetName]实力的提升，[JAP.GetName]也应该同意这一点，并且两国潜在的冲突应当在有机会显现前就已得到解决，这才是合理的。"
 AST_dividing_the_pacific_ast_gain_tt: "[GET_AST_DIVIDING_THE_PACIFIC_AST_GAIN]"
 AST_dividing_the_pacific_jap_gain_tt: "[GET_AST_DIVIDING_THE_PACIFIC_JAP_GAIN]"
 AST_dividing_the_pacific_tt1: "§G我们获得§!："
 AST_dividing_the_pacific_tt2: "§R他们获得§!："
 AST_dividing_the_pacific_tt3: "§Y[AST.GetName]§!移交以下控制的领土："
 AST_against_war_and_fascism: "反对战争与法西斯主义"
 AST_against_war_and_fascism_desc: "反战反法西斯运动是共产国际发起、动员工人反抗反动势力的国际努力之澳大利亚分支。尽管近年来已失势头，但再度高举这面旗帜的责任落在了我们肩上。"
 AST_world_peace: "世界和平"
 AST_world_peace_desc: "反战与反法西斯运动始终致力于出版一本名为《世界和平》的刊物，用以揭露德国与意大利法西斯运动的种种罪恶，尤其是在西班牙内战期间所犯下的暴行。受这些文章所鼓舞，志愿者们正纷纷踊跃投身于反抗法西斯的战斗之中。"
 AST_red_fred: "红色弗雷德"
 AST_red_fred_desc: "“红色”弗雷德·帕特森最初以共产主义运动候选人身份，于1934年竞选布里斯班市长而崭露头角，结果惨败。然而他的雄心未减，如今正竞选汤斯维尔市议员。有了我们的支持，他或能成为首位当选公职的共产主义者。"
 AST_workers_defence_corps_sparks_anew: "工人防卫军重燃火种"
 AST_workers_defence_corps_sparks_anew_desc: "工人防卫军最初为保护纠察线和罢工而组建。随着“新卫队”等团体的侵犯日益加剧，它已被重组，为了争取更好权利和机会而抗议的人们，而再次充当盾牌。"
 AST_a_controversial_recruitment: "颇具争议的征募"
 AST_a_controversial_recruitment_desc: "莫里斯·布莱克本，是一位著名的社会主义律师，以在法庭上对抗压迫性雇主、捍卫工人权利而闻名。身为工党成员，他因与更激进的反战反法西斯运动有联系，其忠诚度已受质疑。"
 AST_from_picket_line_to_front_line: "从纠察线到前线"
 AST_from_picket_line_to_front_line_desc: "随着反对工人阶级解放者的恐吓手段越发咄咄逼人，我们自身的防御也必须相应加强。每发生一起事件，工人们就更坚定，越来越多的人站出来加入防卫军。"
 AST_pig_iron_protests: "生铁抗议"
 AST_pig_iron_protests_desc: "我们的码头工人在许多事务上不赞同其政府，尤其反对向交战国出售生铁。澳大利亚人无意参与侵略，或运输用于伤害无辜平民的装备，因此[AST.GetName]也绝不应如此；发动罢工吧。"
 AST_part_with_colonizer: "与殖民宗主决裂"
 AST_part_with_colonizer_desc: "我们苦难的根源在于大英帝国及其从远方强加的资本主义制度。再也不能这样下去了。趁不列颠被近在家门口的危机分散精力，现在正是掌握自身命运、开辟自由独立国家之路的时候。"
 AST_take_it_to_the_streets: "走上街头"
 AST_take_it_to_the_streets_desc: "产业行动是我们手中推动社会变革的最有力工具之一，我们必须用它来对付只为剥削而设计的制度。夺回生产资料的时候到了，澳大利亚工人们，团结起来！"
 AST_workers_educational_association: "工人教育协会"
 AST_workers_educational_association_desc: "工人教育协会是一个致力于让劳动人民获得教育机会的国际组织。我们应建立本国的分会，因为真正的机会平等始于课堂。"
 AST_off_leash: "解开束缚"
 AST_off_leash_desc: "码头工人是澳大利亚工会行动的脊梁。作为一个大陆般的岛屿，海事劳工在我国经济中扮演如此关键的角色并不奇怪。是时候摘下项圈，解放该产业的老水手了。"
 AST_a_national_housing_commission: "国家住房委员会"
 AST_a_national_housing_commission_desc: "住房问题长期争议不休。人人都应有遮顶之瓦，可这基本需求却常被用来对付工人，其成本成了一种经济压迫。再也不能这样。我们将要求让所有人公平获得住房。"
 AST_guaranteed_employment: "就业保障"
 AST_guaranteed_employment_desc: "社会主义常常被斥为助长需要帮助者的懒惰或依赖。这必须终结。我们追求的只是在工作中获得公平的机会，以及能养家糊口的公平工资。"
 AST_equal_pay: "同工同酬"
 AST_equal_pay_desc: "一个持久的谬误是，拥有生产资料者理应比在其中劳动的人获得更多。企业主和管理者的辛劳不比工人多，也并非天生更有技能。通过均平工资，劳动的果实就能在全社会更公平地分配。"
 AST_all_for_one_one_for_all: "人人为我，我为人人"
 AST_all_for_one_one_for_all_desc: "“人人为我，我得更甚”早已是资产阶级的战斗口号，其贪婪索求愈多，回报却愈少。财富会向下流淌的承诺是个谎言。财富必须平等地共有、共享。"
 AST_abolition_of_private_property: "废除私有制"
 AST_abolition_of_private_property_desc: "工业的齿轮以工人的鲜血润滑。我们必须终结积累的暴行，彻底废除私有财产。一切财产都将共有、共享，人们各尽所能，各取所需。"
 AST_centralized_production: "集中化生产"
 AST_centralized_production_desc: "市场力量混乱而不平等。要建设一个真正公平的社会，国家必须在决定生产什么、由谁生产、在何处生产上发挥中心作用。我们的官僚机构保有详尽的记录，最有条件来制定生产配额。"
 AST_public_institutions: "公共机构"
 AST_public_institutions_desc: "社会的运转需要许多基本服务，从医疗、住房到托儿和交通。国家必须普遍提供这些服务，确保人人不受限制地享有。摆脱了为私人盈利的强制，这些体系就能高效运转，服务全体人民的需要。"
 AST_planned_extraction: "计划性资源开采"
 AST_planned_extraction_desc: "我们有幸拥有一片资源如此丰富的土地。我们必须确保其财富被系统地开采，并导向最需要它们的产业。"
 AST_maritime_commission: "$USA_maritime_commission$"
 AST_maritime_commission_desc: "$USA_maritime_commission_desc$"
 AST_state_research_funding: "国家科研资助"
 AST_state_research_funding_desc: "为了最大限度发挥我们研究机构的效能，国家必须成为其主要资金来源，将努力引向最需要之处，并确保信息受到严格控制。毕竟，我们不能冒险让公民被错误的思想所困扰。"
 AST_graziers_to_industry: "从牧民到工人"
 AST_graziers_to_industry_desc: "大萧条期间，我们的城市人口外流，工人去乡村寻求安稳。如今，掌控了生产资料，我们能把他们拉回工业。我们必须让他们明白国家之需：工业的熔炉必须靠人的汗水来喂养。"
 AST_free_school_policy: "免费教育政策"
 AST_free_school_policy_desc: "要塑造模范公民，就必须塑造其思想。从摇篮到大学，国家将引导我们的孩子接受怎样的教育。由此，我们就能确保后代懂得社会主义理想的重要性，以及自由市场……和自由思想的危险。"
 AST_free_healthcare_policy: "免费医疗政策"
 AST_free_healthcare_policy_desc: "我们的人民理应免于疾病和伤害，而万一不幸发生，他们也不应像在其他社会那样因厄运而沦落赤贫。我们将提供普遍享有的医疗、医院和医生——因为健康的人民才是生产力充沛的人民。"
 AST_the_publics_australia: "公众的澳大利亚"
 AST_the_publics_australia_desc: "我们已抛弃旧秩序，建成了一个为多数人而非少数人存在的国家。工业、劳动和资源如今服务于全体人民。这就是人民的澳大利亚。平等、团结、牢不可破。"
 # 'Cominwealth' over 'Commonwealth' is intentional
 AST_the_australian_commonwealth: "澳大利亚联邦"
 AST_the_australian_commonwealth_desc: "不列颠曾声称在英联邦拥有领导地位，但其愿景已遭资本主义利益腐化。我们将夺取这一角色，引领各国走向共同的社会主义乌托邦。"
 AST_union_control_commonwealth: "解锁§Y工会控制§!决议。\n允许在新西兰、马来西亚、缅甸以及最终在印度进行共产主义渗透。"
 AST_a_comrade_emancipated: "解放的同志"
 AST_a_comrade_emancipated_desc: "放眼世界，许多国家仍被资本主义的锁链束缚，他们的人民得不到真正的自由。作为一个自由的社会主义国家，援助他们解放是我们的义务。全世界的工人们，团结起来，我们将一同挣脱这些锁链。"
 AST_union_control_local: "解锁§Y工会控制§!决议。\n允许在印度尼西亚和菲律宾进行共产主义渗透。"
 AST_comintern: "加入共产国际"
 AST_comintern_desc: "尽管他们偶尔会背离真正的马克思主义原则，但苏联仍是工人国际的旗手。通过加入共产国际，我们能联合起来，将社会主义的火炬传遍世界。"
 AST_comintern_tt: "如果§Y[AST.GetName]§!领导一个阵营，它将与共产国际合并。否则，§Y[AST.GetName]§!将独自加入共产国际。"
 AST_for_greater_good: "为了更伟大的利益"
 AST_for_greater_good_desc: "我们的世界革命愿景需要鲜血与牺牲。在太多地方，社会主义的火炬摇曳不定；我们必须响应召唤，给予支持，以确保它不会熄灭。毕竟，这是为了更伟大的利益（众人合诵：更伟大的利益）。"
 AST_make_common_cause: "结成共同事业"
 AST_make_common_cause_desc: "在社会主义之光的指引下，联邦在我们的领导下已走出资本主义压迫的黑暗，开始走向繁荣。值此关键时刻，我们必须确保我们的意志不被摧毁，并肩向更美好的明天迈进。"
 AST_the_red_pacific: "红色太平洋"
 AST_the_red_pacific_desc: "太平洋必须按照革命的面貌重塑。在区域内的岛屿和海岸，我们将支持社会主义政府的崛起，确保红旗从一个海岸飘扬到另一个海岸。"
 AST_the_irish_anti-britain_pact: "爱尔兰反英协定"
 AST_the_irish_anti-britain_pact_desc: "英国凭借其岛国位置和海军力量，充当资本主义堡垒太久了。通过在爱尔兰和北爱尔兰的码头工人中煽动骚乱，我们可以突破其防御，为我们跨越爱尔兰海开辟一条通道。"
 AST_stretch_the_fleet: "扩充舰队"
 AST_stretch_the_fleet_desc: "英国仍以其强大舰队为护盾，充当资本主义的堡垒。是时候加强我们自己的海军实力，主动向他们出击，告诉世界哪个岛更大。"
 AST_chinese_relations: "与中国的关系"
 AST_chinese_relations_desc: "我们在中国的同志们正在为生存而奋斗。我们有能力援助他们，但必须迅速行动，以免他们被帝国主义势力所压倒。"
 AST_westward_battles: "西进作战"
 AST_westward_battles_desc: "法西斯势力主宰着西方，威胁着我们生存的根本。如今与共产国际结盟，我们必须主动向他们出击，挺身面对那些企图摧毁我们正在建设的工人乌托邦的势力。"
 AST_strongholds: "要塞"
 AST_strongholds_desc: "为了巩固我们在这一新战区的地位，我们必须支持爱尔兰的同志们，对抗资本主义帝国主义的核心。在我们共同为全球冲突的下一阶段做准备之际，他们早期争取独立的斗争已经为我们提供了宝贵的经验与启示。"
 AST_out_of_the_den: "走出巢穴"
 AST_out_of_the_den_desc: "爱尔兰仍有许多人对英国统治深怀怨恨。是时候展示我们的力量，吸引他们走出阴影，集结到我们共同对抗宿敌的事业中来。"
 AST_end_the_kingdom: "终结王国"
 AST_end_the_kingdom_desc: "时刻已到。帝国主义资本主义的根源将被刺入其腐烂的心脏。整个大英帝国工人的解放近在眼前。终结君主制。终结王国。终结压迫。英联邦的工人们，团结起来！"
 AST_red_solidarity: "红色团结"
 AST_red_solidarity_desc: "中国的斗争仍在肆虐，数以百万计的人在受苦和死去。他们的战斗就是我们的战斗，我们不能袖手旁观。我们可以进行干预，分担他们的重担，确保革命的火焰不会黯淡。"
 AST_red_solidarity_tt: "§Y[AST.GetName]§!加入§Y[PRC.GetNameDef]§!针对§Y[CHI.GetNameDef]§!的战争。较小的阵营将被另一方吸收，如果双方已结盟，§Y[AST.GetName]§!直接加入战争。"
 AST_free_the_colonies: "解放殖民地"
 AST_free_the_colonies_desc: "革命的烈火烧穿了分崩离析的大英帝国。殖民地将不再是殖民地，而是自由的国家。起来，同志们！挣脱你们的枷锁，加入革命！"
 AST_free_the_colonies_tt: "§Y[AST.GetName]§!将其控制的所有前英国殖民地降级为半吞并傀儡国。"
 AST_battle_of_the_ocean: "海洋之战"
 AST_battle_of_the_ocean_desc: "海洋长久以来是全球贸易的大动脉。如今，是时候将战斗引向太平洋，并切断它所维系的那个体系。海水将被腐朽资本家和革命英雄的鲜血一同染红。"
 AST_borderless_solidarity: "无国界的团结"
 AST_borderless_solidarity_desc: "团结。这个词将全世界的工人联结在一起。没有边界能将我们划分，没有国家能独自屹立。无论斗争在何处燃烧，我们都会回应召唤，在全球解放斗争中并肩而立。"
 AST_an_equal_union: "平等联盟"
 AST_an_equal_union_desc: "虽然我们扛着革命的旗帜，但所有加入我们的都会得到平等对待。在这个联合体中，资源、劳动和思想自由分享，共同缔造一个集体繁荣、任何国家都不凌驾于他国之上的未来。"
 AST_expanding_influence: "扩大影响力"
 AST_expanding_influence_desc: "站在历史正确的一边，我们的思想不言自明。工人天堂的承诺不是梦幻，而是正在铸就的现实。我们可以将这个愿景向外延伸，邀请他人加入我们建设共同的未来。"
 AST_public_works: "公共工程"
 AST_public_works_desc: "大萧条使澳大利亚经济陷入严重困境。我们将启动一系列公共工程计划，让人们重返工作岗位，恢复消费支出。"
 AST_lang_plan: "杰克·兰计划"
 AST_lang_plan_desc: "杰克·兰认为应拒绝履行外债义务，转而将这些资金用于旨在刺激国内增长的公共计划，从而站到了经济政治的前沿。毕竟，你不能从石头上榨出血来。"
 AST_exports_for_economic_recovery: "经济复苏的出口"
 AST_exports_for_economic_recovery_desc: "兰的反对者则提议利用外国市场和债务来鼓励海外投资和销售，致力于出口导向型经济，以促进国内生产、就业，并最终刺激消费支出。"
 AST_the_phosphate_commision: "磷酸盐委员会"
 AST_the_phosphate_commision_desc: "大战结束后，瑙鲁被置于澳大利亚、新西兰和英国的联合托管之下。1919年，岛上所有磷酸盐销售的权利被移交给以澳大利亚为首的这些托管国。利用我们的领导地位，我们可以影响定价，并为我们的国内市场争取到极具竞争力的价格。"
 AST_goods_standard: "货物标准"
 AST_goods_standard_desc: "杰克·兰经济理论的一个核心原则是在澳大利亚废除金本位，代之以商品本位，将货币供应与实际生产的商品数量挂钩。这确保了资本流动与国内生产力直接相关，而非外部因素。"
 AST_standard_gauge_line_to_darwin: "通往达尔文的准轨铁路"
 AST_standard_gauge_line_to_darwin_desc: "长期以来，我们与北部领土缺乏正常的交通路线。作为旨在将资金回流到经济的更广泛的公共工程计划的一部分，我们可以修建一条连接我们南部城市与北部的铁路。"
 AST_lang_is_right: "杰克·兰没错"
 AST_lang_is_right_desc: "事实证明兰是对的！通过拒绝优先考虑外国债权人，而是更积极地利用我们自己的银行体系，我们可以释放大量资金。然后，这些资金可以投向国内经济，提供急需的投资并刺激增长。"
 AST_within_reach: "触手可及"
 AST_within_reach_desc: "近在咫尺，却又遥不可及。澳大利亚是一个资源极其丰富的国家，只要我们挖得更深一点，我们脚下就蕴藏着无尽的财富。基础设施的扩展拉近了遥远矿井的距离，一个由矿产财富驱动的澳大利亚繁荣时代就在眼前。"
 AST_a_domestic_supply_chain: "国内供应链"
 AST_a_domestic_supply_chain_desc: "我们对国内经济的关注产生的一个副作用是形成了一个异常有韧性的生产体系。由于所有生产环节都在国内，我们在很大程度上不受外部冲击的影响。"
 AST_broken_hill_propietary_company: "布罗肯希尔控股公司"
 AST_broken_hill_propietary_company_desc: "布罗肯希尔控股公司是澳大利亚首屈一指的矿业与钢铁生产商，被当地人称为“澳洲巨人”，主导着整个行业。随着原材料需求的急剧增长，该公司已做好准备迎接更迅猛的发展。"
 AST_radium_hill: "开发镭锭山"
 AST_radium_hill_desc: "在南澳大利亚发现了铀矿，镭迪厄姆山矿井具有巨大的扩展潜力。虽然我们仍在探索这些新兴技术的全部可能性，但很明显，我们正站在原子时代的门槛上，这可能是我们进入原子时代的入口。"
 AST_industrial_expansion: "工业扩张"
 AST_industrial_expansion_desc: "大萧条在过去十年的大部分时间里严重削弱了我们国家的经济产出。现在我们有了采取更直接行动的政治意愿，我们应该将其投入到对工业基础的大胆扩张中，创造就业机会，增加对资源的需求，并为市场生产更多商品。"
 AST_income_tax_assessment_act: "所得税评估法案"
 AST_income_tax_assessment_act_desc: "我们的税收体系状况不佳，人们难以操作，需要我们所负担不起的严厉政府监管。通过改革和简化相关规定，我们可以显著提高税收征收效率。"
 AST_council_for_scientific_and_industrial_research: "科学与工业研究委员会"
 AST_council_for_scientific_and_industrial_research_desc: "1923年帝国会议后，科学与工业研究理事会得到了加强，以帮助拓宽各个殖民地和自治领的经济基础。虽然它做出了重大贡献，但现在是时候让该机构聚焦于一个新的重点：制造业和第二产业。"
 AST_bring_home_the_farmers: "让农民回归家园"
 AST_bring_home_the_farmers_desc: "在大萧条期间，工人前往农村寻找农业劳动机会，我们的大城市人口严重减少。现在情况开始好转，我们应该激励劳动力回流，以便工厂能恢复运转和生产。"
 AST_reverse_wage_cuts: "撤销工资削减"
 AST_reverse_wage_cuts_desc: "为了给企业一个竞争的机会，我们实施了一系列全经济范围的降薪。现在我们看到了复苏的迹象，就应该逆转方向。工资上涨能带来更强的消费能力，有助于推动消费和经济增长。"
 AST_the_manpower_directorate: "人力资源理事会"
 AST_the_manpower_directorate_desc: "随着我们的经济变得越来越复杂，我们面临着日益严重的人力挑战。这个理事会将确保合适的人，在合适的时间，拥有合适的技能，被安置在合适的岗位上。"
 AST_recovery: "恢复"
 AST_recovery_desc: "我们的国内生产总值首次超过了萧条前的水平。这是一个值得庆祝的时刻，因为我们的经济现在唯一的轨迹是向上。我们正在进入一个强劲增长的时期，是时候收获我们新繁荣的回报了。"
 AST_devalued_currency: "贬值货币"
 AST_devalued_currency_desc: "增加出口最有效的方法之一是使货币贬值。如果外国买家因为他们的钱更有价值而能购买更多我们的商品，我们在国际上就会变得更具竞争力。然而，这是一把双刃剑，因为来自其他国家的进口商品也会变得更贵。"
 AST_reverse_industry_tariffs: "取消工业关税"
 AST_reverse_industry_tariffs_desc: "过去，我们用关税来保护国内产业免受外国竞争。然而，这导致了贸易战和对我们出口商品的报复性关税，抬高了价格。我们应该减少这些壁垒，并鼓励对等削减，以帮助扩大贸易。"
 AST_foreign_competition: "外国竞争"
 AST_foreign_competition_desc: "竞争对商业有益；它鼓励创新和效率，同时消除自满。外面是一个狗咬狗的世界，我们需要确保我们的狗是最大的，并且我们已经解开了它的项圈，让它完全自由地去竞争。"
 AST_expanding_into_new_markets: "开拓新市场"
 AST_expanding_into_new_markets_desc: "依赖外国市场而非国内市场的优势很简单。全球市场是广阔的。总有新的市场可以开拓；我们只需要找到我们的优势，并证明澳大利亚商品和商业实践的优越性。"
 AST_populate_or_perish: "繁衍或者灭亡"
 AST_populate_or_perish_desc: "大萧条袭来时，出生率急剧下降，此后一直难以恢复。为了持续推动国内发展，我们将设立联邦移民部，开展并监督新的移民计划。"
 AST_recruitment_drive: "征兵运动"
 AST_recruitment_drive_desc: "历届政府的软弱意志，加上对英国的过度依赖，导致了澳大利亚武装力量长年废弛。这种情况不能再继续下去，我们将发起动员，推动适龄人口加入澳大利亚国防军。"
 AST_new_deal: "新政"
 AST_new_deal_desc: "在[AST.GetName]150周年庆典期间发生的抗议，清楚地表明我们关于原住民的法律必须重新考量。应原住民权利活动家的请求，我们将与他们见面，共同确定一条通向原住民完整公民权的道路。"
 AST_the_1938_sesquicentenary_flag: "§Y1938年一百五十周年纪念§!事件已触发。"
 AST_the_1938_sesquicentenary_tt: "§Y繁衍或者灭亡分支§!的“§Y新政§!”国策将开放。"
 AST_repeal_immigration_restrictions: "取消移民限制"
 AST_repeal_immigration_restrictions_desc: "移民部受困于过时的法律，这些法律决定了谁被允许移民到[AST.GetName]。尽管有引发争议的风险，我们将废除这些法律，代之以配额制度来控制移民流入。"
 AST_womens_armed_services: "妇女服役"
 AST_womens_armed_services_desc: "尽管遭遇激烈反对，妇女服役仍将继续推进。无论性别，每一双援手都将受到欢迎，以保卫[AST.GetName]抵御侵略者。为激励征兵与训练，部队官员的人选至关重要。"
 AST_northern_territory_reconnaissance_unit: "北领地侦察部队"
 AST_northern_territory_reconnaissance_unit_desc: "空军中尉兼人类学家唐纳德·汤姆森一直主张将原住民纳入[AST.GetName]的武装部队，如今终获采纳。我们将亲自委托汤姆森组建一支侦察分队，征召具备当地知识与丛林技能的士兵，以监视我国最偏远荒凉之地。"
 AST_northern_territory_reconnaissance_unit_tt: "解锁支援连§Y北领地侦察部队§!。"
 AST_torres_strait_battalion: "托雷斯海峡营"
 AST_torres_strait_battalion_desc: "托雷斯海峡连队作为守备部队的表现一直可圈可点，但其麾下将士仍有更上一层楼的潜力。鉴于该部队成员多出身于[AST.GetName]北海岸外的岛屿，他们对托雷斯海峡的地理环境了如指掌。我们应当将这些士兵训练为海军陆战队，并号召更多志愿者加入，从而组建一个完整的营级单位。"
 AST_department_of_aboriginal_affairs: "原住民事务部"
 AST_department_of_aboriginal_affairs_desc: "我们将采纳原住民权利活动团体的建议，设立一个新的原住民事务部。该部将由一个原住民传统委员会提供咨询，其目标在于确保原住民群体获得适当的食物与医疗援助。"
 AST_immediate_rights: "立即赋予权利"
 AST_immediate_rights_desc: "[AST.GetName]内任何人口群体均不受联邦管制，任何传统也不得限制公民权利的授予。通过制定我们自己的公民法案，并摆脱我国人口仅系英国臣民的概念，澳大利亚人的权利将不再是有条件的。"
 AST_diverse_army: "多元化军队"
 AST_diverse_army_desc: "保卫国家的行为不仅是特权，更是权利。每一位自愿的澳大利亚人都应能参军入伍，每一位有抱负的士兵都应能在行伍中晋升。"
