 AST_war_is_coming: "战争将至"
 AST_war_is_coming_desc: "在过去的三十年里，我们接连面对各种挑战，而现在似乎又有一场最终的考验即将到来，它将再次检验澳大利亚民主制度的力量。前总理比利·休斯对此十分明确，并警告说——无论我们是否愿意——战争即将来临。如果我们忽视这一判断，那将是极其不负责任的行为。"
