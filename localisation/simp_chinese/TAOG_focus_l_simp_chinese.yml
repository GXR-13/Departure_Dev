 NZL_national_roads_board_taog_desc: "$NZL_national_roads_board_desc$"
 NZL_taranaki_oil_taog: "$NZL_taranaki_oil$"
 NZL_taranaki_oil_taog_desc: "$NZL_taranaki_oil_desc$"
 NZL_women_in_the_workforce: "女性劳工"
 NZL_women_in_the_workforce_desc: "随着人力短缺加剧，女性正挺身而出去填补工厂、农场和公共服务中的关键岗位，确保工业生产在战时重压下不致动摇。扩大培训和就业机会将使我们能够在维持国防的同时，保持工业产出。"
 NZL_restart_the_onekaka_ironworks: "重启奥内卡卡钢铁厂"
 NZL_restart_the_onekaka_ironworks_desc: "奥内卡卡钢铁厂曾象征着我们自主生产钢铁、减少对海外供应依赖的雄心。为启动经济并增进国家安全，有人对重启奥内卡卡的高炉重燃兴趣。"
 NZL_new_zealand_steel_taog: "$NZL_new_zealand_steel$"
 NZL_new_zealand_steel_taog_desc: "$NZL_new_zealand_steel_desc$"
 NZL_scrap_metal_recycling: "回收运动"
 NZL_scrap_metal_recycling_desc: "如我国这般高度依赖进口的经济，承受不起对战略资源的浪费。为增强经济韧性，我们将建立废料回收设施，以处理和再利用金属与橡胶。"
 NZL_domestic_car_industry: "投资车辆组装厂"
 NZL_domestic_car_industry_desc: "[ROOT.GetName]的车辆生产一直局限于将海外制造、运来此地最终组装的零件拼装起来。随着近期我们对本国钢铁生产的投资，或许能够开始自行制造部件了。"
 NZL_department_of_scientific_and_industrial_research_taog: "$NZL_department_of_scientific_and_industrial_research$"
 NZL_department_of_scientific_and_industrial_research_taog_desc: "$NZL_department_of_scientific_and_industrial_research_desc$"
 NZL_project_seal_taog: "$NZL_project_seal$"
 NZL_project_seal_taog_desc: "$NZL_project_seal_desc$"
 NZL_industrial_conscription_taog: "$NZL_industrial_conscription$"
 NZL_think_big_taog: "$NZL_think_big$"
 NZL_industrial_conscription_taog_desc: "$NZL_industrial_conscription_desc$"
 NZL_think_big_taog_desc: "$NZL_think_big_desc$"
 NZL_expand_the_university_of_auckland_taog: "$NZL_expand_the_university_of_auckland$"
 NZL_expand_the_university_of_auckland_taog_desc: "$NZL_expand_the_university_of_auckland_desc$"
 NZL_national_broadcasting_service: "国家广播部门"
 NZL_national_broadcasting_service_desc: "鉴于邮局在1935年选举中的干预及其对国家广播部门的监管，显然我们需改革该组织的管理。我们也应投资更新它所使用的广播设备。"
 NZL_support_allies_with_meat: "利用肉类工业"
 NZL_support_allies_with_meat_desc: "我们在太平洋的盟友的补给状况常处于极限。为减轻压力并让他们的部队吃饱，我们将开始向他们供应肉类。"
 NZL_support_allies_with_meat_tt: "所有盟友会获得§G1§!§Y地图外民用工厂§!"
 AST_COMINWEALTH_FACTION: "澳大利亚联邦"
 AST_cominwealth_tech_sharing_tt: "我们将与阵营中的所有成员签订§Y技术共享协议§!。"
 AST_modify_offshore_advancements_spirit_tt: "§Y$AST_offshore_advancements_spirit$§!追加效果："
 AST_gain_claims_on_japan_tt: "我们将获得对§Y日本本岛§!的宣称"
 AST_ireland_anti_british_pact_offer_accept_tt: "如果他们接受："
 AST_through_the_barricades_tt: "如果§Y[ENG.GetNameDef]§!拥有至少§Y10%§!共产主义支持度，那么战争开始时§Y[132.GetCapitalVictoryPointName]§!的码头工人会发动起义支持我们！"
 AST_end_the_kingdom_ireland_join_tt: "由于[IRE.GetName]签署了反英条约，他们会在我们对[ENG.GetNameDef]宣战时加入我们一方。"
 ###########################
 ##### FABDA BRANCH ########
 ###########################
 # Root
 ABDA_abdacom: "建立美英荷澳司令部"
 ABDA_abdacom_desc: "随着敌对势力在东南亚和太平洋地区迅速推进，该地区的盟军必须作为一个整体行动以阻止他们。通过建立一个联合最高指挥部，我们可以整合资源，协调海军资产，并形成统一战线对抗敌人。"
 # Tier 1 - country-locked
 ABDA_fortress_singapore: "新加坡要塞"
 ABDA_fortress_singapore_desc: "新加坡是我们在该地区防御战略的关键。加强其防御工事并部署重兵把守，将为美英荷澳司令部的更大规模的行动争取关键时间，并阻止敌人取得快速的战略胜利。"
 ABDA_corps_expeditionnaire: "法国远东远征军"
 ABDA_corps_expeditionnaire_desc: "法属印度支那位于美英荷澳联合司令部防御圈的北翼。通过派遣远征军积极参与作战行动，[FRA.GetNameDef]将为其殖民部队提供至关重要的人力资源和作战经验，以此支援联合司令部的整体力量。"
 ABDA_maintain_strategic_flexibility: "保持战略灵活性"
 ABDA_maintain_strategic_flexibility_desc: "美国绝不能将其兵力过度投入任何单一战区。通过谨慎管理我们的战略储备，我们可确保美国的工业与军事力量能在太平洋上任何最需要的地方发挥效能。"
 # Tier 2
 ABDA_the_malay_barrier: "马来屏障"
 ABDA_the_malay_barrier_desc: "从马来亚经[INS.GetNonIdeologyName]延伸的一系列岛屿形成了一道天然防御屏障。美英荷澳司令部的部队必须利用这一地理条件，建立协调的海陆防御以迟滞敌军推进。"
 ABDA_develop_naval_infrastructure: "发展海军基建"
 ABDA_develop_naval_infrastructure_desc: "太平洋上的持续海军行动需要基地、燃料库和维修设施。投资于我们的港口和锚地基础设施，将延伸美英荷澳司令部的海军的活动范围和续航能力。"
 # Tier 3
 ABDA_unified_naval_command: "统一海军指挥"
 ABDA_unified_naval_command_desc: "在陆地防御已建立、基础设施就位的情况下，美英荷澳司令部现在可将所有海军力量统一于一个指挥之下。标准化的信号、共享的情报以及协调的巡逻路线，将成倍增强战区每一艘舰艇的效能。"
 # Tier 4
 ABDA_ship_a_day_sinking_quotas: "每日击沉指标"
 ABDA_ship_a_day_sinking_quotas_desc: "横跨太平洋的敌方补给线是其战略弱点。通过为我们的潜艇和水面舰队设定积极且协调的击沉吨位指标，美英荷澳司令部可在后勤上拖垮敌人，迫使他们转入防御。"
 ABDA_naval_procurement: "海军采购"
 ABDA_naval_procurement_desc: "已遭受的损失迫切需要补充。美英荷澳司令部的协调采购计划将优先建造最适合太平洋战区的驱逐舰、潜艇和巡逻舰，确保我们的联合舰队能与敌人的扩张相匹敌。"
 ABDA_keep_trade_open: "保持贸易畅通"
 ABDA_keep_trade_open_desc: "[INS.GetNonIdeologyName]的橡胶和石油对同盟国的战争努力至关重要。美英荷澳司令部必须保卫承载这些重要资源的海上通道，保护护航船队免遭敌人拦截，保持贸易畅通，流向我们的工业。"
 # Tier 5 - capstone
 ABDA_expand_the_command: "扩大司令部"
 ABDA_expand_the_command_desc: "美英荷澳司令部已证明了其价值。现在我们必须在此基础上再接再厉，将成员资格扩展至同盟国内该地区的其他国家，并深化我们的研究与情报共享，以领先于敌人。"
