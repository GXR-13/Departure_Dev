l_simp_chinese:
 INS_nationalize_companies_tt: "所有军工机构和工业企业将被国有化并重新命名。"
 available_focus_tt: "§G可用§!国策：\n"
 INS_is_union_tt: "已成立荷兰-印度尼西亚联邦"
 INS_is_union_tt_NOT: "尚未成立荷兰-印度尼西亚联邦"
 INS_denounce_soetardjo: "谴责苏塔尔乔"
 INS_denounce_soetardjo_tt: "我们将开始策划一场地下革命，渗透政府并在群岛各地建立游击小组。待准备充分后，我们将发动针对荷兰的独立游击战争。"
 INS_soetardjo_petition_debate_done_tt: "人民议会关于苏塔尔乔自治请愿的辩论已结束"
 INS_tkr_tt: "§Y人民安全军§!追加效果："
 INS_commander_sudirman_tt: "§Y苏迪尔曼§!（[INS.GetFlag]）晋升为§Y陆军元帅§!"
 INS_the_declaration_of_independence: "独立宣言"
 INS_the_declaration_of_independence_desc: "我们不能再冒险等待，必须趁热打铁！我们应派遣民兵迅速控制港口、城市和工业中心，让荷兰当局来不及反应。然后，我们将宣布独立，成立印度尼西亚共和国。"
 INS_the_declaration_of_independence_tt: "我们将宣布§Y独立§!。所有我们建立了§Y民兵基地§!或§Y总部§!的地区都将由我们控制，其余地区仍归属[HOL.GetNameDef]\n\n[HOL.GetNameDefCap]不会承认我们的主权，低烈度冲突将开始。这可能升级为§R战争§!。\n\n解锁接管地区的地面袭击。"
 INSHOL_the_declaration_of_independence: "民族革命"
 INS_laskar_rakjat: "人民武装"
 INS_laskar_rakjat_desc: "革命由印度尼西亚各地众多民兵组成，有大有小。组织民兵是取得胜利的必要步骤。但我们不能操之过急，因为把权力赋予那些与我们政治对手有关联的民兵可能会招致灾难。"
 INS_militia_tt: "创建一种新的§Y自由斗士§!民兵师编制，并解锁管理他们的决议。"
 INS_militia_warning_tt: "民兵是§Y半自治§!的自由斗士团体。他们会为我们而战，但他们的帮助不是无偿的。他们期望自己的努力得到补偿。§R如果要求得不到满足，稳定性将受到严重影响！§!"
 INS_usa_tanks_opinion_mod: "购买我国坦克"
 INS_republic_add_generals_tt: "（§Y$INS_sudirman$§!（[INS.GetFlag]）、§Y$INS_soengkono$§!（[INS.GetFlag]）、§Y$INS_supriyadi$§!（[INS.GetFlag]）、§Y$INS_djatikoesoemo$§!（[INS.GetFlag]）、§Y$INS_maludin_simbolan$§!（[INS.GetFlag]））成为陆军将领。"
 INS_big_militia_presence_tt: "宣布独立后将由我方民兵控制。"
 INS_prepare_raiding_bases: "准备突袭基地"
 INS_prepare_raiding_bases_desc: "我们将利用我们的间谍网络，在整个群岛秘密建立掩体，确保革命开始时我们已做好打击准备。"
 # <Joint Tree - Central Milestones>
 INSHOL_dutch_east_indies: "荷属东印度"
 INSHOL_dutch_east_indies_desc: "该殖民地建立于近500年前，此后经历了多种形态。世界变化迅速，我们现在的行动将决定荷兰与印度尼西亚关系的长远未来。"
 INSHOL_the_war_in_europe: "欧洲战火"
 INSHOL_the_war_in_europe_desc: "欧洲冲突迅速升级，荷兰现已卷入战争。我们不能再依赖他们保护，必须坚守阵地，否则有被外国势力征服的风险。"
 # <Joint Tree - Military Equipment Contracts>
 INSHOL_military_equipment_contracts: "军事装备合同"
 INSHOL_military_equipment_contracts_desc: "东印度群岛是拥有数千万公民的广阔群岛。我们远未具备自卫所需的工业产能。然而，我们有足够的资源来确保与全世界的贸易。通过与世界各地的民主国家签订合同，我们的问题可以得到解决。"
 INSHOL_hawk_75a7: "霍克75A-7"
 INSHOL_hawk_75a7_desc: "美国霍克75A-7战斗机是适合东印度群岛的完美机型，价格实惠且性能强大。我们可以与制造商达成协议，为空军进行急需的升级。"
 INSHOL_purchase_american_tanks: "购买美国坦克"
 INSHOL_purchase_american_tanks_desc: "虽然东印度群岛缺乏制造坦克所需的工业能力，但我们可以直接用东印度群岛的橡胶产业资金从美国购买坦克。"
 INSHOL_purchase_british_artillery: "购买英国火炮"
 INSHOL_purchase_british_artillery_desc: "我们可以将火炮制造外包给英国，从而优先生产其他装备。"
 INSHOL_produce_own_goods: "生产自有装备"
 INSHOL_produce_own_goods_desc: "虽然我们可以达成许多有利可图的贸易协议，但我们不能忘记自己的生产线和军事工业公司。我们应当补贴这些公司，以减少对外国进口的依赖。"
 # <Joint Tree - East Indies Investments>
 INSHOL_east_indies_investments: "东印度投资"
 INSHOL_east_indies_investments_desc: "好的宗主国应当投资其殖民地的发展。投资东印度群岛的经济发展符合我们的最佳利益，也对殖民地公民有益。"
 INSHOL_east_indies_student_exchange: "东印度学生交换计划"
 INSHOL_east_indies_student_exchange_desc: "建立一个允许印度尼西亚人前往荷兰大学学习的体系，对荷兰和东印度群岛的经济都是重大利好。"
 INSHOL_east_indies_fokker_division: "组建东印度福克子公司"
 INSHOL_east_indies_fokker_division_desc: "福克公司已获得东印度空军足够多的许可，值得考虑设立一个专注于东印度空军的专门子公司。"
 INSHOL_expand_shell: "扩建壳牌基础设施"
 INSHOL_expand_shell_desc: "壳牌正逐渐成为我们经济中更大的一部分。显然，我们必须扩建东印度群岛的石油基础设施，跟上壳牌的出口能力。"
 INSHOL_increase_funding_for_tix: "增加T.IX飞机项目资金"
 INSHOL_increase_funding_for_tix_desc: "福克公司的工程师正在开发一种新型双引擎轰炸机，以取代东印度空军使用的过时型号。该项目的预算非常低，有可能在很长一段时间内无法完成。我们可以增加资金，大幅加快进度。"
 INSHOL_reduce_land_ownership_taxes: "降低土地所有权税"
 INSHOL_reduce_land_ownership_taxes_desc: "我们应降低对拥有土地的印度尼西亚公民征收的税款，鼓励农场和企业的发展。"
 INSHOL_coffee_plantations: "咖啡种植园"
 INSHOL_coffee_plantations_desc: "我们应专注于在东部的岛屿获得更多国有土地，并用这些土地建造咖啡种植园。"
 INSHOL_overallwagen: "多用途战车"
 INSHOL_overallwagen_desc: "坦克未必是东印度陆军的最佳解决方案。我们缺乏生产坦克所需的工业实力，且恶劣的地形使其应用受限。我们可以投资为印度尼西亚建造装甲车以填补这一空白。"
 INSHOL_indonesian_cheap_labor: "印度尼西亚廉价劳工"
 INSHOL_indonesian_cheap_labor_desc: "$CONGO_cheap_labor_desc$" #LL: stealing this to save time, hope you don't mind!
 INSHOL_eastern_development_fund: "东部群岛发展基金"
 INSHOL_eastern_development_fund_desc: "我们过于注重对爪哇和苏门答腊的投资，而忽略了殖民地的大部分土地。我们必须致力于开发东部的基础设施，为未来的工业化奠定基础。"
 INSHOL_increase_rubber_taxes: "提高橡胶税"
 INSHOL_increase_rubber_taxes_desc: "东印度群岛的许多橡胶公司正利用殖民地的资源获取巨额财富。对这些企业征收重税才是公平之举。"
 INSHOL_reform_knil: "改革荷兰皇家东印度陆军"
 INSHOL_reform_knil_desc: "自东印度完成对整个群岛的征服以来，荷兰皇家东印度陆军一直停滞不前，且严重缺乏资金。随着全球紧张局势加剧，我们必须尽早开始重新武装东印度。"
 INSHOL_fund_ml_knil: "资助荷兰皇家东印度陆军航空兵"
 INSHOL_fund_ml_knil_desc: "若要跟上世界各国陆军的步伐，我们必须建立一支属于自己的强大空中力量，否则将处于显著劣势。"
 INSHOL_bandung_aircraft_facility_tt: "§Y西爪哇：§!\n 每完成一项前置国策，增加§G1§!个建筑槽位和§G1§!个§Y军用工厂§!。"
 INSHOL_rangers: "游骑兵"
 INSHOL_rangers_desc: "东印度群岛是一个环境多样的广阔群岛。我们应训练能适应这些恶劣环境作战的游骑兵，确保做好防御准备。"
 INSHOL_mountaineers: "山地部队"
 INSHOL_mountaineers_desc: "我们应训练能在群岛的恶劣地形中作战的山地部队。"
 INSHOL_elevate_elite_infantry: "特别部队基地"
 INSHOL_elevate_elite_infantry_desc: "我们不能永远依赖大战时期的战略，必须适应新技术，确保不落人后。我们应建立数个能应对各类环境的精锐步兵师。"
 INSHOL_modernize_knil: "现代化荷兰皇家东印度陆军"
 INSHOL_modernize_knil_desc: "我们将为东印度陆军研究新的战略和学说，确保对敌保持优势。"
 INSHOL_transfer_of_henri_winkelman: "调任亨利·温克尔曼"
 INSHOL_transfer_of_henri_winkelman_desc: "亨利·温克尔曼曾在荷兰皇家东印度陆军服役多年。显然，东印度再次需要他，我们应安排他正式调任至东印度群岛。"
 INSHOL_eastern_conscription: "征集辅助部队"
 INSHOL_eastern_conscription_desc: "爪哇和马都拉岛上有数支由当地王公控制的本土辅助部队。在此危急时刻，我们可以与当地统治者谈判达成协议，使这些部队归我们指挥。"
 INSHOL_establish_vk_knil: "建立荷兰皇家东印度陆军女子军团"
 INSHOL_establish_vk_knil_desc: "我们将为荷兰皇家东印度陆军建立一个妇女志愿军团。她们的贡献将在改善我们的后勤和通讯方面发挥重要作用。"
 INSHOL_emergency_dockyard_construction: "紧急船坞建设"
 INSHOL_emergency_dockyard_construction_desc: "登陆作战的威胁不容小觑，我们必须将海防作为重中之重。"
 INSHOL_emergency_powers_gov_general: "授予总督紧急权力"
 INSHOL_emergency_powers_gov_general_desc: "当前的战争需要迅速做出艰难决策，而东印度的所有决策都须先经荷兰批准，这两者不可能同时实现。我们应授予[INS.GetLeader]紧急权力，使其能立即采取行动。"
 INSHOL_emergency_naval_purchases: "紧急海军采购"
 INSHOL_emergency_naval_purchases_desc: "我们的海岸线防御不足，有被登陆的危险。时间至关重要，我们必须获得更强大的海军，否则必将灭亡。我们将举债从私营公司购买船只，并将其改装为海军驱逐舰。"
 INSHOL_east_indies_navy: "东印度海军"
 INSHOL_east_indies_navy_desc: "[INS.GetNameDefCap]缺乏正式海军，导致荷兰不得不负责该殖民地的防务。随着欧洲和亚洲局势日益紧张，这种状况已难以为继。我们必须迈出第一步，建立一支专门的[INS.GetAdjective]海军。"
 INSHOL_marines: "海军陆战队"
 INSHOL_marines_desc: "我们应该建立一支隶属于新海军的东印度海军陆战队，并派遣海军陆战队成员前往荷兰船只进行训练。"
 INSHOL_domestic_ship_production: "国内船舶生产"
 INSHOL_domestic_ship_production_desc: "若想让我国海军足以抗衡邻国，就必须着手扩大国内舰船的生产规模。"
 INSHOL_destroyers: "驱逐舰"
 INSHOL_destroyers_desc: "如果没有护航舰艇的掩护，我方的重型战舰便无法在群岛间的狭窄海域行动。通过建造现代化驱逐舰，[ROOT.GetAdjective]海军就能保卫海上航线，并将敌方鱼雷艇驱逐出海峡水域。"
 INSHOL_cruisers: "巡洋舰"
 INSHOL_cruisers_desc: "在缺乏战列舰的情况下，一支海军必须更多地依赖巡洋舰。通过组建一支强大的巡洋舰分舰队，能够为[ROOT.GetAdjective]海军奠定坚实的核心力量，使其得以在群岛之间的广阔海域执行巡逻任务，并有效迎击任何侵入我国水域的敌方袭击舰。"
 INSHOL_submarines: "潜艇"
 INSHOL_submarines_desc: "东印度群岛的海峡天然适合设伏，而潜艇的成本远低于被它送入海底的军舰。一支强大的潜艇舰队能让[ROOT.GetAdjective]海军掌控航线，在无需现身的情况下打击敌方船只。"
 INSHOL_outsourced_navy: "将生产外包给企业"
 INSHOL_outsourced_navy_desc: "我们的开支已经够高了，不能再继续将越来越多的殖民地预算挪用于海军。我们可以出资委托企业代为生产。"
 INSHOL_divert_civilian_to_navy: "调拨民用与陆军经费给海军"
 INSHOL_divert_civilian_to_navy_desc: "鉴于当前世界局势，遭受海上入侵的风险空前高涨。我们已无暇顾及财政紧缩，必须将政府各部门的经费悉数调拨给海军。"
 INS_netherlands_can_remove_autonomy_tt_50: "\n若[HOL.GetFlag]§Y[HOL.GetNameDefCap]§!先完成此国策：\n （[INS.GetFlag]§Y[INS.GetName]§!）：§Y£autonomy_texticon -50.00§!"
 INS_netherlands_can_remove_autonomy_tt_75: "\n若[HOL.GetFlag]§Y[HOL.GetNameDefCap]§!先完成此国策：\n （[INS.GetFlag]§Y[INS.GetName]§!）：§Y£autonomy_texticon -75.00§!"
 INS_netherlands_can_remove_autonomy_tt_100: "\n若[HOL.GetFlag]§Y[HOL.GetNameDefCap]§!先完成此国策：\n （[INS.GetFlag]§Y[INS.GetName]§!）：§Y£autonomy_texticon -100.00§!"
 INS_netherlands_can_remove_autonomy_tt_150: "\n若[HOL.GetFlag]§Y[HOL.GetNameDefCap]§!先完成此国策：\n （[INS.GetFlag]§Y[INS.GetName]§!）：§Y£autonomy_texticon -150.00§!"
 INS_netherlands_can_remove_autonomy_tt_200: "\n若[HOL.GetFlag]§Y[HOL.GetNameDefCap]§!先完成此国策：\n （[INS.GetFlag]§Y[INS.GetName]§!）：§Y£autonomy_texticon -200.00§!"
 INS_netherlands_can_remove_autonomy_tt_250: "\n若[HOL.GetFlag]§Y[HOL.GetNameDefCap]§!先完成此国策：\n （[INS.GetFlag]§Y[INS.GetName]§!）：§Y£autonomy_texticon -250.00§!"
 INSHOL_begin_negotiations_soetardjo: "开始与苏塔尔乔谈判"
 INSHOL_begin_negotiations_soetardjo_desc: "苏塔尔乔的自治请愿很有前景，为我们提供了在民族主义者和效忠派之间妥协的机会。我们应开始与他的政党进行正式谈判。"
 INSHOL_urge_gov_veto: "敦促总督否决"
 INSHOL_urge_gov_veto_desc: "苏塔尔乔请愿就是民族主义者的阴谋，东印度政府上当了。我们必须敦促总督立即否决该请愿，否则将有失去该殖民地的风险。"
 INSHOL_eventual_autonomy: "同意最终自治"
 INSHOL_eventual_autonomy_desc: "印度尼西亚的独立愿望强烈且势头不减。我们将同意东印度群岛最终实现自治，但前提是殖民地必须证明自己能独力维持，并坚持民主理念。"
 INSHOL_autonomous_dominion: "[GetYear]年苏塔尔乔法案"
 INSHOL_autonomous_dominion_desc: "尽管荷兰为苏塔尔乔请愿书的生效条件设定了“自力更生”这一不合理的定义，但印度尼西亚对独立的渴望是如此强烈，以至于我们设法满足了这些要求。根据协议，我们将宣布彻底、无条件地脱离荷兰王室独立。"
 INS_cannot_become_independent_tt: "§W§Y[INS.GetFlag][INS.GetNameDefCap]§!在没有外部干预的情况下将§R永远无法独立§!。§!"
 INSHOL_sideline_the_volksraad: "人民议会靠边站"
 INSHOL_sideline_the_volksraad_desc: "苏塔尔乔发起的请愿明显违反了荷兰宪法第一条，只会给东印度群岛的行政带来困难。该请愿必须被否决。"
 INSHOL_prioritize_dutch_profits: "优先考虑荷兰收益"
 INSHOL_prioritize_dutch_profits_desc: "我们将专注于增加母国的收益。其经济稳定对整个王国的福祉有益。"
 INSHOL_development_loans_netherlands: "从荷兰获取发展贷款"
 INSHOL_development_loans_netherlands_desc: "我们可以从荷兰公司获得贷款，以加快工业化进程。虽然我们会利用作为发展中殖民地的地位来确保低利率，但仍需支付利息。"
 INSHOL_request_economic_dev_subsidy: "请求经济发展补贴"
 INSHOL_request_economic_dev_subsidy_desc: "作为有利可图的殖民地，我们已向宗主国证明了自身价值。我们可以将此作为谈判筹码，争取工业发展补贴。"
 INSHOL_loyalty_to_crown: "效忠王室"
 INSHOL_loyalty_to_crown_desc: "东印度群岛拥有诸多特质，然而最为关键的在于，我们是一片忠诚于荷兰的殖民地。威廉明娜女王将引领我们走向胜利。我们绝不能容许民族主义终结我们绵延近五个世纪的历史，并且要持续表明我们对王室的坚定忠诚。"
 INS_loans_timer: "\n在§Y365§!天后："
 INS_expand_batavia_med_school_tt: "§Y$INS_dutch_east_indies$§!：研究速度修正至少为§G1.00%§!。"
 INS_subsidize_local_business: "补贴本地企业"
 INS_subsidize_local_business_desc: "我们应向本地企业提供补贴以刺激经济增长，从而提振我们长期的经济。"
 INSHOL_education_reforms: "教育改革"
 INSHOL_education_reforms_desc: "许多东印度群岛居民缺乏接受教育的能力，只有极少数人从中学毕业。若要让东印度群岛成为一个富裕的工业化国家，我们必须确保民众能够获得适当的教育机会。"
 INS_expand_batavia_med_school: "扩建巴达维亚医学院"
 INS_expand_batavia_med_school_desc: "通过建设新校园设施并聘请更多教授来扩建巴达维亚医学院，将使深造教育更加普及，这对我们的长期经济增长至关重要。"
 INS_prepare_for_policy_shift: "为政策转变做准备"
 INS_prepare_for_policy_shift_desc: "过去几十年的民族觉醒已对东印度的政治格局产生影响，我们当前的政策显然已经过时。应考虑对治理结构做出一些调整。"
 INS_reallocate_rubber_industry_funding: "重新分配橡胶产业资金"
 INS_reallocate_rubber_industry_funding_desc: "我们对橡胶销售的依赖已经对经济造成了灾难性影响。应通过在群岛上勘探资源、建设矿井和工厂来实现经济多元化。这并非易事，因此必须削减用于维护橡胶种植园的预算。"
 INS_reallocate_rubber_industry_funding_tt: "解锁一项决议，将一个地区的§Y橡胶§!替换为少量§Y其他资源§!。"
 INSHOL_nationalist_coallition: "民族主义联盟"
 INSHOL_nationalist_coallition_desc: "人民议会长期意见一致，与此同时，议会的意见无人问津。递交请愿书与耐心拖延的时代已经过去。议会中的民族主义成员将组成联盟，搁置彼此间的争端，要求无条件独立。那些曾一度被荷兰人认为已安全排除在政治核心之外的老一辈政客，将重新被接纳回派系之中。"
 INSHOL_volksraad_compromises: "人民议会的妥协"
 INSHOL_volksraad_compromises_desc: "在议会内部进行改革已将我们带到此处，如今没有理由放弃这条道路。人民议会将继续其审慎的工作，向海牙让步，以耐心而非决裂来追求自治。留在荷兰联邦内的未来，比在联邦外为之奋战的未来有更丰厚的回报。"
 INSHOL_establish_the_princely_council: "建立土邦理事会"
 INSHOL_establish_the_princely_council_desc: "群岛上诸苏丹与拉贾所掌握的忠诚，是巴达维亚任何议会都未曾拥有过的。他们的宫廷比东印度公司，以及之后崛起的共和国更为古老。一个由土邦家族正式组成的理事会，将给予这些统治者在新国家中的一席之地，并将他们的权威与我们捆绑在一起。"
 INSHOL_nationalize_dutch_companies: "将荷兰公司收归国有"
 INSHOL_nationalize_dutch_companies_desc: "那些大型商行、航运公司、种植园企业和银行，在人们的记忆里，一直冠以荷兰的招牌。从今往后，它们将改冠印度尼西亚之名。董事会将重新任命，招牌将被摘下，三个世纪以来从这些岛屿上被榨取的资本，将最终归属这些岛屿自身。"
 INSHOL_democracy: "民主的印度尼西亚"
 INSHOL_democracy_desc: "人民议会以不彻底的折中方案起家，曾只是个被精心限制权力的咨询机构，旨在提供代表权的表象，却扣留其真实内容。它已超越了它的缔造者。该议会将被重组为一个真正的立法机构，其成员由它所宣称代表的人民选出，其决议对那个曾经将它牢牢拴在极短的缰绳上的政府具有约束力。"
 INSHOL_princely_authority: "土邦权威"
 INSHOL_princely_authority_desc: "一个顾问委员会各得其宜诚然是好事，但那些将自己的名号借予此国创建的苏丹们，或许还可以借出更多。对于想让其中某一位的地位超越其余众人之上的人，议会将不会横加阻拦。这些古老的宫廷早已等了好久来回应这个问题。"
 INSHOL_encourage_further_investment: "鼓励进一步投资"
 INSHOL_encourage_further_investment_desc: "在人民议会商定的条件，目前已暂时解决了政治问题，荷兰资本也已注意到了这一点。关税将得到减免，保障将得到延长，阿姆斯特丹与鹿特丹的商会将得到保证：本群岛依然开放正常的商贸往来。在旧制度下有利可图的，在新制度下亦将如此。"
 # <Joint Tree - ABDACOM>
 INSHOL_east_indies_artillery: "东印度群岛火炮制造"
 INSHOL_east_indies_artillery_desc: "在爪哇开设火炮制造设施，将减少我军在军事行动上对外国贸易的依赖。"
 INSHOL_recall_gerardus_johannes_berenschot: "召回贝伦斯霍特将军"
 INSHOL_recall_gerardus_johannes_berenschot_desc: "赫拉尔杜斯·约翰内斯·贝伦斯霍特是联邦中最有才华的将军之一。他职业生涯的大部分时间在东印度群岛度过，但也曾在荷兰待过数年。在这危急时刻，我们必须将他召回东印度群岛，以助战事。"
 INSHOL_east_indies_cruiser_manufacturing: "东印度群岛巡洋舰制造"
 INSHOL_east_indies_cruiser_manufacturing_desc: "自行制造巡洋舰，而非直接向荷兰订购，是组建真正海军的第一步。考虑到日本的威胁，这一努力十分必要。"
 INSHOL_transfer_of_conrad_helfrich: "将康拉德·赫尔弗里赫调往东印度群岛"
 INSHOL_transfer_of_conrad_helfrich_desc: "直接将海军将领康拉德·赫尔弗里赫调往东印度群岛，将极大改善该地区的海军作战能力。"
 # <Joint Tree - Naval Program>
 INSHOL_naval_program: "荷兰-印度尼西亚海军计划"
 INSHOL_naval_program_desc: "东印度海军远落后于其他国家的海军，甚至落后于某些殖民地海军。为了确保快速发展，各方最好协助这支新海军的建设。"
 INSHOL_naval_program_transfer_25_tt: "将我方§Y25%§!的海军力量移交给[INS.GetNameDef]。"
 INSHOL_naval_program_transfer_25_2_tt: "§Y[HOL.GetFlag][HOL.GetNameDefCap]§!将把其§Y25%§!的海军力量移交给§Y[INS.GetNameDefCap]§!。"
 INSHOL_naval_program_transfer_100_tt: "将§R我方整个海军§!移交给[INS.GetNameDef]。"
 INSHOL_naval_program_transfer_100_2_tt: "§Y[HOL.GetFlag][HOL.GetNameDefCap]§!将把其全部海军力量移交给§Y[INS.GetNameDefCap]§!。"
 INSHOL_naval_program_rejected_tt: "解锁国策§Y$INSHOL_naval_secondchance$§!。"
 INSHOL_hybrid_navy: "混合型海军"
 INSHOL_hybrid_navy_desc: "我们的海军不能仅依靠接管[HOL.GetNameDef]的太平洋舰队，必须开始自行造船，否则一次失误就可能使我们的全部海军补给中断。"
 INSHOL_request_naval_control: "东印度中队"
 INSHOL_request_naval_control_desc: "[HOL.GetNameDefCap]已经沦陷，无法运作一支完整海军。我们应在战争剩余时间内接管其海军。"
 INSHOL_naval_secondchance: "东印度海军方案"
 INSHOL_naval_secondchance_desc: "尽管[HOL.GetNameDef]拒绝移交海军控制权，但我们若不想被占领，仍须保卫太平洋。虽然效果不如他们同意我方提议那样理想，但我们会找到一个足够好的替代方案。"
 # <Joint Tree - Netherlands in Exile>
 INSHOL_netherlands_in_exile: "流亡的荷兰"
 INSHOL_netherlands_in_exile_desc: "王国的悲惨沦陷已成现实。我们不能陷入失败主义。必须接受已发生的事，专注于我们还能挽救的部分。"
 # INSHOL_relocate_prime_minister: "Relocate the Prime Minister to Java"
 INSHOL_relocate_our_generals: "将陆军调往爪哇"
 INSHOL_relocate_our_generals_desc: "必须抢在一切太晚之前，将余下的流亡将领、指挥官及坚持抵抗的士兵，以最高优先级转移到[1058.GetName]。"
 #INSHOL_relocate_our_soldiers: "Transfer Holdout Soldiers to Java"
 INSHOL_netherlands_indonesia_union: "荷兰-印度尼西亚联邦"
 INSHOL_netherlands_indonesia_union_desc: "对许多人而言，[HOL.GetNameDef]与[INS.GetNameDef]组成平等联盟国家的想法很可笑，但鉴于我们当前的危机，这似乎是最大化维持主权几率唯一途径。"
 # <Sukarno Shared Branch - Resistance Buildup>
 INS_underground_revolution: "地下革命"
 INS_underground_revolution_desc: "我们将开始秘密策划革命，逐步扩大成员数量和民兵活动，直到准备就绪发起打击。"
 INS_infiltrate_the_media: "渗透媒体"
 INS_infiltrate_the_media_desc: "我们的运动已争取到东印度多家媒体组织的高层成员的支持。我们可以借此优势，巧妙地在民众心中植入亲革命的情绪。"
 INS_infiltrate_the_army: "渗透陆军"
 INS_infiltrate_the_army_desc: "我们的许多成员已应募加入荷兰皇家东印度陆军，从低阶士兵到少校不等。我们应尽可能搜集秘密，同时将自己人扶持到高位。一旦动手，我们就能在荷兰皇家东印度陆军中制造混乱。"
 INS_privately_owned_military_industry: "私营军工产业"
 INS_privately_owned_military_industry_desc: "我们将在军事工业部门建立若干影子公司，确保革命开始后我们仍能掌控军工产业。"
 INS_privately_owned_military_industry_tt: "在你的总部添加§G2§!§Y军用工厂§!"
 INS_instigate_chaos_sulawesi: "在苏拉威西煽动混乱"
 INS_instigate_chaos_sulawesi_desc: "我们将与苏拉威西的地方民族主义者合作，组织罢工、暴动，并激化民众思想。"
 INS_instigate_chaos_sulawesi_tt: "一旦宣布独立，我们将获得§Y[673.GetName]§!和§Y[1056.GetName]§!的§G核心§!。它们依然不是荷属东印度的核心。"
 INS_instigate_chaos_medan: "在棉兰煽动混乱"
 INS_instigate_chaos_medan_desc: "我们将与棉兰和廖内的当地民族主义者合作，组织罢工、暴动，并激化民众思想。"
 INS_instigate_chaos_medan_tt: "一旦宣布独立，我们将获得§Y[1049.GetName]§!的§G核心§!。它依然不是荷属东印度的核心。"
 INS_embezzlement_scheme_in_batavia: "巴达维亚侵占计划"
 INS_embezzlement_scheme_in_batavia_desc: "我们将制定一项计划，在宣布独立时将我们的产能从巴达维亚转移到共和国领土。"
 INS_embezzlement_scheme_in_batavia_tt: "宣布独立时，§Y[1058.GetName]§!一半的工厂将被转移到我们的§Y革命总部§!。"
 INS_volksraad_rumors: "人民议会内部传闻"
 INS_volksraad_rumors_desc: "我们将在人民议会内部开始秘密讨论革命。如果成功，可以说服印度尼西亚裔人民议会成员加入我们的事业。"
 INS_volksraad_rumors_tt: "宣布独立后，人民议会内所有§Y印度尼西亚§!顾问将被§G保留§!。"
 INS_railway_youth_force: "与铁路青年团合作"
 INS_railway_youth_force_desc: "铁路青年团是一支主要活跃于中爪哇的伊斯兰青年民兵组织，因其夺取铁路的策略而得名。他们是宝贵的盟友，但活力四射且渴望战斗。若停火时间过长，他们会变得对政府不满。"
 INS_sleeper_informant_network: "[GetInformantNetworkName]"
 INS_Sleeper_Informant_Network_name: "潜伏情报网络"
 INS_KNIL_Informant_Network_name: "荷兰皇家东印度陆军情报网络"
 INS_sleeper_informant_network_desc: "我们将建立一个遍布荷兰皇家东印度陆军行政机构的情报网络，使我们能提前获得敌人的计划。"
 INS_sleeper_informant_network_tt: "§R当宣布独立时：§!\n"
 # <Sukarno Shared Branch - Peoples Security Army>
 INS_the_peoples_security_army: "人民安全军"
 INS_the_peoples_security_army_desc: "我们的成员（主要是年轻的印度尼西亚人）正变得不耐烦，渴望为独立事业贡献力量并战斗。我们应建立革命武装力量，并开始训练未来的士兵。"
 INS_commander_sudirman: "苏迪尔曼之军"
 INS_commander_sudirman_desc: "苏迪尔曼虽然年轻，但展现出了巨大潜力，在抵抗组织的年轻成员中人气极高。应该由他指引人民安全军的道路，带领我们走向胜利。"
 INS_commander_oerip: "乌里普之军"
 INS_commander_oerip_desc: "乌里普在陆军中服役数十年，是唯一被晋升为荷兰皇家东印度陆军少校的印度尼西亚人。他的知识和经验远超任何其他成员。应该由他指引人民安全军的道路，带领我们走向胜利。"
 INS_sudirmans_promotion: "苏迪尔曼的晋升"
 INS_sudirmans_promotion_desc: "苏迪尔曼展现了卓越的领导才能，并精心策划了数次成功的突袭。是时候认可我们的司令的功绩，授予他当之无愧的将军头衔了。"
 INS_tkr_steal_general: "策反荷兰陆军将领"
 INS_tkr_steal_general_desc: "若我们能说服荷属东印度陆军的高层成员加入我们的事业，不仅能壮大我军，还能削弱敌军。"
 INS_tkr_supply: "每位革命者都必须战斗"
 INS_tkr_supply_desc: "我们将确保运动的每位成员都接受正规军事训练，无一例外。"
 INS_tkr_professional_army: "职业化陆军"
 INS_tkr_professional_army_desc: "我们不能只依赖民兵，应建立一支专业的共和国军队以维持秩序。"
 INS_arm_the_revolutionaries: "武装革命者"
 INS_arm_the_revolutionaries_desc: "我们必须从那些充满活力、愿为印度尼西亚奉献一切的革命者和民族主义者入手。我们将为他们提供所需的训练和装备，为国而战。"
 INS_arm_the_youth: "武装青年"
 INS_arm_the_youth_desc: "除了革命者，我们还必须武装青年。他们充满活力和希望，将传承革命的火炬。我们必须确保尽可能多的印尼青壮年接受战斗训练和装备。一旦战火蔓延至家园，他们将随时行动。"
 INS_arm_the_students: "武装学生"
 INS_arm_the_students_desc: "学生自数十年前就奠定了革命的基础，他们将继续引领革命前进。"
 INS_guerilla_industry: "夺取工业"
 INS_guerilla_industry_desc: "我们将利用遍布群岛的游击力量，夺取工厂控制权，从而生产新枪械来武装我们的民兵。"
 INS_indonesian_assault_doctrine: "印尼突击学说"
 INS_indonesian_assault_doctrine_desc: "战争不仅仅依靠士兵。百万人若无枪械作战，则毫无意义。我们必须优先获取高质量火炮，以便向敌占区纵深推进。"
 INS_tighter_tkr_integration: "加强人民安全军与民兵整合"
 INS_tighter_tkr_integration_desc: "人民安全军与各路民兵力量未能统一行动，协调有限。随着战争持续，这只会引发越来越多的问题。尽管民兵军官难免抗议，我们仍需将武装部队与民兵融合成一个统一的组织。"
 INS_quality_over_quantity: "质量胜于数量"
 INS_quality_over_quantity_desc: "一名训练有素、具备周密战略和现代装备的士兵，能击败五名持手枪的学生。我们必须优先培养高质量、装备精良的士兵和特种部队，而非一味动员尽可能多的士兵。"
 INS_add_militia_cap_1_tt: "§Y自由战士§!师编制上限增加§Y1§!。\n"
 INS_add_militia_cap_2_tt: "§Y自由战士§!师编制上限增加§Y2§!。\n"
 INS_add_militia_cap_3_tt: "§Y自由战士§!师编制上限增加§Y3§!。\n"
 INS_add_3_militia_unit_tt: "创建三个可用于§Y突袭§!的§Y自由战士§!单位，以增加荷兰各地区的§G民兵存在§!。"
 INS_add_fully_trained_militia_unit_tt: "创建一个已训练完成的§Y自由战士§!单位。\n"
 # <Sukarno Shared Branch - Expand Resistance Membership>
 INS_expand_resistance_membership: "扩招抵抗组织成员"
 INS_expand_resistance_membership_desc: "将整个运动集中于一个基地必然导致失败。我们将征召成员组成民兵小组，作为特使派往各地，以提升我们在不同地区的声望和控制力。"
 # <Central Independence Branch - Militias>
 INS_deploy_the_kris: "苏拉威西印尼人民服务组织"
 INS_deploy_the_kris_desc: "印尼苏拉威西人民奉献力量，印尼文简称KRIS，是一个活跃的民兵团体，构成了苏拉威西和万鸦老地区民兵的主要力量。我们应招募他们正式加入人民安全军并肩作战。"
 INS_assist_the_pemuda: "协助青年军"
 INS_assist_the_pemuda_desc: "爪哇岛遍布着各种青年学生民兵组织。与他们联手，并在他们针对荷兰人的行动中提供军事援助，或许能为我们赢得一个有用的盟友。"
 INS_mobilize_the_pemuda: "动员青年军"
 INS_mobilize_the_pemuda_desc: "既然我们已成功赢得最大青年团体的信任，就应着手计划将他们编入人民安全军。"
 INS_organize_jakarta_pemuda: "组织雅加达青年军"
 INS_organize_jakarta_pemuda_desc: "爪哇有许多规模不一的青年团体。虽然我们已经动员并招募了其中大部分，但雅加达仍有数十个小团体在独立行动。我们必须联系他们并建立合作关系。"
 INS_recognize_moestopos_batallion: "承认穆斯托波营"
 INS_recognize_moestopos_batallion_desc: "一位名叫穆斯托波的革命者在泗水自封为“代理国防部长”，并掌控着泗水的民兵力量。他的努力值得正式认可，我们应正式晋升他为人民安全军少将。"
 INS_darul_islam_focus: "伊斯兰之家"
 INS_darul_islam_focus_desc: "卡尔托苏维尔佐的伊斯兰军在西爪哇的山丘中已经证明了自己，我们不能让这样的战士游离于我们的队伍之外。让他的非正规军与我们的士兵并肩作战，而他本人则应获得应得的军衔。信徒们很快便会在共和国境内提出他们的诉求。"
 # <Central Independence Branch - Navy>
 INS_just_a_fisherman: "伪装渔民"
 INS_just_a_fisherman_desc: "在没有海军的情况下进行群岛战争十分艰难，我们无法长期维持。我们将尝试一个可能天真的策略：派遣民兵伪装成渔民，乘坐渔船潜入荷兰控制的港口。"
 INS_a_cheap_navy: "廉价海军"
 INS_a_cheap_navy_desc: "我们没有时间和资金来建设一支庞大的现代化海军。必须因陋就简，拼凑一切可用的资源。"
 INS_divert_army_funds_to_navy: "调拨陆军经费给海军"
 INS_divert_army_funds_to_navy_desc: "印度尼西亚是群岛国家，没有舰船运输，我们的步兵就毫无用处。从人民安全军调拨经费给新建海军是值得的牺牲。"
 INS_indonesian_naval_doctrine: "印尼海军学说"
 INS_indonesian_naval_doctrine_desc: "既然我们正在建设自己的海军，明确作战和训练的学说至关重要。我们应优先尽快制定并采纳一套海军学说。"
 INS_domestic_shipbuilding: "国内造船"
 INS_domestic_shipbuilding_desc: "我们不能永远依赖缴获和购买来的舰船，用不了多久就没有荷兰船只可供我们缴获了。我们应尽早开始建造自己的舰船。"
 INS_acquire_modern_blueprints: "获取现代蓝图"
 INS_acquire_modern_blueprints_desc: "我们将从其他国家和私营企业购买蓝图，用于建造我们的新海军。"
 INS_reclaiming_the_dutch_navy: "回收荷兰东印度海军"
 INS_reclaiming_the_dutch_navy_desc: "荷兰人在我们目前占领的港口中留下了大量舰船。我们应趁此机会将这些船只据为己有。"
 INS_admiral_mas_pardi: "马斯·帕尔迪海军上将"
 INS_admiral_mas_pardi_desc: "任何一支优秀的海军都需要一位海军上将指挥。马斯·帕尔迪是显而易见的人选。"
 INS_akademi_angkatan_laut: "建设海军学院"
 INS_akademi_angkatan_laut_desc: "我们将建立一所拥有海军研究设施的海军学院，同时培养更多成为工程师和海军将领的公民。"
 # <Central Independence Branch - Militia Logistics>
 INS_pki_militia_tt: "陈马六甲拥有一支非常强大的民兵力量。然而，他们不仅为印度尼西亚的意志而战，也为§R共产主义§!和苏联的意志而战。§R最终，他们会以暴力手段反对任何非共产主义政府。§!"
 INS_increase_laskar_funding_tt: "§W每成功满足一个民兵派系的要求，获得§!1§Y个军用§!工厂（最多§G6§!个）"
 INS_subsidize_laskar_armament: "补贴民兵武装"
 INS_subsidize_laskar_armament_desc: "手持竹矛的民兵无法在装备精良的部队面前生存太久。我们需要优先为这些民兵生产更多的枪支和弹药。"
 INS_loot_knil_weapons_caches: "缴获荷兰皇家东印度陆军武器库"
 INS_loot_knil_weapons_caches_desc: "革命前荷兰皇家东印度陆军储备了大量武器。我们的许多成员曾是荷兰皇家东印度陆军成员，或许我们能找到并夺走这些仓库。"
 INS_utilize_tan_malakas_militia: "利用陈马六甲的民兵"
 INS_utilize_tan_malakas_militia_desc: "陈马六甲的红色民兵或许是全印尼最强大的一支民兵力量，将其编入人民安全军将是一大助力。但这并非没有风险——给予一支拥有强烈政治动机的强大民兵如此大的影响力，将使他们更容易夺取权力。"
 INS_increase_laskar_funding: "增加民兵经费"
 INS_increase_laskar_funding_desc: "民兵构成了我军的主力。我们必须认识到这一点，并相应提供资金，即使他们并非完全忠于[INS.GetLeader]。"
 INS_develop_a_functioning_airforce: "建立正规空军"
 INS_develop_a_functioning_airforce_desc: "空军对陆军影响巨大，我们应优先创建一支。"
 # <Vice Presidential Edict - Intro>
 INS_political_stabilization: "恢复秩序"
 INS_political_stabilization_desc: "我们的国家日益动荡。若不尽快采取行动，内战几乎不可避免。我们必须在民族委员会、总统和民兵领导人之间展开谈判，寻求解决方案。"
 INS_vice_presidential_edict: "签署第十号副总统法令"
 INS_vice_presidential_edict_desc: "民族委员会几乎一致要求获得真正的立法权。一份请愿书已呈交给总统，提议建立混合体制：民族委员会成为独立议会，与总统共享立法权。这一提议颇具吸引力，但总统权力可能变得微乎其微。"
 INS_local_cooperatives: "建立地方合作社"
 INS_local_cooperatives_desc: "我们不应建立西方那样的资本主义体系，但也不应忽视私有化带来的经济效益。我们将允许建立地方合作社，其成功将为所有者带来财富。然而，它们将受政府监督，并禁止向所在地以外扩张。"
 INS_local_unity: "土邦部分自治"
 INS_local_unity_desc: "我们将给予土邦部分自治权，作为在这本已动荡时期减少内斗的临时措施。"
 INS_education_subsidies: "教育补贴"
 INS_education_subsidies_desc: "若想建立一个经济成功的国家，投资于国家青年的未来绝对必要。我们将在共和国各地建设负担得起的学校。"
 INS_land_reform: "土地改革"
 INS_land_reform_desc: "在我们宣布独立之前，荷兰直接拥有大量土地。我们应将这些土地低价分配给任何能善加利用的印尼人，以鼓励经济增长。"
 INS_dominion_of_atjeh: "亚齐自治领"
 INS_dominion_of_atjeh_desc: "亚齐的分离主义运动规模庞大且不断壮大。没有必要激化局势，我们应通过谈判达成妥协，让亚齐在保持大部分自治的同时，仍是印度尼西亚的一部分。"
 # <Vice Presidential Edict - Presidential Balance>
 INS_dissolve_national_party: "解散民族党"
 INS_dissolve_national_party_desc: "混合体制是为避免混乱而做出的必要妥协。我们不应允许总统以不民主的方式掌握如此大的权力。总统必须被议会罢免，否则我们将永远无法实现民主。"
 INS_womens_sufferage: "妇女选举权"
 INS_womens_sufferage_desc: "赋予女性投票权会导致短期不稳定，但对于长期稳定和民主却是必要的。"
 INS_women_in_military: "女性参军"
 INS_women_in_military_desc: "允许女性在军队服役，对于确保我们的武装力量尽可能强大是必要的。"
 INS_fair_election: "公平选举"
 INS_fair_election_desc: "随着总统被罢免、革命结束，我们终于可以举行第一次真正公平、没有威权影响的选举。"
 # < Hybrid Politics >
 INS_continue_hybrid_politics: "延续混合政体"
 INS_continue_hybrid_politics_desc: "混合政体是一种必要的恶。虽然最终目标是真正的民主，但印度尼西亚过于年轻和不稳定，无法将所有权力交给人民。总统和议会将继续相互制衡，确保任何一方都不会过于强大。"
 INS_guided_economy: "指导型经济"
 INS_guided_economy_desc: "我们将直接监督印度尼西亚的经济，以确保我们维持控制。我们将所有银行以及石油和农业部门国有化。"
 INS_reform_education_system: "强制性思想教育"
 INS_reform_education_system_desc: "革命证明，对社会秩序不满的学生和青年总会引领反抗。为了政府和国家的安全，我们将要求学校按照我们的政府意识形态进行教学。"
 INS_reform_education_system_2: "教育改革"
 INS_reform_education_system_2_desc: "若要让印度尼西亚未来成为一个富裕的国家，所有印尼人，无论出生地，都必须有权接受教育。"
 INS_three_year_plan: "三年计划"
 INS_three_year_plan_desc: "我们可以制定一个三年计划，在整个群岛建设基础设施并连接各岛屿。"
 INS_destroy_pacific_colonialism: "摧毁太平洋殖民主义"
 INS_destroy_pacific_colonialism_desc: "革命或许已经结束，但仍有战斗要打。我们家门口仍有许多人生活在殖民暴政之下。我们不能袖手旁观，必须采取行动将他们从宗主国手中解放出来！"
 INS_rapid_mobilization: "快速动员"
 INS_rapid_mobilization_desc: "任何强大的国家都有一支强大的军队作为支撑。若想成为能保护自己的区域强国，就必须先大幅提高军队的实力。"
 INS_greater_indonesia: "成立大印度尼西亚"
 INS_greater_indonesia_desc: "努山达拉古国曾将马来世界统一为一个实体、一个民族。既然我们已经将马来亚从殖民暴政中解放出来，我们就应该像努山达拉先祖那样，宣告整个马来世界成为一个统一的国家。"
 # < State Religion >
 INS_secularism: "世俗主义"
 INS_secularism_desc: "印度尼西亚是多民族、多宗教的家园。将宗教与政治混为一谈只会引发内斗，因此我们应该禁止宗教政党。"
 INS_integrate_sarekat_islam: "整合伊斯兰联盟"
 INS_integrate_sarekat_islam_desc: "大的伊斯兰政党拥有广泛的民众支持。将他们整合进政府符合我们的最大利益。"
 # <Vice Presidential Edict - Sjahrir>
 INS_sjahrirs_continued_tenure: "沙里尔连任"
 INS_sjahrirs_continued_tenure_desc: "总理沙里尔已证明自己是一位伟大的领导者，带领我们度过了革命，改善了经济，建立了民主。我们应该让他连任总理。"
 INS_unity_in_diversity: "求同存异"
 INS_unity_in_diversity_desc: "几个世纪以来，“求同存异”这四个字一直体现着我们群岛的精神。在革命期间，这一理念成为了战斗口号，提醒印尼人：尽管我们说多种语言，遵循多种不同传统，但我们团结为一体。我们应该将这一短语写入宪法，以便我们的团结能够代代相传。"
 INS_the_timor_issue: "[INS_timor_issue_scripted_name]"
 INS_timor_issue_scripted_name_issue: "帝汶问题"
 INS_timor_issue_scripted_name_attack: "进攻东帝汶"
 INS_the_timor_issue_desc: "[INS_timor_issue_scripted_desc]"
 INS_timor_issue_scripted_desc_issue: "东帝汶显然是印尼的合法领土，虽然革命已经结束，但它仍处于殖民统治之下。我们将向[721.OWNER.GetName]发出最后通牒，要求立即移交东帝汶。"
 INS_timor_issue_scripted_desc_attack: "东帝汶无疑是印度尼西亚的合法领土。岛上的叛乱分子或许声称要独立，但他们显然不能代表全体人民。葡萄牙殖民主义的残余必须被整合进共和国。"
 INS_pledge_to_allies: "对同盟国的承诺"
 INS_pledge_to_allies_desc: "随着全球冲突日益加剧，我们面临被入侵的风险。虽然我们与同盟国的关系一直不稳定，但我们已经将自己确立为太平洋地区的一股民主力量，应该与强大的民主国家结盟。"
 INS_mixed_economy_system: "混合经济体制"
 INS_mixed_economy_system_desc: "印度尼西亚是一个独特的国家，难以适配传统的资本主义或共产主义。我们应该建立一种混合经济体制，兼有资本主义和共产主义的元素。"
 INS_social_democracy: "社会民主主义"
 INS_social_democracy_desc: "自沙里尔的经济政策实施以来，[INS.GetAdjective]经济已经大幅增长。我们应该宣布印度尼西亚是一个完全的社会民主主义国家，并基于社会民主主义原则制定未来的经济政策。"
 # <Vice Presidential Edict - Sjarifuddin>
 INS_prime_minister_sjarifuddin: "谢里夫丁总理"
 INS_prime_minister_sjarifuddin_desc: "谢里夫丁是领导印度尼西亚的最佳候选人，他的温和政策允许在共产主义者和社会主义者之间达成妥协。"
 INS_concessions_to_communists: "向共产主义者让步"
 INS_concessions_to_communists_desc: "印尼共产党在议会中拥有相当数量的席位，我们应该授予印尼共产党领导人几个部长职位以确保稳定。"
 INS_sjarifuddin_focus_2: "自我管理的出口经济"
 INS_sjarifuddin_focus_2_desc: "我们刚刚获得了独立，因而我们必须重新审视我们的出口经济体系，并对其加以重组，使其不再将荷兰的利润纳入考量。虽然出口导向型经济仍有风险，但我们可以使它比过去更可靠。"
 # <Vice Presidential Edict - Hatta>
 INS_prime_minister_hatta: "哈达总理"
 INS_prime_minister_hatta_desc: "被称为革命宣告者的穆罕默德·哈达，曾担任苏加诺的副总统，并通常是两人中更倾向民主的人。他将成为多数政党都能妥协接受的合适总理人选。"
 INS_hatta_focus_2: "下一步"
 INS_hatta_focus_2_desc: "革命已经结束，尽管某些政治人物坚称革命必须继续，但这些声音应该被忽略。相反，我们应向前看，必须建设印度尼西亚，以使未来数代人能生活在繁荣之中。"
 INS_hatta_princely_advisors: "整合土邦"
 INS_hatta_princely_advisors_desc: "通过我们共同的多元性，我们建立了团结的原则。我们的国家基于此原则建立，但革命的结束使得这一理念因缺少共同奋斗而面临压力。为防止来自少数群体的怨恨和暴动，我们应设立一个额外的理事会，让土邦的地方统治者能在国家政治中有直接发言权。"
 INS_prime_minister_tt: "印度尼西亚首次大选已经举行"
 # < Guided Democracy >
 INS_guided_democracy: "指导型民主"
 INS_guided_democracy_desc: "民主或许是理想，但现在将权力交给人民只会导致混乱。我们将扶植苏加诺为终身总统，由他监督民主议会并在必要时进行干预。"
 INS_enact_militarism: "实行军国主义"
 INS_enact_militarism_desc: "我们应该从[JAP.GetNameDefCap]及其军国主义政策中学习。采用类似的原则将有利于我们的新政府。"
 INS_sukarnos_industrialization: "赋能爪哇工业"
 INS_sukarnos_industrialization_desc: "爪哇的工业是我们经济和军事的支柱。条条大路须通罗马。"
 INS_sukarnos_industrialization2: "人人各尽其责"
 INS_sukarnos_industrialization2_desc: "战争是国家的头等大事，因此每个印尼人为此贡献力量也是头等大事。奢侈是敌人，军工复合体必须发展壮大。"
 INS_japanese_military_lessons: "借鉴日本军事经验"
 INS_japanese_military_lessons_desc: "我们应该研究日本的军事学说，并相应地调整我们自己的军队。"
 # < Support Tan Malaka's Coup>
 INS_support_tan_malakas_coup: "支持陈马六甲政变"
 INS_support_tan_malakas_coup_desc: "苏加诺宣布了我们的独立，但他已证明自己是一个只知折中措施和外交让步的人。陈马六甲和他的斗争统一阵线的纲领才符合人民的要求：百分之百独立，不谈判，不妥协。如果苏加诺不能为革命全力战斗，那么革命必须找到一位愿意这样做的领袖。"
 INS_minimum_program: "最低纲领"
 INS_minimum_program_desc: "斗争统一阵线已提出其诉求：人民政府、人民军队，以及将所有外资种植园和工业国有化。我们需要有能力的人来推进这一纲领。约诺代表工人，塞蒂亚吉特代表党内知识分子。他们将共同确保革命从工厂车间到政府大厅都得到组织。"
 INS_agrarian_reform: "农业改革"
 INS_agrarian_reform_desc: "三个世纪以来，印尼的土地一直在供养陌生人的种植园。耕作土地的农民对此几乎一无所知。不改变这一点的革命根本算不上革命。我们将见证土地转交给耕种它的人。"
 INS_soviet_aid: "苏联援助"
 INS_soviet_aid_desc: "苏联已经承认我们的革命，并准备提供支持。无论我们的纲领与莫斯科之间存在何种分歧，我们都无法拒绝对方提供的援助。我们应该接受武器，继续前进。"
 INS_pacific_revolution: "太平洋革命"
 INS_pacific_revolution_desc: "殖民势力并未从亚洲撤退，只是从印度尼西亚撤退。旧的秩序在马来亚和菲律宾等地仍然存在，这些地方都有渴望推翻旧秩序的男男女女。我们的革命既赋予了我们去帮助他们的地位，也赋予了这种义务。我们必须这样做。"
 INS_purge_oppurtunists_tt: "在共产主义支持率达到§Y60%§!或以上的国家解锁§Y$INS_launch_revolution$§!。那些我们发动革命的国家将成为我们的§Y傀儡§!。"
 INS_purge_oppurtunists: "清洗机会主义者"
 INS_purge_oppurtunists_desc: "慕梭在莫斯科待了二十年学习服从命令。他带着苏联的指示回来，并有一个将我们的共和国变成共产国际傀儡的计划。我们摆脱荷兰人不是为了向另一个外国主子下跪。那些要把我们的革命卖给莫斯科的机会主义者必须被根除，我们所解放的人民应该仰望雅加达，而不是克里姆林宫。"
 INS_federation_of_aslia: "阿斯利亚联邦"
 INS_federation_of_aslia_desc: "我们所解放的国家不必孤军奋战。陈马六甲一直设想着比一个共和国更宏大的蓝图。一个从大陆延伸到太平洋的联邦，团结起来对抗任何胆敢回来的殖民势力。我们将向他们提供我们国家的正式成员资格。"
 INS_aslia_tt: "允许核心化并吞并§Y太平洋§!附属国"
 INS_musso_ascends: "慕梭崛起"
 INS_musso_ascends_tt: "在共产主义支持度达到§Y30%§!及以上的国家解锁§Y$INS_launch_revolution$§!。那些我们煽动革命的国家将保持独立。"
 INS_musso_ascends_desc: "陈马六甲是一个梦想家。慕梭带来了梦想家所不能企及的东西：苏联的全力支持以及国际共产主义运动的团结。我们的革命不必孤军奋战。"
 INS_soviet_economic_integration: "苏维埃经济一体化"
 INS_soviet_economic_integration_desc: "革命赋予了我们自由，但单凭自由无法建造工厂，也无法养活大众。苏联提供了任何资本主义大国都不愿给予的东西：工业技术、发展信贷以及不附带殖民条件枷锁的贸易。拒绝才是傻瓜。"
 # <National Revolution - Reasserting Control>
 INSHOL_revolution_ongoing_tt: "印度尼西亚革命仍在继续"
 INSHOL_reasserting_control: "重新控制东印度群岛"
 INSHOL_reasserting_control_desc: "我们不能袖手旁观，任由这些机会主义者试图毁掉我们数百年来的建设成果，同时摧毁我们的基础设施、毒害年轻人的思想。我们必须采取行动！"
 INSHOL_request_british_support: "请求英国支持"
 INSHOL_request_british_support_desc: "[ENG.GetNameDefCap]作为殖民同行，很可能会同情我们的处境，尤其是如果革命者取得成功，可能会在东亚引发多米诺骨牌效应。我们应当请求他们的经济和军事援助。"
 INS_eng_treaty_holside_tt: "§Y[ENG.GetNameDefCap]§!将正式宣布站在我们一方，并提供大量援助。如果战争以胜利告终，§Y[ENG.GetNameDefCap]§!将有权获得婆罗洲。"
 INS_eng_treaty_engside_tt: "我们将在东印度群岛冲突中正式与§Y[HOL.GetNameDefCap]§!结盟。如果§Y[HOL.GetNameDefCap]§!获胜，我们将有权获得婆罗洲。"
 INS_fra_treaty_holside_tt: "§Y[FRA.GetNameDefCap]§!将正式宣布站在我们一方，并提供大量援助。如果战争以胜利告终，§Y[FRA.GetNameDefCap]§!将有权获得苏门答腊东北部。"
 INS_fra_treaty_fraside_tt: "我们将在东印度群岛冲突中正式与§Y[HOL.GetNameDefCap]§!结盟。如果§Y[HOL.GetNameDefCap]§!获胜，我们将有权获得苏门答腊东北部。"
 INSHOL_franco_dutch_accord: "法荷协定"
 INSHOL_franco_dutch_accord_desc: "尽管我们的士兵装备和组织优于共和国民兵，但他们压倒性的人数优势使战局对我们不利。为了确保胜利，我们需要外部援助，而且是超出大多数国家愿意提供的援助。如果我们愿意让出东印度群岛的部分领土以扩大法国在太平洋的存在，法国可能会愿意介入。"
 INSHOL_london_batavia_accord: "伦敦-巴达维亚协定"
 INSHOL_london_batavia_accord_desc: "尽管我们的士兵装备和组织优于共和国民兵，但他们压倒性的人数优势使战局对我们不利。为了确保胜利，我们需要外部援助，而且是超出大多数国家愿意提供的援助。[ENG.GetNameDefCap]因其在马来亚的存在，可能会对此感兴趣。如果我们提供一些回报，也许可以说服他们？"
 INSHOL_australian_divisions: "派遣澳大利亚步兵至爪哇"
 INSHOL_australian_divisions_desc: "根据伦敦-巴达维亚协定，一旦我们提出请求，英国需通过澳大利亚向东印度群岛增派部队，因为澳大利亚靠近东印度群岛，是建立境外军事基地的理想地点。"
 INSHOL_indian_divisions: "英属印度陆军师"
 INSHOL_indian_divisions_desc: "虽然英国极有可能不愿派遣本国士兵到东印度群岛，但说服他们派遣印度师团要容易得多，尤其是因为印度距离巴达维亚很近。"
 INSHOL_undermine_the_militias: "削弱民兵"
 INSHOL_undermine_the_militias_desc: "媒体夸大了局势的严重性，民兵不过是一群试图追求遥不可及目标的流氓青年。我们不需要调集所有资源去阻止他们，只需守住防线，等待他们疲惫即可。"
 INSHOL_flag_will_fly_again: "旗帜将再次飘扬"
 INSHOL_flag_will_fly_again_desc: "荷兰的旗帜在东印度群岛飘扬了数个世纪，我们绝不容许它降下。如果保住这颗王冠上的珠宝需要派遣坦克和轰炸机，那就派过去！"
 INSHOL_flag_will_fly_again_tt: "§Y革命结束后，该民族精神将被移除，规则改动将被还原。§!"
 # <National Revolution - Escalation>
 INSHOL_mass_mobilization: "大规模动员"
 INSHOL_mass_mobilization_desc: "没有一支装备精良的军队，我们无法赢得这场冲突并粉碎共和国。我们必须重新武装东印度群岛，并将民用部门的资金转拨给荷兰皇家东印度陆军。"
 INSHOL_batavia_storm_operation: "风暴巴达维亚"
 INSHOL_instigate_infighting: "煽动共和国内斗"
 INSHOL_ultimatum_to_republic: "向共和国发出最后通牒"
 INSHOL_comite_rijkseenheid: "国家统一委员会"
 INSHOL_comite_rijkseenheid_desc: "东印度的旗帜正在降下，而人们却只是袖手旁观。我们不能允许这种情况发生，必须说服东印度当局：荷兰人民希望阻止这场革命！"
 INSHOL_increase_esclation_placeholder: "快速升级"
 INSHOL_increase_esclation_placeholder_desc: "我们的民兵已控制了诸多重要港口、城市和工业中心。我们将不再继续等待荷兰采取行动，我们将自行号召发起一场重大军事攻势！"
 INS_take_batavia_explination_tt: "如果我们成功占领整个爪哇，我们将从内部摧毁殖民政府，并§G赢得战争§!。然而，如果我们未能在§Y730天§!内做到这一点，我们将§R灭亡§!。"
 INSHOL_linggadjati_agreement: "停火协议谈判"
 INSHOL_linggadjati_agreement_desc: "事实证明，入侵爪哇困难重重，我们的政府也日益不稳。我们必须后撤并采取守势，以免整个共和国覆灭。我们应当与荷兰谈判达成局部停火，从而在重回爪哇之前重组我们的部队。"
 INSHOL_increase_esclation_placeholder_tt: "解锁一项§Y决议§!，以谈判局部停火并§Y增加占领爪哇的时间限制§!。"
 # <National Revolution - Peace Negotiation>
 INSHOL_seek_foreign_help: "寻求外国援助"
 INSHOL_seek_foreign_help_desc: "一个尚未形成稳定经济的新生国家，试图战胜一个高度工业化的殖民大国，几乎是不可能完成的任务，这不是什么秘密。我们应当联系其他支持我们事业的国家，看看他们是否愿意帮助我们。"
 INSHOL_renville_agreement: "伦维尔协议"
 INSHOL_renville_agreement_desc: "荷兰前所未有的侵略行动已引起国际社会对这场革命的关注，然而荷兰仍在违反停火协议，并挑衅我们做出反应。我们必须尝试向[USA.GetNameDef]发出呼吁，只要能说服他们支持印度尼西亚，荷兰将别无选择，只能退让。"
 INSHOL_no_compromise: "不妥协，不投降"
 INSHOL_no_compromise_desc: "荷兰人的贪婪导致他们几乎只投资爪哇，忽视了东部诸岛，这使爪哇成为整个殖民地的致命弱点。他们必将在此败亡！"
 INSHOL_end_to_bloodshed: "两国方案"
 INSHOL_end_to_bloodshed_desc: "这场冲突持续太久了，双方都没有取得什么进展，每天都有更多人丧生。没人希望这种情况继续下去，是时候与荷兰领导人在谈判桌上讨论了。"
 INSHOL_reorganize_colonies: "重组殖民地"
 INS_we_will_need_another_tt: "由于我们已经控制了整个爪哇，因此还需再控制一个除爪哇以外的地区。"
 # Industry Branch - New
 INS_centralize_the_state: "国家集权"
 INS_centralize_the_state_desc: "从苏门答腊到苏拉威西，从婆罗洲到邦加，我们的发展计划为那些曾仅被[1058.GetName]名义上管辖的领土带来了道路、工厂和机构。这些地区不再是遥远的省份。它们就是[INS.GetNameDefCap]。"
 INS_centralize_the_state_1_tt: "满足前提且拥有§Y核心§!的地区："
 INS_centralize_the_state_2_tt: "满足前提且§Y无核心§!的地区："
 INS_fate_of_de_javasche_bank: "[INS_fate_of_de_javasche_bank_scripted_name]"
 INS_fate_of_de_javasche_bank_scripted_name_colony: "爪哇银行的命运"
 INS_fate_of_de_javasche_bank_scripted_name_independent: "印度尼西亚银行的命运"
 INS_fate_of_de_javasche_bank_desc: "[INS_fate_of_de_javasche_bank_scripted_desc]"
 INS_fate_of_de_javasche_bank_scripted_desc_colony: "自大萧条爆发以来，东印度盾一直在自由落体式贬值，而爪哇银行缺乏阻止这种颓势的手段。我们必须决定如何稳定我们的货币，以免投资者彻底丧失信心。"
 INS_fate_of_de_javasche_bank_scripted_desc_independent: "我们继承了一个处于危机中的货币体系。旧的殖民地盾币已经摇摇欲坠，而向卢比的过渡也未能稳定市场。印度尼西亚银行需要政府的明确指导，否则我们年轻的经济将因此受损。"
 INS_finish_the_bauxite_project: "完成邦加项目"
 INS_finish_the_bauxite_project_desc: "随着邦加-勿里洞全境的新道路、港口和铁路投入使用，勘察队报告称钨和铬的储量超出了我们最初的预期。这些岛屿终将向共和国证明它们的全部价值。"
 INS_australian_contracts: "澳大利亚合同"
 INS_australian_contracts_desc: "我们的橡胶储备已远超国内需求。澳大利亚一直渴望获得原材料来滋养其工业，是一个天然的贸易伙伴。与澳大利亚公司签订长期合同将带来稳定的收入，并巩固我们在区域经济中的地位。"
 INS_coopereate_with_chinese_businessmen: "与华商合作"
 INS_coopereate_with_chinese_businessmen_desc: "一个富裕且人脉广泛的商人阶层长期以来一直促进着群岛各地的贸易。与其将这些成熟的网络边缘化，不如与他们合作。他们的资本和商业专长对于拉动我国经济走出当前的困境可能具有不可估量的价值。"
 INS_oil_decisions_unlock_tt: "解锁新的§Y$INS_realign_supply_chains_cat$§!决议，用于出售§Y石油§!。"
 INS_negotiate_new_contracts_unlock_tt: "解锁新的§Y$INS_realign_supply_chains_cat$§!决议。"
 INS_realign_supply_chains_explain_tt: "解锁§Y$INS_realign_supply_chains_cat$§!决议，以两年期租约向私营公司出售资源。"
 INS_negotiate_new_contracts: "谈判新合同"
 INS_negotiate_new_contracts_desc: "我们作为可靠供应商的声誉日益提升，这打开了之前对我们紧闭的大门。新的买家正在接洽，我们应迅速采取行动，抢在竞争对手压价之前与他们签订长期协议。"
 INS_all_in_on_rubber: "全力押注橡胶"
 INS_all_in_on_rubber_desc: "橡胶是我们最强的底牌，我们打算好好利用它。每一英亩可用的种植园土地都将转为橡胶种植，我们的出口机构也将重组，以实现比区域内任何国家都更快、更便宜的运输。"
 INS_more_market_resources: "战胜大萧条"
 INS_more_market_resources_desc: "世界或许深陷经济危机，但危机为那些敢于抓住机遇的人创造了机会。通过以竞争对手无法匹敌的价格向市场倾销我们的商品，我们将确保当世界经济复苏时，印尼商品已遍布每一个货架和仓库。"
 # <Industry Branch - Trade Policy>
 INS_recovering_from_the_great_depression: "从大萧条中复苏"
 INS_recovering_from_the_great_depression_desc: "大萧条对[INS.GetNameDef]造成了毁灭性的影响。由于我国经济以出口为主，世界各地的保护主义政策重创了我们。随着全球贸易似乎有望重新开放，我们必须寻找新市场，并努力重建我们的旧贸易路线。"
 INS_first_come_first_serve: "先到先得"
 INS_first_come_first_serve_desc: "尽管大萧条时期的保护主义正在放缓，但产量增加和荷兰盾被高估已使荷兰的出口市场支离破碎，因为我们在西方的老贸易伙伴已转向南美来满足其需求。与其追逐它们签订新的贸易协定，不如利用这个机会拓展亚洲的新市场。"
 INS_oil_export: "增加石油出口"
 INS_oil_export_desc: "我们将改善苏门答腊和加里曼丹的石油基础设施，以确保与新贸易伙伴达成交易。"
 INS_increased_trade_with_japan: "增加对日贸易"
 INS_increased_trade_with_japan_desc: "[JAP.GetNameDefCap]已成为价值日益增长的贸易伙伴，并未让我们失望。我们应谈判新的贸易协定，以深化两国间的经济合作，并帮助我们摆脱大萧条的残余影响。这可能会让我们在西方的盟友，尤其是荷兰，感到不满。然而，如果我们想对自己的命运有任何发言权，就必须建立自己的贸易渠道。"
 INS_asian_trade_investments: "亚洲贸易投资"
 INS_asian_trade_investments_desc: "大萧条的破坏性影响向我们展示了我们对西方长期贸易伙伴的过度依赖。鉴于我国经济以出口为主，发展并拓展东南亚的新市场，以确保我国经济不依赖于任何一个国家，现在比以往任何时候都更为关键。"
 INS_asian_trade_investments_tt: "每§Y420§!天，源自§Y大萧条§!的出口资源折价惩罚将§G改善§!§Y5%§!，直至负面修正消失。"
 INS_declare_free_trade: "宣布自由贸易"
 INS_declare_free_trade_desc: "我们不应仅与单个国家结盟，而应让市场自然地为[INS.GetNameDef]做出最佳决策。"
 INS_japanese_export_contracts: "一份合约统御一切"
 INS_japanese_export_contracts_desc: "我们将与[JAP.GetNameDef]谈判一项重大贸易协定，出售[1049.GetName]和[672.GetName]的所有橡胶。虽然我们会以非常低的价格出售，但这将保证全部售出。"
 INS_realign_supply_chains: "重组供应链"
 INS_realign_supply_chains_desc: "尽管大萧条时期的保护主义正在放缓，但产量增加和荷兰盾被高估已使荷兰的出口市场支离破碎，因为我们在西方的老贸易伙伴已转向南美来满足其需求。我们必须采取措施，说服我们的盟友重新与我们开展贸易。"
 INS_invite_foreign_companies: "支持美国石油企业"
 INS_invite_foreign_companies_desc: "自1930年以来，加州标准石油公司通过其荷兰子公司——荷兰太平洋石油公司在我国运营。他们在廖内的勘探前景喜人，我们应尽一切可能支持其上游业务。一次重大发现既能增加我们的收入，也能鼓励其他国际公司在我国寻求投资。"
 INS_expand_sea_routes: "拓展海上航线"
 INS_expand_sea_routes_desc: "我国自然资源丰富，但我们的采掘业过于专业化，且缺乏开采某些稀有矿物（如铬和钨）所需的基础设施。如果我们想提高军事生产能力，就需要从其他地方进口这些矿物。为了充分利用我们不断增长的贸易网络，我们需要提高商船队的运力。"
 INS_ship_contracts: "确保船舶合同"
 INS_ship_contracts_desc: "为了在战争期间维持我们的贸易航线，建设一支海军是必要的。我们可以利用新建立的贸易关系来获得海军合同。"
 # <Industry Branch - Sumatra>
 INS_developing_sumatra: "开发苏门答腊"
 INS_developing_sumatra_desc: "苏门答腊是群岛上资源最丰富的岛屿，但基础设施极其落后，以至于开采的资源有很大一部分甚至无法运抵巴达维亚。交通运输依赖于由土路和互不连通的铁路线拼凑而成的网络，完全不足以支持我们对这个岛屿的计划。我们不能让这种情况继续下去。"
 INS_sumatra_railway: "苏门答腊铁路"
 INS_sumatra_railway_desc: "为了发展苏门答腊的基础设施，我们应该修建一条大型铁路，连接亚齐北部和苏门答腊最南部的港口——该港口与巴达维亚的海上连接极其迅速。这样一来，资源只需运输到最近的火车站，然后我们就能在几天内将其运至巴达维亚。"
 INS_develop_borneo: "开发加里曼丹"
 INS_develop_borneo_desc: "加里曼丹拥有巨大的财富潜力，然而该岛屿的开发程度极低，人民饱受贫困之苦。货物运输严重依赖岛上众多的河流和水道，任何远程通信都因缺乏电力而受阻。通过建造输电线和道路，我们可以为未来的勘探和资源开采铺平道路。"
 INS_kalimantan_mic: "加里曼丹军事工业"
 INS_kalimantan_mic_desc: "我们在加里曼丹的基础设施建设已见成效。电力和通信的普及让我们接触到了远处于政府覆盖范围之外的社区。我们可以借此机会，通过在该地区建造新工厂并利用这些新增劳动力来满足我们提高军事生产的需求。"
 INS_pontianak_to_balikpapan: "从坤甸到丹戎塞洛"
 INS_pontianak_to_balikpapan_desc: "在加里曼丹修建铁路的设想已被详细讨论过，但岛屿中心恶劣且大部分未经勘探的地形让这成为一项艰难的任务。唯一的解决方案是沿海岸修建一条U形铁路。这不会便宜，但从长远来看，它会收回成本。"
 INS_develop_sulawesi: "开发苏拉威西"
 INS_develop_sulawesi_desc: "苏拉威西位于群岛的中心，战略位置重要。我们应该修建道路、电力和通信设施，以确保它能在战争期间作为军事枢纽。"
 # <Industry Branch - Bangka Project>
 INS_the_bangka_project: "邦加项目"
 INS_the_bangka_project_desc: "邦加-勿里洞岛屿虽小，但由于其铝土矿储量，是印度尼西亚经济的基石。我们需要在邦加-勿里洞修建道路、港口和铁路，以确保我们能从这些岛屿丰富的矿产资源中获得全部收益。"
 INS_aluminium_factory: "邦加槟榔铝厂"
 INS_aluminium_factory_desc: "我们的铝土矿原矿开采量正在增长，但国内铝生产的缺乏限制了我们的利润。作为邦加-勿里洞省的省会，邦加槟港是建立我们自己工厂的理想地点。这样做可以让我们省去中间商，实现回报最大化。"
 INS_bauxite_export: "加倍押注铝土矿出口"
 INS_bauxite_export_desc: "邦加项目的完成使我们拥有大量过剩的铝土矿原矿，多得不知如何处理。虽然试图全部售出会很困难，但我们可以提供远低于市场上任何其他供应商的价格，确保每一克都售出。由于我们可以出售的铝土矿数量巨大，与我们目前的出口相比，这仍将带来利润的相应增长。"
 INS_tin_mining: "投资锡矿开采"
 INS_tin_mining_desc: "邦加-勿里洞岛屿的锡矿开采历史早于欧洲人在群岛的存在。因此，这些岛屿上的锡产业早就该进行现代化改造了。彻底改革生产能力是一项昂贵的工作，在我们重建期间，现有的锡产业将暂时无法运营。然而，长期利润潜力巨大。"
 in_240_days_tt: "§Y240天内：§!\n"
 INS_tin_to_usa: "向[USA.GetNameDef]出售锡"
 INS_tin_to_usa_desc: "[USA.GetNameDefCap]有许多正购买锡的公司和政府机构。既然我们已建立了成规模的采矿作业，我们将有机会从中大赚一笔。"
 INS_tin_to_japan: "向[JAP.GetNameDef]出售锡"
 INS_tin_to_japan_desc: "[JAP.GetNameDefCap]拥有许多如今已过时的可更换船只，它们非常适合[INS.GetAdjective]海军。我们应该用锡矿生产获得的资金购买这些船只。"
 INS_tin_to_japan_tt: "[JAP.GetNameDefCap]将给我们送来§Y9§!艘旧型号的驱逐舰。"
 INS_new_bauxite_routes: "新的铝土矿路线"
 INS_new_bauxite_routes_desc: "我们通过压低市场价格来增加铝土矿出口量的策略已奏效，我们的总收入大幅增加。然而，我们不能止步于此。我们应该继续扩大贸易网络，优化供应链，并寻找其他机会来最大化我们的回报。"
 INS_bangka_bauxite_export_flag: "已完成国策§Y$INS_bauxite_export$§!："
 INS_not_industry: "规划未来"
 INS_not_industry_desc: "爪哇是我们国家跳动的心脏，是我们大部分人口的家乡和政府的所在地。在我们真正开始在这个岛屿实现工业化之前，我们必须首先打好基础。土地勘测、区域划分和场地清理将确保工厂建成后，它们被建在能发挥最大效益的地方。"
 INS_construction_focus: "工业繁荣"
 INS_construction_focus_desc: "外国资本正在涌入，出口收入不断攀升，多年来首次有真正的资金可以投资于国内工业。我们必须抓住时机，在条件对我们有利的时候进行建设。"
 # <Industry Branch - Java>
 INS_developing_java: "扩建爪哇基础设施"
 INS_developing_java_desc: "爪哇无疑是群岛上工业化程度最高的岛屿，也是我们大部分财富的来源。然而，由于人口增长，巴达维亚等某些城市变得越来越拥挤。我们应该通过建造新的住宅、商业区、有轨电车、火车和工厂来扩建这些城市，以容纳不断增长的人口。"
 INS_prioritize_sugar_economy: "优先发展制糖经济"
 INS_prioritize_sugar_economy_desc: "我们应减少政府在巴达维亚工业发展上的预算；这里的工业化程度已经远高于群岛其他城市了。这笔资金应转而用于在全国范围内建立许多小型棕榈种植园，生产国际需求旺盛的商品棕榈糖。"
 INS_all_cards_into_industry: "全押工业"
 INS_all_cards_into_industry_desc: "工业化对[1058.GetName]的经济产生了巨大影响。如果我们实现整个岛屿的工业化，使其拥有数千万公民，我们就可以在全球范围内发挥影响力。"
 INS_expand_batavia_technical_institute: "扩建巴达维亚理工学院"
 INS_expand_batavia_technical_institute_desc: "扩建巴达维亚理工学院将使更多学生接受教育，并提高我们的技术发展速度。"
 INS_quinine_export: "更有利可图的奎宁协议"
 INS_quinine_export_desc: "阿姆斯特丹的金鸡纳管理局几乎垄断了奎宁出口，由于奎宁作为疟疾治疗药物在全球范围内需求旺盛，这尤其有利可图。该局大部分的奎宁来自东印度群岛。尽管如此，我们获得的利润份额却非常小。我们应该利用我们的奎宁产量作为筹码，以谈判一个更公平的协议。"
 INS_spend_profits_on_rural: "将收益用于农村发展"
 INS_spend_profits_on_rural_desc: "随着我们的新奎宁协议最终敲定，我们有了一个机会：利用我们的额外收入来发展农村地区的交通和通信基础设施，为未来的工业发展铺平道路。"
 INS_spend_profits_on_urban: "将收益用于城市发展"
 INS_spend_profits_on_urban_desc: "随着我们的新奎宁协议最终敲定，我们有了一个机会：利用我们的额外收入来扩大巴达维亚的制造业，这将使我们的经济多样化，并减少我们对出口原材料的依赖。"
 INS_spend_profits_on_military: "将收益用于军事发展"
 INS_spend_profits_on_military_desc: "随着我们的新奎宁协议最终敲定，我们有了一个机会：利用我们的额外收入在日惹和三宝垄建造和维护新的武器工厂，从而显著改善我们的军事力量。"
 INS_end_to_bloodshed_tt: "战争将会结束，并根据当前的占领情况划定新的边界。爪哇、苏门答腊和婆罗洲将被目前在各自区域拥有最大控制权的一方§Y吞并§!。"
