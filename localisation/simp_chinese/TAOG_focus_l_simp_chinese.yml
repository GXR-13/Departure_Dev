 # <Empower the Volksraad>
 INS_the_jewel_in_the_crown: "王冠上的明珠"
 INS_the_jewel_in_the_crown_desc: "东印度群岛是荷兰殖民王冠上最璀璨的明珠，我们打算保持这一地位。通过人民议会，我们的声音能够传达到海牙。"
 INSHOL_java: "$HOL_java$"
 INSHOL_java_desc: "$HOL_java_desc$"
 INSHOL_sumatra: "$HOL_sumatra$"
 INSHOL_sumatra_desc: "$HOL_sumatra_desc$"
 INSHOL_borneo_and_the_grote_oost: "$HOL_borneo_and_the_grote_oost$"
 INSHOL_borneo_and_the_grote_oost_desc: "$HOL_borneo_and_the_grote_oost_desc$"
 INSHOL_foundations_of_defense: "$HOL_the_foundations_of_defense$"
 INSHOL_foundations_of_defense_desc: "$HOL_the_foundations_of_defense_desc$"
 INSHOL_investments_in_civ_railways_tt: "如果[HOL.GetFlag]§Y[HOL.GetName]§!完成国策：\n         （[INS.GetFlag]§Y[INS.GetName]§!：获得§Y£autonomy_texticon -250.00§!）\n   如果[INS.GetFlag]§Y[INS.GetName]§!完成国策：\n         获得§Y£autonomy_texticon 250.00§!"
 INSHOL_investments_in_civ_railways: "投资民用铁路"
 INSHOL_investments_in_civ_railways_desc: "赢得东印度群岛人民的支持需要投资民用基础设施。目前，我们的铁路主要用于货物运输。我们应该购置客运列车，在爪哇和苏门答腊现有的铁路上运行。"
 INSHOL_continue_exclusive_rights: "爪哇银行独家经营权"
 INSHOL_continue_exclusive_rights_desc: "东印度盾在大萧条期间失去了大部分价值，我们的经济增长陷入停滞。我们可以尝试通过给予爪哇银行独家印钞权来稳定盾币，该银行在1922年之前一直拥有这一权利。"
 INSHOL_peg_indies_guilder_to_dutch_guilder: "将东印度盾与荷兰盾挂钩"
 INSHOL_peg_indies_guilder_to_dutch_guilder_desc: "东印度盾在大萧条期间失去了大部分价值，我们的经济增长陷入停滞。最简单的解决方案是将东印度盾与更为稳定的荷兰盾挂钩。这也会让我们与宗主国联系更为紧密。"
 INSHOL_peg_indies_guilder_to_us_dollar: "将东印度盾与美元挂钩"
 INSHOL_peg_indies_guilder_to_us_dollar_desc: "东印度盾在大萧条期间失去了大部分价值，我们的经济增长陷入停滞。虽然我们可以将东印度盾与荷兰盾挂钩，但美元是更为稳定的货币。将盾币与美元挂钩还能让我们拥有更多的经济独立性，使自治成为一个更可实现的目标。"
 indonesia_currency_pegged_to_dollar_modifier: "荷属东印度盾与美元挂钩"
 INS_direct_rule_tt: "在印度尼西亚土邦中解锁§Y$INS_direct_rule_occupation_law$§!占领法令。\n效果：\n     §G增加§!从该地区获得的工厂和资源\n     §R降低§!顺从度增长\n     §R增加§!抵抗度增长"
 INS_local_autonomy_tt: "在印度尼西亚土邦中解锁§Y$INS_local_autonomy_occupation_law$§!占领法令。\n效果：\n     各方面给予§Y小幅§!提升\n     §G增加§!顺从度增长"
 INS_invest_in_batavian_education_req_tt: "已成功完成至少§Y3§!项人民议会任务"
 INS_invest_in_batavian_education_req_2_tt: "已成功完成至少§Y6§!项人民议会任务"
 INSHOL_eventual_autonomy_req_tt: "已成功完成至少§Y4§!项人民议会任务"
 indonesia_volksraad_passed_12: "印度尼西亚国旗已获得正式承认"
 INS_stronghold_java_tt: "任何印度尼西亚地区：未被[ROOT.GetFlag][ROOT.GetNameDefCap]占领"
 INSHOL_request_east_timor: "要求归还东帝汶"
 INSHOL_request_east_timor_desc: "葡萄牙无权占领帝汶，这是殖民历史的残余，我们绝不能继续容忍，因为它是印度尼西亚的合法领土。我们将正式要求葡萄牙立即将帝汶归还给我们。"
 INS_resist_occupation: "抵抗占领"
 INS_resist_occupation_desc: "尽管有许多印度尼西亚人对荷兰十分愤怒，但我们不能就因此倒向法西斯。我们必须尽一切努力抵抗日本的入侵，保卫祖国。"
 INS_local_resistance: "地方抵抗组织"
 INS_local_resistance_desc: "我们将在尚未被占领的领土上建立抵抗组织，确保即使那里被占领，我们也已准备好在时机来临时将其夺回。"
 INS_stronghold_java: "固守爪哇"
 INS_stronghold_java_desc: "东印度是一个广阔的群岛，居住着众多民族，地形极其恶劣。面对一支远强于我们的军队，试图守住每一处岛屿、丛林和山脉，这注定会失败。虽然放弃同胞并非易事，但撤离除爪哇以外的所有岛屿，从而将全部军队驻扎在爪哇，也许是对整个国家最有利的举措。"
 INS_silence_nationalists: "压制民族主义支持者"
 INS_silence_nationalists_desc: "日本的入侵导致革命民族主义运动因共同的敌人荷兰而开始支持日本侵略者。入侵造成的不稳定使这些运动以前所未有的速度发展。如果我们现在不采取行动，它可能会完全脱离我们的控制。"
 INS_east_indies_exile_government: "东印度流亡政府"
 INS_east_indies_exile_government_desc: "唉，尽管我们尽了最大努力，东印度群岛还是沦陷了。然而，我们还不能失去希望。我们必须继续利用有限的资源尽一切所能。我们可能输掉了战斗，但还没有输掉战争。"
 INS_establish_nefis: "建立荷兰东印度武装力量情报局"
 INS_establish_nefis_desc: "我们将与同盟国一起建立荷兰东印度武装力量情报局，驻扎在澳大利亚。通过该机构，我们将开展秘密行动，针对日本占领军展开破坏行动。每一次小胜利，都让我们离重返故土更近一步。"
 INS_evacuate_soldiers_to_australia: "将士兵撤离至澳大利亚"
 INS_evacuate_soldiers_to_australia_desc: "我们将在澳大利亚北部的荷兰东印度武装力量情报局基地附近建立一个军事基地。在那里，我们将驻扎在占领期间未被俘获的荷兰皇家东印度陆军士兵，使我们能够继续战斗。"
 INS_australian_weapons: "澳大利亚武器"
 INS_australian_weapons_desc: "秘密行动并不容易开展，我们需要合适的装备才能成功。我们可以授权澳大利亚的工厂，使其为荷兰东印度武装力量情报局生产武器。"
 INS_defenders_of_homeland: "乡土防卫义勇军"
 INS_defenders_of_homeland_tt: "如果建立“乡土防卫义勇军”，该国策将自动完成。"
 INS_resist_occupation_tt: "如果我们遭到入侵且未投降，该国策将自动完成。"
 INS_defenders_of_homeland_desc: "东印度群岛政府已倒台，新政权取而代之。在民族主义者和日本政府的领导下，我们将建立一支优于荷兰皇家东印度陆军的新军队，并赢得战争。然而，不可否认的是，民族主义者与帝国主义者之间的这个联盟是脆弱的。联盟会持续下去，还是以流血冲突告终？"
 INS_embrace_co_prosp_sphere: "加入共荣圈"
 INS_embrace_co_prosp_sphere_desc: "我们终于结束了荷兰的统治，尽管我们只是用一个主人换来了另一个主人，但经济繁荣与泛亚主义的承诺极具诱惑。我们将继续协助日本的战争努力，以确保荷兰永远不会企图重返印度尼西亚。"
 INS_seize_oppurtunity: "抓住机遇"
 INS_seize_oppurtunity_desc: "[JAP.GetNameDefCap]正在失败，他们的占领政府无比虚弱。数个世纪以来，我们第一次有了打破印度尼西亚的枷锁、建立独立国家的真正机会。若不趁此机会宣布独立，不知道还要等多久才能迎来下一次机会。"
 INS_japanese_resource_infrastructure: "资助更大的战事"
 INS_japanese_resource_infrastructure_desc: "将我们核心资源开采基础设施的控制权交给[JAP.GetNameDef]是赢得战争的必要步骤，因为确保[JAP.GetAdjective]部队始终保持充足补给是重中之重。[JAP.GetNameDefCap]还将开发我们的当地基础设施，以提高资源出口效率。"
 INS_japanese_army_training: "改革军队"
 INS_japanese_army_training_desc: "我们有很多东西要向我们的[JAP.GetAdjective]宗主学习，既然荷兰皇家东印度陆军已经解散，我们应该建立一支由日本陆军教导的新军队，准备好保卫印度尼西亚免受外部威胁。"
 INS_governor_general_de_jonge: "德容格总督"
 INS_governor_general_de_jonge_desc: "博尼法修斯·科内利斯·德容格以铁腕统治著称，反对任何形式的民族主义，经常无视人民议会的意愿。他对东印度群岛的统治持续了很长时间，他的经验可以一直追溯到第一次世界大战，当时他担任东印度群岛战争部长。"
 INS_governor_general_tjarda: "恰尔达总督"
 INS_tjarda_explain_tt: "§Y博尼法修斯·科内利斯·德容格§!任期已到，§Y阿利迪厄斯·恰尔达·范·斯塔尔肯博赫·斯塔豪韦尔§!于1936年9月被选为继任总督。"
 INS_governor_general_tjarda_desc: "阿利迪厄斯·恰尔达·范·斯塔尔肯博赫·斯塔豪韦尔对东印度的看法与他的前任略有不同。虽然他仍然反对民族主义，但他的政策略为自由，更愿意听取人民议会的意愿。"
 INS_electrical_investments: "电力投资"
 INS_electrical_investments_desc: "每个欧洲工业化国家都有强大的电网来支持其工业。如果我们想停止依赖原材料出口，并像他们一样建立自己的制造业，就应该建造覆盖整个爪哇的高容量电网。"
 INS_reduce_land_taxes: "降低土地税"
 INS_reduce_land_taxes_desc: "对土地所有权征收的高额税收使得印尼原住民难以拥有种植园和企业。虽然这让我们能够轻松垄断橡胶行业，但也给整个国家带来了经济问题。我们应该考虑将这些税收降至以前的水平，使规模较小、私人拥有的橡胶种植园能够运营。"
 INS_invest_in_batavian_education: "投资巴达维亚教育"
 INS_invest_in_batavian_education_desc: "人民议会已经明确表示，印尼人民的意愿是让教育变得更加普及，因为目前只有荷属印尼人和少数印尼精英阶层能够负担得起教育费用。为了响应人民议会的动议，我们应在巴达维亚及其周边地区建造若干所中小学。"
 INS_javanese_education_investments: "爪哇教育投资"
 INS_javanese_education_investments_desc: "除了我们正在进行的建造中小学的项目外，我们还可以建造一所社区大学和专门的职业学校，这将使中产阶级家庭更容易接受高等教育。"
 INS_allow_local_autonomy: "允许地方自治"
 INS_allow_local_autonomy_desc: "授予土邦自治权的“王公领地”制度使民族主义运动更易于管理，并提高了整个国家的稳定性。我们应进一步提高授予土邦的自治权，让政府能够专注于更重要的议题。"
 INS_direct_rule: "直接统治"
 INS_direct_rule_desc: "授予土邦自治权的“王公领地”制度增加了行政管理的难度，需要额外的官僚机构并浪费时间。现在是时候彻底废除这一制度，对整个群岛实施直接统治。"
 INS_seize_oppurtunity_tt: "§Y[JAP.GetFlag][JAP.GetName]§!已被击退，并且控制少于§Y[?var:temp_states_plus_more]§!个地区。（当前：§Y[?var:JAP.num_controlled_states]§!）"
 INS_seize_oppurtunity_refuse_warn_tt: "§R民族革命将开始，这可能导致与[HOL.GetNameDef]的战争。§!"
 INS_economic_stabilization: "经济稳定"
 INS_economic_stabilization_desc: "大萧条和全球范围内的保护主义使我们的经济陷入困境，许多曾经在原材料行业工作的印尼人发现自己也失业了。我们必须采取严厉措施，制定一项劳工计划，为失业公民分配工作。"
 INS_restore_order_in_indies: "恢复东印度群岛秩序"
 INS_restore_order_in_indies_desc: "东印度群岛日益高涨的民族主义运动已经破坏了多个地区的稳定，如果不加以制止，情况可能会失控。我们必须将恢复秩序与稳定作为首要任务。"
 INS_detangle_supply_chains: "理顺供应链"
 INS_detangle_supply_chains_desc: "我们的出口经济要求货物经过数十个中间商才能最终到达目的地，每次中间商都会以费用、税收或其他名义从中抽取一部分。我们应该努力理清这一混乱局面，并直接控制供应链的大部分环节。"
 INS_prioritize_industrial_growth: "优先发展工业"
 INS_prioritize_industrial_growth_desc: "我们的出口经济波动过大，使我们依赖于与荷兰的合作。我们应该着手在巴达维亚各地建造工厂，发展制造业，成为太平洋地区工业化程度最高的国家。"
 INS_closer_economic_ties_to_netherlands: "加强与荷兰的经济联系"
 INS_closer_economic_ties_to_netherlands_desc: "我们有很多东西可以向我们的宗主国学习，尤其是在经济方面。如果我们能进一步将我们的出口经济与荷兰整合，我们就可以利用他们的基础设施和人脉来获得更有利的贸易协议。"
 INS_prioritize_dutch_companies: "荷兰公司优先"
 INS_prioritize_dutch_companies_desc: "几个世纪以来，壳牌和福克等荷兰公司一直是我们经济的支柱，我们的原材料出口与壳牌高度整合。这为东印度群岛带来了巨大的财富，我们应该优先考虑这些公司，而不是本地的小型企业，以确保我们的合作关系保持牢固。"
 INSHOL_java_factories: "在爪哇开设武器工厂"
 INSHOL_java_factories_desc: "虽然基础，但不可否认的是，仅仅建造更多的武器工厂就能极大地提高军队的实力。作为殖民地的工业中心，爪哇显然是建造这些工厂的地点。"
 INSHOL_license_dutch_weapon_blueprints: "授权荷兰武器蓝图"
 INSHOL_license_dutch_weapon_blueprints_desc: "与其投资建设完整的国内制造流程并自主研发技术设计，我们不如与荷兰公司合作，购买他们的武器蓝图。"
 INSHOL_bangka_production_lines: "邦加生产线"
 INSHOL_bangka_production_lines_desc: "邦加项目使得邦加岛的基础设施飞速发展，将这个曾经微不足道的小岛变成了新工业项目的理想地点。我们有机会通过在邦加岛建造一座新的武器工厂来加强荷印皇家陆军，由于该岛集中的道路、铁路和港口，这座工厂的运营效率将比建在其他地方更高。"
 INSHOL_artillerie_inrichtingen: "荷兰兵器公司"
 INSHOL_artillerie_inrichtingen_desc: "荷兰兵器公司在荷兰制造火炮和其他武器已有超过250年的历史，并在东印度群岛运营了几十年。通过在东印度群岛开设新的制造工厂来扩大其生产能力，将显著提升荷兰皇家东印度陆军的作战能力，同时通过创造新的就业机会来增强资金不足地区的经济。"
 INSHOL_ai_pyrotechnische: "荷兰兵器公司烟火技术子公司"
 INSHOL_ai_pyrotechnische_desc: "继续扩大荷兰兵器公司在东印度群岛的生产设施，我们应资助建立荷兰兵器公司烟火技术子公司的东印度群岛分部。"
 INSHOL_bio_pharma: "生物制药"
 INSHOL_bio_pharma_desc: "扩大东印度群岛的制药行业显然是改革荷兰皇家东印度陆军的下一步，以确保受伤士兵得到充分治疗并安全康复。东印度群岛盛产奎宁，这使得该项目的成本大大低于正常水平。"
 INSHOL_develop_fighters: "研发新型战斗机"
 INSHOL_develop_fighters_desc: "我们将派遣巴达维亚工程师前往阿姆斯特丹，亲身学习福克公司的战斗机生产，接触其严格保守的制造机密。他们将带着在东印度群岛建立现代国内战斗机工业所需的知识和技术专长返回。"
 INSHOL_develop_bombers: "研发新型轰炸机"
 INSHOL_develop_bombers_desc: "我们将派遣巴达维亚工程师前往阿姆斯特丹，亲身学习福克公司的轰炸机生产，接触其严格保守的制造机密。他们将带着在东印度群岛建立现代国内轰炸机工业所需的知识和技术专长返回。"
 INSHOL_bandung_aircraft_facility: "万隆飞机制造厂"
 INSHOL_bandung_aircraft_facility_desc: "虽然蓝图和制造秘密很有用，但只有当我们据此造出飞机时才有价值。我们将在万隆开设新的飞机制造厂，以满足荷印皇家陆军航空队当前的需求。"
 INSHOL_netherlands_indies_air_doctrine: "荷印空军学说"
 INSHOL_netherlands_indies_air_doctrine_desc: "我们将研究那些面临与我们类似挑战的国家的空军，借鉴它们来之不易的经验，形成一种适合东印度群岛实际情况的学说，避免重蹈这些历史错误。"
 INSHOL_manado_military_academy: "望加锡军事学院"
 INSHOL_manado_military_academy_desc: "在爪哇以外建立一所军事学院，通过使东部岛屿的征兵成为可能，将极大地缓解我们的人力短缺。位于东印度群岛中部附近的望加锡是理想的选址。"
 INSHOL_infantry_training_in_borneo: "婆罗洲步兵训练"
 INSHOL_infantry_training_in_borneo_desc: "东印度群岛的特点是茂密的丛林、崎岖的山脉和严酷的地形。我们主要驻扎在爪哇的士兵完全没有准备好在这种条件下作战。我们必须将军事训练扩展到爪哇以外，并在更恶劣的环境中进行演习。地球上很少有地方能比得上婆罗洲的丛林和山脉，使其成为训练世界级游骑兵的完美地点。"
 INSHOL_knil_engineers: "工程兵军团"
 INSHOL_knil_engineers_desc: "我们不能把所有精力都集中在步兵和步枪生产上，要记住后勤和通讯在战斗中起着至关重要的作用。我们应该训练工兵并资助巴达维亚的职业学校，以确保我们的军队不会因糟糕的后勤而受限。"
 INSHOL_work_with_oil_barons: "与石油巨头合作"
 INSHOL_work_with_oil_barons_desc: "大萧条使我们以出口为基础的经济陷入悲惨境地。也许是时候考虑将部分贸易谈判权交给苏门答腊的石油巨头，以保证石油能够售出。然而，这是有代价的，因为为了让他们同意这笔交易，我们需要以远低于市场价的价格出售石油。"
 INSHOL_rubber_taxation: "橡胶税"
 INSHOL_rubber_taxation_desc: "荷兰的投资和专业技术已将东印度群岛的橡胶种植园转变为帝国最宝贵的资产之一。王室理应获得其所创造的财富中应得的份额。尽管一些当地政客提出抗议，但帝国的利益不能被地方的煽动所左右。"
 INSHOL_padang_port: "巴东国际港口"
 INSHOL_padang_port_desc: "巴东生产的资源必须先运往爪哇，然后才能到达国际市场，因为该地区缺乏能够处理大型船队的设施。这种不必要的绕路给我们的供应链带来压力，并限制了苏门答腊的经济潜力。通过在巴东建造一个大型货运港口，我们可以消除这一绕路，提高巴东种植园的盈利能力。"
 INSHOL_subsidize_bauxite: "补贴铝土矿项目"
 INSHOL_subsidize_bauxite_desc: "东印度群岛正在进行的旨在实现富含铝土矿的邦加-勿里洞群岛现代化的项目非常有前景，长期盈利潜力巨大。我们应该通过经济补贴来支持东印度群岛政府，以加快项目进度。"
 INSHOL_agricultural_subsidies: "农业部门私有化"
 INSHOL_agricultural_subsidies_desc: "通过允许建立不同规模的私人农场，我们可以加速资金不足的农村地区的基础设施发展，同时增加政府收入。为此，我们将建立一个结构化的税收框架，即这些农场产生的所有税收收入直接上缴给荷兰，而不是先经过东印度群岛。"
 INSHOL_import_sugar: "进口糖类"
 INSHOL_import_sugar_desc: "我们将在东印度群岛不断发展的农业部门实施价格管制，以便以其他政府无法比拟的价格从东印度群岛的种植园进口全国所需的全部糖类，并建立政府对糖类的垄断。"
 INSHOL_import_lumber: "进口木材"
 INSHOL_import_lumber_desc: "我们将在东印度群岛不断发展的农业部门实施价格管制，以便以其他政府无法匹配的价格从东印度群岛的种植园进口全国所需的全部木材，并建立政府对木材的垄断。"
 INSHOL_industrialized_colony: "工业化的殖民地"
 INS_no_peta_tt: "印度尼西亚将无法与外国侵略者合作。"
 INSHOL_industrialized_colony_desc: "东印度群岛，曾经一个不起眼的殖民地，如今已成为全亚洲工业化程度最高、最富有的地区之一。这标志着荷兰历史上、也是人类历史上一个划时代的时刻。我们的努力得到了回报，我们将继续投资于我们殖民地的发展，并重新确立荷兰作为世界强国的地位。"
 INSHOL_economic_integration: "经济一体化"
 INSHOL_economic_integration_desc: "荷属东印度是我们帝国皇冠上闪耀的明珠，其繁荣昌盛得益于女王、首相和总督的稳健领导。这种稳定绝不能因鲁莽的独立呼声而受到威胁，那只会带来混乱和衰退。我们将使荷兰与东印度群岛的经济联系更加紧密，确保持续的稳定与辉煌。"
 INSHOL_republic_of_indonesia: "印度尼西亚共和国"
 INSHOL_republic_of_indonesia_desc: "当荷兰勉强同意苏塔尔乔请愿书时，由此产生的立法将印度尼西亚的独立与一长串经济自给自足的条件捆绑在一起。尽管如此，由于印尼人民的决心，这些条件现在已经完全满足，荷兰别无选择，只能接受我们正式的独立宣言。"
 INSHOL_propose_malay_unification: "提议马来亚加入一统"
 INSHOL_propose_malay_unification_desc: "印度尼西亚是一个拥有数百种文化、语言和民族的群岛。虽然有些相似，但另一些则截然不同。然而，通过殖民统治的共同斗争，我们找到了在一个国家，即，在印度尼西亚下的团结。也许我们应该问问自己，当隔海相望的马来亚人民与我们有着许多共同的历史和愿望时，为什么这种团结必须止步于此？"
 INSHOL_singapore_compromise: "新加坡妥协方案"
 INSHOL_singapore_compromise_desc: "无论从历史还是文化上看，新加坡都是印尼的土地，将其纳入统一的印尼是理所当然的。然而，鉴于其战略重要性和作为军事基地的必要性，英国不愿意放弃新加坡。我们应该提出一个妥协方案：新加坡加入联邦，条件是英国保留在该岛驻军的权利。"
 INSHOL_request_ceylon: "索要锡兰"
 INSHOL_request_ceylon_desc: "英国殖民地锡兰与更广泛的马来世界有着深厚的文化和语言联系。随着泛马来联邦“马菲印多”的发展，这座岛屿自然也应在联邦中找到自己的位置。"
 INSHOL_papua_referendum: "巴布亚公投"
 INSHOL_papua_referendum_desc: "如今，巴布亚岛被印度尼西亚和澳大利亚分割。我们通过投资与开发已将我们这一半变成了繁荣发展的地区，但澳大利亚管理的领土仍然被忽视且欠发达。这座岛的未来应由其人民决定，因此我们必须要求就巴布亚统一问题举行正式公投。"
 INSHOL_invite_phillipines: "提议成立马菲印多"
 INSHOL_invite_phillipines_desc: "我们联盟的众多民族说着不同的语言，遵循着不同的传统，但几乎所有人的根源都可追溯到马来世界。我们应将我们的联邦国家改革为一个泛马来联邦，邀请菲律宾作为成员国加入。曾经的几个微不足道的殖民地，如今将崛起成为东南亚的区域强国。"
