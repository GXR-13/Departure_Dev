 HOL_curtail_colonial_autonomy_taog_desc: "$HOL_curtail_colonial_autonomy_desc$"
 HOL_taog_guarantee_colonial_loyalty: "保证殖民地忠诚"
 HOL_taog_guarantee_colonial_loyalty_desc: "东印度的民族主义高涨，显然又一场革命正在酝酿。虽然我们在1927年面对的那场革命被轻易镇压，但情报显示，这次我们面对的或许是准备充分得多的革命者。如果我们对苏塔尔乔的和平民族主义运动作些让步，或许能将平民的注意力从革命引向苏塔尔乔？"
 HOL_taog_guarantee_colonial_loyalty_tt: "§W确保[INS.GetNameDef]不会发生革命。§!\n[INS.GetNameDefCap]将试图和平宣布独立。可以通过§Y$INSHOL_industrialized_colony$§!国策来阻止，这需要在殖民地投入大量资金。"
 ################
 ###   SIAM   ###
 ################
 SIA_the_khana_ratsadon: "人民党"
 SIA_the_khana_ratsadon_desc: "人民党终结了专制，开启了通向宪政的道路。它的遗产曾被争夺、被背叛、被血洗，但它依然是建设现代[SIA.GetName]的基石。"
 SIA_the_khana_ratsadon_tt: "\n§Y人民党§!开始活跃。\n\n§Y人民党§!是[ROOT.GetName]的执政党，分为§Y军方派系§!和§Y文官派系§!。\n\n§Y文官派系§!通常倾向于支持民主政策，注重民用工业；而§Y军方派系§!通常倾向于支持法西斯政策以及工业军事化。\n\n我们的选择会影响他们对我们的支持度，带来不同的加成或减益。\n如果他们变得叛逆，可能会尝试发动政变。\n\n不同的支持状态为：§Y叛逆§!、§Y反对§!、§Y中立§!、§Y略微支持§!和§Y全力支持§!"
 SIA_shuffle_pridi_to_the_minister_of_interior: "增强文官派系地位"
 SIA_shuffle_pridi_to_the_minister_of_interior_desc: "通过将比里从外交部长调任为内政部长，他可以更有效地控制政府资源的分配，并对不断扩张的军方影响力形成制衡。"
 SIA_shuffle_pridi_to_the_minister_of_interior_tt: "§Y$anti_fascist_raids$§!将增加§Y文官派系§!的支持度，并减少§Y军方派系§!的支持度"
 SIA_civil_nationalism: "公民民族主义"
 SIA_civil_nationalism_desc: "每一位泰国人，无论身份地位如何，都应明白他们的忠诚不应属于某个政府或某个人，而应当忠于自由、解放与平等的价值，无论权力王座上坐着的是谁。"
 SIA_the_true_heirs_of_1932: "1932年的真正继承者"
 SIA_the_true_heirs_of_1932_desc: "军方常将1932年革命描绘成他们独自的功绩，却忽视了那其实是人民的胜利。人民只需要被提醒这一事实，而我们将从他们那里获得力量。"
 SIA_thammasat_university: "泰国国立法政大学"
 SIA_thammasat_university_desc: "作为一所新成立的大学，泰国国立法政大学应当得到扩展，以为泰国创新时代铺平道路。"
 SIA_defenders_of_constitutional_liberty: "宪政自由的捍卫者"
 SIA_defenders_of_constitutional_liberty_desc: "教师、银行家、护士——受过教育的中产阶层可以被动员起来，在军方势力越界时捍卫自由。"
 SIA_dominate_public_symbols: "掌控公共话语权"
 SIA_dominate_public_symbols_desc: "军方长期主导公共象征，通过建立雕像和设立纪念日来歌颂自身。我们必须建立自己的象征，以庆祝人民的自决权和战胜旧专制的胜利。"
 SIA_civil_service_heroism: "护宪主义"
 SIA_civil_service_heroism_desc: "每一位泰国人都必须被灌输一种内在责任：当任何国内或外国势力试图篡夺权力时，都要维护法治。不仅需要人民在自由受到威胁时支持我们，还要让人民自身成为维护原则的旗手。"
 SIA_spread_democratic_sentiment_in_universities: "在大学传播民主思想"
 SIA_spread_democratic_sentiment_in_universities_desc: "学者们掌握着[SIA.GetName]未来的发展方向。今天他们所学的思想将影响未来，如果我们在当代学者中植入强烈的民主责任感，这种理念就可能传播到学术殿堂之外。"
 SIA_sideline_disloyal_officers: "边缘化不忠的军官"
 SIA_sideline_disloyal_officers_desc: "陆军军官团并非铁板一块。在其队伍中，有些人的忠诚属于老上司、敌对派系或自身的野心，而非政府。通过审慎的人事调动与行政压力，可将这些人物调至无威胁的职位，而那些已证明自己可靠的人，将得到他们应得的责任。"
 SIA_sideline_disloyal_officers_tt: "两名随机将领将获得持续4年的§Y重新调职§!特质，使其不再提供任何加成。\n另外两名没有§Y重新调职§!特质的随机将领将获得额外属性与一个正面特质。"
 SIA_direct_funds_from_the_military_towards_development: "调拨军费投入发展建设"
 SIA_direct_funds_from_the_military_towards_development_desc: "尽管军方派系会因其经费被调拨投入发展建设项目而感到不满，但向公众解释为何这种投资减少对他们有利，将是军方而非我们的责任。"
 SIA_as_the_eyes_turn_towards_southeast_asia: "当目光转向亚洲"
 SIA_as_the_eyes_turn_towards_southeast_asia_desc: "东南亚已不再是遥远的战场，这里是帝国、革命与战争的十字路口。[SIA.GetName]必须决定是甘当这场斗争中的棋子，还是做一个自主的强国。"
 SIA_support_songsuradets_military_clique: "支持颂素拉德的军事派系"
 SIA_support_songsuradets_military_clique_desc: "并非所有军官都是国家的敌人。颂素拉德及其忠诚者纪律严明，足以取代那些将暹罗推向崩溃边缘的腐败将领。在他们的支持下，秩序将得以恢复，国家不会陷入混乱。"
 SIA_support_songsuradets_military_clique_tt: "若爆发§Y内战§!，颂素拉德将支持我们，并给予额外§Y3§!个师。\n§R若我们先强化颂素拉德的势力，然后再通过$SIA_the_songsuradet_rebellion$试图逮捕他，他可能会反抗。§!"
 SIA_the_royal_police_counterweight: "王家警察"
 SIA_the_royal_police_counterweight_desc: "王家警察作为一支独立力量存在，如果反对派试图夺权，我们可以利用他们来对抗对手。"
 SIA_the_royal_police_counterweight_tt: "若爆发§Y内战§!，王家警察将支持我们，并给予额外§Y2§!个师。"
 SIA_for_the_preservation_of_siamese_independence: "巩固军方派系控制"
 SIA_for_the_preservation_of_siamese_independence_desc: "上个世纪世界列强不断侵蚀[SIA.GetAdjective]的领土完整，而本世纪似乎也没有改变。若我们想维持自己的生活方式，就必须果断行动，否则国家将沦为残破不堪的残余国家，被削弱、分裂并撕裂。"
 SIA_for_the_preservation_of_siamese_independence_tt: "§Y$anti_democratic_raids$§!将增加§Y军方派系§!的支持度，并减少§Y文官派系§!的支持度"
 SIA_the_peoples_day: "人民日"
 SIA_the_peoples_day_desc: "与其进一步强调军方推翻旧君主制的作用，我们应当提升人民自身的角色。设立“人民日”将激励整个国家，并让公民学会不再接受低于这一标准的政治现实。"
 SIA_hold_military_parades: "举行阅兵"
 SIA_hold_military_parades_desc: "为了提升军队士气、奖励忠诚的将领，并提醒民众[SIA.GetAdjective]武装力量的强大，我们将在曼谷举行盛大阅兵。让报纸有值得报道的内容！"
 SIA_embed_technocrats_in_civilian_institutions: "在文职机构中安插技术官僚"
 SIA_embed_technocrats_in_civilian_institutions_desc: "我们可以与政府中的技术官僚结盟，让他们成为文官派系的延伸力量，从而扩大影响力并对抗军方势力。"
 SIA_military_academies_indoctrination: "军事学院思想灌输"
 SIA_military_academies_indoctrination_desc: "我们的军事学院是进行意识形态教育的理想场所。它们武装精良，而年轻学员容易受到教官影响。赢得教官，就等于赢得军队青年。一支忠于统治阶层的强大军队是强国的基础，而我们必将成为强大的国家。"
 SIA_the_king_of_the_white_elephant: "《白象王》"
 SIA_the_king_of_the_white_elephant_desc: "关于收复失地的狂热情绪正席卷全国，世界也在注视。为了缓和这种狂热，我们将制作一部反战电影——泰国第一部用英语拍摄的电影——向世界展示[SIA.GetName]的真实面貌。"
 SIA_the_king_of_the_white_elephant_tt: "完成国策§Y$SIA_sala_chaloem_thai_movie_theater$§!后，解锁宣传运动§Y$SIA_the_king_of_the_white_elephant$§!，效果为：\n每周稳定度：§G+0.45%§!，持续180天"
 SIA_drum_up_irredentism: "鼓动领土收复主义"
 SIA_drum_up_irredentism_desc: "仅仅获得军方对未来战争的支持还不够，我们还必须赢得广大民众的支持。通过诗歌、电影与演讲，我们将让[SIA.GetName]为与夺走我们历史领土的帝国主义势力进行清算做好准备。"
 SIA_sell_privy_purse_lands: "出售王室私产土地"
 SIA_sell_privy_purse_lands_desc: "王室拥有大片如今由我们控制的土地。这些地产可以大大充实国库，同时也可以以优惠价格出售给部分军官，以确保他们的忠诚。"
 SIA_sell_privy_purse_lands_tt: "当该民族精神结束后，§Y[SIA_phraya_phahon.GetName]§!将卷入一场丑闻，使你能够绕过法西斯主义要求，以启用§Y$SIA_phibuns_premiership$§!"
 SIA_war_fervor: "战争狂热"
 SIA_war_fervor_desc: "战鼓已经敲响，预示着即将到来的冲突。人民已经被动员起来，导火索也已点燃，战争热情即将达到顶点。我们必须谨慎地将这股能量引导到一个值得为之而战的目标上。"
 SIA_war_fervor_tt: "战争支持度将持续永久性上升，直到我们向其他任何国家宣战。一旦宣战，该国家精神将被移除。\n\n若§Y战争支持度§!长时间保持在§Y95%§!以上却未宣战，则将爆发内战。\n宣战时："
 SIA_the_midnight_meeting: "午夜会议"
 SIA_the_midnight_meeting_tt: "[SIA_plaek_phibunsongkhram.GetName]将在[SIA.GetNameDef]夺取政权，领导政府。我们需要推翻他才能恢复君主制。"
 SIA_the_midnight_meeting_desc: "颂素拉德元帅注视着披汶日益集权，从中看到了清算的契机。若要让君主制和颂素拉德本人得以存续，保皇派、高级军官和民间名流必须秘密会面，商定在披汶动手之前先行将其铲除。"
 SIA_meet_with_king_prajadhipok: "会见流亡中的巴差提朴国王"
 SIA_meet_with_king_prajadhipok_desc: "没有国王参与的阴谋不过是又一次军方权谋。通过与流亡中的巴差提朴国王会面，我们可以将保皇派的事业置于王权正统的庇护之下，并赢得那位唯一可能让犹豫者归附、分裂现政权之人的祝福。"
 SIA_prajadhipok_audience_with_churchill: "巴差提朴与[ENG.GetLeader]会晤"
 SIA_prajadhipok_audience_with_churchill_desc: "巴差提朴身处[ENG.GetName]带来的不仅是威望。如果他能说服[ENG.GetLeader]相信保皇派起事符合英国在亚洲的利益，那么来自马来亚的武器就可能落入仍忠于王座的人们手中。"
 SIA_prajadhipok_audience_with_churchill_tt: "[ENG.GetName]将向我们提供"
 SIA_prajadhipok_audience_with_churchill_tt2: "当内战开始时。"
 SIA_facilitate_prajadhipoks_move_to_japan: "促成巴差提朴访日"
 SIA_facilitate_prajadhipoks_move_to_japan_desc: "能从[ROOT.GetNameDef]的动荡中获利的并非只有英国。安排巴差提朴前往日本，我们可以赢得东京的青睐，甚至获得承诺：若保皇派起事演变为内战，日军将提供支援。"
 SIA_facilitate_prajadhipoks_move_to_japan_tt: "[JAP.GetNameDef]的3个游骑兵师将在内战中支援我们。"
 SIA_the_kings_gambit: "国王的豪赌"
 SIA_the_kings_gambit_desc: "巴差提朴返回曼谷，完全预料到现政权会将他逮捕。这一行动将为保皇派提供所需的愤慨、合法性与权威，使他们不再犹豫，以他的名义起事。一旦流亡国王被捕，信号即会发出，[ROOT.GetName]的斗争将正式开启。"
 SIA_the_kings_gambit_tt: "我们的支持度取决于我们争取到了多少派系。"
 SIA_restore_order: "恢复秩序"
 SIA_restore_order_desc: "内战胜利了，但仅凭胜利无法治愈整个王国。废墟必须重建，旧势力必须安抚，行政机构必须重组，以便[ROOT.GetName]能从混乱中崛起，王权稳固，公共生活回归正轨。"
 SIA_ananda_age_trigger_12: "阿南塔国王已满§Y12§!岁（目前§Y[?var:SIA_anandas_age]§!岁）。生日为9月20日"
 SIA_ananda_age_trigger_15: "阿南塔国王已满§Y15§!岁（目前§Y[?var:SIA_anandas_age]§!岁）。生日为9月20日"
 SIA_ananda_trait_tt: "当阿南塔登基时，他将获得："
 SIA_to_forge_a_king: "铸造一位国王"
 SIA_to_forge_a_king_desc: "阿南塔国王远在瑞士，尚且年幼，心智与品格仍在塑造之中。如果我们能精心引导他的学业，或许不仅能培养出一个有名无实的傀儡君主，更能造就一位符合我们为[ROOT.GetNameDef]所设之命运的统治者。"
 SIA_to_forge_a_king_tt: "未来的国王阿南塔·玛希敦目前正在[SWI.GetName]求学，年纪尚轻。我们可以影响他未来的学业与志趣，确保他成为一位伟大的国王。\n\n每年他的生日，我们都可以为他选择一项学习兴趣，直到他年满15岁，这些选择将在他最终登基时提供不同的加成。\n\n他的生日是9月20日，目前年龄为§Y[?var:SIA_anandas_age]§!岁。"
 SIA_ascend_the_throne: "登上王位"
 SIA_ascend_the_throne_desc: "摄政不能永远持续下去。阿南塔已到亲政的年龄，他的正式登基将使复辟的君主政体从监护与阴谋过渡到新的合法统治期。"
 SIA_the_provincial_council_of_state: "省府政务委员会"
 SIA_the_provincial_council_of_state_desc: "战火使政府机器支离破碎，权威难定。在年轻的阿南塔国王能够亲政之前，省政务委员会必须作为临时政府履行职责，并宣告保皇派并非为自身而战，而是为了恢复合法君主政体。"
 SIA_the_regency_of_boworadet: "博沃拉德摄政"
 SIA_the_regency_of_boworadet_desc: "博沃拉德亲王承载着旧秩序的威望，无人能质疑他的忠诚。以阿南塔的名义任命他担任摄政，我们将国家托付于保守派手中，并明确表明复辟不仅仅是更换内阁大臣。"
 SIA_the_sacred_hierarchy: "神圣阶序"
 SIA_the_sacred_hierarchy_desc: "博沃拉德认为，当每个阶层各安其位、王权凌驾于一切世俗野心之上时，王国最为强盛。君主制、信仰以及[ROOT.GetNameDef]的天然等级制度，必须再次被视为神圣的支柱，而非可供交易的遗物。"
 SIA_the_regency_of_songsuradet: "颂素拉德摄政"
 SIA_the_regency_of_songsuradet_desc: "颂素拉德并非自由派，但他对现代国家的需求也并非视而不见。作为摄政，他可以在维护王室权威的同时，将[ROOT.GetNameDef]的未来托付给纪律、规划以及由军方引导的国家发展计划。"
 SIA_order_discipline_and_unity: "秩序、纪律与团结"
 SIA_order_discipline_and_unity_desc: "派系政治与内战的混乱几乎摧毁了整个国家。颂素拉德的答案简单明了：政府有序、社会守纪、目标统一，从而让王国得以重塑为一个更强大、更现代的国家。"
 SIA_the_regency_of_rangsit: "兰实摄政"
 SIA_the_regency_of_rangsit_desc: "兰实亲王明白，君主制只有与代议制政府和解才能存续。在他的摄政下，王室的复辟将在尊严上保持保守，但在方法上奉行民主，并准备为[ROOT.GetNameDef]带来稳定的议会制未来。"
 SIA_constitutional_virtue: "宪政美德"
 SIA_constitutional_virtue_desc: "尊重法律的君主制更难被推翻，也更容易捍卫。在兰实的指导下，我们将复兴宪政，约束专权，并教导国民：王权作为合法自由的守护者时最为稳固。"
 SIA_an_absolute_monarchy: "绝对君主制"
 SIA_an_absolute_monarchy_desc: "有限君主制的实验只带来了屈辱、政变以及野心军官对王室权威的篡夺。如果王权要重新赢得忠诚，那么国王就必须恢复其全部特权，不受制于政党或议会。"
 SIA_a_constitutional_monarchy: "君主立宪制"
 SIA_a_constitutional_monarchy_desc: "国王无需支配国家也能保全王国。通过在一个持久的宪制安排内恢复君主制，我们可以将国王与人民紧密联结，确保王室尊严与责任政府并存。"
 SIA_to_lay_the_bait: "设下诱饵"
 SIA_to_lay_the_bait_tt: "我们将泄露一份伪造的经济计划以激怒军方。\n我们拖延§Y$SIA_and_spring_the_trap$§!越久，军方的反弹就越大，我们获得的支持也会越强。\n\n$SIA_dem_event_count_cw_scale_tt$\n\n每当军方批评这份虚假草案，我们在内战中的支持度就会增加，最高可达§Y75%§!的内战支持。还可根据民主支持度总和（从§Y0%-100%§!比例折算）额外获得§Y25%§!的内战支持。"
 SIA_dem_event_count_cw_scale_tt: "§Y当前预计支持度§!：§G[?var:SIA_dem_event_count_cw_scale|%]§!"
 SIA_to_lay_the_bait_desc: "黄皮档案呼吁经济改革，但军方会称之为共产主义。先泄露一份伪造的激进草案，激怒他们，待真正较温和的版本公布时，便可令他们信用扫地。"
 SIA_and_spring_the_trap: "启动陷阱"
 SIA_and_spring_the_trap_desc: "军方将领已然中计。他们的愤怒演变为叛乱，野心也随之彻底暴露，而文官政府早已布下万全之策。如今收网时刻已至，[ROOT.GetName]的未来，将由忠于宪法的忠志之士全权定夺。"
 SIA_and_spring_the_trap_tt: "若我们的总支持度超过§Y80%§!，将避免内战并立即解除军方权力。"
 SIA_rebuild_the_war_torn_economy: "重建饱受战争摧残的经济"
 SIA_rebuild_the_war_torn_economy_desc: "内战破坏了道路、工厂、稻田与贸易路线。必须马上开始重建。工资、粮食、铁路和信贷，这比在曼谷的任何演说都更能稳定[ROOT.GetName]。"
 SIA_end_military_grift: "终结军方贪腐"
 SIA_end_military_grift_desc: "军事预算长期流入私人口袋、庇护网络和无用的面子工程。战争揭露了这些腐败现象。每一笔腐败合同、每一支幽灵部队、每一批被盗的物资，都必须彻查并从旧集团手中收回。"
 SIA_the_purge: "大清洗"
 SIA_the_purge_desc: "军事集团宁可让国家流血，也不愿服从文官统治。对这些叛徒决不能妥协。凡是牵扯其中的军官、合作者与支持者都必须从指挥职位上清除，以免他们再次威胁国家。"
 SIA_achieve_foreign_legitimacy: "获取外国承认"
 SIA_achieve_foreign_legitimacy_desc: "外国列强一直以怀疑的目光注视着我们的危机，等着看暹罗会垮于军政府统治还是革命。我们必须证明文官政府稳定、合法，并且有能力保卫国家。"
 SIA_achieve_foreign_legitimacy_trigger: "任意主要国家对我们的评价超过§Y75§!"
 SIA_countries_that_like_me_doctrine_tt: "§Y[?var:SIA_countries_that_like_me]x§!§G50%§!花费减免：§Y陆军学说§!"
 SIA_achieve_foreign_legitimacy_tt: "每个对我们的评价超过§Y75§!的主要国家使稳定度提高§G[?var:SIA_achieve_foreign_legitimacy_base_stab_gain|%.0]§!。\n\n如果超过§Y3§!个主要国家符合条件，则超出部分的每个符合条件的国家还将使§Y陆军学说§!的花费降低§Y1x§!§G50%§!。\n\n如果有§Y6§!个及以上主要国家符合条件，则我们将获得§G+2§!§Y民用工厂§!。"
 SIA_secure_the_state: "稳定国政"
 SIA_secure_the_state_desc: "内战胜利并不等于稳定。必须确保铁路、港口、军械库和通讯枢纽的安全，以防反动军官重整旗鼓。曼谷必须保持镇定，与各地联系畅通，并牢牢处于文官控制之下。"
 SIA_expand_upon_the_dossier: "增订黄皮档案"
 SIA_expand_upon_the_dossier_desc: "黄皮档案编写于危机之时。那一刻已经过去。击败军事集团后，我们可以走得更远：更深入的土地改革、更强的劳工保护，以及一个有能力从根本重塑暹罗的国家。"
 SIA_military_oversight_bureau: "军事监察局"
 SIA_military_oversight_bureau_desc: "决不能再让军队成为国中之国。一个由文官领导的监察局将审查军队内的人事任命、预算和政治活动，确保这些当兵的服从曼谷，而不是反过来。"
 SIA_military_oversight_bureau_tt: "§Y军事监察局§!每5至9个月便会对现役将领展开调查。在此期间，接受调查的将领将时刻忌惮愈发严密的政治审查，其行动效率因此降低。"
 SIA_the_yellow_dossier: "黄皮档案"
 SIA_the_yellow_dossier_desc: "伪造的激进草案已发挥完作用。现在可以实施真正的黄皮档案了：慎重的改革、经济现代化以及旨在打破军方主导同时又不让国家陷入混乱的政治保障。"
 SIA_achieve_domestic_legitimacy: "获取国内认可"
 SIA_achieve_domestic_legitimacy_desc: "政府凭借武力得以生存，但如今必须靠法律、面包和秩序赢得人心。必须恢复公众信心，必须为紧急措施正名，必须让人民看到文官统治提供的不只是苟活。"
 SIA_achieve_domestic_legitimacy_tt: "§Y人民党体制§!将被废止。\n§Y军方派§!将遭到永久解散，完全移除其精神。\n\n§Y文官派§!将永久整合入§Y$idea_SIA_unwavering_civilian_support$§!。"
 SIA_allies_integration: "融入同盟国作战体系"
 SIA_allies_integration_desc: "我军必须学会与同盟国协同作战。指挥体系、通讯机制、补给流程与军械标准都需全面接轨，唯有如此，暹罗才能摆脱象征性盟友的身份，真正融入同盟国作战体系。"
 SIA_prepare_for_a_pacific_war: "准备太平洋战争"
 SIA_prepare_for_a_pacific_war_desc: "各帝国的目光正转向太平洋。日本的野心、欧洲的殖民地以及同盟国的战略，都指向一场迫近的风暴。暹罗必须在战火烧到我们海岸之前做好准备。"
 SIA_the_end_of_gunboat_diplomacy: "炮舰外交的终结"
 SIA_the_end_of_gunboat_diplomacy_desc: "绝不能再允许外国军舰盘踞湄南河口、恃强要挟了。暹罗必须自建岸防重炮、船坞设施、水雷布设体系与海岸防御工事，让任何妄图兵临曼谷的挑衅都沦为自取灭亡的狂妄之举。"
 SIA_preemtive_strike: "先发制人"
 SIA_preemtive_strike_desc: "坐等日本择机开战实属愚行。倘若日本帝国意图席卷亚洲，[SIA.GetName]便必须在其陆海军主力深陷其他战场之前，主动先发制人。"
 SIA_the_siamese_armada: "[SIA.GetAdjective]舰队"
 SIA_the_siamese_armada_desc: "现代的[SIA.GetName]需要现代的舰队。凭借新式船舰、训练有素的舰员和扩建的海军基础设施，[SIA.GetAdjective]舰队将成为能够保卫海岸并向远海投射力量的军事存在。"
 SIA_asian_democratic_compact: "亚洲民主协定"
 SIA_a_more_moderate_option: "更温和的路线"
 SIA_a_more_moderate_option_desc: "改革必须持久，不能在反对的风暴中燃尽自己。将黄皮档案保持在温和范围内，就能孤立极端分子，安抚中产阶级，建立起一个能挺过首场胜利的文官秩序。"
 SIA_asian_democratic_compact_desc: "亚洲不能永远依赖遥远的帝国或列强的承诺。本地区的民主国家必须精诚团结，相互捍卫独立，证明独立与自由的理念可以在亚洲生存下去。"
 SIA_asian_democratic_compact_tt: "解锁能力，允许我们要求别国释放亚洲的附属地区，并邀请它们加入我们的阵营。"
 SIA_asian_democratic_compact_modify: "对§Y$SIA_asian_democratic_compact$§!追加效果："
 SIA_southeast_asia_joint_command: "东南亚联合司令部"
 SIA_southeast_asia_joint_command_desc: "我们的协定必须超越一纸外交承诺。一个联合指挥部将协调整个东南亚的战略、补给、情报和防御计划，将分散的军队铸成共同的盾牌。"
 SIA_pan_asian_weapon_standardization: "泛亚洲武器标准化"
 SIA_pan_asian_weapon_standardization_desc: "各盟友若使用不同的步枪、口径、电台和车辆，无疑将后勤的灾难。武器标准化与联合生产计划，将使我们联盟的武装更强、更省、更快。"
 SIA_united_against_aggression: "共同对抗侵略"
 SIA_united_against_aggression_desc: "我们协定中的任何成员都不应孤军奋战。无论威胁来自帝国、法西斯主义、军国主义还是机会主义邻邦，亚洲各国将联手应敌。"
 SIA_the_hammers_that_strike: "挥下重锤"
 SIA_the_hammers_that_strike_desc: "我们的同盟已不再是一群挣扎求生的小国，而是一件武器。每一个国家都是一把锤子，我们将一齐痛击任何妄图主宰亚洲的力量。"
 SIA_mobilize_the_defenders_of_siam: "动员暹罗的保卫者"
 SIA_mobilize_the_defenders_of_siam_desc: "旧军队辜负了国家，但暹罗仍需要保卫者。志愿兵、忠诚的军官、地方卫队和爱国公民，必须被组织成一支能保护宪法、抵御内外之敌的力量。"
 SIA_join_the_allies: "加入同盟国"
 SIA_join_the_allies_desc: "当世界被战火吞噬时，[ROOT.GetName]不能孤立无援。同盟国提供武器，承认并赋予它在抵抗侵略的国家中一席之地。加入他们，就是把暹罗的生存与更广泛的自由世界斗争绑在一起。"
 SIA_the_malay_peninsular_defense_plan: "马来半岛防御计划"
 SIA_the_malay_peninsular_defense_plan_desc: "如果战争降临东南亚，马来亚将是首当其冲的战场之一。修筑工事、补给站，并与英国进行联合规划，将把这个半岛变成抵御入侵的盾牌。"
 SIA_the_malay_peninsular_defense_plan_tt: "修建曼谷与新加坡之间的铁路。\n\n在[MAL.GetName]、新加坡、[724.GetName]、[289.GetName]和[1076.GetName]的每个胜利点\n增加§G2§!级§Y海岸堡垒§!\n增加§G2§!级§Y陆上堡垒§!\n每个地区：\n增加§G1§!级§Y防空阵地§!"
 SIA_join_the_united_front: "加入统一战线"
 SIA_join_the_united_front_desc: "中国在[JAP.GetAdjective]的侵略下流血，却仍在战斗。加入统一战线，[SIA.GetName]能提供支援，把这场陆战变成帝国野心的坟场。"
 SIA_a_land_war_in_asia_desc: "仅凭宣告赢不了战争。暹罗士兵必须在亚洲的艰险地形上进军、战斗并坚持到底。我们对统一战线的承诺，必须以行动来衡量。"
 SIA_death_to_the_communists: "消灭共产主义者"
 SIA_death_to_the_communists_desc: "击败军事集团，决不能让另一场暴政乘虚而入。共产主义煽动者以为这场危机削弱了国家。他们很快将明白，文官民主政府并非毫无还手之力。"
 SIA_death_to_the_nationalists: "消灭民族主义者"
 SIA_death_to_the_nationalists_desc: "日本已被击退，但亚洲未来的问题仍在。旧的民族主义秩序只会用一种等级制替代另一种。若要重塑亚洲，共产主义者必须获胜。"
 SIA_a_new_dawn_over_asia: "亚洲的新黎明"
 SIA_a_new_dawn_over_asia_desc: "日本帝国已垮台，那些妄图继承其废墟的腐败势力也被扫除。遍及亚洲，新曙光正升起在各民族之上，他们决心摆脱帝国统治，建设自己的未来。"
 SIA_phibuns_premiership: "披汶内阁"
 SIA_phibuns_premiership_desc: "随着[SIA_phraya_phahon.GetName]的总理任期结束，党内选定的继任者銮披汶·颂堪已准备好接掌政权。这将极大地取悦军方，但也会让文治派感到焦虑不安。\n对我们来说，在这个新时代只有一条道路——以坚定的信念前进！"
 SIA_siamese_youth_movement: "[THIS.GetAdjective]青年运动"
 SIA_siamese_youth_movement_desc: "[THIS.GetName]的年轻人需要像钢铁在烈火中淬炼一样被锻造。他们将学会尊重国家、保卫祖国，并成为泰国社会中有价值的一员。"
 SIA_territorial_defense_student: "领土防卫学生"
 SIA_territorial_defense_student_desc: "在青年运动的基础上，最有前途的成员将被送往初级士兵训练营，在那里他们将协助保卫[SIA.GetNameDef]。他们将接受正规的军事训练，并成为军队可以使用的额外力量。"
 SIA_expand_domestic_arms_workshops: "扩建国内武器工厂"
 SIA_expand_domestic_arms_workshops_desc: "我们国内生产战争物资的能力远远落后于其他发达国家。我们必须重点扩大本土军工生产，以确保军队不断获得新的装备。"
 SIA_look_to_european_fascism: "借鉴欧洲法西斯主义"
 SIA_look_to_european_fascism_desc: "我们有机会重塑这个国家。摆脱过去的束缚，我们将面向未来，并从西方正在发生的变化中获得启发。旧的世界秩序显然正在被拆解，而那些缺乏远见、落在后面的人，将为此付出代价。"
 SIA_the_songsuradet_rebellion: "颂素拉德叛乱"
 SIA_the_songsuradet_rebellion_desc: "高级军官披耶·颂素拉德将军对现政权构成了威胁——只要他有意愿。这种对政权的危险不能继续存在。作为披汶的主要对手，他必须被清除。\n毫无疑问，我们掌握着大量可用来打击颂素拉德及其支持者的不利材料，这将有助于巩固我们的权力并消灭国内反对派。"
 SIA_the_songsuradet_rebellion_historical_tt: "颂素拉德将军将被指控密谋反对国家。他和顾问§Y[SIA_rangsit_prayurasakdi.GetName]§!将被清洗。\n\n我们将获得：\n"
 SIA_the_songsuradet_rebellion_historical_tt2: "超时后获得："
 SIA_the_songsuradet_rebellion_historical_tt3: "持续§Y[?var:SIA_purged_military_timer]§!天"
 SIA_the_songsuradet_rebellion_alt_tt: "披耶·颂素拉德将军将被指控阴谋叛国。\n\n然而，由于我们增强了他的军事派系力量，他可能会胆大妄为并拒绝传唤，从而导致僵持局面，甚至可能引发内战。"
 SIA_sue_the_king_in_exile: "起诉流亡国王"
 SIA_sue_the_king_in_exile_desc: "流亡的国王据说在前往[ENG.GetNameDefCap]时带走了大量贵重物品。我们必须把它们拿回来，如果需要起诉他和他的配偶来实现这一点，那也在所不惜。"
 SIA_suspend_ordinary_legal_procedures: "暂停普通法律程序"
 SIA_suspend_ordinary_legal_procedures_desc: "颂素拉德叛乱为我们提供了一个以国家安全为名实施全面改革的机会。法院和其他政治机构所掌握的制衡机制将被削弱，使我们能够争取时间集中权力。"
 SIA_the_duty_of_the_thai_people_during_the_war_act: "战争时期泰国人民义务法"
 SIA_the_duty_of_the_thai_people_during_the_war_act_desc: "$idea_SIA_cemented_control_3_desc$"
 SIA_recognize_manchukuo: "承认满洲国"
 SIA_recognize_manchukuo_desc: "TODO_CM"
 SIA_press_censorship: "新闻审查"
 SIA_press_censorship_desc: "自由媒体可能削弱国家稳定。虽然必须保留一定空间，但我们必须确保政府的声音和意志在媒体中占据优先地位。"
 SIA_department_of_publicity: "宣传部"
 SIA_department_of_publicity_desc: "任何国家都离不开宣传机器，尤其是像我们这样怀有领土抱负的国家。资助建立宣传部门将使我们能够实现这一目标。"
 SIA_thai_cultural_mandates: "泰国文化公告"
 SIA_thai_cultural_mandates_desc: "我们可以通过发布文化公告来鼓舞泰国人民、建立强大的民族文化，加强人民团结并塑造统一的国家认同。"
 SIA_thai_cultural_mandates_tt: "解锁可实施文化公告的决议，需要消耗§Y政治点数§!并提供各种加成。第一号公告和首个其他公告无需花费。"
 SIA_relocate_the_capital_to_phetchabun: "将首都迁至碧差汶"
 SIA_relocate_the_capital_to_phetchabun_desc: "政府正面临威胁！历史证明，曼谷容易遭受海军攻击。虽然这肯定会是一个不受欢迎的决定，但将首都迁往更内陆地区是必须做出的选择。"
 SIA_relocate_the_capital_to_phetchabun_tt: "从§Y[1076.GetName]§!迁移最多§G3§!座§Y军用工厂§!到§Y[1077.GetName]§!\n从§Y[1076.GetName]§!迁移§G3§!座§Y民用工厂§!到§Y[1077.GetName]§!\n在碧差汶周围建造§G3级要塞§!"
 SIA_relocate_the_capital_to_phetchabun_tt2: "该民族精神结束时获得基础稳定度：§R-25%§!"
 SIA_radio_propaganda: "广播宣传"
 SIA_radio_propaganda_desc: "随着[SIA.GetName]的电气化，广播正成为主流媒介。正如我们需要控制新闻媒体一样，我们也必须掌控广播内容。"
 SIA_sala_chaloem_thai_movie_theater: "开设差伦泰剧院"
 SIA_sala_chaloem_thai_movie_theater_tt: "解锁制作宣传电影的决议，提供各种加成。例如：\n"
 SIA_sala_chaloem_thai_movie_theater_desc: "电影在我国是一种新媒介，但其潜力显而易见。就像诗歌、书籍和广播一样，它能够影响普通人和精英阶层的思想。通过这种媒介，我们可以增强公民的决心，让他们支持一个崛起的伟大[SIA.GetName]。"
 SIA_pan_thaiism: "泛泰主义"
 SIA_pan_thaiism_desc: "[ROOT.GetName]不仅要生存，它必须繁荣。[ROOT.GetAdjective]民族的未来不应只是一个三流国家，而应成为世界事务中的积极参与者。首先必须动员人民的思想与情感，让他们反对那些夺走我们土地的帝国主义者，并提醒人民我们曾经失去的一切。"
 vichy_exist_trigger: "§Y维希法国§!存在"
 vichy_exist_not_trigger: "§Y维希法国§!不存在"
 SIA_retake_lost_british_states: "收复被英国夺走的领土"
 SIA_retake_lost_british_states_tt: "解锁对§Y缅甸§!和§Y马来西亚§!的英国领土发动有限战争的能力"
 INS_retake_lost_british_states_tt: "解锁对英属§Y马来西亚§!领土发动有限战争的能力。"
 SIA_retake_lost_british_states_desc: "不仅是[FRA.GetAdjective]分裂了我们的王国，[ENG.GetAdjective]也同样在野心驱使下抓住每一个机会夺取属于他们的一份。如今他们的注意力被更强大的对手吸引，我们行动的时刻已经到来。"
 SIA_recover_indochina: "收复印度支那"
 SIA_recover_indochina_desc: "上个世纪，我们的国家被[FRA.GetAdjective]分裂，那是一个远在世界另一端的政府，却用炮舰和武器夺走了属于我们的土地。而在这个世纪，[FRA.GetAdjecive]的力量正在衰落；这个世纪属于我们。"
 SIA_recover_indochina_tt: "解锁对§Y印度支那§!领土发动有限战争的能力"
 SIA_demand_the_return_of_lost_territory: "要求归还失地"
 SIA_demand_the_return_of_lost_territory_desc: "[FRA.GetNameDefCap]已暴露出其虚弱，不过是一只仍试图维持残余影响力的纸老虎。随着其军队崩溃，他们已无法像过去那样投射力量，也没有能力反对我们的要求。"
 SIA_demand_the_return_of_lost_territory_tt: "我们将向§Y印度支那§!与§Y[MAL.GetName]§!部分地区的拥有者请求归还§Y[1069.Getname]§!、§Y[1067.Getname]§!、§Y[741.Getname]§!、§Y[1068.Getname]§!、§Y[1061.Getname]§!、§Y[1064.Getname]§!、§Y[1065.Getname]§!和§Y[670.Getname]§!于我方。\n\n影响因素：\n-战斗力相较于拥有者不少于30%\n拥有者正在与主要国家交战\n-拥有者无阵营\n-拥有者是§Y维希法国§!\n-我们在一个阵营中\n-拥有者厌恶我国"
 SIA_the_greater_thai_empire: "大泰帝国"
 SIA_the_greater_thai_empire_available_trigger: "§Y[ROOT.GetName]§!控制所有印度支那地区\n所有印度支那地区的顺从度大于：§Y[?var:SIA_greater_thai_empire_compliance_requirement]%§!\n\n此外还需要："
 SIA_the_greater_thai_empire_desc: "我们崛起的时刻已经到来。曾经被夺走的一切已经恢复，而当地人民也承认我们是事实上的统治者。我们已经牢固确立了自己作为新生大泰帝国合法领导者的地位。"
 SIA_crack_down_of_foreign_merchants: "打击外国商人"
 SIA_crack_down_of_foreign_merchants_desc: "贸易长期受到外部势力影响，这造成了可能危及国家韧性的漏洞。为了保障经济安全，我们必须能够控制自己的贸易体系，确保繁荣和稳定建立在我们自己掌控的基础之上。"
 SIA_royal_palace_bureau_directive_no_1523: "王室局第1523号指令"
 SIA_royal_palace_bureau_directive_no_1523_desc: "随着国内民族主义情绪高涨，甚至王室也开始支持政府，要求王室所有成员捐出10%的收入用于购买更新式的武器。"
 SIA_end_factionalism: "终结派系斗争"
 SIA_end_factionalism_desc: "自革命以来，人民党内部军方派和文官派之间的裂痕始终笼罩着每一项决策。如果我们能让两派在足够长的时间内坚定地支持政府，我们就能最终将他们融合为一个统一的人民党，并永远驱散政变的幽灵。"
 SIA_end_factionalism_available_tt: "§Y文官派§!和§Y军方派§!连续§Y270§!天处于§G全力支持§!状态。"
 SIA_end_factionalism_tt: "人民党的内部派系斗争已经平息：\n   §Y文官派§!和§Y军方派§!融合为§G统一人民党§!\n   获得精神§Y$idea_SIA_unified_khana_ratsadon$§!"
 SIA_turn_off_the_khana_ratsadon: "人民党已解散"
 SIA_factionalism_overcome: "派系斗争已被克服"
 SIA_new_territories_administration: "新领土管理"
 SIA_new_territories_administration_tt: "解锁管理§Y印度支那§!领土的决议，可提高顺从度、工业能力和防御工事。"
 SIA_new_territories_administration_desc: "收复失地只是第一步。我们必须向当地居民证明，我们是更好的选择。政府将实施全面计划，提高所有人的生活水平，让每一位公民都能在这个新的大[ROOT.GetName]中感到平等。"
 SIA_new_territories_administration_available_trigger: "任何§Y印度支那§!地区\n   由§Y[ROOT.GetName]§!控制"
 SIA_industrialization_drive: "工业化进程"
 SIA_industrialization_drive_desc: "几代人以来，[ROOT.GetName]的财富一直植根于稻田和乡村。然而，现代世界的塑造者并非农具，而是工厂与机器。若要在列强中保持独立，我们必须将农业王国转变为工业国家。"
 SIA_industrialization_drive_trigger: "§Y人民党§!活跃中"
 SIA_asian_financial_compact: "亚洲金融协定"
 SIA_asian_financial_compact_desc: "欧洲资本仍主导着亚洲贸易的很大一部分，使我们的经济暴露于外部压力之下。通过与邻国寻求更紧密的金融安排，我们可以在不放弃独立的前提下，扩大信贷、市场和投资的渠道。"
 SIA_revision_of_unequal_treaties: "修订不平等条约"
 SIA_revision_of_unequal_treaties_desc: "昔日因孱弱而签订的旧协定，至今仍给予外国利益集团任何现代国家都不应容忍的特权。我们必须修改这些不平等条约，恢复[ROOT.GetNameDef]对其商业、司法和租界的全部主权。"
 SIA_renegotiate_teak_control: "重新谈判柚木控制权"
 SIA_renegotiate_teak_control_desc: "北方森林的利润落入特许经营者囊中，而国家所得甚少。通过重新谈判柚木控制权，我们可以收回收入，规范开采，确保暹罗的木材服务于暹罗的发展。"
 SIA_a_fledgling_tobacco_industry: "新兴烟草产业"
 SIA_a_fledgling_tobacco_industry_desc: "烟草仍是一项零散、组织不善的小宗贸易。通过适度的保护和谨慎的投资，这种小作物可以成为消费税收入、农村收入和工厂工作的可靠来源。"
 SIA_a_fledgling_tobacco_industry_tt: "处于§Y$limited_exports$§!或§Y$closed_economy$§!状态将额外为我们提供§Y民用工厂§!。"
 SIA_all_weather_roads: "全天候公路"
 SIA_all_weather_roads_desc: "太多道路在雨季消失，使各省与首都和市场隔绝。一个全天候公路网将把王国联结在一起，让货物和士兵在任何季节都能通行。"
 SIA_the_bank_of_siam: "暹罗银行"
 SIA_the_bank_of_siam_desc: "工业发展不能仅凭惯例和私人恩惠推进。一个更强大的国家银行将使国家在信贷、货币和资本流通方面拥有更大的控制权。"
 SIA_thai_rice_company: "泰国稻米公司"
 SIA_thai_rice_company_desc: "大米仍是[ROOT.GetName]的命脉，但其贸易过于分散、投机性强，且易受外部压力影响。一家国家大米公司将使国家能够引导出口、稳定价格，并将稻田的收成转化为国家实力的更坚实基础。"
 SIA_uk_japan_focus_tt: "这允许在[ENG.GetNameDef]和[JAP.GetNameDef]之间做出选择，效果如下：\n\n§Y[ENG.GetFlag][ENG.GetNameDefCap]§!："
 SIA_japan_option_tt: "§Y[JAP.GetFlag][JAP.GetNameDefCap]§!"
 SIA_send_bureaucrats_abroad: "派遣官僚出国学习"
 SIA_send_bureaucrats_abroad_desc: "其他国家已经建立了我们如今所需的政府部门、学校和技术服务机构。通过派遣有前途的官员出国，我们可以引进行政经验，而不必引入外国统治。"
 SIA_baht_stabilization_act: "泰铢稳定法"
 SIA_baht_stabilization_act_desc: "现代经济需要一种商人和投资者都信任的货币。稳定泰铢将减少贸易中的不确定性，并为[ROOT.GetNameDef]在国际市场上提供更稳固的基础。"
 SIA_siamese_development_cooperative: "暹罗发展合作社"
 SIA_siamese_development_cooperative_desc: "私人资本趋于谨慎，国家无法独自建设一切。一个国家发展合作社将使官员、商人和地主能够为服务于共同经济的项目汇集资源。"
 SIA_boon_rawd_brewery: "胜狮啤酒厂"
 SIA_boon_rawd_brewery_desc: "国内酿酒业不仅仅是消费问题。像胜狮这样的企业表明，暹罗的资本、机械和管理能力可以在暹罗的土地上创造现代工业。"
 SIA_national_savings_bond: "国家储蓄债券"
 SIA_national_savings_bond_desc: "国家的财富不能闲置在保险箱和装饰品中，而道路和工厂却迟迟未建。国家储蓄债券将把私人储蓄转化为公共投资。"
 SIA_national_savings_bond_tt: "获得$SIA_national_savings_bond$精神，其强度根据你的§Y征兵法案§!按比例变化。征兵法案等级越低，正面效果越强；等级越高，效果越差。\n\n在§Y$disarmed_nation$§!下获得："
 SIA_national_savings_bond_scraping_the_barrel: "在§Y$scraping_the_barrel$§!下获得："
 SIA_national_savings_bond_volunteer_only: "在§Y$volunteer_only$§!下获得："
 SIA_national_savings_bond_limited_conscription: "在§Y$limited_conscription$§!下获得："
 SIA_national_savings_bond_extensive_conscription: "在§Y$extensive_conscription$§!下获得："
 SIA_national_savings_bond_service_by_requirement: "在§Y$service_by_requirement$§!下获得："
 SIA_national_savings_bond_all_adult_serve: "在§Y$all_adults_serve$§!下获得："
 SIA_national_savings_bond_current: "我们当前的动员法案将为我们提供："
 SIA_deficit_spending: "赤字财政"
 SIA_deficit_spending_desc: "正统的记账方式无法及时建立现代经济以应对危险的世界。国家必须敢于在当前财政收入之前支出，通过公共工程和采购来强制推动工业增长。"
 SIA_deficit_spending_tt: "民族精神效果结束后获得："
 SIA_acquire_light_tools: "购置轻型工具设备"
 SIA_acquire_light_tools_desc: "在制造出大型机器之前，我们必须首先掌握基础的工业工具。进口轻工具和车间设备将使小型工厂和修理厂在[ROOT.GetName]各地迅速增加。"
 SIA_railway_and_port_extensions: "铁路与港口扩建"
 SIA_railway_and_port_extensions_desc: "大米、木材和锡如果无法到达市场就毫无价值。延伸铁路、扩建港口，将各个省份纳入全国商业网络，并将[ROOT.GetNameDef]与更广阔的世界连接起来。"
 SIA_mechanization_of_agriculture: "农业机械化"
 SIA_mechanization_of_agriculture_desc: "过多的劳动力仍被束缚在传统农业中，几乎没有剩余可供工业使用。通过向农村引入现代工具和机器，我们可以提高产量，并为工厂释放劳动力。"
 SIA_irrigation: "灌溉工程"
 SIA_irrigation_desc: "农民的命运仍然随着洪水和干旱而起落。更广泛的灌溉系统将稳定收成、扩大耕地面积，并使农村成为国家发展的更坚实基础。"
 SIA_siam_cement_group: "[ROOT.GetName]水泥集团"
 SIA_siam_cement_group_desc: "在皇家赞助下成立的[ROOT.GetName]水泥集团，是[ROOT.GetNameDef]最重要的工业企业之一。通过有针对性的投资和政府支持，该公司可以从一家国内供应商转变为我国更广泛工业能力的基石——从字面意义上，为国家的未来奠定根基。"
 SIA_chemical_imports: "化学品进口"
 SIA_chemical_imports_desc: "现代农业和工业都依赖于我们目前产量不足的化合物。进口化学品将供应化肥、药品、染料和炸药，直到国内工业能够承担起这项任务。"
 SIA_chemical_imports_tt: "完成此国策时，若评价高于§Y[?var:ROOT.SIA_chemical_imports_opinion_threshold]§!，则增加§G+1§!个地图外§Y民用工厂§!。"
 INS_chemical_imports_stolen_tt: "完成此国策时，若好感度高于§Y75§!，则增加§G[?var:ROOT.INS_guns_from_seek_help_focus]§!单位的步兵装备。"
 SIA_foreign_currency_exchange: "外汇兑换"
 SIA_foreign_currency_exchange_desc: "工业化需要外国机械、药品和燃料，但这些只能通过稀缺的外汇购买。受控的货币兑换系统将把外汇引导至对国家最为重要的工业部门。"
 SIA_farmers_into_the_city: "农民进城"
 SIA_farmers_into_the_city_desc: "仅靠农村劳动力无法维持现代经济。随着工业扩张，国家必须鼓励从稻田到城镇的有序迁移，以便在那里形成新的城市劳动力。"
 SIA_textile_mills: "纺织厂"
 SIA_textile_mills_desc: "布料是日常必需品，但其中有太多是在国外织造再卖回给我们的。纺织厂将取代进口商品，雇佣城市劳动力，并为[ROOT.GetNameDef]提供现代生活的基础工业之一。"
 SIA_public_credit: "公共信贷"
 SIA_public_credit_desc: "商人、种植者和制造商都受到资本获取渠道有限的制约。通过扩大公共信贷，政府可以在私人金融犹豫不决的领域提供贷款，并将发展推向被忽视的部门。"
 SIA_public_credit_trigger: "$idea_SIA_public_credit_debt$已激活至少§Y180天§!"
 SIA_a_modern_economy: "现代化经济"
 SIA_a_modern_economy_desc: "旧的农业秩序不会在一朝一夕间消失，但它不能再决定[ROOT.GetNameDef]的未来。随着银行、学校、工厂和基础设施的逐步成型，我们正在开始建设一个配得上独立现代国家的经济体。"
 SIA_reduction_of_agricultural_yield_taxes: "降低农业产量税"
 SIA_reduction_of_agricultural_yield_taxes_tt: "每月将$idea_SIA_agricultural_tax_reduction$的§Y消费品§!需求降低§Y[?var:SIA_agricultural_tax_reduction_cg_decrease_rate|%]§!，并每月增加§Y稳定度§!§Y[?var:SIA_agricultural_tax_reduction_stability_gain|%]§!，直到§Y消费品§!负面效果降至§Y0%§!。\n\n当该国家精神被移除时：\n"
 SIA_reduction_of_agricultural_yield_taxes_desc: "不能要求农民在没有任何救济的情况下供养王国、资助国家并承受所有困苦。通过降低农业产量的税收，我们在农村留下更多剩余产出，增强耕种者的忠诚，并鼓励土地的产量上升。"
 SIA_fuel_oil_act: "燃料油法案"
 SIA_fuel_oil_act_desc: "现代运输、工业和国防都依赖燃料，但在战争中燃料获取可能被切断。《燃料油法案》将对消费、储存和紧急分配实施更严格的国家监管，以免稀缺资源被浪费。"
 SIA_siam_electricity_company: "暹罗电力公司"
 SIA_siam_electricity_company_desc: "没有可靠的电力，任何经济体都无法承受现代压力。通过加强暹罗电力公司，我们可以扩大发电规模、改善协调，并确保车间、仓库和城市即使在逆境中也能保持供应。"
 SIA_revise_the_taxation_system: "税制改革"
 SIA_revise_the_taxation_system_desc: "目前的税收结构无法充分服务于一个正在为艰难和自力更生做准备的国家。修订后的税收制度将更均衡地征收财政收入，减少浪费，并以更严格的方式将国防和发展的负担进行分配。"
 SIA_census_the_hill_tribes: "山区部族人口普查"
 SIA_census_the_hill_tribes_desc: "高地仍然远未达到行政、税收和供应的全面覆盖。适当的人口普查将为政府提供有效治理这些地区所需的知识，并将其人民和资源纳入国家更广阔的生活中。"
 SIA_increase_rice_exports: "增加大米出口"
 SIA_increase_rice_exports_desc: "大米是[ROOT.GetNameDef]可获得的最可靠的外汇来源。通过在市场仍然开放时扩大出口，我们可以建立储备、资助战略进口，并为国库应对可能到来的动荡做好准备。"
 SIA_pad_thai: "泰式炒河粉"
 SIA_pad_thai_desc: "现代国家不仅依靠部委和工厂维持，还需要将人民凝聚在一起的共同习惯。通过推广使用暹罗食材制作的民族米食，我们鼓励国内消费，支持我们的农民，并在不确定时期减少对外国食品的依赖。"
 SIA_rice_husk_steam_turbines: "稻壳蒸汽涡轮机"
 SIA_rice_husk_steam_turbines_desc: "外国人眼中的废物，在必要性中教会我们去珍惜。通过燃烧稻壳进行蒸汽发电，我们可以从自己的收成中获取能源，并减少对进口煤炭和石油的依赖。"
 SIA_domestic_tin_smelters: "国内锡冶炼厂"
 SIA_domestic_tin_smelters_desc: "仅仅从地下挖出矿石并运往海外已经不够了。通过建造国内锡冶炼厂，我们将更多的资源价值留在国内，并获取对商业和战争都至关重要的工业金属。"
 SIA_use_ships_as_generators: "以舰船作为发电机"
 SIA_use_ships_as_generators_tt: "将我们拥有的§Y主力舰§!停泊在§Y核心州港口§!将为我们带来每艘§Y主力舰§!§G-2%§!的工厂能耗增益，最高可达§G-15%§!。\n\n这些舰船离港将相应减少增益，重新将舰船停泊在港口即可恢复增益。"
 SIA_use_ships_as_generators_desc: "较旧型号的舰船即使不再适合战斗或贸易，仍可以为国家服务。通过将船舶系泊作为浮动发电站，我们可以为港口和沿海工业提供应急电力，同时节省宝贵的燃料和基础设施。"
 SIA_diversity_foreign_reserves: "外汇储备多元化"
 SIA_diversity_foreign_reserves_desc: "[ROOT.GetNameDef]将财政安全寄托于任何一个外国势力的货币或信用上是危险的。通过多元化我们的储备，我们能减少外部冲击的风险，并在贸易和外交中保留更大的行动自由。"
 SIA_diversity_foreign_reserves_tt: "开战时增加额外§G2§!个地图外§Y军用工厂§!。\n开战时在一个随机核心地区增加§G8§!钢铁产量。"
 SIA_exclusivity_resource_contract: "资源独家合同"
 SIA_exclusivity_resource_contract_desc: "一个外国伙伴提供资本和保证采购，以换取对我们资源的特权准入。这种排他性合同可能加速发展，但它将[ROOT.GetNameDef]的部分未来与另一个国家的喜恶捆绑在一起。"
 SIA_maintain_resource_independence: "维持资源独立"
 SIA_maintain_resource_independence_desc: "外国合同可能带来快速利润，但依赖也随之而来。通过保持对资源的控制，我们保留根据暹罗需求而非外国要求来支配资源的自由。"
 SIA_kasetsart_university: "农业大学"
 SIA_kasetsart_university_desc: "如果农业要提高生产力，它必须以科学为指导，而不仅仅依靠传承。农业大学将培训农学家、兽医和技术专家，以实现土地的现代化。"
 SIA_mahidol_university: "玛希隆大学"
 SIA_mahidol_university_desc: "现代国家需要医生、研究人员和行政人员，正如它需要士兵和工程师一样。玛希敦大学将加强高等教育，为国家改革提供训练有素的人才。"
 SIA_silpakorn_university: "泰国艺术大学"
 SIA_silpakorn_university_desc: "TODO_CM"
 SIA_contingency_funds: "应急资金"
 SIA_contingency_funds_desc: "如果国家在危机来临时毫无准备，和平时期的繁荣就没什么价值。通过现在设立应急基金，我们确保封锁、作物歉收或突然的战争不会立即导致政府机器停摆。"
 SIA_contingency_funds_tt: "我们将在和平时期积累应急基金。在积累基金期间，我们将获得适度的§Y消费品系数§!。\n\n在战争期间，我们可以选择释放这笔基金，获得巨大的生产加成。\n基金的持续时间取决于我们在释放前积累基金的时间长短。"
 SIA_prepare_for_the_next_blockade: "为下一次封锁做准备"
 SIA_prepare_for_the_next_blockade_desc: "一旦海洋陷入敌手，[ROOT.GetNameDef]可能会发现自己被切断了市场、机械和燃料的渠道。因此，我们现在就必须为下一次封锁做准备，在形势所迫之前建立库存、应急计划和替代品。"
 SIA_domestic_arms_industry: "国内军工产业"
 SIA_domestic_arms_industry_desc: "一个必须进口每一支步枪和每一发炮弹的王国不能自称安全。无论起步多么微小，国内军工业将使[ROOT.GetNameDef]能够用自己的车间武装士兵，并在外国供应中断时坚持下去。"
 SIA_war_material_substitutions: "战争物资替代"
 SIA_war_material_substitutions_desc: "在封锁时期，完美的材料不如可用的材料有价值。我们必须研究金属、化学品和进口部件的替代品，以便即使外国货物无法抵达我们的海岸，生产也能继续进行。"
 SIA_royal_thai_ordnance_factory: "泰国王家兵工厂"
 SIA_royal_thai_ordnance_factory_desc: "一个安全的国家需要的不仅仅是进口武器和零散的修理厂。皇家泰国军械厂将把技术、机器和监督集中在王权之下，为[ROOT.GetNameDef]提供一个永久的武器弹药制造中心。"
 SIA_built_to_withstand_every_flame: "经得起一切战火"
 SIA_built_to_withstand_every_flame_desc: "一夜之间烧毁的工厂无法在第二天早晨为国家服务。我们的仓库、工厂和车间在建设时必须考虑到分散布局、防火和紧急保护，这样破坏、轰炸或事故就不会轻易使生产瘫痪。"
 SIA_the_army_of_siam: "暹罗陆军"
 SIA_the_army_of_siam_desc: "我们武装部队的旧结构，已不再适应时代要求。若[ROOT.GetName]要捍卫主权并在海外主张利益，就必须建立一支新型现代军队，其装备、训练和编制都要适应当今世界正在形成的战争。"
 SIA_plan_for_a_short_war: "短期战争计划"
 SIA_plan_for_a_short_war_desc: "我们的资源有限，而敌人可能众多。[ROOT.GetNameDefCap]经不起长期的消耗比拼。如果战争来临，必须速战速决，在敌人部队集结前就结束战事。"
 SIA_intermediate_war_preparation: "中期战争准备"
 SIA_intermediate_war_preparation_desc: "只准备闪电战役是危险的，而完全为持久苦战组织又是浪费。一套均衡的学说，能让[ROOT.GetName]既有力出击，又保持面对顽强对手所需的后劲。"
 SIA_prepare_for_a_long_war: "长期战争准备"
 SIA_prepare_for_a_long_war_desc: "大国也许能在几个月内决出胜负，但小国往往被迫苦撑数年。因此，我们必须让[ROOT.GetAdjective]的军备、工业和运输准备好应对一场漫长的消耗战，耐心和韧性将与勇气同样重要。"
 SIA_specialized_warfare: "特种作战"
 SIA_specialized_warfare_desc: "我国的地形不适于组建只有单一种类的陆军。山地、丛林和河网地带各有不同的技能要求。通过培养特种作战的兵种，我们能确保[ROOT.GetNameDef]在任何战场上都能以相适应的部队迎敌。"
 SIA_artillery_reigns_supreme: "炮兵至上"
 SIA_artillery_reigns_supreme_desc: "现代战斗不只靠精神取胜。火炮依然是战场之王，它能击破据点、粉碎冲锋、为我们的步兵开辟道路。若想获胜，[ROOT.GetAdjective]的火力必须既充足又精准。"
 SIA_yield_the_air_war: "出让制空权"
 SIA_yield_the_air_war_desc: "我们无法指望以对等条件在空中挑战列强。与其在难以取胜的竞争中浪费宝贵资源，不如加强防空力量，让敌机无法毫无代价地肆意攻击我们的人员和城市。"
 SIA_the_thunder_at_the_gates: "门前惊雷"
 SIA_the_thunder_at_the_gates_desc: "有些堡垒是普通火炮无法摧毁的，有些攻势则必须以压倒性火力宣告。重炮、攻城炮和列车炮，将赋予[ROOT.GetNameDef]砸开敌人大门的力量，让任何错将我们的克制当作软弱的人都付出代价。"
 SIA_night_time_training: "夜间训练"
 SIA_night_time_training_desc: "在准备充分的敌人面前，在白天莽撞进攻只会招致灾难。训练我们的士兵在夜色掩护下渗透、运动和攻击，就能在敌人视线不清、混乱且最无力应对时夺得主动权。"
 SIA_steel_arteries: "钢铁动脉"
 SIA_steel_arteries_desc: "缺乏铁路和公路的支撑，任何军队都走不远。必须加强国家的钢铁动脉，使部队、补给和火炮能被迅速运往每一个受威胁的边境。在这项工作中，军事安全与国家发展相辅相成。"
 SIA_prepare_northern_infrastructure_for_war: "为战争准备北方基础设施"
 SIA_prepare_northern_infrastructure_for_war_desc: "在与缅甸及其背后势力的任何角逐中，北部通道都将举足轻重。必须立即扩建该地区的公路、铁路和仓库，使[ROOT.GetAdjective]部队能够毫无迟滞地前进或固守。"
 SIA_unconventional_tank_construction: "非常规坦克建造"
 SIA_unconventional_tank_construction_desc: "我们无法逐项模仿大国的装甲计划。若[ROOT.GetNameDef]真要装备坦克，就必须采用更廉价、更灵活的制造方式，舍弃不必要的奢华部件以换取数量和实用性。"
 SIA_conventional_tank_construction: "常规坦克建造"
 SIA_conventional_tank_construction_desc: "装甲兵已成为现代战争中公认的兵种，权宜之计终究有限。因此，我们应建立正规的坦克工业，遵循合理的原则、标准化的设计和可靠的生产方法，造就一支与现代化军队相称的力量。"
 SIA_reverse_engineer_allied_tanks: "逆向工程盟友的坦克"
 SIA_reverse_engineer_allied_tanks_desc: "别人已经承担了试验的代价。缴获的坦克和进口的机器，可被拆解、研究和模仿。通过学习他国设计，[ROOT.GetName]可以加快建设自己的装甲部队的进程。"
 SIA_tankettes: "超轻型坦克"
 SIA_tankettes_desc: "超轻型坦克轻便、廉价且易于生产，或许无法单独决定大会战，但仍能用于侦察、殖民地作战和步兵支援。对一个财力有限的国家来说，这种小型装甲车辆是踏入机械化战争的务实的第一步。"
 SIA_jungle_armor: "丛林装甲"
 SIA_jungle_armor_desc: "我们地区的丛林，容不下为欧洲平原设计的笨重机械。若装甲部队要为[ROOT.GetNameDef]效力，就必须适应狭窄的小径、恶劣的路况和压抑的气候，牺牲重量换取机动，以适应丛林地形。"
 SIA_mountain_tanks: "山地坦克"
 SIA_mountain_tanks_desc: "崎岖山地与险要隘口不能仅靠步兵独力死守。研发适配复杂地形的紧凑型装甲载具，能让我军在常规坦克无法通行的地域，投送具备防护能力的机动火力。"
 SIA_reluctant_submission: "勉强屈服"
 SIA_reluctant_submission_desc: "若[ROOT.GetNameDef]面临更强敌人的入侵，公开抵抗可能只会带来毁灭。屈服是痛苦的，但有时政府必须退让，以保全国家免于毁灭，并等待更有利的时机。"
 SIA_reluctant_submission_trigger: "若我们在被攻击时选择事件中的§Y屈服§!选项，该国策将自动完成。"
 SIA_reluctant_submission_tt: "我们将能够与一个进攻中的主要大国达成和平。但他们会要求我们为他们印钞。\n我们的§Y消费品工厂§!产出将每月增加§Y[?idea_SIA_printing_money_monthly_change|%]§!，最高至§Y[?idea_SIA_printing_money_monthly_change_max|%]§!。\n\n选择§Y$SIA_thai_rice_company$§!国策将使增幅降低§G50%§!\n\n选择§Y$SIA_demand_repatriation$§!国策将移除印钞需求。"
 SIA_seri_thai: "自由泰国"
 SIA_seri_thai_desc: "屈服不意味着放弃民族精神。在占领与顺从的表象之下，可以组织忠诚的地下力量，以留存独立事业、搜集情报，并为[ROOT.GetName]再次崛起的日子做准备。"
 SIA_contact_the_south_east_asia_command: "联系东南亚司令部"
 SIA_contact_the_south_east_asia_command_desc: "抵抗若要不止于英勇的姿态，就必须与更宏大的战略结合。通过与东南亚的盟军指挥部建立联系，[ROOT.GetName]的爱国者们可以获得指导、补给，并在更大范围的斗争中占据一席。"
 SIA_broadcast_weather_reports_to_the_allies: "向同盟国广播天气报告"
 SIA_broadcast_weather_reports_to_the_allies_desc: "该地区的天空与海洋，不仅受舰队和陆军左右，同样受天气支配。来自[ROOT.GetNameDef]的可靠报告，能协助同盟国的规划，使其免遭突袭，并将我们的祖国变成他们战争中虽无声却珍贵的伙伴。"
 SIA_american_investment_aid: "美国投资援助"
 SIA_american_investment_aid_desc: "美国拥有的财富远超我们地区所能获取的一切。若能争取到美国的援助和投资，用于我们的地下斗争和民族事业，[ROOT.GetNameDef]就将获得忍受苦难、准备解放的物质手段。"
 SIA_thai_students_in_the_oss: "泰国学生加入战略情报局"
 SIA_thai_students_in_the_oss_desc: "新一代爱国青年可被送往国外，接受谍报、破坏和非正规战的训练。将忠诚的泰国学生送入同盟国的情报体系，我们就能为将来的隐蔽战线培养忠诚的干将。"
 SIA_prepare_to_drop: "准备空投行动"
 SIA_prepare_to_drop_desc: "当解放的号角吹响时，同盟国的力量也许会自天而降，落在我们的祖国大地上。因此，我们必须提前选定合适的着陆地点，做好接应准备，并组织起完善的支援网络，以便能够顺利接收空降部队，并将他们引导至最需要他们的地方。"
 SIA_unseat_the_government: "推翻政府"
 SIA_unseat_the_government_desc: "一个把[ROOT.GetNameDef]绑在外国统治上的政权，绝不能任其永存。通过抵抗、权谋和适时行动，我们可以除掉那些出卖国家者，重建一个更配得上暹罗的政府。"
 SIA_unseat_the_government_tt: "[ROOT.GetName]将退出当前阵营，并在战争中转换立场，加入§Y同盟国§!。\n\n效忠派将反抗这一变化，激起内战。\n\n若我们的总支持率§Y超过 80%§!，我们将推翻政府并避免内战。除民主支持率以外，每争取一位将军倒戈可额外获得§Y5%§!的支持率。\n\n我们来自倒戈将军的支持率为§Y[?var:SIA_seri_thai_cw_scale|%]§!，我们的民主支持率为§Y[?var:party_popularity@democratic|%]§!"
 SIA_choose_new_leader_tt: "随着旧政权的瓦解，胜利者必须决定由谁来领导新政府。"
 SIA_the_phayap_army: "帕亚普军"
 SIA_the_phayap_army_desc: "若我们把命运与入侵者绑在一起，那我们的陆军就必须在新战争秩序中占有一席之地。一个向西、向北作战的专门野战指挥部，将让[ROOT.GetName]能与其强大伙伴一同推进，并谋取自身利益。"
 SIA_securing_the_rubber_islands: "控制橡胶群岛"
 SIA_securing_the_rubber_islands_desc: "橡胶是现代战争的命脉，为轮胎、密封件和无数机械化冲突的器具提供原料。我国南边资源丰富的领土既意味着机遇，也是必需。我们应当抢在他人之前将其掌控。"
 SIA_breaking_the_burmese_line: "突破缅甸防线"
 SIA_breaking_the_burmese_line_desc: "缅甸横亘在我们的雄心与外边的世界之间。若[ROOT.GetAdjective]的陆军要证明其价值，就必须凭决心、筹划和集中用兵，来摧毁那里的敌军阵线。"
 SIA_pacific_war: "太平洋战争"
 SIA_pacific_war_desc: "东亚冲突已不能被视为遥远之事。太平洋战争正塑造着我们区域所有国家的命运，而[ROOT.GetNameDef]必须决定自己在这场斗争中的位置——无论是追随者、伙伴还是牺牲品。"
 SIA_joint_asian_military_command: "亚洲联合军事司令部"
 SIA_joint_asian_military_command_desc: "若与我们区域的伙伴协调努力，我们的力量将更强大。一个联合指挥架构，能提高效率、清晰规划，并赋予战役以共同方向，否则这些战役可能因彼此竞争和混乱而被浪费。"
 SIA_demand_repatriation: "要求遣返"
 SIA_demand_repatriation_desc: "那些以权宜之计为借口进入我们国土的人，已欠下[ROOT.GetNameDef]的债。一旦我们的处境改善，就应要求归还被夺走的一切，并迫使占领者偿还他们入侵的代价。"
 SIA_standing_our_ground: "坚持我方立场"
 SIA_standing_our_ground_desc: "总会有退让和谈判只会带来更多屈辱的时刻。[ROOT.GetNameDefCap]必须展示它依然拥有意志，未曾倒下、可以战斗并驱逐那些自以为能用枪口决定我们命运的家伙。"
 SIA_standing_our_ground_trigger: "若我们在被攻击时选择事件中的§Y抵抗§!选项，该国策将自动完成。"
 SIA_ask_for_the_release_of_american_commodities: "请求疏通美国商品"
 SIA_ask_for_the_release_of_american_commodities_desc: "美国的库存、机器和货物，或可提供我国所需的喘息之机。通过审慎的外交，我们可以请求发放该类物资，缓解短缺，巩固战争努力的物质基础。"
 SIA_japanese_fighters: "日本战斗机"
 SIA_japanese_fighters_desc: "虽然我们自身的航空工业依然弱小，但外国飞机能帮助填补缺口。将日本战斗机纳入[ROOT.GetAdjective]手中，至少能给我们一定程度的现代空中力量，哪怕仅限于我们工业薄弱所容许的范围。"
 SIA_get_off_our_shores: "离开我们的海岸"
 SIA_get_off_our_shores_desc: "外国军队出现在暹罗的土地上，是无法用借口轻描淡写的冒犯。无论是靠武力，还是靠海外事件的压力，我们都必须坚持让入侵者离开我们的海岸，恢复[ROOT.GetNameDef]的尊严。\n\n如同所有残忍的人一样，他们只是懦夫。现在，离开我们的海岸。"
 SIA_singaporean_reinforcements: "新加坡增援"
 SIA_singaporean_reinforcements_desc: "马来亚及更远地区的斗争，与我们自身的安全密不可分。抽调集结在新加坡周围的部队作为援军，能加固我国的战线，扩大我们与盟军的合作，并在共同目标下将整个战区紧密联结。"
 modify_SIA_directorate_of_aeronautical_engineering: "§Y航空工程局§!追加效果："
 SIA_aid_for_resources: "资源换援助"
 SIA_aid_for_resources_desc: "我国拥有外国所渴望的资源，也缺乏他们能提供的某些工具。谨慎地用援助换取物资，将有助于维持[ROOT.GetNameDef]的供应，同时确保我们的财富为自保效力。"
 SIA_aid_for_resources_tt: "我们会要求[JAP.GetNameDef]加入我们的战争，以§Y[724.GetName]§!的橡胶资源权为条件"
 SIA_how_quickly_the_tables_turn: "风水轮流转"
 SIA_how_quickly_the_tables_turn_desc: "那些曾视[ROOT.GetNameDef]为软弱顺从的家伙，或许会发现局势已然逆转。战争中的运势瞬息万变，我们必须准备好在压迫者开始衰败、形势终于对我有利的时刻，果断抓住时机。"
 SIA_how_quickly_the_tables_turn_trigger: "我们曾遭一大国攻击，并使该大国投降。"
 SIA_royal_thai_navy: "泰国王家海军"
 SIA_royal_thai_navy_desc: "保卫[ROOT.GetNameDef]不止于海岸线。我们的海岸、河流与海上贸易，需要一支与王国相称的舰队。通过加强泰国皇家海军，我们将确保暹罗始终是其水域的主人。"
 modify_royal_thai_navy: "§Y$idea_SIA_thai_royal_navy$§!追加效果："
 SIA_direct_army_fundings_towards_the_navy: "将陆军资金投入海军"
 SIA_direct_army_fundings_towards_the_navy_desc: "陆军长期吞噬了军费的大头，然而[ROOT.GetNameDef]的战略需求并不全在大陆。将经费转向舰队，我们便能着手纠正这种失衡，并保卫庇护我们贸易与海岸的海洋。"
 SIA_thonburi_class_coastal_defense_ship: "吞武里级海岸防御舰"
 SIA_thonburi_class_coastal_defense_ship_desc: "一支规模适中的舰队，若按本地条件合理设计，仍能拥有锋利的牙齿。吞武里级为[ROOT.GetNameDef]提供了近海防御的实用手段，将可观的火力与最适合我们急需保卫水域的角色结合了起来。"
 SIA_acquire_submarines: "购置潜艇"
 SIA_acquire_submarines_desc: "潜艇能让小国海军打出超过其体量的重击。潜藏于波涛之下，它们能威胁航运、威慑更强的舰队，并让任何针对我们海岸的敌对图谋变得复杂。[ROOT.GetNameDefCap]不应忽视这样的武器。"
 SIA_submarine_day: "潜艇日"
 SIA_submarine_day_desc: "将水下战引入我们的舰队，值得公众的认可与全国的激情。通过颂扬潜艇兵种，我们能够鼓励民众应征入伍、提升政府威望，并在公众心中牢固树立暹罗正迈入一个新海军时代的观念。"
 SIA_the_thonburi_dockyard_project: "吞武里造船厂计划"
 SIA_the_thonburi_dockyard_project_desc: "海军不能只靠进口船体来维持。若[ROOT.GetNameDef]要维持并扩大其海上力量，就必须投资船坞、车间和劳动力，这些才是构成海权的真正基础。"
 SIA_expand_the_slipways: "扩建船台"
 SIA_expand_the_slipways_desc: "我们现有的设施，对正在成形的雄心来说已过于拥挤。通过扩建船台，我们将增强建造和修理舰船的能力，使舰队得以扩充规模并提升战备。"
 SIA_a_new_drydock: "新建的干船坞"
 SIA_a_new_drydock_desc: "正规的海军维护需要现代化的干船坞。没有它，大型舰艇的保养便始终缓慢、低效且依赖外援。一座崭新的干船坞将让[ROOT.GetNameDef]更有力地掌握自己的海军未来。"
 SIA_install_heavy_cranes_and_power_plant: "安装重型起重机与发电站"
 SIA_install_heavy_cranes_and_power_plant_desc: "造船不仅是木料和钢铁的事，更关乎机器与能源。重型起重机和可靠的电力供应，将把我们的船厂从简陋的设施，改造成现代工业的合格工具。"
 SIA_establish_the_foundry_and_machine_shop: "建立铸造厂与机床车间"
 SIA_establish_the_foundry_and_machine_shop_desc: "一支主权国家的海军需要的，不只是用进口零件组装的船壳。通过建立我们自己的铸造与机械车间，我们将强化工业筋骨，从而使[ROOT.GetNameDef]能在国内铸造、加工和修理军舰的关键部件。"
 SIA_the_thonburi_arsenal: "吞武里兵工厂"
 SIA_the_thonburi_arsenal_desc: "缺乏武器装备的船坞是不完整的。在吞武里设立兵工厂，将使海军火炮、弹药和相关装备的制造与储存成为可能，把我们的舰队与国家工业更紧密地联结起来。"
 SIA_focus_on_commercial_civilian_ships: "专注商用民船"
 SIA_focus_on_commercial_civilian_ships_desc: "并非每一根铺设的龙骨都须为战斗而生。商船、运输船和其他民用船舶，构成国民经济的循环系统。通过鼓励商业造船，[ROOT.GetNameDef]将同时增强经济繁荣与战时的韧性。"
 SIA_empower_the_coastguard: "强化海岸警卫队"
 SIA_empower_the_coastguard_desc: "舰队不可能无处不在，而海岸安全的许多任务由更轻便的勤务力量承担更为恰当。一支强化后的海岸警卫队，将保护我们的渔业、警戒我们的海岸，并使海军得以腾出手来应对更严峻的威胁。"
 SIA_river_patrols: "河流巡逻"
 SIA_river_patrols_desc: "[ROOT.GetNameDef]的河流，既是道路，也是边疆，又是生命线。这些水域上的巡逻艇，将帮助我们维护秩序、支援当地驻军，并将国家的力量延伸至遥远的首都难以迅速应对的区域。"
 SIA_sell_bangkok_dock_co: "出售曼谷船坞公司"
 SIA_sell_bangkok_dock_co_desc: "私人资本或许能做由国家管理完成得太过缓慢的事。将曼谷船坞公司卖给能力胜任的人，我们或许能吸引投资、激发效率，并将公共资金转向更紧迫的军事需求。"
 SIA_a_race_against_time: "与时间赛跑"
 SIA_a_race_against_time_desc: "我们的海军过时、经费不足，对现代战争毫无准备。必须立刻将资金转投向造船、改装、岸防和海军训练。时钟走得远比我们的船坞更快。"
 SIA_a_race_against_time_tt: "民族精神效果结束后，我们将获得："
 SIA_a_race_against_time_tt2: "持续§Y280§!天"
