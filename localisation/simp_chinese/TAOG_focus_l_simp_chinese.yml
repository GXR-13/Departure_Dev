 AST_advance_pacific_initiatives: "推进太平洋倡议"
 AST_advance_pacific_initiatives_desc: "凭借我国成功缔结的互不侵犯条约，我国与亚洲邻国的关系已然改善。我们应继续充分利用这份睦邻关系，并呼吁新晋盟友助力我国工业发展。"
 AST_advance_pacific_initiatives_tt: "\n与以下国家签署互不侵犯条约："
 AST_advance_pacific_initiatives_jap_tt: " §Y[JAP.GetName]§!为修正添加§G2§!地图外§Y船坞§!。"
