 AST_natunity_desc: "§Y国民团结政府§!\n§L在危机时刻，小的斗争会让位于大的斗争。周边国家正面临着一场又一场的冲突，尽管国内问题有其自身的紧迫性，但当流血威胁越来越近时，这种紧迫性就会减弱。[AST.GetName]的民主党派必须搁置分歧，团结起来面对世界。§!"
