 idea_SIA_weather_broadcasts_desc: "定期天气广播使我空军与海军能更清晰地掌握气象状况，从而提升其作战效能，并降低在恶劣天气下行动的风险。"
 idea_SIA_seri_thai_contacts: "自由泰国运动联络"
 idea_SIA_seri_thai_contacts_desc: "与抵抗组织自由泰人运动网络建立的联系正体现出其价值，为我们带来了经验丰富的战士，并加强了与同盟国的关系。"
 idea_SIA_secure_rubber_islands: "控制橡胶群岛"
 idea_SIA_joint_military_command: "联合军事指挥部"
 idea_SIA_joint_military_command_desc: "统一的指挥架构改善了各军种间的协调，加速了经验丰富的军官培养与战场理论的发展。"
