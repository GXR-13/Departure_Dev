 idea_SIA_land_war_in_asia: "亚洲陆战"
 # Alternative Communist Focus
 SIA_the_peoples_war_in_asia: "亚洲人民战争"
 SIA_the_peoples_war_in_asia_desc: "反对[JAP.GetAdjective]帝国主义的斗争不仅是国家间的较量，更是一场工人、农民和士兵反抗外来统治的战争。通过与中国的共产主义力量站在一起，[ROOT.GetNameDef]投身于一场遍及亚洲的更广泛的人民战争。"
 SIA_peoples_war_in_asia_idea: "亚洲人民战争"
 SIA_peoples_war_in_asia_idea_desc: "支撑这场战争的不仅是正规部队。地方委员会、游击向导和农民补给队如今都在战场为军队服务。每个村庄都成为一座兵站，每条道路都可能是一次伏击，每次撤退都是一次将敌人引向更深内陆的机会。"
 # Alternative Nationalist Focus
 SIA_national_defense_in_asia: "亚洲国防"
 SIA_national_defense_in_asia_desc: "亚洲的防卫需要纪律、等级体系与共同的战略目标。通过与中国的民族主义政府站在一起，[ROOT.GetNameDef]加入了一个决心以有组织的军队和协调统一的指挥来抵抗[JAP.GetAdjective]扩张的联盟。"
 SIA_national_defense_in_asia_tt: "§Y[ROOT.GetNameWithFlag]§!支持统一战线的民族主义力量。\n添加§Y$SIA_national_defense_in_asia_idea$§!，给予：\n $MODIFIER_ARMY_ORG_FACTOR$：§G+5%§!\n $MODIFIER_PLANNING_SPEED$：§G+10%§!\n $MODIFIER_MAX_PLANNING$：§G+10%§!\n $MODIFIERS_ARMY_DEFENCE_FACTOR$：§G+5%§!"
 SIA_stronger_together: "团结就是力量"
 SIA_stronger_together_desc: "战争已将那些遥远的许诺与各行其是的同盟化为近乎障碍的存在。若[ROOT.GetNameDef]要塑造亚洲的未来，我们必须要求我们的伙伴将他们的阵营与我们联合，并在即将到来的斗争中接受单一指挥。"
 idea_SIA_national_defense_in_asia: "亚洲国防"
 SIA_directorate_of_aeronautical_engineering_desc: "[ROOT.GetNameDef]空中力量的未来不能仅靠飞行员来保障。它需要工程师、检查员、车间，以及一个能将外国采购转化为堪用战机的中央权威。航空工程局将成为这一努力的基础。"
 idea_SIA_aeronautical_engineering_directorate: "航空工程局"
 SIA_standardize_aircraft_maintenance: "标准化飞机维护"
 SIA_standardize_aircraft_maintenance_desc: "我们的飞机来源众多，每种都有各自的零件、工具和维修习惯。通过在航空工程局下统一标准化维护流程，[ROOT.GetNameDef]能让更多飞机保持升空状态，并减少因地勤混乱造成的损耗。"
 SIA_expand_aircraft_workshops: "扩建飞机车间"
 SIA_expand_aircraft_workshops_desc: "航空工程局所需的不仅是办公室和检验文件。新的车间、机床和训练有素的机械师将使受损飞机能在国内维修，而简单部件则可自行生产，无需等待外国交付。"
 SIA_license_modern_airframes: "现代机身许可生产"
 SIA_license_modern_airframes_desc: "[ROOT.GetNameDefCap]尚不能设计所有自身所需的飞机。一条更务实的道路是获取外国型号的生产许可，研究其构造，并在航空工程局的监督下使其适应我国的气候、机场及补给条件。"
 SIA_tropical_air_operations: "热带空中作战"
 SIA_tropical_air_operations_desc: "炎热、潮湿、季风雨和崎岖的前线机场对飞机和机组人员有其特殊要求。通过使发动机、维护周期和飞行员战术条令适应这些条件，航空工程局能使我空军在东南亚上空更加可靠。"
