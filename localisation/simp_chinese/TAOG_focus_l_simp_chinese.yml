 AST_australian_military_forces: "澳大利亚军事力量"
 AST_australian_military_forces_desc: "在世界大战的烈火中淬炼，澳大利亚军队在遥远的异国海岸证明了其勇气，在一战中最残酷的一些战役中屹立不倒。此后的岁月里，军队规模缩小，并重组为一支防御力量，主要任务是保卫本土岛屿。过去艰难赢得的经验教训得以留存，随时准备再次被征调。"
 AST_permanant_military_forces: "常备军事力量"
 AST_permanant_military_forces_desc: "澳大利亚的主要军事力量是民兵，其任务为保卫本土。然而，在全球紧张局势升温之际，建立一支由职业军官与士兵组成的骨干队伍是审慎之举，他们中许多人曾在上个大战中积累经验。即便最初以预备役身份服役，这支部队也能提供常备性与标准化的训练水平。"
 AST_invoke_the_1903_defence_act: "援引1903年国防法"
 AST_invoke_the_1903_defence_act_desc: "传统上，澳大利亚依赖其民兵进行国防。但在面临重大威胁时，我们可以援引《1903年国防法案》。这使我们能够为防御目的征召额外人力。"
 AST_lithgow_small_arms_factory: "利特高轻武器厂"
 AST_lithgow_small_arms_factory_desc: "利思戈轻武器工厂成立于1912年，旨在战时减少对英国制造武器与装备的依赖。随着全球紧张局势再度升高，我们应扩大生产以满足武装部队日益增长的需求。"
 AST_dingo_scout_car: "丁戈侦察车"
 AST_dingo_scout_car_desc: "澳大利亚并无深厚的装甲车辆研发传统，但我军对此领域增援的呼声日益高涨。因此，我们应更积极地采用本土设计，例如丁戈侦察车。"
 AST_volunteer_defence_corps_taog: "志愿防卫部队"
 AST_volunteer_defence_corps_taog_desc: "志愿防卫部队作为一支类似于英国本土防卫军的部队组建，是由不符合常规服役条件者组成的无薪公民民兵。尽管有此局限，他们熟悉当地地形，若最坏情况发生，极适合开展游击战。"
 AST_war_carriers: "战地劳工"
 AST_war_carriers_desc: "后勤决定战争胜负，而澳大利亚部队作战的许多地形极不适合卡车或火车等常规运输。相反，我们应依赖当地人力，他们适应环境，熟悉隐秘的小路与捷径。"
 AST_anzac_spirit: "澳新军团之魂"
 AST_anzac_spirit_desc: "澳新军团在一战期间赢得了赫赫威名，为帝国的胜利付出了巨大努力与大量鲜血。其品质有目共睹：坚韧、勇敢、机智与风趣——并兼有面对危险与困苦时顽强的反抗精神。"
 AST_lee_enfield_no1_mark3: "李-恩菲尔德 No.1 Mk III*"
 AST_lee_enfield_no1_mark3_desc: "那枚小星至关重要——李-恩菲尔德 No.1 Mk III*步枪标志着为更快、更廉价生产而进行的战时修改。当需求甚至超过这些改进时，我们必须采用“分散分包方案”，由较小企业生产零部件，在利思戈组装以提升产量。"
 AST_new_south_wales_government_railways: "新南威尔士国营铁路"
 AST_new_south_wales_government_railways_desc: "新南威尔士政府铁路工坊提供了一项独特能力：以单件铸造大型钢构件。作为少数能够生产全铸造坦克车体与炮塔的英联邦国家之一，我们应善加利用这一能力。"
 AST_second_australian_imperial_force: "澳大利亚第二帝国军"
 AST_second_australian_imperial_force_desc: "澳大利亚在上个大战期间部署了第一澳大利亚帝国部队，派兵海外作战。随着战争再次威胁吞噬世界，我们应组建第二帝国部队，在海外彰显澳大利亚的实力。"
 AST_expeditionary_leader: "该§Y陆军将军§!将获得§Y远征领袖§!特质，提升其海外作战能力，但会限制其可指挥的陆军师数量。"
 AST_expeditionary_leader_plural: "两名§Y陆军将领§!都将获得§Y远征军领袖§!特质，该特质能提升他们在海外的能力，但会限制他们指挥的陆军师数量。"
 AST_larrikinism: "“兵痞”精神"
 AST_larrikinism_desc: "“兵痞”精神，过去被定义为“缺乏教养、爱惹事但心地善良”，现已成为澳大利亚文化的象征；粗犷的耐力，对权威的不敬，以及面对危险时风趣的反抗。澳大利亚士兵在上个大战中因坚强面对困苦并泰然处之而声名远播。"
 AST_diggers: "矿工"
 AST_diggers_desc: "“挖，挖，挖，直到安全为止”，这是澳新军团在加里波利登陆时给威廉·伯德伍德将军的命令，此言已成为澳大利亚作战方式的代名词。然而，“挖地汉”精神更深的含义在于，通过“伙伴情谊”——为并肩作战、为相互扶持的战友而产生的不灭之纽带——将澳大利亚和新西兰士兵紧紧相连。"
 AST_owen_gun: "欧文冲锋枪"
 AST_owen_gun_desc: "创新且本土制造的欧文冲锋枪，以其粗犷耐用赢得了声誉，恰如我们的士兵。当我军在世界各地作战时，我们应将此武器不仅作为澳大利亚创造与设计的象征，更作为我们战争精神本身的象征来采用。"
 AST_department_of_supply_and_development_taog: "供应和发展部"
 AST_department_of_supply_and_development_taog_desc: "随着战争需求将我们的生产与后勤系统推向极限，我们必须将各项工作集中于一个专门机构之下，负责协调与维持这些系统。"
 AST_sentinel_tank_development: "哨兵式坦克研发"
 AST_sentinel_tank_development_desc: "历史上，我们依赖进口的坦克设计，即使在国产化时亦然。我们应基于从这些机器中汲取的经验教训，融入澳大利亚的创新，开发我们自己的坦克，一种为我们的能力与资源量身定做的坦克。"
 AST_establish_training_camps: "建立训练营"
 AST_establish_training_camps_desc: "如同上个大战，第二帝国部队可能被召唤到世界各地作战。因此，我们必须制定全面的训练计划，使我军士兵适应任何环境，从北非沙漠到南太平洋丛林。"
 AST_jungle_tanks_if_sentinel_tank_development: "如果我们已完成“哨兵式坦克研发”："
 jungle_heavy_tanks: "丛林重型坦克"
 AST_anti_malaria_campaign: "抗疟疾运动"
 AST_anti_malaria_campaign_desc: "我们所在的部队或许需要在太平洋的丛林地带作战，而那里存在着一个比敌人子弹更为致命的威胁——疟疾。面对这一无形的敌人，我们必须采取果断措施，全力保护我们的部队免受其侵害。"
 AST_defence_citizen_military_forces_act: "公民防卫军法案"
 AST_defence_citizen_military_forces_act_desc: "到目前为止，只有职业志愿士兵才能被部署到海外。随着冲突继续升级，我们必须建立法律框架，允许在必要时将民兵部队派遣出国。"
 AST_call_that_a_knife: "没啥事儿！"
 AST_call_that_a_knife_desc: "“那也算刀？这才叫刀子！”些许豪情与风趣足以振奋军心。我们的士兵直面险境时自信果敢、坚韧不屈，更自带十足的气魄。"
 AST_army_inventions_directorate_taog: "军事发明理事会"
 AST_army_inventions_directorate_taog_desc: "战争若还有少许好处可言，其中之一便是需求驱动的急速技术创新。我们应成立一个集中化组织，以开发、改进和利用这些突破。"
 AST_yeramba: "耶兰巴自行火炮"
 AST_yeramba_desc: "在“哨兵”等澳大利亚自研车辆成功的基础上，我们又迈出了一步，推出了耶兰巴自行火炮，这是我军的一款威力强大的新装备。一门架设在坦克底盘上的25磅炮，能向敌人倾泻机动而毁灭性的火力。"
 AST_alice_springs: "艾丽斯斯普林斯号"
 AST_alice_springs_desc: "内陆非常辽阔……真的非常辽阔。其中心坐落着爱丽斯泉小城，可作为全澳作战的中央后勤枢纽。我们应加以开发，并建立军事基地，训练能适应任何环境的部队。"
 AST_australian_regular_army: "澳大利亚正规军"
 AST_australian_regular_army_desc: "从加里波利海滩，到北非沙漠、希腊山地和东南亚丛林，我们汲取了无数经验。这些来之不易的经历，铸就了一支比任何军队都更灵活、更适应环境的军队。"
 AST_no1_flying_training_school: "第一飞行训练学校"
 AST_no1_flying_training_school_desc: "飞行训练学校于1921年随澳大利亚皇家空军成立而设立，随着对空勤人员的需求波动时开时关。随着全球紧张局势升温，我们应重新将其开放，以训练新一代飞行员与空勤人员。"
 AST_empire_air_training_scheme_taog: "帝国空军训练计划"
 AST_empire_air_training_scheme_taog_desc: "英联邦空军训练计划为一英联邦国家提供大量资金与专业支持，以训练大批飞行员与空勤人员。对其主办权的竞争十分激烈，澳大利亚与加拿大是主要竞争者。我们已在帝国空军训练方案框架下提交了自己的方案。"
 AST_volunteer_air_corps: "志愿防空观测部队"
 AST_volunteer_air_corps_desc: "澳大利亚空域极其辽阔，远非单靠官方部队所能覆盖。我们应依托当地志愿兵，遍布全国的数千个观察哨所将监视我们的天空。"
 AST_improved_ground_crews: "训练地勤班组"
 AST_improved_ground_crews_desc: "每一位飞行员背后，都需要一整个地勤团队来确保飞机妥善维护、飞行协调与基地运作。更不用说在空中陪伴他们的领航员、机枪手与轰炸机手。我们必须建立适当的训练设施，确保空军以最高效率运作。"
 AST_advanced_pilot_training: "高级飞行员培训"
 AST_advanced_pilot_training_desc: "随着飞机变得更复杂、更快、更先进，我军飞行员的技能也必须相应提高，以充分利用这些技术。"
 AST_advanced_pilot_training_tt: "§Y空军学说§!的精通度获得速度§G+10%§!"
 AST_commonwealth_aircraft_corporation_taog: "联邦飞机公司"
 AST_commonwealth_aircraft_corporation_taog_desc: "随着全球对空战的兴趣日增，我们必须确保不落后于人。民间爱好者与创新者们已开始看到航空工业的潜力；通过向他们提供初始资金，我们可以培育并加强这一新兴行业。"
 AST_reestablish_central_flying_school: "重建中央飞行学校"
 AST_reestablish_central_flying_school_desc: "另一所飞行学校，与第一飞行训练学校并行运作的中央飞行学校，将有助于满足一支现代化空军日益增长的需求。随着紧张局势升级，我们必须确保空勤人员拥有他们所需的设施。"
 AST_aerodrome_of_democracy_democracy: "民主的机场"
 AST_aerodrome_of_democracy_fascism: "主宰的机场"
 AST_aerodrome_of_democracy_communism: "解放的机场"
 AST_aerodrome_of_democracy_neutrality: "力量的机场"
 AST_aerodrome_of_democracy: "[GET_AERODOME_NAME]"
 AST_aerodrome_of_democracy_desc: "已将前沿航空能力握于手中，澳大利亚空军赢得了“[GET_AERODOME_NAME]”之名。我们的飞行员在全球展开空战，而我们的轰炸机将死亡的阴影笼罩在敌人的工业设施之上。"
 AST_government_aircraft_factories: "政府飞机工厂"
 AST_government_aircraft_factories_desc: "由于远离欧洲，战时我们无法依赖传统的飞机供应来源。因此，发展本土制造能力至关重要，使我们能按自身需求制造飞机机体与发动机。"
 AST_death_from_down_under_taog: "来自南半球的致命打击"
 AST_death_from_down_under_taog_desc: "从南半球的尽头，我们锻造出了一支无可匹敌的空军。我们的战机遍布全球，以精准而毁灭性的力量施展打击，敌人无论藏身何处，死亡都将从澳大利亚降临。"
 AST_ride_the_lightning: "风驰电掣"
 AST_ride_the_lightning_desc: "我们的战斗机飞行员是空中力量的矛头；迅捷、凌厉、百折不挠。他们驾着闪电投身战斗，夺取天空的制空权，拦截敌机，并确保我军所至之处，空中优势紧随其后。"
 AST_the_gathering_storm: "风暴将至"
 AST_the_gathering_storm_desc: "地平线上正聚集着风暴。我们日益壮大的空中力量带来了与日俱增的来自空中的压力，在敌人最薄弱之处打击，支撑我军的推进。始于远方的低吼，即将迸裂为一场无休止的毁灭风暴。"
 AST_hear_the_thunder: "且听雷鸣"
 AST_hear_the_thunder_desc: "你可听见，你可听见那雷鸣？从南方大地，我们的战略轰炸机将澳大利亚的力量带往全球。当天穹咆哮、大地震颤之时，我们的敌人终将明白：风暴已至，它带来的只有毁灭。"
 AST_department_of_aircraft_production: "飞机生产部"
 AST_department_of_aircraft_production_desc: "澳大利亚皇家空军的极速扩张，给我们的生产能力带来了沉重压力。我们必须拿出更大的雄心，扩张并协调工业基础以满足需求，确保我们能让自己的战机遮蔽天际。"
 AST_royal_australian_navy: "澳大利亚皇家海军"
 AST_royal_australian_navy_desc: "澳大利亚皇家海军在联邦成立后由各殖民地舰队联合组建，在上个大战期间几乎征战在所有战场。此后，由于经费有限，海军规模遭到削减，但随着全球紧张局势升温，舰队是时候重返大海了。"
 AST_coast_watchers: "海岸警备队"
 AST_coast_watchers_desc: "虽然我们的大部分军事力量仍集中在本土，但北部诸通道构成了至关重要的早期预警网络。通过在这些外围岛屿部署本地情报特工，远在敌方海空行动威胁到澳大利亚海岸之前，我们便能将其察觉。"
 AST_marines: "海军陆战队"
 AST_marines_desc: "身处群岛环绕的大洋之中，作为其中最大的岛屿，我们必须确保自身具备两栖作战能力，以便将力量投送至国土之外。一旦我们需要由防御转为进攻，这支力量将确保跳岛行动的有效开展。"
 AST_naval_auxiliary_patrol_taog: "辅助海上巡逻"
 AST_naval_auxiliary_patrol_taog_desc: "当职业部队另有他用之时，我们可以仰仗热忱的本地志愿者来守卫港口与沿岸设施。他们对当地水道的熟悉使其无比珍贵，而且无人会怀疑，一名本地渔民竟是在为我们效力。"
 AST_cockatoo_island_shipyards_taog: "鹦鹉岛造船厂"
 AST_cockatoo_island_shipyards_taog_desc: "鹦鹉岛造船厂长期充当帝国维修与保养的枢纽，支撑着皇家海军的海外行动。如今，它已是皇家澳大利亚海军的基石，我们必须扩大其产能，以满足日益增长的舰队需求，并维系海军的实力。"
 AST_kangaroo_point_dry_dock_taog: "袋鼠角干船坞"
 AST_kangaroo_point_dry_dock_taog_desc: "尽管埃文斯-迪肯公司主要是一家工程公司，但随着全球紧张局势加剧，他们准确认识到了扩大造船能力的必要，并将目光投向了袋鼠角。我们应为他们接管这片土地提供便利，以支持舰队的持续壮大。"
 AST_scrap_iron_flotilla_taog: "废铁舰队"
 AST_scrap_iron_flotilla_taog_desc: "虽被批评者视作过时陈旧而不屑一顾，但我们一批较老旧的驱逐舰仍被整合为单一编队。相比新型舰艇，尽管这些船舰缺乏声望，但彰显了对既有资产的巧妙运用。"
 AST_cruising_for_a_bruising: "自讨苦吃"
 AST_cruising_for_a_bruising_desc: "我们的海军长于运用巡洋舰，这是一项值得发扬的传统。快速、多用途且火力猛烈，这些舰艇不久将享誉全球——任何挡道的敌人，都免不了头破血流，遭受重创。"
 AST_strike_from_down_under: "来自南半球的打击"
 AST_strike_from_down_under_desc: "在波涛下悄然滑行，无雷霆之轰鸣，一旦它们发现你，你的舰船就等着被洗劫一空。你可曾听说，可曾听说来自澳大利亚的潜艇？跑快些吧，否则你的舰队将被挥霍一空。好耶——！"
 AST_hmas_sydney: "悉尼号巡洋舰"
 AST_hmas_sydney_desc: "战列舰的时代已经结束了。海军的未来在于空中力量，澳大利亚不会落后。经过多年的海军重建和现代化改造，我们已准备好迈出最后一步；航母将定义澳大利亚未来一代的海上力量。"
 AST_conscription_level_allowed_tt: "争取更多征兵的政治意愿（查看国策上的人力图标）"
 AST_conscription_level_allowed_limited_conscription_tt: "解锁下一级的§Y征兵法案§!，可启用§Y有限征兵§!"
 AST_conscription_level_allowed_extensive_conscription_tt: "解锁下一级的§Y征兵法案§!，可启用§Y广泛征兵§!"
 AST_conscription_level_allowed_service_by_requirement_tt: "解锁下一级的§Y征兵法案§!，可启用§Y按要求服兵役§!"
 AST_conscription_level_allowed_all_adults_serve_tt: "解锁下一级的§Y征兵法案§!，可启用§Y所有成人服兵役§!"
 AST_conscription_level_allowed_scraping_the_barrel_tt: "解锁下一级的§Y征兵法案§!，可启用§Y榨干他们§!"
 AST_conscription_law_so_far: "[CONSCRIPTION_LAW_SO_FAR]"
 ############
 ### MISC ###
 ############
 add_random_stat_to_general_tt: "为该将领添加1额外随机技能点"
 generic_unlock_industrial_concern_tt: "可作为工业企业： \n"
 NZL_rail_standardization_tt: "§Y[?NZL_train_var]§!单位的§Y$NZL_train_equipment_1$§!添加到国家储备中。"
 NZL_ministry_of_public_works: "公共工程部"
 NZL_ministry_of_public_works_desc: "通过协调规划与严明投资，公路、铁路和电力计划将遵循一贯的国家战略推进，而非零敲碎打。"
 NZL_abolish_the_railways_board: "废除政府铁路局"
 NZL_abolish_the_railways_board_desc: "政府铁路局在实现交通网络现代化方面毫无成效。是时候废除这一反常机构，将铁路重归内阁管控。"
 NZL_rail_standardization: "机车标准化"
 NZL_rail_standardization_desc: "[ROOT.GetName]全国各地有多家作坊，生产过质量参差不齐的机车。为使铁路系统更高效，我们将为它们设立一批标准机车进行制造，每类专用于特定目的。"
 NZL_full_employment: "充分就业"
 NZL_full_employment_desc: "通过持续的公共工程建设、审慎的规划和稳健的工业扩张，失业终让位于机遇。大萧条年代闲置的工坊再度活跃，国家劳动已全面投入生产事业。恢复了信心与稳定，我们不仅实现了复苏，更已为前方的挑战厉兵秣马。"
 NZL_direct_the_coal_industry: "指导煤炭工业"
 NZL_direct_the_coal_industry_desc: "随着煤炭对我们的铁路、工业和发电站变得愈发关键，政府必须为国家利益介入协调生产与分配。"
 NZL_establish_the_ncb: "设立国家煤炭委员会"
 NZL_establish_the_ncb_desc: "通过成立国家煤炭委员会，我们可以将全国分散的煤矿纳入协调指挥，为铁路、工业和发电确保稳定的燃料供应。中央监管将使我们得以合理化生产、提高效率，并确保战略需求优先于私人利益。"
 NZL_electrification: "提升发电量"
 NZL_electrification_desc: "通过加强水利，并发展水力发电，我们可为持久的工业实力奠定基础。新的水坝和输电工程将增加全国各地的容量，确保工厂、铁路和港口获得所需电力。"
 NZL_bureau_of_industry_taog: "$NZL_bureau_of_industry$"
 NZL_bureau_of_industry_taog_desc: "$NZL_bureau_of_industry_desc$"
 NZL_wairarapa_sheep_farms_taog: "$NZL_wairarapa_sheep_farms$"
 NZL_wairarapa_sheep_farms_taog_desc: "$NZL_wairarapa_sheep_farms_desc$"
