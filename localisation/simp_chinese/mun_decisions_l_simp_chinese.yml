 ###FORT DECISIONS###
 CZE_the_second_fortification_program_category: "防御工事计划"
 CZE_the_second_fortification_program_category_desc: "我国不甚理想的边境线已成为紧迫的国家安全问题。周边国家已经明确表示，他们有意按照对自己有利的方式重新划分我国边界。继续加强边境防御，将使得任何潜在的敌人在攻击我们之前再三思量。"
 CZE_fate_of_the_ro: "防御工事委员会的命运"
 CZE_fate_of_the_ro_desc: "防御工事委员会负责筹集与我国防御工程相关的资金。如果这些资金迟迟不投入使用，人们就会开始质疑筹集这些资金的初衷。"
 CZE_bop_army_bunker_maintenance: "防御工事维护"
 CZE_bop_army_bunker_maintenance_desc: "确保防御工事得到妥善维护并随时可使用，将确保军队在需要驻守时对其充满信心。"
 CZE_fortification_research: "防御工事研究"
 CZE_fortification_research_desc: "对我国边境进行要塞化防御之必要不言而喻，问题在于如何实施？研究将帮助我们解答这个问题。"
 CZE_fortification_research_tt: "拥有民族精神§Y$CZE_directorate_of_fortification_works_no_gd_idea$§!"
 CZE_fortification_research_subtract_variable_tt: "所有未来的§Y防御工事计划§!决议§Y完成§!所需时间将减少§Y30§!天"
 CZE_fortification_decision_inprogress: "已经在进行一项其他的防御工事项目"
 CZE_second_sudetenland_fortification_program: "第二轮苏台德防御工事计划"
 CZE_second_sudetenland_fortification_program_desc: "苏台德地区是我们与德国接壤的山区边境，是修建边境防御工事的理想地点。我们研究了法国的马其诺防线，可以依样建造一条我们自己的防线。"
 CZE_third_sudetenland_fortification_program: "第三轮苏台德防御工事计划"
 CZE_third_sudetenland_fortification_program_desc: "苏台德地区如今已有了一条像样的防线，但事关国家存亡，仅仅是“像样”还远远不够。"
 CZE_fourth_sudetenland_fortification_program: "第四轮苏台德防御工事计划"
 CZE_fourth_sudetenland_fortification_program_desc: "苏台德地区有了一套坚固的防御工事体系，但其强度仍需进一步加强。"
 CZE_fortify_the_crossroads_with_slo: "巩固路口"
 CZE_fortify_the_crossroads_with_slo_desc: "任何防御工事体系都可能被突破。为了防范这种情况，我们可以在最重要的城市周围构建防御据点，确保即便敌军突破防线，也无法轻易夺取这些城市。"
 CZE_fortify_the_hungarian_border_with_73: "巩固对匈边防"
 CZE_fortify_the_hungarian_border_with_73_desc: "匈牙利的收复失地主义始终威胁着我国，在两国边境修建防御工事体系将有助于保障我们的安全。"
 CZE_fortify_the_polish_border_with_72: "巩固对波边防"
 CZE_fortify_the_polish_border_with_72_desc: "波兰人的侵略野心永无止境，但愿通过构筑完善的要塞边防体系能让他们知难而退，另外寻找其他更易得手的目标。"
