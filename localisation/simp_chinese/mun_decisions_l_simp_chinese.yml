 CZE_embezzle_quatermaster_funds_desc: "我们的士兵已经得到了很好的照顾。如果把原本用于营房的一些资金挪作他用，肯定不会有人注意到。"
 CZE_prioritize_export_contracts: "£BoP_left_texticon 出口合同优先"
 CZE_prioritize_export_contracts_desc: "我们的出口产业帮助我们走出了大萧条。为什么我们现在要做出改变？反正任何对我们国家的威胁都被夸大其词。舰队可以再等等。"
 CZE_focus_on_export_designs: "£BoP_left_texticon 重视出口设计"
 CZE_focus_on_export_designs_desc: "军队对设计的要求极为苛刻，而出口市场则宽容得多，还能为国内的军队设计提供资金支持。所以实际上，军队真该好好感谢我们，毕竟我们为他们在研发上省了那么多钱。不用谢，军队。"
