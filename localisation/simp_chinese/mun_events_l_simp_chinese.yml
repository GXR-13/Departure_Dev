l_simp_chinese:
 ##CZECHOSLOVAKIA##
 MUN_czech_skoda_priority.t: "斯柯达工厂"
 MUN_czech_skoda_priority.d: "斯柯达工厂涵盖了多个领域，从火炮、坦克、列车和舰炮都有生产。我们可以在一定程度上予以指示，将资源转移到需求最大的领域。"
 MUN_czech_skoda_priority.1.a: "有趣"
 MUN_czech.2.t.1: "苏台德地区准军事部队请求援助"
 MUN_czech.2.t.2: "苏台德自由军团请求援助"
 MUN_czech.2.t.3: "苏台德工人民兵寻求帮助"
 MUN_czech.2.d.1: "得知我们对[CZE.getname]的计划后，许多苏台德政党迅速在苏台德各地建立准军事组织，希望动摇[CZE.GetAdjective]政府。他们现在请求我们支持跨境袭击和破坏行动，以帮助我们打击[CZE.getname]。"
 MUN_czech.2.d.2: "得知我们对[CZE.getname]的计划后，许多苏台德政党迅速动员了他们的准军事组织：苏台德自由军。苏台德各地的自由军集结起来，开始攻击[CZE.GetAdjective]政府在苏台德的资产。他们现在请求我们全力支持他们针对[CZE.getname]的跨境袭击和破坏行动。"
 MUN_czech.2.d.3: "得知我们对[CZE.getname]的计划后，当地共产主义党派迅速动员了工人民兵。这些工人民兵集结起来，开始攻击[CZE.GetAdjective]政府在苏台德的资产。他们现在请求我们全力支持他们针对[CZE.getname]和其他反革命分子的跨境袭击和破坏行动。"
 MUN_czech.2.a: "我们当然会予以协助"
 MUN_czech.2.b: "最好别再纵容他们"
 MUN_czech.3.t: "苏台德游击活动"
 MUN_czech.3.d: "最近[FROM.getname]表示有兴趣吞并苏台德地区的消息，导致以苏台德为基地的准军事组织开始对我们发动游击战。他们开始袭击政府大楼，并破坏我们在一些地区的防御。如果我们希望改善在该地区的军事形势，就必须解决这些准军事组织。"
 MUN_czech.3.a: "事态还能更糟吗？"
 MUN_czech.4.t: "信任危机"
 MUN_czech.4.d: "最近针对我们的军事入侵的消息动摇了政府的核心。[CZE.GetLeader]对政府领导国家度过这场危机的能力失去了信心。他要求$CZE_jan_syrovy$接管并领导国家。$CZE_jan_syrovy$曾表示拒绝，但考虑到目前的形势，[CZE.GetLeader]告诉他，他别无选择，只能指挥并带领我们度过这场危机。"
 MUN_czech.4.a: "我们前所未有地需要你"
 MUN_czech.4.b: "我们不能失去我们的领袖"
 MUN_czech.5.t: "托马什·马萨里克逝世"
 MUN_czech.5.d: "马萨里克在捷克斯洛伐克政坛稳定活跃了二十多年。当联盟被认为不可能建立，政治僵局过大难以克服时，马萨里克一次又一次创造了政治奇迹，帮助加强和发展捷克斯洛伐克，使其成为今天的样子。全国人民都会深深怀念他。"
 MUN_czech.5.a: "不可替代的政治巨人"
 MUN_czech.7.t: "重新评估对[CZE.getnamedef]的承诺"
 MUN_czech.7.d: "据最新消息，[GER.getnamedef]意图吞并苏台德地区，并不惜与[CZE.getnamedef]开战达成目的。我们目前与[CZE.getnamedef]签有防御协议，若其与[GER.getnamedef]开战，我们将有义务支援。若想避免介入，我们必须立即终止与[CZE.getnamedef]的防御协议。"
 MUN_czech.7.a: "我们支持我们的朋友"
 MUN_czech.7.b: "我们对抗[GER.getnamedef]毫无胜算"
 MUN_czech.1001.t: "[FROM.GetNameDefCap]要求获得通往[SOV.GetNameDef]的走廊"
 MUN_czech.1001.d: "为了协调与[SOV.GetNameDef]的军事行动，[FROM.GetNameDef]要求我们将[89.GetName]和[91.GetName]的边境地区割让给他们。"
 MUN_czech.1002.t: "[FROM.GetNameDefCap]要求对南斯拉夫联盟施加影响力"
 MUN_czech.1002.d: "在向南扩张之后，[FROM.GetName]提出了一个不同寻常的要求。他们并不寻求领土，而是要求控制南巴尔干地区国家现有的“南斯拉夫防卫同盟”，成为这些附属国的保护者和宗主。他们声称自己比我们更有能力担任这些国家的保护者，但这当然也可能只是借口。"
 MUN_czech.1002.a: "也许他们说得有道理。"
 MUN_czech.1002.b: "不，他们在我们的保护之下！"
 MUN_czech.1003.t: "[FROM.GetName]拒绝要求"
 MUN_czech.1003.d: "尽管我们的外交官提出了令人信服的论点，[FROM.GetNameDef]仍拒绝了我们的要求。"
 MUN_czech.1003.a: "他们让我们别无选择"
 MUN_czech.1004.t: "[FROM.GetName]对匈牙利采取行动"
 MUN_czech.1004.d: "[ROOT.capital.GetCapitalVictoryPointName]得报，[FROM.GetAdjective]军队正在逼近[HUN.GetAdjective]边境。虽然[HUN.GetAdjective]方面很快可能会联系我们，但我们应尽早决定是否协助[HUN.GetNameDef]以争取潜在盟友，还是让[FROM.GetNameDef]继续执行其当前计划。"
 MUN_czech.1004.a: "我们应保护我们的利益"
 MUN_czech.1004.b: "我们不应介入此事"
 MUN_czech.1005.t: "[FROM.GetName]索要沿海领土"
 MUN_czech.1005.d: "随着[FROM.GetNameDef]不断扩张，他们派出代表如今要求我们割让一些曾为[FROM.GetAdjective]贵族所拥有的领地。他们称这将赋予其通往亚得里亚海的潜在通道，显然并不在意我们的看法。"
 MUN_czech.1006.t: "[FROM.GetName]提议建立伙伴关系"
 MUN_czech.1006.d: "[FROM.GetNameDef]提议签订一项共同防御条约，以此联合我们两国的军力来震慑潜在敌人。有趣的是，该条约还有一部分秘密内容，涉及[ROOT.GetAdjective]势力可能扩张的计划，以及[FROM.GetNameDef]如何协助我们实现这一目标。"
 MUN_czech.1007.t: "[FROM.GetName]要求结盟"
 MUN_czech.1007.d: "我们与[FROM.GetNameDef]之间自成立以来就缺乏互信，如今他们要求我们站队，否则将面临入侵。然而，[FROM.GetNameDef]也在迎合我们的领土野心，承诺若我们放弃对他们领土的要求，他们将协助我们夺取我们宣称的其他领土。"
 MUN_czech.1007.b: "我们必须维护主权！"
 MUN_czech.1008.t: "[FROM.GetName]建议联合[CZE_invited_country.GetName]"
 MUN_czech.1008.d: "我们通往中欧的桥梁[FROM.GetNameDef]的代表提议邀请[CZE_invited_country.GetName]加入我们的联盟。"
 MUN_czech.1008.a: "进一步威慑试图攻击我们的势力"
 MUN_czech.1008.b: "我们无法保卫整个欧洲"
 MUN_czech.1009.t: "[FROM.GetName]邀请我们加入[CZE.GetFactionName]"
 MUN_czech.1009.d: "[FROM.GetNameDef]的外交官表示，十分欢迎我们加入他们的联盟。然而过去我们对[FROM.GetNameDef]的领土主张曾是双方关系的争议焦点。现在我们必须决定，是继续坚持这些领土宣称，还是专注于建立友好关系。"
 MUN_czech.1009.a: "为我们的新盟友干杯！"
 MUN_czech.1009.b: "在他们承认我们的领土宣称后我们将加入联盟。"
 MUN_czech.1009.c: "我们对此毫无兴趣。"
 MUN_czech.1010.t: "[FROM.GetName]邀请我们领导[CZE.GetFactionName]"
 MUN_czech.1010.d: "在最近尝试将小协约国变成真正的联盟后，[FROM.GetNameDef]提议让我们领导这个新阵营。他们将放弃领导权，由我们担任守护者，这项协议将扩大我们的势力范围，但也可能会让其他国家感受到威胁。"
 MUN_czech.1010.a: "他们将是宝贵的盟友"
 MUN_czech.1010.b: "保护[ROOT.GetNameDef]已经够了"
 MUN_czech.1011.t: "[FROM.GetName]提出保护协议"
 MUN_czech.1011.d: "作为威慑任何对[FROM.GetNameDef]发动侵略的手段，他们的外交官向我们提交了一份共同防御条约草案。作为回报，他们也将为我们提供同等的保护，从而迫使任何进犯者陷入两面作战的困境。"
 MUN_czech.1011.a: "值得冒这个险"
 MUN_czech.1011.b: "保持中立更安全"
 MUN_czech.1012.t: "[FROM.GetName]要求我们臣服"
 MUN_czech.1012.d: "在建立新联盟后信心倍增的[FROM.GetNameDef]提出了一系列要求，这些要求实际上意味着我们将失去主权。考虑到[SOV.GetName]对该地区的兴趣并给予他们支持，我们必须决定是否还有能力拒绝。"
 MUN_czech.1012.a: "抵抗只会浪费[ROOT.GetAdjective]人的生命"
 MUN_czech.1012.b: "宁死不屈！"
 MUN_czech.1013.t: "[FROM.GetName]提议有条件结盟"
 MUN_czech.1013.d: "经过慎重考虑，[FROM.GetNameDef]政府宣布，他们认同结盟的益处，但他们也宣布，他们无法放弃领土的宣称。因此，他们提议：他们将加入我们的阵营，但前提是我们放弃他们宣称的领土。"
 MUN_czech.1013.a: "这个牺牲是值得的"
 MUN_czech.1013.b: "我们结盟就是要保卫领土！"
 MUN_czech.1014.t: "[FROM.GetName]请求保护"
 MUN_czech.1014.d: "来自[FROM.GetNameDef]的高级外交官拜访了外交部长，要求我们落实《1935年捷克斯洛伐克-苏联条约》中措辞模糊的保护承诺。"
 MUN_czech.1014.a: "也许我们应尽力保护我们的盟友"
 MUN_czech.1014.b: "还是继续保持模糊承诺"
 MUN_czech.1015.t: "[FROM.GetName]提议合并我们的派系"
 MUN_czech.1015.d: "如今我们有了共同的敌人，[FROM.GetName]向我们提出深化合作的建议，建议将我们阵营整合进他们的阵营。"
 MUN_czech.1015.a: "通力合作将拯救生命"
 MUN_czech.1015.b: "我们必须掌握主动权"
 MUN_czech.1016.t: "[FROM.GetName]提议互不侵犯条约"
 MUN_czech.1016.d: "在此前因外交方针改变而被中止的谈判基础上，[FROM.GetNameDef]提议继续就互不侵犯条约进行谈判。"
 MUN_czech.1016.a: "少一个需要防御的边境"
 MUN_czech.1016.b: "这会妨碍我们的雄心"
 MUN_czech.1017.t: "联合入侵[GER.GetNameDef]？"
 MUN_czech.1017.d: "[FROM.GetNameDef]向[ROOT.GetAdjective]高层提交了一份秘密计划，内容是入侵[GER.GetNameDef]。他们展示出消灭[GER.GetAdjective]威胁的坚定决心，请求我们提供协助，以联手击溃强大的[GER.GetAdjective]军队。"
 MUN_czech.1017.a: "我们将与他们共同打击[GER.GetNameDef]！"
 MUN_czech.1017.b: "这太危险了"
 MUN_czech.1018.t: "单独对抗[GER.GetNameDef]？"
 MUN_czech.1018.t.2: "联合入侵[GER.GetNameDef]"
 MUN_czech.1018.d: "尽管我们做出了最大的外交努力，但没有任何国家支持先发制人入侵[GER.GetName]。现在的问题是，我们是否要执行我们的攻击计划。"
 MUN_czech.1018.d.FRA_POL: "来自[FRA.GetNameDef]与[POL.GetNameDef]的捷报传来。我们的外交官报告，两国均已承诺协助我们发起对[GER.GetNameDef]的入侵。"
 MUN_czech.1018.d.FRA: "外交官自[FRA.GetNameDef]归来，带回振奋人心的消息：该国愿与我们共同发起对[GER.GetNameDef]的联合入侵。现在，我们必须评估联军的兵力是否足以完成这一任务。"
 MUN_czech.1018.d.POL: "外交官自[POL.GetNameDef]归来，带回振奋人心的消息：该国愿与我们共同发起对[GER.GetNameDef]的联合入侵。现在，我们必须评估联军的兵力是否足以完成这一任务。"
 MUN_czech.1018.a: "倘若真有那么一天，他们也怪不了别人。"
 MUN_czech.1018.b: "事后看来，确实太过冒险。"
 MUN_czech.1019.t: "[FROM.GetName]索要[762.GetName]"
 MUN_czech.1019.d: "以恢复波希米亚旧有边界、巩固其对[72.GetName]的控制为理由，[FROM.GetAdjective]代表向我们提交最后通牒，要求我们割让[762.GetName]。"
 MUN_czech.1019.a: "也许这将确保我们的安全"
 MUN_czech.1020.t: "[FROM.GetName]提议有条件投资"
 MUN_czech.1020.a: "好提议！"
 MUN_czech.1020.b: "这些条款让人无法接受"
 MUN_czech.1020.d: "[FROM.GetNameDef]的外交官抵达，提出了一项协议：他们国家将投资于我们的工业和基础设施，以换取一份资源协定。经历了前些年失败的投资，这一行动旨在改善我们之间的关系。"
 CZE_investment_effects_tt: "§Y100天§!后我们会获得：\n§Y3§!个随机地区的§Y基础设施§!\n§Y1§!个随机地区的§Y民用工厂§!\n"
 MUN_czech.1021.t: "重建奥匈关税同盟？"
 MUN_czech.1021.d: "[CZE.GetNameDefCap]就之前奥匈帝国的贸易协议草案与我们联系。尽管对他们的独立感到满意，但新的[CZE.GetAdjective]政府似乎十分愿意恢复奥匈国家的有利元素。"
 MUN_czech.1021.a: "更多的贸易听起来很有吸引力"
 MUN_czech.1021.b: "我们必须保护国内的生产者"
 MUN_czech.1022.t: "[CZE.GetName]夺取西里西亚"
 MUN_czech.1022.d: "在[69.GetName]山区激烈战斗后，[CZE.GetAdjective]部队突破敌军防线，在敌军恢复战斗能力前便掌控了整个西里西亚。"
 MUN_czech.1022.a: "我们必须干预"
 MUN_czech.1022.b: "我们不能再树敌了"
 MUN_czech.1022.c: "伟大的胜利！"
 MUN_czech.1023.t: "[CZE.GetName]开始争夺西里西亚"
 MUN_czech.1023.d: "[FROM.GetNameDef]援引中世纪王国和帝国的一些奇怪推理，将边境的小规模冲突升级为有限战争，以建立对[ROOT.GetAdjective]西里西亚的控制。"
 MUN_czech.1023.a: "集结部队"
 MUN_czech.1024.t: "[CZE.GetName]提出和平协议"
 MUN_czech.1024.d: "在西里西亚的边境冲突升级为全面战争后，[FROM.GetNameDef]如今表示，只要他们提出的领土要求得到满足，便愿意结束这场战争。"
 MUN_czech.1024.a: "也许我们应将注意力转向其他地区"
 MUN_czech.1024.b: "当前局势对我们仍有利"
 MUN_czech.1024.c: "此事无可谈判！"
 MUN_czech.1025.t: "西班牙志愿军行动的结束"
 MUN_czech.1025.d.1: "[ROOT.GetAdjective]派往[CZE_supported_spanish_faction.GetName]的部队在帮助他们取得胜利后正在返乡。战斗为我们的部队，尤其是他们的医疗支队开拓了视野。"
 MUN_czech.1025.d.2: "尽管[ROOT.GetAdjective]部队在西班牙内战中英勇作战，但我们支持的一方最终还是被击败了。尽管如此，我们的部队，特别是他们的医疗支队还是获得了宝贵的经验。"
 MUN_czech.1025.a: "希望我们不必将这些经验用在自己家里"
 MUN_czech.1026.t: "[FROM.GetName]拒绝提议"
 MUN_czech.1026.a: "这是他们的损失"
 MUN_czech.1026.b: "令人担忧的发展"
 MUN_czech.1026.france_refuses_to_lead: "尽管[FROM.GetAdjective]被提议加入我们的联盟并担任领导角色，他们仍选择拒绝。这似乎表明[FROM.GetAdjective]希望保持中立，或仍在观望局势发展。"
 MUN_czech.1026.sphere_of_influence: "尽管[FROM.GetAdjective]政府成员对我们参与[ROOT.GetFactionName]表示感谢，但他们也指出，我们在巴尔干地区扩大影响力的举动过于激进，可能会吓退潜在的盟友。"
 MUN_czech.1026.guarantee: "我们的外交官回报说，尽管他们付出了努力，[FROM.GetNameDef]还是不同意我们提出的共同防御协议。看来他们认为我们面临的风险要高于他们，但愿他们错了。"
 MUN_czech.1026.faction_merge: "尽管我们尽了最大努力，我们和[FROM.GetAdjective]的外交官还是未能达成一致，签署协议统一[ROOT.GetFactionName]和[FROM.GetFactionName]。"
 MUN_czech.1026.non_aggression: "尽管[FROM.GetAdjective]的外交官向我们保证了他们的和平意向，但却拒绝与我国签署互不侵犯条约，具体原因未明。"
 MUN_czech.1026.trade_deal: "[FROM.GetNameDef]以希望保持经济独立为由，拒绝了我们提出的贸易协定。"
 MUN_czech.1026.faction_invite: "尽管我们的外交官提出了[FROM.GetNameDef]与我们结盟所能带来的种种好处，但最终仍未能成功争取他们的支持。"
 MUN_czech.1026.weapons_sale: "尽管我们提供了极具吸引力的报价，[FROM.GetNameDef]目前仍决定不购买我们的武器。"
 MUN_czech.1026.unification: "尽管他们承认联邦制带来的好处，[FROM.GetNameDef]仍将自己的流亡政府视为其领土的唯一合法政权。"
 MUN_czech.1026.white_peace: "我方代表今日带回令人悲痛的消息：尽管我们已占领[66.GetName]，[FROM.GetAdjective]领导层仍无意签署和平条约。看来我们必须继续推进征服行动，或者寄希望于拖垮对方。"
 MUN_czech.1027.t: "签署[FROM.GetAdjective]-[ROOT.GetAdjective]贸易协议？"
 MUN_czech.1027.d: "尽管双方在意识形态上存在初始分歧，[FROM.GetNameDef]还是向我们提出了务实的贸易协定建议。作为交换，[FROM.GetAdjective]将被允许在[202.GetName]开采资源，而他们则会向我们提供急需的机床，以扩大我们的工业产能。"
 MUN_czech.1027.a: "非常划算的交易"
 MUN_czech.1027.b: "我们应拒绝他们获取这些资源"
 MUN_czech.1028.t: "防御工事延期"
 MUN_czech.1028.d: "国内许多人现在质疑政府为什么没有继续去年年底开始的防御工事项目。政府已通过防御工事委员会为额外的要塞建设工程拨款。由于该工程没有取得进展，有些人要求继续工程，有些人要求退还资金。如果我们确实希望继续建造防御工事，那么就必须立即重启工程，以便按时完工。"
 MUN_czech.1028.a: "我们没有时间了！"
 CZE_no_time_to_lose_tt: "我们在威胁出现前完成防御工事的时间不多了。"
 MUN_czech.1029.t: "防御工事完工"
 MUN_czech.1029.d: "我们最近的防御工事已经完工，可以开始将资源投入另一项工程中。我们的工程师已准备好在接到通知后立即部署到另一地点，开始新防御工事的地基工作。"
 MUN_czech.1029.a: "干得漂亮，先生们"
 MUN_czech.1030.t: "[FROM.GetName]要求整合"
 MUN_czech.1030.d: "[FROM.GetNameDefCap]要求我们加入他们的联盟，因为他们正寻求扩展其联盟影响力。尽管他们对该地区各国诉诸不同理由，如泛斯拉夫主义、泛巴尔干主义，以及与奥匈帝国的共同历史等，这一诉求中却也明显暗含着威胁：如果我们拒绝，后果自负。"
 MUN_czech.1030.a: "也许这也不算太糟"
 MUN_czech.1030.b: "不太令人信服"
 MUN_czech.1031.t: "[FROM.GetName]提议合邦"
 MUN_czech.1031.d: "尽管[ROOT.GetNameDef]已经投降，[FROM.GetAdjective]政府却提出了一个激进的提议：将我们国家的残余部分并入他们国家，从而继续战斗。"
 MUN_czech.1031.a: "团结一心让我们能更好地保卫我们的家园"
 MUN_czech.1031.b: "我们之间的分歧太大了"
 MUN_czech.1032.t: "削除对立"
 CZE_divide_nation_title_dynamic_sudentenland: "在苏台德地区的$MUN_czech.1032.t$"
 CZE_divide_nation_title_dynamic_czech_states: "与捷克工人一道的$MUN_czech.1032.t$"
 CZE_divide_nation_title_dynamic_tesinko_poles: "[72.GetName]的$MUN_czech.1032.t$"
 CZE_divide_nation_title_dynamic_slovakia_states: "[SLO.GetNonIdeologyName]的$MUN_czech.1032.t$"
 CZE_divide_nation_title_dynamic_hungarian_states: "[664.GetName]的$MUN_czech.1032.t$"
 CZE_divide_nation_title_dynamic_ukrainian_states: "[73.GetName]的$MUN_czech.1032.t$"
 MUN_czech.1032.d: "近期解决[FROM.getname]地区问题的努力已成功缓解了民众对中央政府的愤怒，我们政府的资源现在可以腾出来投入其他社会或经济计划，以持续应对那些正在分裂我国的问题。"
 MUN_czech.1032.a: "让我们继续"
 MUN_czech.1033.t: "[FROM.GetAdjective]流亡政府要求承认"
 MUN_czech.1033.d: "$CZE_edvard_benesh$领导的[FROM.GetAdjective]流亡政府要求我们接待他们的代表团，他们正在努力恢复[CZE.GetNonIdeologyName]的主权。"
 MUN_czech.1033.a: "对抗[GER.GetAdjective]的又一个盟友"
 MUN_czech.1033.b: "他们是非法的"
 MUN_czech.1034.t: "斯洛伐克的动荡"
 MUN_czech.1034.d: "由于我们向其他团体的民族主义情绪让步，斯洛伐克人民党成员组建了自己的准军事部队，正在寻求斯洛伐克独立或至少自治。现在的问题是，我们是要阻止此事维持表面上的团结，还是允许此事并专注于忠于政府的土地。"
 MUN_czech.1034.a: "派遣军队进入斯洛伐克！"
 MUN_czech.1034.b: "阻止他们，但授予一些自治权。"
 MUN_czech.1034.c: "直接控制"
 MUN_czech.1034.c_tt: "§R我们将任由[GER.GetNameDef]摆布捷克斯洛伐克的命运。§!"
 MUN_czech.1035.t: "[FROM.GetName]提议为我们制造武器"
 MUN_czech.1035.d: "鉴于我们与[CZE.GetNameDef]的紧密合作关系，他们提出了一项特殊的提议：他们将为我们制造我们国内正在生产的武器，当然，这是有条件的。这反过来将使我们能够专注于产业的其他领域。"
 MUN_czech.1035.a: "这意味着能少些重复性工作"
 MUN_czech.1035.b: "我们不能让军队依赖外国装备"
 #MUN_czech.1036.t: "" #Event uses MUN_czech.1032.t
 MUN_czech.1036.d: "大萧条在经济和政治上对我国都没什么帮助。许多地方上的经济和政治问题困扰着我们，即使我们奇迹般地从大萧条中复苏，这些问题似乎也在恶化。我们需要在这些问题进一步分裂国家之前解决它们。"
 MUN_czech.1036.a: "我们需要拯救我们的国家"
 CZE_divided_nation_event_onbroad_tt: "解锁§Y决议§!，允许我们§Y移除§!核心地区上的负面§Y地区修正§!。\n\n完成这些§Y决议§!也会降低§Y$CZE_a_divided_nation_dynamic_modifier$§!民族精神的负面修正，直至完全§Y移除§!。"
 MUN_czech.1037.t: "[GER.GetName]保护[HUN.GetName]"
 MUN_czech.1037.d: "在察觉我们国内明显正为对[HUN.GetNameDef]发动战争进行正当化活动后，[GER.GetAdjective]代表明确表示，对[HUN.GetAdjective]开战就等同于对[GER.GetNameDef]宣战。现在由我们决定是否继续行动。"
 MUN_czech.1037.a: "我们必须取消计划"
 MUN_czech.1037.b: "这什么也改变不了"
 MUN_czech.1038.t.1: "[FROM.GetName]提议授权坦克设计"
 MUN_czech.1038.t.2: "[FROM.GetName]提议出售枪支"
 MUN_czech.1038.t.3: "[FROM.GetName]提议出售火炮"
 MUN_czech.1038.t.4: "[FROM.GetName]提议出售轻型坦克"
 MUN_czech.1038.t.5: "[FROM.GetName]提议出售战斗机"
 MUN_czech.1038.d: "[FROM.GetAdjective]政府及其武器公司的代表已与我们接洽，提出一项武器销售提议。价格似乎颇为合理，而且[FROM.GetNameDef]还提供了一些非常现代化的武器。"
 MUN_czech.1038.a: "听起来是笔不错的交易"
 MUN_czech.1039.t: "[RUT.getname]要求签署自治协议"
 MUN_czech.1039.d: "鉴于我们已经与[SLO.getname]签署了自治协议，$RUT_augustin_voloshyn$也提出希望其所在地区也能达成类似的联邦化协议。这要求听起来荒谬，但考虑到当前局势，我们必须认真对待这些诉求。"
 MUN_czech.1039.a: "我们拭目以待"
 MUN_czech.1040.t: "[CZE.getname]向我们提议关税同盟条约"
 MUN_czech.1040.d: "[CZE.getnameDEFCAP]最近重新发起了关于两国建立关税同盟的外交谈判。他们正在推动的协议看起来公平，但或许将来还会提出我们难以接受的新要求。这份条约及其中的贸易内容看似象征性意义大于实际影响，因此签署它应无大碍。"
 MUN_czech.1040.a: "似乎没有什么危害"
 MUN_czech.1040.b: "他们不值得信任"
 MUN_czech.1041.t: "[FROM.getname]拒绝签署关税同盟条约"
 MUN_czech.1041.d: "[From.getname]以条约可能扰乱其国内经济为由拒绝签署两国之间的关税同盟条约。这些理由看起来毫无根据，只是借口。"
 MUN_czech.1041.a: "令人失望"
 MUN_czech.1042.t: "[FROM.getname]同意签署关税同盟条约"
 MUN_czech.1042.d: "[FROM.getname]认为条约内容令人满意，并认可了其中的条款。希望这是我们两国建立更紧密关系的第一步。"
 MUN_czech.1042.a: "棒极了"
 MUN_czech.1043.t: "[FROM.getname]要求我们加入他们的联邦"
 MUN_czech.1043.d: "[FROM.getname]指出我们两国关系日益密切以及当前世界局势的变化，表示我们加入他们的联邦将比孤立无援要好得多。这似乎只是他们借口吞并我们领土的手段。我们该如何回应？"
 MUN_czech.1043.a: "我们接受"
 MUN_czech.1043.b: "这是个坏主意"
 MUN_czech.1044.t: "[FROM.getname]拒绝加入联邦"
 MUN_czech.1044.d: "他们认为独立要优于在我们控制下。[FROM.getname]拒绝了加入我们联邦的机会。这打击了我们在欧洲提升地位的目标是。现在[FROM.getname]仍未清醒，我们该怎么办？"
 MUN_czech.1044.a: "真遗憾"
 MUN_czech.1044.b: "我们得尝试别的办法"
 MUN_czech.1045.t: "[FROM.getname]同意加入联邦"
 MUN_czech.1045.d: "他们认为接受我们的保护比单独生存更安全。[FROM.getname]明智地加入了我们的联邦。这将极大地提升我们在欧洲的地位。"
 MUN_czech.1045.a: "棒极了"
 MUN_czech.1046.t: "弥合裂痕"
 MUN_czech.1046.d: "我们已经解决了国内的诸多问题，国家内部的紧张局势似乎正在缓解。在完成多项经济与社会改革项目之后，如今我们的国家似乎正在走向恢复。"
 MUN_czech.1046.a: "喜讯"
 #MUN_czech.1047 is hidden
 MUN_czech.1048.t: "[FROM.GetName]接受要求"
 MUN_czech.1048.t2: "[FROM.GetName]同意提案"
 MUN_czech.1048.d: "[FROM.GetAdjective]官员不情愿地告知我们，他们将满足我们的领土要求。[FROM.GetAdjective]部队已经开始从该地撤离。"
 MUN_czech.1048.d2: "经过长时间讨论，我方官员与[FROM.GetNameDef]官员已成功达成协议，[FROM.GetAdjective]的经济将在我们的联盟中扮演新角色。这一安排必将为两国人民带来繁荣。"
 MUN_czech.1048.d3: "我们提出的互不侵犯条约提案立即得到了[FROM.GetAdjective]代表的热烈响应，看来他们的野心目前集中在别处。"
 MUN_czech.1048.d4: "面对严峻威胁，[FROM.GetNameDef]已屈从于我方的结盟要求。"
 MUN_czech.1048.d5: "经过长时间的讨论，我方官员与[FROM.GetNameDef]的代表已成功达成协议：我们的部分军事工业将为他们生产装备。作为回报，我们将获得用于市场与生产的贸易物资。"
 #MUN_czech.1049 is a faction joining event so largely reuses generic loc
 MUN_czech.1049.d: "[FROM.GetNameDef]的新政府向我们提出结盟建议。尽管他们的新军事政府起初持反德立场，但他们似乎已采取务实态度，意识到他们曾经的国际伙伴不再可靠。"
 MUN_czech.1050.d: "我们的外交官从[FROM.GetNameDef]返回，带来了令人失望的消息：他们拒绝了我们加入其联盟的请求。虽然理由尚不明确，但我们现在陷入了一个两难的境地——我们暴露了对老盟友的担忧，却未能争取到新的依靠。"
 MUN_czech.1050.a: "也许我们应该提出更有吸引力的条件"
 MUN_czech.1050.b: "我们该寻找更好的盟友"
 MUN_czech.1051.t: "[FROM.GetName]请求划定势力范围"
 MUN_czech.1051.d: "我们的新盟友[FROM.GetNameDef]表示希望扩展其边界之外的影响力。[FROM.GetAdjective]代表因此前来寻求对扩张行为的支持，并希望明确划定[ROOT.GetAdjective]与[FROM.GetAdjective]势力范围的边界。"
 MUN_czech.1051.a: "我们应当加强与关键盟友[FROM.GetAdjective]的关系"
 MUN_czech.1052.t: "[FROM.GetName]请求[SOV.GetAdjective]部队的通行权"
 MUN_czech.1052.d: "在[FROM.GetNameDef]与[SOV.GetNameDef]达成新的外交协议后，[FROM.GetNameDef]确信如果爆发冲突，[SOV.GetNameDef]将对其提供保护。唯一的障碍是两国之间没有陆地连接，因此，[FROM.GetAdjective]外交官已与我国政府接触，请求我们允许在冲突实际发生时，[SOV.GetAdjective]军队可经我方领土前往[FROM.GetNameDef]。"
 MUN_czech.1052.a: "他们的战斗也将保护我们"
 MUN_czech.1053.t: "[FROM.GetName]以[HUN.GetAdjective]领土要求向我们施压"
 MUN_czech.1053.d: "在将[HUN.GetNameDef]变为附庸国后，[FROM.GetNameDef]现正要求我们接受同样的命运。他们威胁称，如果我们拒绝，他们将支持[HUN.GetAdjective]对[ROM.GetAdjective]领土的主权要求。现在我们必须在丧失主权或可能损害领土完整之间做出选择。"
 CZE_cancel_anti_hungary_focus_tt: "取消国策§Y$CZE_neutralize_the_hungarian_threat$§!"
 MUN_czech.1054.t: "联合入侵[LIT.GetName]？"
 MUN_czech.1054.d: "按照先前达成的协议，[FROM.GetNameDef]提出了一个有助于增强我国实力的建议。具体来说，就是通过武力与[LIT.GetNameDef]合并，这将使我们能够获得更多资源，并阻止敌人通过[LIT.GetNameDef]对我们发起攻击。"
 MUN_czech.1054.a: "我们必须扩张以抵御他国的扩张。"
 MUN_czech.1055.t: "[SOV.GetAdjective]志愿军抵达"
 MUN_czech.1055.d: "在一场前所未有的空运后勤行动中，[SOV.GetNameDef]动用其空军，将数个志愿师部署至我方位于[73.GetName]的机场，以支援我们当前的战争努力。"
 MUN_czech.1056.t: "[FROM.GetName]要求[975.GetName]"
 MUN_czech.1056.d: "正如第一次世界大战后的巴黎和会上曾提议的那样，[CZE.GetNameDef]宣称建立一条通往其盟友[YUG.GetNameDef]的走廊对于其联盟安全至关重要。为实现这一目标，[FROM.GetAdjective]代表已发出最后通牒，要求我们割让[975.GetName]。"
 #THE FALL OF THE REPUBLIC EVENTS#
 MUN_the_fall_of_the_republic.1.t: "大范围抗议"
 MUN_the_fall_of_the_republic.1.d: "[ROOT.GetLeader]近期决定放弃苏台德地区，导致全国爆发抗议活动。尽管军政领导层希望避免流血冲突，不想面对不可能的困难进行毫无意义的抵抗，但全国各地的许多民众认为他们做出了错误的决定。一些政治运动现在正在利用这次动乱来推进自己的目标。"
 MUN_the_fall_of_the_republic.1.a: "我们别无选择！"
 MUN_the_fall_of_the_republic.2.t.1: "第一共和国的垮台"
 MUN_the_fall_of_the_republic.2.t.2: "政府内部混乱"
 MUN_the_fall_of_the_republic.2.d: "在政府选择放弃苏台德地区后，军队和政府的中下级领导的辞职信如雪片般飞来。据报道，其中一些人连夜逃离了我国。我们的政府需要进行重大改革，以阻止官员离职，并恢复人们对我们领导能力的信心。"
 MUN_the_fall_of_the_republic.2.a: "我们需要激进的改革。"
 MUN_the_fall_of_the_republic.2.b: "我们必须坚持到底！"
 MUN_the_fall_of_the_republic.3.t: "[RUT.getname]请求自治"
 MUN_the_fall_of_the_republic.3.d: "随着最近我国发生的政治混乱，喀尔巴阡乌克兰希望从[9.GetCapitalVictoryPointName]获得更大的自治权。他们列举了该地区与[ROOT.getname]其他地区间长期存在的差异。然而，这一要求似乎是当地领导人在抓住机会夺取权力。考虑到我们目前没有多余的政治资本，拒绝这一要求代价高昂。"
 MUN_the_fall_of_the_republic.3.a: "当然，为什么不呢？"
 MUN_the_fall_of_the_republic.3.b: "绝对不行！"
 MUN_the_fall_of_the_republic.3.c: "让他们自生自灭。"
 MUN_the_fall_of_the_republic.4.t: "[RUT.getname]的命运"
 MUN_the_fall_of_the_republic.4.d: "近期[CZE.getname]爆发混乱后，[RUT.getname]宣告独立，并且正在与邻国进行外交接触。我们政府内部的许多人担心边境上如此重要的战略要地会落入别国之手。军队建议立即向分裂地区发出最后通牒，要求他们归顺。"
 MUN_the_fall_of_the_republic.4.a: "立即发送最后通牒！"
 MUN_the_fall_of_the_republic.4.b: "这太冒险了，先按兵不动"
 MUN_the_fall_of_the_republic.5.t: "[FROM.getname]要求合并！"
 MUN_the_fall_of_the_republic.5.d: "在我们独立后，邻国寻求将我们纳入他们的领土只是时间问题。[FROM.getname]似乎是第一个这么做的国家，并且已经要求我们投降。我们该怎么办？"
 MUN_the_fall_of_the_republic.5.a: "我们会战至最后一人！"
 MUN_the_fall_of_the_republic.5.b: "我们别无选择只能同意"
 MUN_the_fall_of_the_republic.6.t: "[FROM.getname]拒绝了我们的最后通牒！"
 MUN_the_fall_of_the_republic.6.d: "令人惊讶的是，[FROM.getname]拒绝了我们的最后通牒，反而试图以武力对抗我们。他们让我们别无选择只能入侵。作战计划和进攻路线已经制定好，我们只需要下达进攻命令。"
 MUN_the_fall_of_the_republic.6.a: "我们警告过他们"
 MUN_the_fall_of_the_republic.6.a_tt: "此行动不会影响§Y$HUN_pal_teleki$§!，除非[RUT.GetNameDef]拥有盟友"
 MUN_the_fall_of_the_republic.6.b: "这可能会适得其反，最好先缓一缓"
 MUN_the_fall_of_the_republic.7.t: "[FROM.getname]向我国妥协"
 MUN_the_fall_of_the_republic.7.d: "[FROM.getname]接受了我们的要求，愿意以一些微不足道的条件被并入我们国家，没有人对此感到意外。这个小地方完全无法抵抗像我们这样强大的国家。我们的北方边界现在比以前更加漫长，政府对于如此轻松取得胜利非常满意。"
 MUN_the_fall_of_the_republic.7.a: "好消息"
 #BOP EVENTS#
 MUN_czech_bop.1.t: "军队就绪"
 MUN_czech_bop.1.d: "这十年前半段的改革努力开始初见成效。目前，我国军队已是欧洲最现代化的军队之一。然而，一些政客和众多工业集团领导人却开始滋生自满情绪。如果要使我国军队保持最佳战备状态，我们必须消除外界对我国军队作战能力的疑虑，并打击那些为谋取私利而企图削弱军队的人。"
 MUN_czech_bop.1.a: "我们会做好准备。"
 MUN_czech_bop.2.t.1: "德国军备重整的威胁"
 MUN_czech_bop.2.t.2: "邻国军事扩张"
 MUN_czech_bop.2.d.1: "[GER.getnameDEFcap]近期在莱茵兰的再武装吓坏了我们的一些军事和政治领导人。尽管许多人对国家建立的联盟以及军队目前为应对德国威胁所做的准备充满信心。但有些人并不相信我们能够抵御[GER.GetAdjective]的威胁。"
 MUN_czech_bop.2.d.2: "最近有消息称，我们的一些邻国已开始大幅扩军，我们的部分军事和政治领导人对此十分担心。尽管许多人对国家与其他国家组建的联盟，以及军队目前为应对外国威胁所做的准备充满信心。然而，有些人并不相信我们能够抵御外国的侵略。"
 MUN_czech_bop.2.a: "我们会准备好的"
 MUN_czech_bop.2.a_tt: "邻国的军备重整已使我军内部部分人员对我们抵御潜在侵略的能力产生怀疑。我们必须以实际行动重振军心。"
 MUN_czech_bop.3.t: "[CZE.getname]向我国派遣观察员"
 MUN_czech_bop.3.d: "[CZE.getname]近期向我国派遣了观察员观察持续中的冲突。与此同时，他们的一家武器制造商通过秘密渠道与我们的外交官联系，询问我们是否有兴趣购买他们的轻武器。由于国际联盟对我们的制裁，这将涉及到向我国走私武器。"
 MUN_czech_bop.3.a: "让我们看看局势如何发展"
 MUN_czech_bop.3.b: "我们不能让他们越过观察的界限。"
 MUN_czech_bop_3_tt: "§Y[CZE.getname]§!武器制造商§Y$CZE_zbrojovka_brno_organization$§!可以尝试向我们走私军火。"
 MUN_czech_bop.4.t: "$CZE_zbrojovka_brno_organization$的计划"
 MUN_czech_bop.4.d: "[ETH.getname]联系上了$CZE_zbrojovka_brno_organization$的代表，希望走私我国武器进入该国。尽管国际联盟对[ETH.GetNameDef]实施了制裁，$CZE_zbrojovka_brno_organization$仍愿意接受这一计划。如果我们被发现，违反国际联盟的命令将让我们在国际上名声扫地。"
 MUN_czech_bop.4.a: "干吧"
 MUN_czech_bop.4.b: "这不值得冒险"
 CZE_gun_smuggling_tt: "走私武器进入国家"
 CZE_we_got_caught_tt: "§Y$CZE_zbrojovka_brno_organization$§!被发现了。"
 CZE_we_dont_get_caught_tt: "§Y$CZE_zbrojovka_brno_organization$§!未被发现。"
 MUN_czech_bop.5.t: "$CZE_zbrojovka_brno_organization$同意走私计划"
 MUN_czech_bop.5.d: "在与捷克政府代表商讨后，$CZE_zbrojovka_brno_organization$获得秘密许可，开始向我国走私少量轻武器。他们的专业知识也将通过秘密渠道为我们所用。"
 MUN_czech_bop.5.a: "我们会好好利用"
 MUN_czech_bop_5_tt: "该§Y制造商§!会在战争结束后§R移除§!。"
 ##SLOVAKIA##
 MUN_slovakia_little_war.1.t: "[71.Getname]大捷"
 MUN_slovakia_little_war.1.d: "我军在[71.Getname]击败敌军，表现出色。指挥官们从战斗中汲取了宝贵的经验。"
 MUN_slovakia_little_war.1.a: "干得漂亮"
 MUN_slovakia_little_war.2.t: "在[71.Getname]的失败"
 MUN_slovakia_little_war.2.d: "尽管我们全力以赴，我军仍在[71.Getname]败北。弹药和摩托化装备未能及时供应，是此次失利的关键原因。不过，指挥官们从这场战斗中吸取了宝贵教训。"
 MUN_slovakia_little_war.2.a: "表现令人失望。"
 MUN_slovakia_little_war.3.t: "[71.Getname]边境冲突"
 MUN_slovakia_little_war.3.d: "即便他们已在$GER_first_vienna_award$获得领土，[HUN.getnamedef]仍在[71.getname]继续寻求进一步的边界调整。对此，我们必须以武力应对，表明我们绝不轻易让步，更不会割让国土。"
 MUN_slovakia_little_war.3.a: "他们简直放肆！"
 MUN_slovakia_little_war.4.t: "[71.Getname]困局"
 MUN_slovakia_little_war.4.d: "尽管我们全力以赴，我军仍在[71.Getname]败北。弹药和摩托化装备未能及时供应，是此次失利的关键原因。不过，指挥官们从这场战斗中吸取了宝贵教训。"
 MUN_slovakia_little_war.4.a: "令人失望。"
 ##Exile##
 MUN_czech_exile.1.t: "[CZE.GetAdjective]流亡者抵达[ROOT.GetNameDef]"
 MUN_czech_exile.1.d: "慕尼黑会议后，[GER.GetNameDef]解散了[CZE.GetAdjective]，他们的流亡者已经抵达包括我们在内的许多国家。他们愿意拿起武器帮助我们，希望有朝一日能借助我们的力量解放自己的祖国。"
 MUN_czech_exile.1.a: "欢迎"
 ##NEWS EVENTS##
 MUN_czech.news.1.t: "苏台德危机"
 MUN_czech.news.1.desc: "苏台德地区的人们已经开始武装反抗[CZE.getnameDef]。有报道称，苏台德地区的准军事组织已经开始袭击整个地区的警察局和政府大楼。[FROM.getname]试图吞并该地区的消息就是这场叛乱的缘由。\n\n这些叛乱似乎是[FROM.getname]和[CZE.GetNameDef]之间更大冲突的前奏。而这场冲突看起来已不可避免。"
 MUN_czech.news.1.a: "这对欧洲来说并不是个好兆头"
 MUN_czech.news.1.b: "混乱是阶梯"
 MUN_czech.news.1.c: "我们能赢！"
 MUN_czech.news.1.d: "希望能在外交上取得胜利"
 MUN_czech.news.2.t: "[FROM.GetNameDefCap]入侵[RUT.GetNameDef]"
 MUN_czech.news.2.desc: "\n[CZE.getname]的政治混乱导致了一系列的事件，[RUT.getname]就此脱离并宣告独立，开始组建民兵试图保卫其新获得的国家地位。\n\n[FROM.getnamedefcap]一直以来都觊觎该地区，并瞅准计划迅速入侵了这个小国。他们对[RUT.getname]的胜利在许多观察员看来是注定的结果。"
 MUN_czech.news.2.a: "喀尔巴阡啥？"
 MUN_czech.news.2.b: "这会很容易。"
 MUN_czech.news.2.c: "有胆量就过来！"
 MUN_slovakia.news.1.t: "在[71.Getname]的边境冲突"
 MUN_slovakia.news.1.desc: "尽管在$GER_first_vienna_award$后收复了[664.Getname]，[HUN.getnamedef]仍希望在[71.Getname]与[SLO.getnamedef]进一步调整边界。\n\n此冲突似乎是[HUN.getnamedef]借机测试军力的借口，而[SLO.getnamedef]这支年轻的军队恐怕还没准备好迎接挑战。"
 MUN_slovakia.news.1.a: "一群吵吵嚷嚷的小鬼。"
 MUN_slovakia.news.1.b: "我们已做好万全准备。"
