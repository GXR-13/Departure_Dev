 ### INS - Political Events
 INS_political_events.1.t: "[INS.GetNameDef]新任总督"
 INS_political_events.1.desc: "[INS.GetLeader]的五年任期即将结束，因此我们必须决定一位合适的领导人来接替他的位置。威廉明娜女王推荐了阿利迪厄斯·恰尔达·范·斯塔尔肯博赫·斯塔豪韦尔，他作为特命大使和全权公使表现出了巨大的潜力。"
 INS_political_events.1.a: "如女王所愿"
 INS_political_events.1.b: "[INS.GetLeader]干得不错，应该再给他一个任期"
 INS_political_events.2.t: "[FROM.GetName]索取[721.GetName]"
 INS_political_events.2.desc: "前东印度群岛的新共和国政府宣布其对整个群岛的法理权。[FROM.GetLeader]已正式要求我们放弃[721.GetName]，并威胁在拒绝后将采取军事行动。"
 INS_political_events.2.a: "好吧，不值得引起摩擦"
 INS_political_events.2.b: "决不可能！"
 INS_political_events.3.t: "[FROM.GetName]同意放弃[721.GetName]"
 INS_political_events.3.desc: "正如我们所料，[FROM.GetLeader]同意了我们的要求，开始将军队撤出[721.GetName]。人民安全军已协同数位政府特使进入该地区。[INS.GetLeader]亲自在帝力发表演讲，宣布摆脱殖民影响。"
 INS_political_events.3.a: "太棒了！"
 INS_political_events.4.t: "[FROM.GetName]拒绝放弃[721.GetName]"
 INS_political_events.4.desc: "与[FROM.GetName]的谈判并不顺利。[FROM.GetLeader]出于某种原因拒绝放弃[721.GetName]，提前结束了会谈。"
 INS_political_events.4.a: "那就开战吧"
 INS_political_events.5.t: "印度尼西亚大选"
 INS_political_events.5.desc: "今天对印度尼西亚来说是一个历史性的里程碑。随着革命的正式结束，总理[INS.GetLeader]宣布印度尼西亚将举行第一次自由民主的选举。这次选举的结果将对印度尼西亚产生持久的影响。"
 INS_political_events.5.a: "苏丹·沙里尔带领国家走到这一步，他将领导我们继续前进！"
 INS_political_events.5.b: "阿米尔·谢里夫丁是社会主义者和民族主义者的折中方案"
 INS_political_events.5.c: "穆罕默德·哈达发起了革命，也将由他来完成。"
 INS_political_events.6.t: "我们的准备得到了回报"
 INS_political_events.6.desc: "随着革命的进行，我们渗透到东印度政府的游击队已不再需要秘密行动，并将在荷兰有时间做出反应之前开始执行破坏任务。"
 INS_political_events.6.a: "我们必须继续迅速行动"
 INS_political_events.7.t: "苏塔尔乔请愿"
 INS_political_events.7.desc: "苏塔尔乔组织人民议会请愿，要求荷兰和印度尼西亚代表举行圆桌会议，讨论印度尼西亚自治的愿景，请愿书已递交总督裁决。尽管许多顾问坚持维持现状，要求否决请愿书，但不可否认的是，民族主义运动只会愈发强大和激进。如果我们继续拒绝每一项和平的自治请求，民族主义者可能会开始尝试更暴力的替代方案。"
 INS_political_events.7.a: "我们必须开始谈判，以避免不可避免的内战"
 INS_political_events.7.b: "必须维持现状"
 INS_political_events.7.c: "也许民族主义者有点道理？"
 INS_political_events.8.t: "[?event_target:INS_invasion_event_invader.GetAdjective]即将占领"
 INS_political_events.8.desc: "[?event_target:INS_invasion_event_invader.GetName]的士兵抵达了[?event_target:INS_invasion_event_invaded_state.GetName]，我们在该地区的士兵人数远不如对手，已被下令全面撤出[?event_target:INS_invasion_event_invaded_state.GetName]。[?event_target:INS_invasion_event_invader.GetAdjective]军队继续在东印度群岛推进，我们避免占领的希望渺茫。"
 INS_political_events.8.a: "我们将逮捕民族主义者，保卫我们的家园，直到死亡！"
 INS_political_events.9.t: "印度尼西亚宣布独立"
 INS_political_events.9.desc: "[JAP.GetNameDef]已开始从东印度群岛撤军，我们向巴达维亚派遣了士兵，以重建殖民政府。然而，我们的士兵发现，自占领以来，东印度群岛的政治格局发生了重大变化。在我们的军队抵达巴达维亚之前，[INS.GetLeader]已经签署了一份独立宣言，宣告了印度尼西亚共和国的独立，并得到了公众惊人的支持。"
 INS_political_events.9.a: "出动坦克！"
 INS_political_events.9.b: "没希望了，我们不需要更多战斗。我们应该专注于重建家园"
 INS_political_events.11.t: "[HOL.GetNameDefCap]承认印度尼西亚主权"
 INS_political_events.11.desc: "宣布独立后，我们的民兵立即采取行动，准备应对预期中的荷兰入侵。然而，令许多人惊讶的是，[HOL.GetLeader]宣布他不会发动入侵，而是要优先重建荷兰家园，并避免进一步的冲突。"
 INS_political_events.11.a: "真令人意外，但也是个惊喜"
 INS_political_events.12.t: "与印度尼西亚民族主义者会谈"
 INS_political_events.12.desc: "我们的部队已在[?event_target:INS_invasion_event_invaded_state.GetName]登陆，印尼战线的胜利即将到来。我们需要决定如何占领印度尼西亚。虽然直接占领可以为我们提供所需的资源，但代价和难度极高。我们与革命领袖苏加诺进行了谈判，并制定了一项计划，建立一个印尼傀儡国家，官方上由苏加诺领导，但听从我们的指示。这能让印尼公民保持冷静，而且比完全占领要廉价得多。"
 INS_political_events.12.a: "我们应该继续与苏加诺谈判"
 INS_political_events.12.b: "我们对与革命者合作不感兴趣"
 INS_political_events.13.t: "[?event_target:INS_invasion_event_invader.GetAdjective]即将占领"
 INS_political_events.13.desc: "[?event_target:INS_invasion_event_invader.GetName]的士兵抵达了[?event_target:INS_invasion_event_invaded_state.GetName]，我们在该地区的士兵人数远不如对手，已被下令全面撤出[?event_target:INS_invasion_event_invaded_state.GetName]。[?event_target:INS_invasion_event_invader.GetAdjective]军队继续在东印度群岛推进，我们避免占领的希望渺茫。另外，我们的间谍报告，称[?event_target:INS_invasion_event_invader.GetLeader]正在与苏加诺和其他民族主义领导人谈判，旨在在共荣圈下建立一个由苏加诺领导的印尼傀儡国家。"
 INS_political_events.13.a: "我们将逮捕民族主义者，保卫我们的家园，直到死亡！"
 INS_political_events.13.b: "这很危险，但也许这是独立的真正机会？"
 INS_peta_explain_tt: "如果[JAP.GetName]被击退，我们就能利用占领的混乱宣布完全独立。"
 INS_peta_explain_tt_jap: "§R[INS.GetName]或许仍对我们保持忠诚，但一旦我们开始失去领土控制，他们可能会看穿我们的虚张声势，宣布独立§!。"
 INS_political_events.14.t: "民族主义者领袖被捕"
 INS_political_events.14.desc: "在我们建立傀儡政权以前，苏加诺和其他几名印尼革命者高层已被荷兰军事警察逮捕。"
 INS_political_events.14.a: "可惜，他是个有价值的盟友"
 INS_political_events.15.t: "乡土防卫义勇军"
 INS_political_events.15.desc: "与苏加诺的谈判已经结束，印度尼西亚傀儡政权正在建立中。苏加诺利用他的关系以及我们的军事存在破坏了荷兰政府的稳定，并建立了对群岛的事实控制。"
 INS_political_events.15.a: "我们不仅获得了廉价的资源，还获得了宝贵的盟友"
 INS_political_events.16.t: "[?event_target:INS_invasion_event_invader.GetAdjective]占领东印度"
 INS_political_events.16.desc: "东印度的[?event_target:INS_invasion_event_invader.GetAdjective]军队与印度尼西亚民族主义者合作，动摇了我们的殖民政府的稳定，并完全占领了东印度。荷兰国旗已经降下，印度尼西亚国旗升起，东印度群岛的原住民似乎正在拥抱[?event_target:INS_invasion_event_invader.GetAdjective]占领者。这对我们的殖民帝国来说可不是好消息。"
 INS_political_events.16.a: "他们赢得了战役，但还未赢得战争"
 INS_political_events.17.t: "[INS.GetName]宣布独立"
 INS_political_events.17.desc: "消息已从巴达维亚传至帝国大本营。由我们一手扶植起来、以天皇之名治理这些岛屿的苏加诺及其集团，因应我们接二连三的领土丧失，宣布成立了[FROM.GetAdjective]共和国。他们认定我们战线拉得太长，已无力回天。"
 INS_political_events.17.a: "不幸的是，他们也许是对的"
 INS_political_events.18.t: "陈马六甲返回印度尼西亚"
 INS_political_events.18.desc: "印度尼西亚共产主义者陈马六甲，这些年来一直是我国政府信赖的顾问，现已宣布即刻离去。随着[INS.GetNameDef]如今成为一个自由的共和国，他终于打算回到那个二十多年前以逃亡者身份踏足过的祖国。他感谢我们给予他的庇护和继续工作的自由，并仅告知此刻他的位置在故乡。"
 INS_political_events.18.a: "祝他好运"
 INS_political_events.19.t: "[HOL.GetName]召回海军将领赫尔弗里赫"
 INS_political_events.19.desc: "消息已传到[1058.GetName]，海军司令、我们在这些水域最有能力的军官康拉德·赫尔弗里赫海军上将已被召回国。海牙方面称本土有紧迫需要，几乎没有做进一步解释。他的离去让这片群岛在局势远未稳固之时防卫薄弱，据说泗水的军官室中弥漫着不满的气氛。"
 INS_political_events.19.a: "舰队灰暗的一天"
 ### INS - Industrial Events
 INS_industrial_events.4.t: "[FROM.FROM.GetName]的预算再分配"
 INS_industrial_events.4.desc: "通过关闭[FROM.FROM.GetName]的橡胶种植园，我们为该地区的新工业项目腾出了预算空间。"
 INS_industrial_events.4.a: "我们会在[FROM.FROM.GetName]建立油井"
 INS_industrial_events.4.b: "我们应该在[FROM.FROM.GetName]开设电解铝厂"
 INS_industrial_events.4.c: "我们应该勘测缺乏生产的资源"
 INS_industrial_events.4.d: "我们可以在[FROM.FROM.GetName]开设煤矿"
 INS_industrial_events.5.t: "[INS_industrial_events_5_t_scripted]"
 INS_industrial_events_5_t_colonial: "爪哇银行的命运"
 INS_industrial_events_5_t_independent: "印度尼西亚银行的命运"
 INS_industrial_events.5.desc: "[INS_industrial_events_5_desc_scripted]"
 INS_industrial_events_5_desc_colonial: "爪哇银行的储备已降至十年来的最低点。荷兰盾使用额每月都在减少，种植园主要求以外币支付。我们的财务顾问一致认为，仅靠银行无法扭转这种下滑趋势，但他们在补救措施上存在严重分歧。"
 INS_industrial_events_5_desc_independent: "印度尼西亚银行报告称，仅在上一季度，卢比就贬值了近五分之一。泗水的大米商人已开始完全拒收卢比，转而使用外币。我们的财政部长坚称，只有果断而迅速采取行动，才能拯救货币。"
 INS_industrial_events.5.a: "我们应该尝试加强盾币，而非取代它"
 INS_industrial_events.5.b: "我们将把东印度盾与荷兰盾挂钩"
 INS_industrial_events.5.c: "我们将把东印度盾与美元挂钩"
 INS_industrial_events.6.t: "更有利可图的协议"
 INS_industrial_events.6.desc: "金鸡纳局已经接受了我们的条件。由于疟疾在一半热带地区肆虐，而奎宁的替代品难以找到，他们别无选择。新协议确保了我们能从出口的每一克奎宁中获得更大份额的利润。现在的问题是该将这笔意外之财用于何处。"
 INS_industrial_events.6.a: "投资城市"
 INS_industrial_events.6.b: "开发外部岛屿"
 INS_industrial_events.6.c: "加强军工业"
 # Rubber shipment dispatched
 INS_industrial_events.28.t: "橡胶已发货"
 INS_industrial_events.28.desc: "船队已经装载了最后一批橡胶并启航。我们的买家将得到他们所支付的货物，我方账目也将如期收到约定的补偿。未来两年，这笔交易的成本将一直留在我们的资产负债表上，时刻提醒我们大萧条所迫使我们付出的代价。"
 INS_industrial_events.28.a: "已知悉"
 INS_industrial_events.28.b: "安排另一批货物"
 # Oil shipment dispatched
 INS_industrial_events.36.t: "石油已发货"
 INS_industrial_events.36.desc: "油轮已驶离我们的炼油厂，全速驶向买方的港口。补偿方案已经达成并将全额收到，但这次出售的负担将在未来两年压制我国经济。在这萧条的岁月里，世界留给我们的条件就是这般残酷。"
 INS_industrial_events.36.a: "已知悉"
 INS_industrial_events.36.b: "安排另一批货物"
 ### INS - Volksraad
 INS_volksraad_events.2.t: "[HOL.GetLeader]否决人民议会请愿"
 INS_volksraad_events.2.desc: "虽然[INS.GetLeader]批准了请愿书，但[HOL.GetLeader]在复审后予以了否决。因此，我们目前无法继续落实。"
 INS_volksraad_events.2.a: "也许我们可以在未来再次尝试通过请愿"
 # Generic/Reused
 INS_volksraad_events.10.t: "人民议会动议允许学校使用印尼语"
 INS_volksraad_events.10.desc: "[INS.GetLeader]批准了人民议会的请愿，同意在[INS.GetNameDef]建立印尼语学校和大学，并递交[HOL.GetLeader]等待最终批准。"
 INS_volksraad_events.10.a: "人民议会派上用场了"
 INS_volksraad_events.10.b: "绝对不行。否决！"
 INS_volksraad_events.11.t: "将建立印尼语教育"
 INS_volksraad_events.11.desc: "[HOL.GetLeader]批准并正式授权了请愿。一旦最终细节确定，很快请愿就会落实。"
 INS_volksraad_events.11.a: "人民议会派上用场了"
 # Individual laws
 INS_volksraad_events.20.t: "人民议会动议允许政府使用印尼语"
 INS_volksraad_events.20.desc: "东印度政府内，包括人民议会，都需要精通荷兰语，这导致人民议会的许多成员，特别是原住民社区的代表，质疑其民主的有效性。他们提出了一项动议，坚持认为政府职位应尽可能由讲印尼语的人担任。"
 INS_volksraad_events.21.t: "允许政府使用印尼语！"
 INS_volksraad_events.21.desc: "[HOL.GetLeader]批准并正式授权了请愿。一旦最终细节确定，很快请愿就会落实。"
 INS_volksraad_events.30.t: "人民议会动议废除教育配额制度"
 INS_volksraad_events.30.desc: "[INS.GetLeader]同意了人民议会废除[INS.GetNameDef]教育配额制度的请愿，以终结人民议会内部对其执行和公平性的长期争论。请愿书已递交[HOL.GetLeader]等待最终批准。"
 INS_volksraad_events.31.t: "教育配额制度已被废除"
 INS_volksraad_events.31.desc: "[HOL.GetLeader]批准并正式授权了请愿。一旦最终细节确定，很快请愿就会落实。"
 INS_volksraad_events.40.t: "人民议会动议降低橡胶出口税"
 INS_volksraad_events.40.desc: "[INS.GetLeader]批准了人民议会的请愿，同意降低对私有橡胶种植园征收的高额赋税。历史上，此类赋税建立的橡胶垄断赋予了政府丰厚的利润，然而，国际保护主义使得这一制度无利可图。[INS.GetLeader]认为这一税种带来的利益已无法弥补造成的经济恶果。"
 INS_volksraad_events.40.a: "[INS.GetLeader]说得对啊"
 INS_volksraad_events.40.b: "必须保留这一赋税"
 INS_volksraad_events.41.t: "对私人橡胶出口的赋税降低"
 INS_volksraad_events.41.desc: "[HOL.GetLeader]批准并正式授权了请愿。一旦最终细节确定，很快请愿就会落实。"
 INS_volksraad_events.60.t: "人民议会动议取消印尼军官不成文的军衔限制"
 INS_volksraad_events.60.desc: "[INS.GetLeader]批准了人民议会的请愿，同意取消不成文的非荷兰裔荷兰皇家东印度陆军军官的军衔限制，并晋升本已符合晋升条件的印尼军官。请愿书已递交[HOL.GetLeader]等待最终批准。"
 INS_volksraad_events.61.t: "[INS.GetAdjective]军官的无形军衔限制取消"
 INS_volksraad_events.61.desc: "[HOL.GetLeader]批准并正式授权了请愿。一旦最终细节确定，很快请愿就会落实。"
 INS_volksraad_events.70.t: "人民议会动议合法化公开展示民族主义旗帜和图像的行为"
 INS_volksraad_events.70.desc: "[INS.GetLeader]已批准人民议会关于解除在[INS.GetNameDef]公共场所展示民族主义旗帜和图像限制的请愿，这主要是为了减少许多年轻民族主义者的激进倾向。[INS.GetLeader]坚称我们应在此问题上采取防御姿态，与和平的民族主义领袖合作，同时扶持我们自己的革命运动，但最终决定权在我们手中。"
 INS_volksraad_events.71.t: "红白旗的展示不再违法！"
 INS_volksraad_events.71.desc: "[HOL.GetLeader]批准并正式授权了请愿。一旦最终细节确定，很快请愿就会落实。"
 INS_volksraad_events.100.t: "人民议会动议允许非荷兰居民享受教育补贴"
 INS_volksraad_events.100.desc: "[INS.GetLeader]已批准人民议会关于允许[INS.GetNameDef]的非荷兰居民申请教育补贴的请愿。该请愿已送交[HOL.GetLeader]作最终批准。"
 INS_volksraad_events.101.t: "[INS.GetAdjective]居民现在可以申请教育补贴"
 INS_volksraad_events.101.desc: "[HOL.GetLeader]批准并正式授权了请愿。一旦最终细节确定，很快请愿就会落实。"
 ### INS - Dutch Interaction Events
 INS_dutch_events.1.t: "[INS.GetNameDefCap]索要海军指挥权"
 INS_dutch_events.1.desc: "本土沦陷后，[INS.GetNameDef]请求我们将海军指挥权移交[INS.GetNameDef]。他们认为，在这个前所未有的时期，统一指挥将有助于更好的协调。"
 INS_dutch_events.1.a: "为了更大的利益，我们只能让步"
 INS_dutch_events.1.b: "我们的船舰只对海牙负责"
 INS_dutch_events.2.t: "[HOL.GetNameDefCap]同意移交海军指挥权"
 INS_dutch_events.2.desc: "[HOL.GetNameDefCap]已接受我方提议，允许我方接管联合海军部队的指挥权。交接工作进展顺利，[HOL.GetAdjective]与[INS.GetAdjective]军官正并肩作战，以加强我们在太平洋地区的地位。"
 INS_dutch_events.2.a: "我们将一起守住太平洋"
 INS_dutch_events.3.t: "[HOL.GetNameDefCap]拒绝移交海军指挥权"
 INS_dutch_events.3.desc: "[HOL.GetNameDefCap]拒绝了我方关于组建统一海军指挥部的提议，理由是后勤与行政管理方面的顾虑。尽管令人失望，但我们的合作仍通过战争努力的其他渠道继续进行。"
 INS_dutch_events.3.a: "我们会另寻他法加强海军影响力"
 INS_dutch_events.4.t: "[HOL.GetNameDefCap]建立[HOL.GetName]-[INS.GetName]海军计划"
 INS_dutch_events.4.desc: "[HOL.GetNameDefCap]宣布创建[HOL.GetName]-[INS.GetName]海军计划，这是一项旨在重组和扩充我方海上力量的联合倡议。[HOL.GetAdjective]的专业知识与[INS.GetAdjective]的人力资源将共同构成新的太平洋防御网络的支柱。"
 INS_dutch_events.4.a: "向着共同生存迈出的坚实一步"
 ### INS - Netherlands–Indonesia Union Events
 INS_union_events.1.t: "[HOL.GetNameDefCap]请求将政府迁至[1058.GetName]"
 INS_union_events.1.desc: "由于本土沦陷，[HOL.GetNameDef]已通知我方，其政府与王室将迁往[1058.GetName]。他们提到这是出于必要性、延续性，以及需要让王国在旗帜仍然飘扬之地继续存在下去的需要。"
 INS_union_events.1.a: "战争将在[1058.GetName]继续下去"
 INS_union_events.1.b: "他们以为自己是谁！这不过是试图重申殖民统治！"
 INS_union_events.2.t: "[INS.GetNameDefCap]接受迁都提议"
 INS_union_events.2.desc: "[INS.GetNameDefCap]已同意我方在[1058.GetName]安置流亡政府。搬迁准备工作正在进行中，双方政府正协调各办公室与人员的整合。我们将共同在东方高举王国的火炬。"
 INS_union_events.2.a: "团结一致对抗我们共同的敌人"
 INS_union_events.3.t: "[INS.GetNameDefCap]拒绝迁都提议"
 INS_union_events.3.desc: "[INS.GetNameDefCap]直接拒绝了我方将政府迁至[1058.GetName]的请求。[INS.GetLeader]表示，在他们已经捉襟见肘的情况下，我方无权要求如此程度的援助。"
 INS_union_events.3.a: "看来他们已经忘记了是谁的旗帜仍将我们团结在一起"
 INS_union_events.4.t: "[HOL.GetNameDefCap]将武装部队迁至[1058.GetName]"
 INS_union_events.4.desc: "首批运输船已从祖国抵达。船上挤满了军官、士兵和我们军火库的残余物资。不出所料，一些护航队未能抵达港口。幸存下来的力量将构成我们在[1058.GetName]部队的骨干。"
 INS_union_events.4.a: "足以让旗帜继续飘扬"
 # INS proposed union
 INS_union_events.5.t: "[INS.GetNameDefCap]提议组建荷兰-印度尼西亚联邦"
 INS_union_events.5.desc: "全世界都清楚，战争的形势对我方不利。我们的国家已沦陷，行动基地已东移。[INS.GetName]的部长们向我们提交了一项提议，组建一个由威廉明娜女王领导的联合联邦国家，以保证最大程度的合作。虽然似乎没有人对此提议特别满意，但这可能是我们生存的关键。"
 INS_union_events.5.a: "这是一项我们必须承担的风险。女王万岁！"
 INS_union_events.5.b: "我们不能同意"
 INS_union_events.6.t: "[HOL.GetNameDefCap]接受联邦提议"
 INS_union_events.6.desc: "经过内阁紧急辩论后，[HOL.GetLeader]批准了[INS.GetAdjective]的提议。法令简短且毫无仪式感。自此，在战争结束前，我们两国政府将在王权下合为一体。"
 INS_union_events.6.a: "两国历史性的协议"
 INS_union_events.7.t: "[HOL.GetNameDefCap]拒绝联邦提议"
 INS_union_events.7.desc: "[HOL.GetNameDef]的议会拒绝了组建联合联邦的提议。他们的信息很坚定：合作将继续，但主权不会共享。"
 INS_union_events.7.a: "无论如何，这也不太可能成功"
 # HOL proposed union
 INS_union_events.8.t: "[HOL.GetNameDefCap]提议组建荷兰-印度尼西亚联邦"
 INS_union_events.8.desc: "全世界都清楚，战争的形势对我方不利。[HOL.GetNameDef]已沦陷，他们的行动基地已东移。[HOL.GetAdjective]领导人向我们提交了一项提议，组建一个由威廉明娜女王领导的联合联邦国家，以保证最大程度的合作。虽然似乎没有人对此提议特别满意，但这可能是我们生存的关键。"
 INS_union_events.8.a: "这是必要之举"
 INS_union_events.8.b: "这不过是试图重申殖民统治"
 INS_union_events.9.t: "[INS.GetNameDefCap]接受联邦提议"
 INS_union_events.9.desc: "[INS.GetNameDefCap]已同意我方提议。目前尚不清楚结果会如何，但我们必须将注意力集中在战事上。"
 INS_union_events.9.a: "若要熬过难关，我们必须共同熬过"
 INS_union_events.10.t: "[INS.GetNameDefCap]拒绝联邦提议"
 INS_union_events.10.desc: "[INS.GetNameDefCap]拒绝了联邦提议。[INS.GetAdjective]人民与领导人认为这无法长期运作，并反对任何放弃权力的提议。"
 INS_union_events.10.a: "无论如何，这也不太可能成功"
 # Flags
 INS_exile_accepted_flag: "正在安置流亡中的[HOL.GetNameDef]"
 INS_hey_btw_you_are_gonna_die_just_know_that_yeah_tt: "§R这会导致游戏结束。§!"
 # Revolution events
 INS_revolution_events.1.t: "[HOL.GetNameDefCap]采取行动镇压共和国"
 INS_revolution_events.1.desc: "不出所料，荷兰政府对我方的独立要求作出了回应，向[1058.GetName]派遣了士兵，并通过媒体散布反共和宣传。"
 INS_revolution_events.1.a: "我们必须迅速行动"
 INS_revolution_events.2.t: "[HOL.GetNameDefCap]请求额外援助"
 INS_revolution_events.2.desc: "[HOL.GetLeader]已与我方领导人召开紧急会议，请求我方提供进一步援助以重新征服东印度群岛，甚至直接加入冲突。[HOL.GetLeader]表示局势危急，荷兰军队无法击退革命民兵。[HOL.GetLeader]承诺，如果我方提供帮助，婆罗洲将作为酬劳。"
 INS_revolution_events.2.a: "为了婆罗洲，我们义无反顾"
 INS_revolution_events.2.b: "我们并不感兴趣"
 INS_revolution_events.3.t: "[ENG.GetNameDefCap]同意《伦敦-巴达维亚协议》"
 INS_revolution_events.3.desc: "[ENG.GetNameDefCap]已同意直接加入冲突，派遣数个师前往巴达维亚作战。虽然我们将不得不放弃婆罗洲，但这使胜算大大地向我们倾斜。"
 INS_revolution_events.3.a: "婆罗洲将是必要的牺牲"
 INS_revolution_events.4.t: "[ENG.GetNameDefCap]拒绝《伦敦-巴达维亚协议》"
 INS_revolution_events.4.desc: "[ENG.GetNameDefCap]拒绝为冲突提供任何进一步援助，尽管情况紧急且我方提供了酬劳。[ENG.GetLeader]表示，虽然维护我方殖民帝国符合他们的最佳利益，但他们的介入导致全球局势升级的风险过高，我方需要自行处理此事。"
 INS_revolution_events.4.a: "情况不容乐观"
 INS_revolution_events.5.t: "[HOL.GetNameDefCap]请求我方援助"
 INS_revolution_events.5.desc: "荷属东印度群岛的革命者已宣布脱离[HOL.GetNameDef]独立，并占领了主要城市。[HOL.GetLeader]紧急联系我方，请求我们在他们准备入侵的同时提供军事援助。"
 INS_revolution_events.5.a: "如果革命者成功，我方殖民地的公民可能会受到鼓舞而效仿。"
 INS_revolution_events.5.b: "我们并不感兴趣"
 INS_revolution_events.6.t: "[ENG.GetNameDefCap]同意援助我方"
 INS_revolution_events.6.desc: "[ENG.GetNameDefCap]已同意派遣志愿部队和装备前往[1058.GetName]，帮助我方重新控制东印度群岛。"
 INS_revolution_events.6.a: "这会很容易。"
 INS_revolution_events.7.t: "[ENG.GetNameDefCap]拒绝援助我方"
 INS_revolution_events.7.desc: "[ENG.GetNameDefCap]拒绝帮助我方重新控制东印度群岛，坚称东印度群岛与己无关，尽管他们距离冲突很近。我方将不得不自行重新武装荷兰皇家东印度陆军。"
 INS_revolution_events.7.a: "这不可接受！"
 INS_revolution_events.8.t: "革命民兵在东印度群岛密谋"
 INS_revolution_events.8.desc: "我方在东印度群岛的殖民警察逮捕并审讯了印度尼西亚一个正在兴起的革命运动的数名成员。他们似乎正试图建立军事存在，为发动民族独立运动做准备。我们尚不确定，但他们可能在密谋武装革命。"
 INS_revolution_events.8.a: "我们必须密切关注"
 INS_revolution_events.9.t: "印度尼西亚独立宣言"
 INS_revolution_events.9.desc: "[INS.GetLeader]今天在爪哇发表演讲，宣布新成立的印度尼西亚共和国独立。虽然我们不承认这个新共和国，但他们的民兵已占领了领土，我方警察无法治理这些地区。如果我们不认真对待这一局势，它可能会演变为全面战争。"
 INS_revolution_events.9.a: "不可接受！"
 INS_revolution_events.9.b: "这不值得耗费精力，他们既然如此渴望独立，那就随他们去吧"
 #INS_revolution_events.10.t: ""
 #INS_revolution_events.10.desc: ""
 #INS_revolution_events.10.a: ""
 INS_revolution_events.11.t: "东印度军队成功阻止了民兵的军事行动"
 INS_revolution_events.11.desc: "一队共和派民兵发动了一次军事行动，企图占领[?event_target:INS_temp_occupied_state.GetName]。我们在东印度群岛英勇的士兵成功将民兵击退，我们保持对该地区的完全控制。"
 INS_revolution_events.11.a: "[HOL.GetNameDef]的又一次胜利"
 INS_revolution_events.12.t: "民兵试图占领[?event_target:INS_temp_occupied_state.GetName]"
 INS_revolution_events.12.desc: "一队共和派民兵发动了一次军事行动，企图占领[?event_target:INS_temp_occupied_state.GetName]。我方警察和士兵最终设法控制住了局势，但局势已在[?event_target:INS_temp_occupied_state.GetName]引发不满，许多平民支持民兵并公开反对[HOL.GetAdjective]政府。"
 INS_revolution_events.12.a: "我们不能让事态升级"
 INS_revolution_events.14.t: "民兵占领了[?event_target:INS_temp_occupied_state.GetName]"
 INS_revolution_events.14.desc: "尽管我们的殖民地警察与士兵竭尽全力，共和派民兵仍成功发动军事行动，占领了[?event_target:INS_temp_occupied_state.GetName]。我们的警察和士兵被迫撤离，并宣布由于民兵的抵抗，该地区已陷入无法治理的状态。如果继续任由民兵摆布，我们将永远失去我们伟大的殖民地。"
 INS_revolution_events.14.a: "真是骇人听闻！"
 INS_revolution_no_effect_tt: "无效果"
 INS_revolution_events.19.t: "东印度群岛的和平谈判"
 INS_revolution_events.19.desc: "[HOL.GetLeader]受邀与[INS.GetLeader]会面，商讨可能的和平协议。[INS.GetLeader]表示已有太多生命逝去，并提出了一项两国方案：大致以现有边界为准，稍作调整，永久停战。"
 INS_revolution_events.19.a: "我们必须同意，已经有太多人丧生了"
 INS_revolution_events.19.b: "如果你这么想要和平，那就投降吧！"
 INS_revolution_events.20.t: "[HOL.GetNameDefCap]同意两国方案！"
 INS_revolution_events.20.desc: "[INS.GetLeader]与[HOL.GetLeader]的会面带来了好消息。双方已达成两国方案，我们将立即根据新边界调动部队。虽然不得不留下我们的印尼同胞令所有人感到遗憾，但结束战斗的决定终究是最好的选择。"
 INS_revolution_events.20.a: "流血冲突终将结束"
 INS_revolution_events.21.t: "[HOL.GetNameDefCap]拒绝停止战斗"
 INS_revolution_events.21.desc: "[INS.GetLeader]与[HOL.GetLeader]的会面并未按计划进行，双方明显动怒且拒绝妥协，导致会谈提前结束。"
 INS_revolution_events.21.a: "还要再牺牲多少生命？"
 INS_revolution_events.22.t: "[HOL.GetNameDefCap]请求我方援助"
 INS_revolution_events.22.desc: "[HOL.GetLeader]召集与[FRA.GetLeader]在阿姆斯特丹会面，讨论东印度群岛的持续局势。会面中，[HOL.GetLeader]解释了革命者以荷兰军队无法匹敌的速度武装民兵，[HOL.GetNameDef]面临失去殖民霸权的风险。[HOL.GetLeader.GetHeShe]请求我方正式加入冲突，站在荷兰一方，并派遣陆军师前往巴达维亚协助重新征服东印度群岛。作为交换，一旦秩序恢复，我们将获得苏门答腊东北部。"
 INS_revolution_events.22.a: "虽然提供帮助代价高昂，但有苏门答腊作为报偿或许值得一试"
 INS_revolution_events.22.b: "这要求太过分了"
 INS_revolution_events.23.t: "[FRA.GetNameDefCap]同意帮助我们！"
 INS_revolution_events.23.desc: "[FRA.GetNameDefCap]已响应我们的求援，并立即派遣了多支法国陆军师前往巴达维亚协助我们。"
 INS_revolution_events.23.a: "形势现在对我们有利"
 INS_revolution_events.24.t: "[FRA.GetNameDefCap]拒绝提供帮助"
 INS_revolution_events.24.desc: "尽管事态紧急，[FRA.GetNameDefCap]仍拒绝帮助我们镇压革命。我们必须迅速重新武装，否则很快就会寡不敌众。"
 INS_revolution_events.24.a: "情况不容乐观"
 INS_revolution_events.25.t: "印度尼西亚战争的结束"
 INS_revolution_events.25.desc: "[HOL.GetAdjective]军队摧毁了主要民兵基地并推翻了共和派政府。共和派精英和指挥官已被逮捕，东印度群岛政府正在前共和派领土上重建其统治。作为对我们贡献的回报，承诺的领土已移交给我国。"
 INS_revolution_events.25.a: "太棒了！"
 INS_revolution_events.26.t: "印度尼西亚战争的结束"
 INS_revolution_events.26.desc: "[HOL.GetAdjective]军队与共和派民兵的战斗时间远超双方预期，[HOL.GetLeader]已同意签署和平协议，实行两国方案。然而，由于我方仍履行了协议中的义务，[HOL.GetLeader]已确认我们仍将获得承诺的领土。"
 INS_revolution_events.26.a: "有趣的发展"
 INS_revolution_events.27.t: "印度尼西亚战争的结束"
 INS_revolution_events.27.desc: "[HOL.GetAdjective]军队与共和派民兵的战斗时间远超双方预期，尽管[HOL.GetNameDef]和我方的军事介入都付出了努力，但民兵的数量优势及其游击战性质使冲突陷入僵局，且局势严重偏向共和派。因此，[HOL.GetLeader]今天宣布已签署和平协议，实行有利于共和派的两国方案。东印度群岛剩下的只是昔日辉煌的空壳。[HOL.GetLeader]表示，由于冲突以失败告终，[HOL.GetLeader.GetHeShe]无法将承诺的领土回报给我们的军事贡献。"
 INS_revolution_events.27.a: "这简直疯了！"
 INS_revolution_events.28.t: "东印度群岛的陷落"
 INS_revolution_events.28.desc: "尽管[HOL.GetNameDef]投入了巨额军费，且我们也直接进行介入，但印度群岛数量庞大的民兵组织仍成功压倒了我方部队，占领了所有主要城市，推翻了荷兰行政当局并迫使其投降。"
 INS_revolution_events.28.a: "可当初承诺要给我们领土的！"
 INS_revolution_events.29.t: "东印度群岛陷落"
 INS_revolution_events.29.desc: "尽管我们竭尽全力，印度群岛的革命分子还是占领了我们的主要城市，并从内部摧毁了殖民政府。我们的将军被俘虏，通讯线路被切断。我们别无选择，只能接受失败。"
 INS_revolution_events.29.a: "真是场悲剧"
 INS_revolution_events.30.t: "[INS.GetLeader]提议局部停火协议"
 INS_revolution_events.30.desc: "[INS.GetLeader]提议在[FROM.GetName]实行局部停火，承诺如果我们同意，他将从[FROM.GetName]撤军，以便我方部队重新掌控该地区。不过，条件是我们暂时推迟重大军事行动，给革命者留出谋划时间。"
 INS_revolution_events.30.a: "我们同意"
 INS_revolution_events.30.b: "我们拒绝，我们将武力夺回[FROM.GetName]！"
 INS_revolution_events.31.t: "[HOL.GetNameDefCap]同意与[FROM.GetName]停火"
 INS_revolution_events.31.desc: "停火谈判进展顺利，[HOL.GetLeader]已同意我们的条件。我们已命令[FROM.GetName]的民兵指挥官立即撤军。"
 INS_revolution_events.31.a: "希望他们能信守协议"
 INS_revolution_events.32.t: "[HOL.GetNameDefCap]拒绝停火"
 INS_revolution_events.32.desc: "停火谈判同计划产生了偏差，[HOL.GetLeader]拒绝签署协议，并在达成妥协前突然中断了谈判。"
 INS_revolution_events.32.a: "这不可接受！"
 INS_revolution_events.33.t: "[INS.GetNameDefCap]请求调停"
 INS_revolution_events.33.desc: "印度尼西亚共和派已正式请求我们协助调停，以期与荷兰达成和解。我们在该地区的顾问报告称，局势正在迅速恶化，而荷兰继续采取军事行动，有可能将民族主义者推向苏联一方。荷兰是我们在欧洲的重要盟友，但我们不能忽视东南亚的政治现实。如果我们袖手旁观导致印度尼西亚落入共产主义阵营，那将是我们的失职。"
 INS_revolution_events.33.a: "派遣调停者"
 INS_revolution_events.33.b: "我们不能拿与荷兰的关系冒险"
 INS_revolution_events.34.t: "[FROM.GetNameDefCap]同意进行调停"
 INS_revolution_events.34.desc: "华盛顿已同意在我国政府与荷兰之间进行斡旋。美国特使正在途中，届时将提出正式停火协议。这是一个绝佳的机会。有世界上最强大的国家支持谈判，荷兰将更难拖延或动用武力。我们必须坚守谈判立场，让美国人施展其最擅长的手段。"
 INS_revolution_events.34.a: "但愿荷兰人能看清形势"
 INS_revolution_events.35.t: "[USA.GetNameDefCap]宣布进行调停"
 INS_revolution_events.35.desc: "美国人已介入印尼问题。华盛顿声称扮演中立调停者，但其意图显而易见。若我们无法达成令其满意的解决方案，他们将动用巨大的影响力对付我们。我方的谈判代表需谨慎应对。我们承受不起失去美国善意的代价。"
 INS_revolution_events.35.a: "我们将按自己的方式来解决此事"
 INS_revolution_events.36.t: "[FROM.GetNameDefCap]拒绝干预"
 INS_revolution_events.36.desc: "美国人拒绝了我们的调停请求。华盛顿选择站在他们的欧洲盟友一边，而非支持我们争取自决的斗争。我们只能依靠自己了。这是沉重的打击，但我们的革命从来不是寄望于外国势力赐予我们自由。"
 INS_revolution_events.36.a: "没有他们，我们也能赢得这场战争"
 INS_revolution_events.37.t: "[USA.GetNameDefCap]发出最后通牒"
 INS_revolution_events.37.desc: "美国人已失去耐心。华盛顿发出了最后通牒，要求立即停止在印度尼西亚的一切军事行动，并承认印度尼西亚主权。他们的威胁几乎毫不掩饰。我们在国际社会的地位经不起与美国公开决裂，我们的经济也承受不了随之而来的后果。我方将领坚称战役仍能取胜，但代价将是什么？"
 INS_revolution_events.37.a: "我们别无选择，只能遵从"
 INS_revolution_events.37.b: "印度尼西亚属于我们，我们绝不会退让"
 INS_revolution_events.38.t: "荷兰投降"
 INS_revolution_events.38.desc: "结束了。荷兰政府已接受美国的最后通牒，承认了我们的主权。三百五十年的殖民统治，不仅终结于战场，也终结于谈判桌上——有世界最强大的力量支持我们的立场。共和国终于真正地、完全地属于我们了。"
 INS_revolution_events.38.a: "独立与自由！"
 INS_revolution_events.39.t: "荷兰拒绝"
 INS_revolution_events.39.desc: "出乎所有人意料，荷兰人拒绝了美国的最后通牒。他们的将军想必认为，在华盛顿采取行动前就能打赢这场战争。他们错了。既然美国人现已公开支持我们的事业，力量对比已发生决定性的转变。让他们来吧。我们已不再是孤军奋战。"
 INS_revolution_events.39.a: "全世界与我们站在一起"
 INS_revolution_events.40.t: "荷兰接受我们的条款"
 INS_revolution_events.40.desc: "海牙方面已接受我方最后通牒。驻印尼的荷兰军队将撤离，主权将移交给印度尼西亚共和国。对这段不幸的插曲来说，这是个令人满意的结局。如今，一个稳定独立的印度尼西亚比维持荷兰已无力支撑的殖民统治，更能保障我们在该地区的利益。"
 INS_revolution_events.40.a: "明智的结果"
 INS_revolution_events.41.t: "荷兰违抗我们"
 INS_revolution_events.41.desc: "海牙已断然拒绝我们的最后通牒。驻印度尼西亚的荷军公然违抗美国要求，继续其军事行动。这是极其严重的误判。荷兰不可能一边在亚洲进行殖民战争，一边指望在欧洲获得美国的援助。他们迫使我们不得不采取行动。"
 INS_revolution_events.41.a: "那就这样吧。"
 INS_revolution_events.42.t: "孤注一掷"
 INS_revolution_events.42.desc: "我们驻巴达维亚的情报机构发来报告，共和派敌人正在筹备一场前所未有的行动。他们似乎正准备发起一场颠覆作战来席卷爪哇，并摧毁我们所有的通信基础设施，从而确保他们的胜利。然而，这次行动极其冒险，需要他们投入几乎所有的资源。我方将领估计，他们只能维持此态势约两年，且难以轻易抽身。如果我们能拖住他们足够长的时间，我们就能像捏烂一个熟透的西红柿一样，彻底粉碎他们的政府和革命。"
 INS_revolution_events.42.a: "最终决战就此开始"
 INS_revolution_events.43.t: "[FROM.GetName]的民兵基地已建立"
 INS_revolution_events.43.desc: "我们在[FROM.GetName]的努力取得了成功，当地民兵领袖确认他们已准备好在时机成熟时采取行动。"
 INS_revolution_events.43.a: "我们必须继续努力。"
 # Chaos Events
 INS_chaos_events.1.t: "泗水战役"
 INS_chaos_events.1.desc: "独立宣言发表后，泗水的局势变得动荡不安。今天，一群效忠荷兰的分子在旧有的大和酒店屋顶升起了昔日的殖民旗帜。当地的青年运动成员冲进大楼，撤下那些旗帜，升起了红白相间的印度尼西亚国旗。这一事件已升级为暴力、无组织的冲突。"
 INS_chaos_events.1.a: "理应如此！"
 INS_chaos_events.1.b: "下令停火，我们不能冒事态升级的风险"
 INS_chaos_events.2.t: "社会党合并"
 INS_chaos_events.2.desc: "印度尼西亚两大社会党——由阿米尔·谢里夫丁和苏丹·沙里尔领导——今天宣布合并，成立统一的印度尼西亚社会党。这显著增强了该党的政治影响力，可能危及我们的行政当局。"
 INS_chaos_events.2.a: "允许合并"
 INS_chaos_events.2.b: "没时间搞政治了，宣布戒严！"
 INS_chaos_events.3.t: "对苏加诺的刺杀失败"
 INS_chaos_events.3.desc: "今天，一名荷兰士兵向苏加诺的汽车开枪，企图杀害苏加诺。幸运的是，苏加诺不在车上，但他的司机受了重伤。虽然这次尝试没有成功，但很明显，这不会是荷兰士兵和印度尼西亚反对派的最后一次尝试。"
 INS_chaos_events.3.a: "我们必须恢复秩序！"
 INS_chaos_events.4.t: "苏加诺遇刺"
 INS_chaos_events.4.desc: "今天，印度尼西亚遭遇了悲剧。苏加诺面临了又一场刺杀，但这次成功了。我们不能让继承危机爆发，必须迅速恢复秩序，否则共和国就会崩溃。"
 INS_chaos_events.4.a: "副总统哈塔将接任"
 INS_chaos_events.4.b: "社会党将接管"
 INS_chaos_events.4.c: "废除共和国，陈马六甲将带领我们走向胜利！"
 # Loyalist Events
 INS_loyalist_events.1.t: "[INS.GetLeader]请求调任亨利·温克尔曼"
 INS_loyalist_events.1.desc: "[INS.GetLeader]已就世界各地持续的冲突和[INS.GetNameDef]所处的危险境地与我们联系。[INS.GetLeader]提议将荷兰皇家东印度陆军前指挥官亨利·温克尔曼正式调回[INS.GetNameDef]，以确保殖民地的安全。"
 INS_loyalist_events.1.a: "我们会立即将其调任"
 INS_loyalist_events.1.b: "本土需要亨利·温克尔曼"
 INS_loyalist_events.2.t: "[HOL.GetLeader]同意调任亨利·温克尔曼"
 INS_loyalist_events.2.desc: "[INS.GetLeader]在[HOL.GetNameDef]与[HOL.GetLeader]进行了会谈，一切进展顺利，[HOL.GetLeader]承认当前的局势，并同意立即调任温克尔曼。亨利·温克尔曼正前往[1058.GetName]，他将在那里等待我们的命令。"
 INS_loyalist_events.2.a: "这将很有帮助"
 INS_loyalist_events.3.t: "[HOL.GetLeader]拒绝调任亨利·温克尔曼"
 INS_loyalist_events.3.desc: "[INS.GetLeader]在[HOL.GetNameDef]与[HOL.GetLeader]进行了会谈，很遗憾，亨利·温克尔曼不会被派往东印度群岛，我们只能在没有他的情况下保护自己。"
 INS_loyalist_events.3.a: "我们必须尽快想出新方案"
 INS_henri_winkelman_tt: "拒绝调任亨利·温克尔曼"
 # MALAYA CHAIN - Independent Malaya
 INS_loyalist_events.4.t: "[FROM.GetNameDefCap]提议统一"
 INS_loyalist_events.4.desc: "[FROM.GetAdjective]代表团抵达[ROOT.Capital.GetCapitalVictoryPointName]，提议两国合并。他们列举了两国人民共同的马来传承，并指出两国边界由欧洲殖民政府划定，而非由这片土地上的人民决定。该提案将解散两国政府，并改组为一个国家。"
 INS_loyalist_events.4.a: "我们同意"
 INS_loyalist_events.4.b: "我们必须拒绝"
 INS_loyalist_events.5.t: "[FROM.GetNameDefCap]接受统一"
 INS_loyalist_events.5.desc: "我们的外交官带着好消息从[FROM.Capital.GetCapitalVictoryPointName]返回。[FROM.GetAdjective]政府同意了我们的提议，他们的官员已开始制定将其领土整合入我们的行政机构的安排。"
 INS_loyalist_events.5.a: "团结使我们更强大！"
 INS_loyalist_events.6.t: "[FROM.GetNameDefCap]拒绝统一"
 INS_loyalist_events.6.desc: "我们的外交官从[FROM.Capital.GetCapitalVictoryPointName]空手而回。[FROM.GetAdjective]政府不愿意接受我们的提议。他们并未给出什么理由，只是将我们的代表团礼送回家。"
 INS_loyalist_events.6.a: "这是他们的损失"
 # MALAYA CHAIN - Subject Malaya (Overlord receives)
 INS_loyalist_events.7.t: "[FROM.GetNameDefCap]要求在[MAL.GetName]举行全民公投"
 INS_loyalist_events.7.desc: "[FROM.GetNameDefCap]正式要求我们在[MAL.GetName]举行全民公投，表决是否与他们国家合并。他们的大使对可能的结果直言不讳，表示边境两侧的马来人民认为自己属于同一国家。允许投票几乎肯定意味着失去[MAL.GetName]。"
 INS_loyalist_events.7.a: "让人民决定"
 INS_loyalist_events.7.b: "我们不会允许"
 # MALAYA CHAIN - Subject Malaya (MAL receives after overlord agrees)
 INS_loyalist_events.8.t: "[FROM.GetNameDefCap]同意举行统一全民公投"
 INS_loyalist_events.8.desc: "我们的宗主国已批准[FROM.FROM.GetNameDef]在我国举行公民投票。[FROM.FROM.GetAdjective]的活动人士已大批抵达，投票将于本月内开始。向人民提出的问题很简单：我们是否希望加入[FROM.FROM.GetNameDef]，还是希望维持现状？"
 INS_loyalist_events.8.a: "我们会加入他们"
 INS_loyalist_events.8.b: "我们宁愿留下"
 # MALAYA CHAIN - Overlord informed of MAL's choice
 INS_loyalist_events.9.t: "[FROM.GetNameDefCap]投票反对合并"
 INS_loyalist_events.9.desc: "[FROM.GetName]的全民公投结束了。[FROM.GetAdjective]人民决定继续由我们管理。[FROM.FROM.GetAdjective]活动人士已经离开。"
 INS_loyalist_events.9.a: "意料之中"
 INS_loyalist_events.10.t: "[FROM.GetNameDefCap]投票支持合并"
 INS_loyalist_events.10.desc: "[FROM.GetName]的公投已结束，结果以决定性多数支持与[FROM.FROM.GetNameDef]统一。我们在该地区的行政官员报告称，这一结果在意料之中。我们有义务尊重这一结果。"
 INS_loyalist_events.10.a: "履行我们许下的承诺。"
 # MALAYA CHAIN - INS receives result
 INS_loyalist_events.11.t: "马来亚全民公投成功"
 INS_loyalist_events.11.desc: "[MAL.GetName]的人民已投票加入我国。[MAL.GetAdjective]官员正与我国行政当局合作，开始移交权力。马来世界的版图上将减少一条边界。"
 INS_loyalist_events.11.a: "欢迎回家"
 INS_loyalist_events.12.t: "马来亚统一提案被拒"
 INS_loyalist_events.12.desc: "我们与[MAL.GetName]统一的提案已被拒绝。[MAL.GetAdjective]政府或其上级已决定反对统一。我们必须在更合适的时机重新考虑此事。"
 INS_loyalist_events.12.a: "我们不会忘记"
 INS_loyalist_events.13.t: "[FROM.GetNameDefCap]提出新加坡妥协方案"
 INS_loyalist_events.13.desc: "[FROM.GetAdjective]政府已就新加坡问题向我们提出建议。他们以该岛在马来世界中的地位为由，索取该岛的主权。作为回报，他们将保证我们能继续进出港口和军事设施，并保留目前拥有的所有资源开采权。"
 INS_loyalist_events.13.a: "公平的交易"
 INS_loyalist_events.13.b: "新加坡不卖"
 INS_loyalist_events.14.t: "新加坡妥协方案被接受"
 INS_loyalist_events.14.desc: "协议被接受了。新加坡将移交我们掌控，而其前控制者保留了对港口的商业和军事进出权。我们的旗帜如今在亚洲最重要的港口之一飘扬。"
 INS_loyalist_events.14.a: "海峡是我们的"
 INS_loyalist_events.15.t: "新加坡妥协方案被拒绝"
 INS_loyalist_events.15.desc: "我们的提议被拒绝了。新加坡的控制者不愿以任何条件放弃该岛。我们向他们提供了除主权之外的一切，但这还不够。"
 INS_loyalist_events.15.a: "那就这样吧"
 INS_loyalist_events.16.t: "[FROM.GetNameDefCap]索要锡兰"
 INS_loyalist_events.16.desc: "[FROM.GetAdjective]政府已正式提出移交锡兰的请求。其外交官援引了该岛与马来世界之间悠久的贸易和民族联系。坦白说，这一主张颇为牵强，但[FROM.GetNameDef]已然强大至此，这类请求必须予以慎重考虑。"
 INS_loyalist_events.16.a: "好吧，让他们拿去"
 INS_loyalist_events.16.b: "锡兰将仍处于我们的控制之下"
 INS_loyalist_events.17.t: "锡兰移交"
 INS_loyalist_events.17.desc: "锡兰的移交已经完成。我方行政部门开始派遣官员前往该岛，交接过程未生事端。如今，我们已掌控海峡两岸的战略要地。"
 INS_loyalist_events.17.a: "太好了"
 INS_loyalist_events.18.t: "锡兰请求被拒"
 INS_loyalist_events.18.desc: "我们关于移交锡兰的请求已被拒绝。当前控制方无意割让该岛，我方外交官报告称，就此问题进一步讨论将毫无结果。"
 INS_loyalist_events.18.a: "再说吧"
 INS_loyalist_events.19.t: "[FROM.GetNameDefCap]要求在巴布亚举行全民公投"
 INS_loyalist_events.19.desc: "[FROM.GetNameDefCap]要求我们允许在巴布亚东部举行公投。在[FROM.GetAdjective]一侧的边境，新建的道路穿越丛林，诊所配备了政府医生，而在我们这一侧，上任总督三年间只去过两次莫尔兹比港。[FROM.GetAdjective]大使无需多言，一切已不言自明。"
 INS_loyalist_events.19.a: "让他们投票"
 INS_loyalist_events.19.b: "我们不会允许这种事"
 INS_loyalist_events.20.t: "巴布亚全民公投通过"
 INS_loyalist_events.20.desc: "澳大利亚人同意举行全民公投。巴布亚东部每个地区的结果都如出一辙。我们对岛屿西半部的投资，说服力远胜任何竞选海报。"
 INS_loyalist_events.20.a: "岛屿终于完整了"
 INS_loyalist_events.21.t: "巴布亚全民公投被拒绝"
 INS_loyalist_events.21.desc: "澳大利亚人拒绝了。莫尔斯比港总督发表声明称，这一要求是对澳大利亚主权的侮辱。这一行为根本无视了巴布亚人民。"
 INS_loyalist_events.21.a: "我们会记住此事的"
 INS_loyalist_events.22.t: "[FROM.GetNameDefCap]索要东帝汶"
 INS_loyalist_events.22.desc: "[FROM.GetAdjective]政府已正式要求我们割让东帝汶。他们的大使指出，我们在那里的驻军不到两百人，里斯本多年来几乎没有向那里分配任何资源。随后他质问，我们到底在坚持什么。"
 INS_loyalist_events.22.a: "不值得为之开战"
 INS_loyalist_events.22.b: "帝汶是我们的，并将始终如此"
 INS_loyalist_events.23.t: "割让东帝汶"
 INS_loyalist_events.23.desc: "东帝汶的控制者开始撤离他们的驻军，并取消那里的殖民政府。整座岛屿很快将由[INS.GetAdjective]治理。"
 INS_loyalist_events.23.a: "理应如此"
 INS_loyalist_events.24.t: "索要东帝汶被拒"
 INS_loyalist_events.24.desc: "帝力的殖民地总督亲自写信拒绝了我们的要求，坚称东帝汶仍然是其政府的主权领土。如果内阁希望继续推进此事，我们的总参谋部已经制定了应急计划。"
 INS_loyalist_events.24.a: "开始准备吧"
 INS_loyalist_events.25.t: "[FROM.GetNameDefCap]提议统一"
 INS_loyalist_events.25.desc: "[FROM.GetAdjective]代表团抵达我国，提出了两个共和国合并的方案。他们认为，我们两国人民有着共同的南岛根源，其历史远远早于将我们分开的殖民边界，一个横跨群岛的单一国家将成为东南亚最重要的势力。接受意味着解散我们的政府并融入他们的政府。"
 INS_loyalist_events.25.a: "我方接受"
 INS_loyalist_events.25.b: "我们为这个共和国付出了太多努力"
 INS_loyalist_events.26.t: "[FROM.GetNameDefCap]接受统一"
 INS_loyalist_events.26.desc: "[FROM.GetAdjective]政府接受了我们的提议。他们的官员已经在与我们协调，开始整合进程。从亚齐到吕宋，从婆罗洲到棉兰老岛，我们的国家现在横跨整个马来群岛。"
 INS_loyalist_events.26.a: "新时代开始了"
 INS_loyalist_events.27.t: "[FROM.GetNameDefCap]拒绝统一"
 INS_loyalist_events.27.desc: "[FROM.GetAdjective]政府拒绝了。他们为独立而进行的抗争仿佛昨日，那付出的巨大代价让他们难以割舍主权。该提案已被搁置。"
 INS_loyalist_events.27.a: "遗憾"
 INS_loyalist_events.28.t: "[FROM.GetNameDefCap]要求在[PHI.GetName]举行全民公投"
 INS_loyalist_events.28.desc: "[FROM.GetNameDefCap]正式要求我们在[PHI.GetName]举行全民公投，表决是否与他们国家合并。他们的外交官强调，两国人民有着共同的南岛血统，分隔两国的殖民边界是人为的。如果投票继续进行，结果可能会有利于[FROM.GetNameDef]。"
 INS_loyalist_events.28.a: "让人民表达意见"
 INS_loyalist_events.28.b: "绝不可能"
 INS_loyalist_events.29.t: "同意全民公投"
 INS_loyalist_events.29.desc: "[FROM.FROM.GetNameDefCap]基于两国共同的南岛传承提议两国合并。我们的宗主国已同意他们就此事举行公投，[FROM.FROM.GetAdjective]的活动人士已经开始抵达。结果将决定我们的共和国是加入[FROM.FROM.GetNameDef]还是维持现状。"
 INS_loyalist_events.29.a: "有趣的提议"
 INS_loyalist_events.29.b: "绝无可能"
 INS_loyalist_events.30.t: "[FROM.GetNameDefCap]投票反对合并"
 INS_loyalist_events.30.desc: "投票箱已经清点完毕，[FROM.FROM.GetAdjective]活动人士打道回府。[FROM.GetAdjective]人民投票决定留下。看来在[FROM.Capital.GetCapitalVictoryPointName]，独立仍然有其意义。"
 INS_loyalist_events.30.a: "到此为止了"
 INS_loyalist_events.31.t: "[FROM.GetNameDefCap]投票支持合并"
 INS_loyalist_events.31.desc: "投票箱已经清点完毕。[FROM.GetAdjective]人民选择了[FROM.FROM.GetNameDef]而非我们，差距悬殊。我们的行政人员已收到指令开始移交工作。"
 INS_loyalist_events.31.a: "人民已作出选择"
 INS_loyalist_events.32.t: "[PHI.GetNameDefCap]投票统一"
 INS_loyalist_events.32.desc: "[PHI.GetAdjective]的公投结果对我们有利。他们的政府已接受结果，并主动联系我方外交部安排权力移交。"
 INS_loyalist_events.32.a: "终得统一"
 INS_loyalist_events.33.t: "[PHI.GetNameDefCap]拒绝统一"
 INS_loyalist_events.33.desc: "[PHI.GetAdjective]政府拒绝了我们的统一提议。他们的议会甚至未进行二读就否决了。我们为他们提供了东南亚最伟大国家的一席之地，他们却嗤之以鼻。"
 INS_loyalist_events.33.a: "一次挫折，仅此而已"
 INS_communist_events.6.t: "[FROM.GetAdjective]特务在[ROOT.GetName]煽动"
 INS_communist_events.6.desc: "我们的情报部门证实了我们长期以来的怀疑。[FROM.GetNameDefCap]一直在我们境内进行持续的颠覆活动，资助激进小组，散发煽动性传单，并组织工人罢工。他们的特务已渗入工会和农村合作社，现在公开呼吁推翻我们的政府。局势已达到临界点，我们必须果断行动，以免事态失控。"
 INS_communist_events.6.a: "不可容忍！"
 INS_communist_events.7.t: "[FROM.GetName]境内的共产主义颠覆活动"
 INS_communist_events.7.desc: "我们收到了来自[FROM.FROM.GetName]的令人不安的报告。代表[FROM.GetNameDef]活动的特务一直在当地民众中煽动革命情绪，利用他们对我国行政当局的不满，为共产主义夺权争取支持。如果不加以制止，[FROM.FROM.GetNameDef]可能会完全落入激进分子之手，腐败还可能进一步蔓延到我们的其他领地。"
 INS_communist_events.7.a: "必须在蔓延之前予以铲除！"
 INS_communist_events.8.t: "[FROM.GetAdjective]宣传品在[ROOT.GetName]流传"
 INS_communist_events.8.desc: "源自[FROM.GetAdjective]的传单和小册子越来越频繁地出现在我们的工厂、市场和大学中。它们宣扬阶级斗争的福音，承诺通过革命实现解放。我们的警方报告称，这些宣传在不满意的人群中找到了一批乐于接受的受众。材料粗糙但有效，其传播毫无减缓迹象。"
 INS_communist_events.8.a: "查出是谁在散发这些垃圾！"
 ## Call for Revolution - Main Event (sent to target) ##
 INS_communist_events.1.t: "[ROOT.GetName]的革命"
 INS_communist_events.1.desc: "局势已恶化到无法挽回的地步。数月来[FROM.GetAdjective]的煽动起了作用，[ROOT.GetName]的共产主义运动已无法通过常规手段遏制。总罢工使城市瘫痪，武装游击队员掌控了数个省份，[FROM.GetAdjective]政府已全力支持革命者。我们的安全部队捉襟见肘，其忠诚度也不再确定。我们必须现在做出决定：是为国家的生存而战，还是在更多流血之前接受不可避免的结果。"
 INS_communist_events.1.a: "集结军队，我们不会坐以待毙"
 INS_communist_events.1.b: "继续抵抗只会给人民带来毁灭"
 INS_communist_events.1.c: "也许给他们一个席位，我们还能控制局面"
 ## Civil War Chosen - sent to Indonesia ##
 INS_communist_events.2.t: "[FROM.GetNameDefCap]选择战斗"
 INS_communist_events.2.desc: "[FROM.GetName]政府拒绝屈服，并已下令武装部队以武力镇压革命运动。我们在那里的同志们正在占领阵地、夺取关键据点。斗争不会短暂，但[FROM.GetName]人民已做出选择，我们将确保他们不会孤军奋战。"
 INS_communist_events.2.a: "革命在前进"
 ## Surrender - sent to Indonesia ##
 INS_communist_events.3.t: "[FROM.GetNameDefCap]已沦陷"
 INS_communist_events.3.desc: "[FROM.GetName]的旧政府已经投降。面对全面爆发的革命运动，并确知[ROOT.GetNameDef]就站在其背后，他们看不到任何前进的道路，唯有屈服。权力已移交给当地的共产党，新政府已开始主动联系我们寻求指导。又一个民族从旧秩序的桎梏中被解放出来。"
 INS_communist_events.3.a: "全世界劳动人民的伟大胜利"
 ## Civil War in Subject - sent to overlord ##
 INS_communist_events.4.t: "[FROM.GetName]爆发内战"
 INS_communist_events.4.desc: "在[FROM.FROM.GetNameDef]的支持下武装和组织起来的共产主义革命者，已在[FROM.GetName]发动公开叛乱。殖民当局已失去对大部分领土的控制，总督报告称，若无增援，当地驻军无法恢复秩序。"
 INS_communist_events.4.a: "派出军队，[FROM.GetName]是我们的！"
 ## Subject Surrendered - sent to overlord ##
 INS_communist_events.5.t: "[FROM.GetName]落入共产党之手"
 INS_communist_events.5.desc: "[FROM.GetName]政府未作抵抗便向共产党叛乱分子投降。总督及其幕僚已被逮捕，我们的国旗被降下，一个革命政府宣告成立。这一切都是由[FROM.FROM.GetNameDef]及其代理人精心策划的，他们数月来一直在那里破坏我们的权威。这简直是盗窃，我们绝不会坐视不管。"
 INS_communist_events.5.a: "这是暴行！"
 # Cooperate with Revolutionaries (sent to target)
 INS_communist_events.9.t: "[FROM.GetAdjective]官员被目击与异见分子会面"
 INS_communist_events.9.desc: "全国各地都有人发现[FROM.GetAdjective]特工与知名的煽动者和激进领袖为伍。曾经在街角散发传单的学生组织者，现在正与持有[FROM.GetAdjective]外交文件的人闭门会面。被禁出版物的印刷速度之快，让警察都来不及没收；曾经只持续一个下午便偃旗息鼓的抗议活动，现在能让整个区域停摆数天。这些共产党人每天都在学习如何更大规模地组织起来，如果我们不迅速采取行动，可能会失去对他们的控制。"
 INS_communist_events.9.a: "马上清除这些外国代理人！"
 # Spread Anti-Colonialist Sentiment (sent to subject target)
 INS_communist_events.10.t: "[FROM.GetAdjective]言论获得影响力"
 INS_communist_events.10.desc: "[FROM.GetAdjective]的小册子一直在军营和行政部门中流传，没收行动收效甚微。它们讲述着国家挣脱枷锁、人民摆脱殖民统治并建立自己家园的故事。如果这些情绪不是那么切合实际，压制起来会更容易。即便是忠诚的官员也开始私下发问：我们当前的安排，究竟是为我们的人民服务，还是仅仅为我们的主子服务。"
 INS_communist_events.10.a: "我们必须谨慎行事"
