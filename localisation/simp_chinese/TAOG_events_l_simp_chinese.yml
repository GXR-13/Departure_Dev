 ### INS News
 taog_news.1.t: "荷兰-印度尼西亚联邦的黎明"
 taog_news.1.desc: "威廉明娜女王昨日在[1058.GetName]出人意料地宣布成立荷兰-印度尼西亚联邦。由于本土遭到占领，[HOL.GetAdjective]流亡政府与[INS.GetAdjective]当局已达成一致，在王室统领下作为一个国家主体进行管理。两国官员称此举是迫于形势而非自愿选择，是为了在这两个大洲上维护王国统一与权威而采取的绝望之举。"
 taog_news.1.a: "有趣的进展。"
 taog_news.2.t: "印度尼西亚宣布独立"
 taog_news.2.desc: "[INS.GetAdjective]的革命领袖[INS.GetLeader]今日在爪哇发表讲话，宣布新成立的印度尼西亚共和国独立。[HOL.GetNameDef]不承认这个新成立共和国的主权，但共和国民兵已在事实上控制了某些领土。"
 taog_news.2.a: "这可能会引发全球范围内的重大局势变化。"
 ############
 ### SIAM ###
 ############
 siam.1.t: "[SIA_phraya_phahon.GetName]卷入丑闻"
 siam.1.desc: "[SIA_phraya_phahon.GetName]被指控以低于市场的价格向官员抛售王家地产，这一丑闻大幅降低了他在人民大会中的合法性。看来[SIA_phraya_phahon.GetName]的影响力即将终结。"
 siam.1.a: "这也许为其他人扫清了障碍？"
 #Spmgsiradet rebellion historical
 siam.2.t: "针对[SIA_plaek_phibunsongkhram.GetName]的第三次暗杀"
 siam.2.desc: "路透社驻曼谷记者的消息透露，这是四年内第三次企图刺杀暹罗总理（披汶·颂堪先生）的阴谋。\n据悉，上周有人在食物中投毒，颂堪先生及其妻女的健康暂时受到影响。\n英国外交大臣（哈利法克斯勋爵）在致颂堪先生的慰问信中，对这起针对总理生命的懦弱企图表示震惊，并对其幸免于难感到欣慰。" #https://trove.nla.gov.au/newspaper/article/47990695
 siam.2.a: "到底会是谁干的？"
 siam.3.t: "披耶·颂素拉德被流放"
 siam.3.desc: "披耶·颂素拉德被指控为针对[SIA_plaek_phibunsongkhram.GetName]的一次或多次暗杀阴谋的幕后主使，并计划推翻其政府。政府决定解除披耶·颂素拉德的职务，剥夺其军衔与头衔，强制退役且不发放养老金，并将其驱逐出境。\n批评者声称这是[SIA_plaek_phibunsongkhram.GetName]清除主要政敌的幌子，但这显然是诽谤。"
 siam.3.a: "一个悲伤的结局。"
 siam.4.t: "颂素拉德支持者被捕"
 siam.4.desc: "凌晨时分，在泰国王家警察的协助下，政府又逮捕了51名嫌疑人及支持者，其中包括兰实亲王、披耶·德帕哈萨丁和披耶·乌东·蓬蓬萨瓦。他们被指控与披耶·颂素拉德共同阴谋叛国，特别值得注意的是，身为王室成员的兰实亲王也将接受审判。一些评论人士质疑，针对亲王的行为是否旨在向留在[THIS.GetName]国内的王室成员传递一个信号：要么安分守己，要么下台。"
 siam.4.a: "形势愈发复杂"
 siam.5.t: "十八具尸体的叛乱"
 siam.5.desc: "披汶成立了一个特别法庭，对参与叛乱的51人进行审判，其中25人被判处终身监禁，21人被判处行刑队枪决。在21名死刑犯中，有三人因功勋显著被赦免，其中包括兰实亲王和披耶·德帕哈萨丁。"
 siam.5.a: "一锤定音。"
 #Songsuradet rebellion alternative
 siam.6.t: "颂素拉德对峙"
 siam.6.desc: "披耶·颂素拉德被指控是针对[SIA_plaek_phibunsongkhram.GetName]的一起或多起暗杀企图的幕后主使，并策划了针对其政府的政变。政府意旨解除颂素拉德的指挥权并将其流放。\n然而，忠于颂素拉德的军头阻止了对他的逮捕，谴责此次逮捕具有政治动机。政府与颂素拉德的军事派系目前陷入僵局，双方均拒绝退让。"
 siam.6.a: "我们不会让步。"
 siam.6.b: "弄巧成拙了。我们还是暂且退让吧。"
 siam.7.t: "颂素拉德寻求海军的支持"
 siam.7.desc: "随着政府军与颂素拉德军事集团之间的紧张对峙持续，政府调查人员开始听到传闻，称海军已与颂素拉德结盟，其明确意图是抗衡披汶日益增长的独裁倾向。\n不仅如此，王室的一些助手报告称，颂素拉德的代表正与高级亲王会面，这加剧了人们对王室也将加入反对派阵营的担忧。"
 siam.7.a: "我们是政府，我们绝不接受讹诈！"
 siam.7.b: "情况正在失控。我们还是暂且退让吧。"
 #alt-hist actual rebellion
 siam.8.t: "颂素拉德发动叛乱"
 siam.8.desc: "在获得了足够的政治和军事支持后，颂素拉德军事集团联合海军已有效地占领了[THIS.GetName]的大片地区。凌晨时分，曼谷郊区响起了枪声，整个国家似乎正处于政府与颂素拉德之间全面内战的边缘。"
 siam.8.a: "政府必将存续。"
 #alt-hist actual rebellion
 siam.9.t: "颂素拉德叛乱的终结"
 siam.9.desc: "叛乱已土崩瓦解。随着颂素拉德被捕，审判成了唯一的余兴，尽管在此时这仅仅是走个过场。阴谋不仅存在于陆军和海军中，王室也牵涉其中——兰实亲王被发现公开支持叛军。对异见分子进行全面深化清洗流毒已成为必然之举，而非备选方案。"
 siam.9.a: "是时候重建了。"
 #Attack Indochina
 siam.10.t: "胜利！"
 siam.10.desc: "敌人正在溃败，我们的胜利已成定局。随着领土被牢牢掌控，旧帝国主义势力定在瑟瑟发抖。他们怎能不失败？这是我们天命所归的迹象。"
 siam.10.a: "为了[ROOT.GetName]！"
 siam.10.b: "实际上，一切进行得很顺利"
 siam.11.t: "[FROM.GetAdjective]战略突破"
 siam.11.desc: "出人意料的是，[FROM.GetAdjective]军队在策略上胜过了我方部队，并夺取了争议地区的控制权。他们的占领削弱了我们的权威，并使我们对该地区的主张受到质疑。继续冲突可能会进一步瓦解纪律和信心，但放弃该领土则意味着在公众面前承认失败。"
 siam.11.a: "我们必须止损，进行撤离。"
 siam.11.b: "我们绝不会放弃我国的宣称！"
 siam.12.t: "[FROM.GetName]接受失败"
 siam.12.desc: "我们的军事行动取得了成功。敌人的抵抗已经瓦解，[FROM.GetName]为避免进一步的破坏，已正式放弃对争议地区的控制。这场胜利提升了我们的地位，并暂时巩固了我们的边境。"
 siam.12.a: "我们的力量不可阻挡"
 siam.13.t: "[FROM.GetName]拒绝调解"
 siam.13.desc: "[FROM.GetName]拒绝了所有涉及领土让步的提议，称其不可接受。他们的领导层宣称，只有摧毁我们的国家才能结束这场冲突。"
 siam.13.a: "那就这样吧"
 siam.14.t: "[FROM.GetNameDefCap]决定全面开战"
 siam.14.desc: "[FROM.GetNameDefCap]已不再假装谈判。他们的意图十分明确：彻底征服和吞并我国。这场战争的胜负，不再由条约决定，而是取决于彻底的胜利或彻底的失败。"
 siam.14.a: "决不妥协，决不投降"
 siam.15.t: "[SIA.GetAdjective]突击停滞"
 siam.15.desc: "[SIA.GetAdjective]部队的迅速突进或许让我们措手不及，但随着他们的压力日渐增加，表现逐步下滑，弱点已暴露出来。对[SIA.GetAdjective]军队而言，原本计划中的闪电战已变成一场苦战。我们可以选择宽宏大量，提出让步给他们一条出路，不过，是放他们一马还是追求彻底的胜利，决定权在于我们。"
 siam.15.a: "提出让步"
 siam.15.b: "我们只接受完全胜利"
 siam.16.t: "进攻停滞"
 siam.16.desc: "我们的攻势已陷入僵局，这并非问题所在，问题在于我们的敌人已经察觉到了这一点。他们向我们发出最后通牒，我们要么立即投降以减少损失，要么继续战争，承受更多的流血牺牲。唯一的区别在于，我们要埋葬多少逝者。"
 siam.16.a: "那就议和吧"
 siam.16.b: "我们永不投降！"
 siam.17.t: "[FROM.GetName]拒绝投降"
 siam.17.desc: "[FROM.GetName]已明确表示，他们宁愿看到整个国家化为灰烬，也绝不会向我们屈服丝毫。战争仍在继续。"
 siam.17.a: "那就如他们所愿"
 siam.18.t: "[FROM.GetName]谋求让我方投降！"
 siam.18.desc: "截获的敌方高层通讯证实了我们最深重的忧虑：不会有谈判达成的和解，也不会有任何让这场战争适度结束的让步。他们要求的无异于我国的彻底投降，企图让我们在又一个帝国主义者的铁蹄下苟活。如果这就是他们的目标，那么我们只有一个回答：我们绝不屈服。"
 siam.18.a: "[ROOT.GetNameDefCap]战斗到底！"
 siam.19.t: "[SIA.GetName]要求归还领土"
 siam.19.desc: "[SIA.GetName]被日益增长的民族主义情绪以及我们在此地区表现出的软弱所煽动，要求我们归还其认为属于他们核心领土的地区。他们显然在不自量力，但随着世界局势正一步步迈向战火纷飞，他们所主张的领土并不一定值得我们为此一战。"
 siam.19.a: "不值得为之而战"
 siam.19.b: "混蛋！"
 siam.20.t: "[FROM.GetName]移交领土"
 siam.20.desc: "[FROM.GetName]已决定归还我们的领土，无论他们是承认了我们对这些领土的主权，还是仅仅面临来自其他方面的压力，这些都不重要，我们的事业始终是正义的。"
 siam.20.a: "伟大的一天！"
 siam.21.t: "[FROM.GetName]拒绝交出领土"
 siam.21.desc: "[FROM.GetName]拒绝了我们的要求。这些帝国主义者死抓住上个世纪不放，不愿承认这些所谓的“列强”的时代已经终结。"
 siam.21.a: "那我们就让他们明白"
 SIA_sent_bureaucrats_to_us: "与我们一同培训公务员"
 SIA_tied_their_currency_to_ours: "将其货币与我国货币挂钩"
 SIA_sent_started_cooperative_with_us: "与我国开展合作"
 siam.22.t: "派遣[SIA.GetName]官僚出国学习"
 siam.22.desc: "我们的官僚机构不适合现代经济，缺乏推动增长所需的必要培训。幸运的是，有许多国家拥有现代、完善的官僚体系，我们可以派遣他们去那里获取经验，而无需同时引入他们的统治。"
 siam.22.a: "派他们去[ENG.GetName]"
 siam.22.b: "派他们去[JAP.GetName]"
 siam.23.t: "泰铢稳定法"
 siam.23.desc: "在[ROOT.GetName]寻求贸易和金融秩序的同时，泰铢不能继续无所依托。我们的官员现在认为，货币稳定需要一个坚实的外部锚点，一个与有足够分量的货币挂钩的锚点，以安抚商人、债权人和外国伙伴。我们面前的选择不仅仅是技术性的。它将决定我们贸易的方向、我们发展的性质，以及最终影响到[SIA.GetAdjective]经济的外国影响力。"
 siam.23.a: "与英镑挂钩"
 siam.23.b: "与日元挂钩"
 siam.24.t: "[SIA.GetAdjective]发展合作"
 siam.24.desc: "[SIA.GetAdjective]发展合作社为国家提供了新的改善工具，但雄心仍超出国内资本。铁路、工坊和电气工程要想快速发展，都需要外部资金。现在有两条道路摆在我们面前。[ENG.GetAdjective]投资提供了进入成熟市场、经验丰富的公司和伦敦金融声望的途径。[JAP.GetAdjective]投资则承诺与一个渴望扩大影响力的新兴亚洲强国建立更紧密的工业伙伴关系。两条道路都可能加速发展，但都伴随着相应的义务。"
 siam.24.a: "寻求[ENG.GetName]的投资"
 siam.24.b: "寻求[JAP.GetName]的投资"
 siam.25.t: "巴差提朴之死"
 siam.25.desc: "前国王巴差提朴，其名号承载着旧秩序历经多年流亡与动荡的记忆，如今他从人间事务中逝去，走进历史。对一些人来说，他的逝世为始于专制统治结束的那场斗争画上了最后的句号。然而，他所代表的理想并未随他消亡。王位永存，王朝延续，恢复[ROOT.GetName]尊严与稳定的工作现在必须继续以年轻国王阿南达的名义进行。"
 siam.25.a: "愿陛下升入天堂。"
 siam.27.t: "塑造一位国王"
 siam.27.desc: "国王阿南达仍留在[SWI.GetName]，远离他终将统治的王国。然而，距离并不意味着他超出我们的影响范围。我们可以选择他的老师，强调某些学科，鼓励某些习惯，从而按照我们为[ROOT.GetNameDef]所设想的未来来塑造他的思想。他最终是作为军人、学者还是更伟大的人物归来，很大程度上取决于他现在学习的内容。\n\n因为国王如果不是国家的延伸，那什么才是呢？"
 siam.27.a: "引导他从事学术研究。"
 siam.27.b: "指导他学习军事事务。"
 siam.27.c: "引导他学习行政与后勤。"
 siam.27.d: "教育他学习工业与发展。"
 siam.28.t: "阿南塔国王的加冕"
 siam.28.desc: "漫长的摄政时期即将结束。在曼谷，面对王子、僧侣、大臣和国家官员，阿南达以自身权利登上王位，接受查克里王朝国王应有的荣誉。典礼宣告着动荡之后的延续，纷争之后的神圣秩序。对于王国而言，这次加冕不仅仅是一场盛典，更是一份宣言：王权永续，王国未被流放或内乱摧毁，一个属于[ROOT.GetNameDef]的新统治时代已经开始。"
 siam.28.a: "国王万岁"
 siam.29.t: "学习常规坦克"
 siam.29.desc: "常规坦克仍然是战场上的王者，因此我们必须向最强者学习，以建立一支强大的坦克军团。"
 siam.29.a: "我们会向德国人学习"
 siam.29.b: "我们会向美国人学习"
 siam.29.c: "我们会向英国人学习"
 siam.31.t: "购买潜艇"
 siam.31.desc: "海军扩充计划要求我们建立潜艇部队，我们必须决定向哪国购买潜艇。[ENG.GetNameDef]和[JAP.GetNameDef]都已提出报价——但选择的意义远超造船厂本身。"
 siam.31.a: "[ENG.GetAdjective]船能派的上用场"
 siam.31.b: "我们围绕[JAP.GetAdjective]的设计来建设潜艇部队"
 siam.32.t: "购买岸防船舰"
 siam.32.desc: "我们的沿海水域需要可靠的防御舰艇，我们必须慎重选择供应商。[ENG.GetNameDefCap]和[JAP.GetNameDef]都已做好交付准备——这一决定不仅影响舰队实力，也将左右我们的对外关系。"
 siam.32.a: "我们将依靠[ENG.GetAdjective]舰船来加强海岸防御。"
 siam.32.b: "我们将依靠[JAP.GetAdjective]舰船来加强海岸防御。"
 siam.33.t: "出售曼谷船坞公司"
 siam.33.desc: "曼谷船坞公司的出售已经完成，所得款项现存入国库。政府必须决定这些资金的最佳流向——是减轻普通民众的财政负担，加速国家技术发展，还是增强对国家未来的信心。"
 siam.33.a: "减轻人民的税负"
 siam.33.b: "将资金拨给海军研究"
 siam.33.c: "利用这笔意外之财安抚国民"
 siam.34.t: "[FROM.GetAdjective]在我海岸提出的要求"
 siam.34.desc: "[FROM.GetAdjective]的军队正向[ROOT.GetNameDef]施压，其外交官言语间充满事已成定局的自信。他们提供给我们关于秩序与稳定的惯常说辞，但他们真正寻求的是服从。我们可以屈服，让国家以残存的形态存续；也可以依附于他们的阵营，以期保留少许行动自由；又或者，选择直面强权断然回绝，命令入侵者离开我们的海岸。"
 siam.34.a: "我们将加入他们的阵营，以保全我们的统治"
 siam.34.b: "让他们离开我们的海岸"
 siam.35.t: "[JAP.GetNameDefCap]要求我们扩大印钞"
 siam.35.desc: "[JAP.GetNameDefCap]已明确其期望：我们必须增加货币供应以满足其经济需求。这一负担将通过物价上涨转嫁到我们自己的人民身上，而[JAP.GetAdjective]工业则将坐收渔利。我们几乎没有拒绝的余地。"
 siam.35.a: "顺从[JAP.GetNameDef]的要求"
 siam.36.t: "[SIA.GetNameDefCap]要求偿还债务"
 siam.36.desc: "[SIA.GetNameDefCap]已正式要求我们偿还因强迫其实施的印钞安排而产生的费用。这一安排曾为我们带来巨大利益，但现在账单已经到期。"
 siam.36.a: "履行债务并开始还款"
 siam.37.t: "[JAP.GetNameDefCap]同意偿还债务！"
 siam.37.desc: "在我们的要求下，[JAP.GetNameDef]已同意开始偿还印钞安排所产生的经济成本。这笔补偿虽不能完全消除加诸我国人民身上的负担，但至少能为国库带来一些缓解。"
 siam.37.a: "公平的解决方案，我们的经济将会复苏"
 siam.38.t: "[SIA.GetName]寻求和谈"
 siam.38.desc: "[SIA.GetAdjective]政府已向我们提出和谈条件。他们的大臣如今不得不承认，我们的枪炮早已证明——[ROOT.GetNameDef]在这场斗争中占据主动。我们可以接受他们的投降，使其臣服，将他们纳入我们的阵营，让他们的政府为我们更宏大的事业服务；也可以拒绝一切妥协，继续推进战事，直至完全占领暹罗。"
 siam.38.a: "接受他们的投降"
 siam.38.b: "不，我们会以武力结束这一切"
 siam.39.t: "[FROM.GetAdjective]政府接受我们的投降"
 siam.39.desc: "[FROM.GetLeader]已选择接受我们的投降。目前，[ROOT.GetNameDef]虽免于进一步遭受蹂躏，却难逃屈辱的命运。军队受命停止抵抗，政府得以存续仅是依靠强权的宽容。我们保住了国家，却付出了尊严与行动自由的代价。"
 siam.39.a: "我们忍受着必须忍受的一切"
 siam.40.t: "[FROM.GetAdjective]政府拒绝我们的提议"
 siam.40.desc: "[FROM.GetLeader]拒绝了曼谷发出的每一次提议。任何投降都被认为不够彻底，任何妥协都不可接受。敌人只想通过彻底征服来解决此事。如今，对于[ROOT.GetNameDef]来说，除了抵抗别无选择。如果他们不愿通过协议离开我们的领土，那就必须用武力将他们赶走。"
 siam.40.a: "那就战斗"
 siam.41.t: "[FROM.GetNameDefCap]派遣官员来向我们学习治国理政"
 siam.41.desc: "一个[FROM.GetAdjective]官员代表团已抵达，考察学习我国的行政和科研方法。[FROM.GetNameDefCap]显然有意借鉴外国经验，推动其官僚体制现代化，并选择[ROOT.GetNameDef]作为典范。此次访问是对我国方法的一种含蓄认可，也是与其他政府建立善意的契机。"
 siam.41.a: "我们欢迎他们的代表团"
 siam.42.t: "[FROM.GetNameDefCap]将其货币与我国货币挂钩"
 siam.42.desc: "[FROM.GetNameDefCap]已正式决定将其货币与我国货币锚定。这一决定使[FROM.GetNameDef]更深地进入我国的经济轨道，并展现出对我国金融机构稳定性的一定信任。我们两国之间的贸易将变得更可预测，[FROM.GetAdjective]商人与我国商人做生意也会更便利。"
 siam.42.a: "这对我们的贸易关系是可喜的进展"
 siam.43.t: "[FROM.GetNameDefCap]请求开展投资"
 siam.43.desc: "[FROM.GetNameDefCap]已发出邀请，希望我国的工程师和专家协助其国家发展。这项合作为我国工业在该地区提供了一处立足点，并加强了两国政府间的经济联系。这是个温和的提议，但随时间推移，可能会带来可观的回报。"
 siam.43.a: "我们很乐意提供协助"
 siam.44.t: "[FROM.GetNameDefCap]下达潜艇订单"
 siam.44.desc: "[FROM.GetNameDefCap]已下订单，要建造我国设计的潜艇。这桩买卖代表着对我国造船业一次有分量的信任投票，也将[FROM.GetAdjective]的影响力延伸到了东南亚水域。"
 siam.44.a: "对我国船厂来说是一份可喜的订单"
 SIA_purchased_submarines_from_us: "从我国购买了潜艇"
 siam.45.t: "[FROM.GetNameDefCap]提议联盟合并"
 siam.45.desc: "来自[FROM.GetName]的代表团带来了[FROM.GetLeader]的提议。他们主张，我们各自独立的联盟如今追求着同样的大目标，却把人员、物资和外交影响力分散在相互竞争的指挥体系之中。\n\n通过将我们的力量与他们合并，我们将建立一个更强大的集团，能够在更广阔的战线上协调战略。这样的协议会增强共同事业，但也会要求我们接受[FROM.GetAdjective]对联盟未来方向的影响力。"
 siam.45.a: "统一的战线是必要的"
 siam.45.b: "我们的联盟仍归我们所有"
 siam.46.t: "[FROM.GetNameDefCap]接受合并"
 siam.46.desc: "[FROM.GetLeader]接受了我们合并联盟的提议，组成单一联合体。曾经各自独立的指挥体系和外交渠道如今正被整合为统一架构，使我们双方政府能以远比过去清晰的姿态协调战争计划、物资供应和外交政策。\n\n安排并非没有麻烦，但团结的必要性占了上风。"
 siam.46.a: "团结一致，更加强大"
 siam.47.t: "[FROM.GetNameDefCap]拒绝合并"
 siam.47.desc: "[FROM.GetLeader]拒绝了我们将联盟合并的提议。他们的政府声称，利益一致时可继续合作，但不会将自己的联盟置于一个由[ROOT.Capital.GetCapitalVictoryPointName]领导的更广泛联合体之内。\n\n眼下，我们两大集团之间的分裂依旧。我们必须在不假定对方全力投入的情况下追求自身目标。"
 siam.47.a: "那我们就单独行动"
 siam.48.t: "[SIA.GetName]请求[JAP.GetAdjective]援助"
 siam.48.desc: "[SIA.GetNameDefCap]已正式请求军事援助，以对抗入侵其国家的军队。作为回报，[SIA.GetAdjective]政府准备向[JAP.GetAdjective]企业授予获取战略资源、基础设施和商业权利的特权。\n\n支持[SIA.GetName]将扩大我们在东南亚的影响力，并为帝国获取宝贵资源，尽管这也可能让我们更深地卷入地区冲突。"
 siam.48.a: "接受他们的提议"
 siam.48.b: "[JAP.GetName]没有多余的资源"
 siam.49.t: "[JAP.GetName]接受我方请求"
 siam.49.desc: "[JAP.GetNameDefCap]同意支持[ROOT.GetNameDef]的斗争。[JAP.GetAdjective]的顾问、装备和物资即将开始运抵，同时根据协议，[JAP.GetAdjective]的公司获得了经济特许权。\n\n尽管内阁为国家的存续而庆祝，但许多人暗自怀疑，为了这份援助，我们究竟牺牲了多少独立自主。"
 siam.49.a: "我们有了真正的盟友"
 SIA_japan_aid_request.4.t: "[JAP.GetName]拒绝我方请求"
 SIA_japan_aid_request.4.desc: "[JAP.GetNameDef]政府拒绝了我们的军事援助请求。东京方面声称，帝国目前不能为我们的斗争提供人员和物资。\n\n在没有外援的情况下，[ROOT.GetNameDef]如今只能依靠自身力量抵御入侵。"
 SIA_japan_aid_request.4.a: "那我们便独自应战"
 siam_adc.1.t: "[FROM.GetNameDefCap]要求释放[?var:SIA_adc_demand_country_to_be_released.GetNameDef]"
 siam_adc.1.desc: "一封正式照会已从[FROM.GetNameDef]送达，[FROM.GetLeader]谴责我们持续占领亚洲国家，认为这是对其自决权的不可容忍的冒犯。照会指出，亚洲不是任由外国随意瓜分或管理的战利品，并要求我方立即撤军，并在[?var:SIA_adc_demand_country_to_be_released.GetNameDef]恢复一个独立的政府。\n\n这一要求没有任何含糊之处。[FROM.GetNameDefCap]期望我们遵照执行，若我们拒绝，将被视为对其国家的蓄意侮辱。"
 siam_adc.1.a: "我们会释放他们"
 siam_adc.1.b: "他们将继续被占领"
 siam_adc.2.t: "[FROM.GetNameDefCap]提议恢复我们的独立"
 siam_adc.2.desc: "随着[FROM.GetAdjective]接受[SIA.GetNameDef]关于[ROOT.GetNameDef]未来的要求，[FROM.GetLeader]现在向我们提出了最终问题。占领当局已做好撤离准备，并表示若我们选择再次独立，将承认我们为拥有主权的[ROOT.GetAdjective]政府。\n\n独立意味着尊严和行动自由，但也意味着我们要在没有[FROM.GetNameDef]保障的情况下重建国家。继续接受他们的保护尽管显得低人一等，但在当前局势不明朗之际，或许能避免国家陷入进一步的混乱。"
 siam_adc.2.a: "我们将成为自由的国家"
 siam_adc.2.b: "我们将继续托庇于[FROM.GetAdjective]的羽翼下"
 siam_adc.3.t: "[?var:SIA_tag_that_was_released_due_to_sia_pressure.GetName]同意独立"
 siam_adc.3.desc: "[?var:SIA_tag_that_was_released_due_to_sia_pressure.GetNameDef]政府选择独立。占领政府即将解散，[var:SIA_tag_that_was_released_due_to_sia_pressure.GetNameDef]准备恢复其在世界主权国家中的地位。"
 siam_adc.3.a: "他们的未来在何方？"
 siam_adc.4.t: "[FROM.GetNameDefCap]拒绝独立"
 siam_adc.4.desc: "尽管有机会获得自由，但[FROM.GetNameDef]政府拒绝立即独立。他们的部长们辩称，国家还未准备好承担完全的主权，目前更愿意维持现状。"
 siam_adc.4.a: "那就继续吧"
 siam_adc.5.t: "[FROM.GetNameDefCap]拒绝我方要求"
 siam_adc.5.desc: "[FROM.GetName]已明确表示，我们的要求极其可笑。他们指出，我们薄弱的军事力量证明我们没有能力挑战现状。"
 siam_adc.5.a: "那我们就让他们瞧瞧"
 siam_dem_event_count: "军方正在策划一场诽谤行动，拖延越久对我们越不利"
 siam_dem.2.t: "陆军目标"
 siam_dem.2.desc: "在一次部长与高级官员的闭门会议上，一名军方代表对《黄皮档案》提案提出了尖锐批评。他指出，提案起草者过多谈论国家指导、资源再分配与社会义务，却很少顾及纪律、财产问题，以及可能加诸军官团体与农村地区的负担。在他看来，随着世界局势逐月恶化，[ROOT.GetNameDef]绝不可能依靠纸上空谈的理论来重塑。"
 siam_dem.2.a: "军方已阐明其立场"
 siam_dem.3.t: "公开谴责"
 siam_dem.3.desc: "这场争论已蔓延至委员会会议室之外。一份被普遍视为军方喉舌的报纸刊登了针对《黄皮档案》的完整谴责文章，将其描绘成一套用爱国言辞包装的外来方案。该报编辑警告称，该提案将阶级矛盾置于国家团结之上，削弱了人们对既定体制的信心，并在工农群体中煽动危险的期许。截至下午，这篇文章的内容已在军营、办公室和茶坊间广泛传播，原本的内部争论已演变为公开的舆论风波。"
 siam_dem.3.a: "批评声传开"
 siam_dem.4.t: "颂堪谴责档案"
 siam_dem.4.desc: "颂堪已公开且明确有力地介入这场纷争。他在支持者与军官面前发表演说，谴责黄皮档案在实质上具有共产主义色彩——无论其辩护者选用何种说辞。他宣称，任何将国家凌驾于财产之上、承诺全面社会变革并在底层阶级中煽动骚乱的方案，都是在以另一种名义将红色毒素注入[ROOT.GetNameDef]。"
 siam_dem.4.a: "他毫不含糊"
 siam_dem.5.t: "必须组建政府"
 siam_dem.5.desc: "旧政权已然崩溃，自由泰人运动胜利在望。但胜利不等于治理，推翻披汶的联合政府在如何善后的问题上远未达成共识。权力走廊中流传着三个名字：抵抗运动的良心——比里·帕侬荣，温和到足以不得罪任何人的宽·阿派旺，以及麾下军官们正等着论功行赏的屏·春哈旺将军。我们此刻扶植谁上台，将决定未来的和平走向。"
 siam_dem.5.a: "比里·帕侬荣应当领导国家。抵抗运动赢得了这一权利。"
 siam_dem.5.b: "宽·阿派旺，各派系均可接受的人选。"
 siam_dem.5.c: "屏·春哈旺将军。军队必须占有一席之地。"
 ###################
 #### AUSTRALIA ####
 ###################
 AST_election_events.1.t.a: "澳联党获胜！"
 AST_election_events.1.t.b: "工党获胜！"
 AST_election_events.1.desc.a: "计票完毕：澳大利亚联合党赢得了选举。\n\n澳大利亚联合党将经历短暂的政府组建期，然后在接下来的三年里证明公民对其代表的信任是正确的。"
 AST_election_events.1.desc.b: "计票完毕：澳大利亚工党赢得了选举。\n\n澳大利亚工党将经历短暂的政府组建期，然后在接下来的三年里证明公民对其代表的信任是正确的。"
 AST_election_events.1.a: "人民已作出选择"
 AST_election_events.2.t: "距离联邦选举还有一半时间"
 AST_election_events.2.desc: "$AST_democratic_party_long$自1931年起领导着[AST.GetName]，带领国家走出大萧条，远离反民主情绪。凭借稳定的领导、保守的倾向和对英国的忠诚，澳大利亚联合党巩固了支持，使连任的可能性日渐增大。然而，还有一个政党在这方面有话要说。\n\n仍在从1931年使其下台的不信任动议中恢复元气的$AST_labor_party_long$正开始重拾势头。随着共产主义声音被压制，工人阶级现在寻找着另一盏指路明灯。在其代表每一个公民的使命中，工党对帝国主义和澳大利亚对帝国的忠诚采取了不同的视角。国内需求将放在首位，外国利益不应再被优先考虑。\n\n距离下一届联邦选举还有一年半时间。如果澳大利亚联合党想再获胜利，其领导人必须加快改革以维持公众支持。否则，澳大利亚工党的竞选活动或许会再次恢复其声望。"
 AST_election_events.2.a: "澳大利亚联合党将实施其最后的改革"
 AST_election_events.2.b: "一场遍及澳大利亚的巡回竞选活动将提升澳大利亚工党的支持率"
 AST_election_events.3.t: "$AST_election_season_cat$"
 AST_election_events.3.desc: "$AST_election_season_cat_desc$"
 AST_election_events.3.a: "开始了"
 AST_diplomatic_events.1.t: "与澳大利亚的互不侵犯条约"
 AST_diplomatic_events.1.desc: "作为近期外交努力的一部分，澳大利亚政府寻求与几个选定的亚洲国家签署互不侵犯协定；我们是其中之一。这一试图避免战争的举动，无论暴露出澳大利亚官员脱离现实，还是彰显出他们可敬的天真，我们的回应将在一定程度上决定一切。\n\n我们是否应与[AST.GetName]签署互不侵犯条约？"
 AST_diplomatic_events.1.a: "毫无疑问——不"
 AST_diplomatic_events.1.b: "的确应该如此"
 AST_diplomatic_events.2.t: "太平洋公约的阻力"
 AST_diplomatic_events.2.desc: "派往[FROM.GetNameDef]的代表团已电告该国对我们互不侵犯条约提议的回应。我们知道这一倡议影响深远，因此[FROM.GetLeader]的拒绝并不令人意外。"
 AST_diplomatic_events.2.a: "至少这是一次光荣的尝试"
 AST_diplomatic_events.3.t: "太平洋协定万岁"
 AST_diplomatic_events.3.desc: "派往[FROM.GetNameDef]的代表团已经电报了该国对我们互不侵犯条约提案的回应。最令人高兴的是，[FROM.GetLeader]支持我们的倡议，同意在其上盖章。"
 AST_diplomatic_events.3.a: "太棒了！"
 AST_diplomatic_events.4.t: "澳大利亚索要新加坡"
 AST_diplomatic_events.4.desc: "[AST.GetNameDefCap]长期以来一直质疑新加坡战略的可靠性；根据澳大利亚官员的说法，在太平洋战争爆发时我们能否前来援助他们是不确定的。将太平洋海军责任移交给[AST.GetName]将减轻英国的负担，但这同样也会将这一负担转移到澳大利亚肩上。\n\n我们能否相信，增加澳大利亚的控制权，会比新加坡继续由我们掌控，让我们的太平洋属民和领土处于更有利的地位？"
 AST_diplomatic_events.4.a: "是的，我们可以"
 AST_diplomatic_events.4.b: "新加坡应继续归我们所有"
 AST_diplomatic_events.5.t: "英国同意我们的请求"
 AST_diplomatic_events.5.desc: "英国同意将新加坡移交给澳大利亚管辖。这将最终结束过时的新加坡战略，让我们掌握自己的国防。"
 AST_diplomatic_events.5.a: "战略重写了！"
 AST_diplomatic_events.5.a.tt: "§Y新加坡§!:\n  由§Y澳大利亚§!控制。\n  由§Y澳大利亚§!拥有。\n§Y圣诞岛§!:\n  由§Y澳大利亚§!控制。\n  由§Y澳大利亚§!拥有。\n§Y科科斯群岛§!:\n  由§Y澳大利亚§!控制。\n  由§Y澳大利亚§!拥有。"
 AST_diplomatic_events.6.t: "英国拒绝我们的请求"
 AST_diplomatic_events.6.desc: "英国拒绝将新加坡移交给澳大利亚管辖。现状将继续维持。"
 AST_diplomatic_events.6.a: "新加坡战略必须坚持下去"
 AST_diplomatic_events.7.t: "[AST.GetName]请求我们的援助"
 AST_diplomatic_events.7.desc: "[AST.GetNameDefCap]希望从盟友那里获取装备用于战事，并请求我们协助管理所需的运输。我们能拨出货船供[AST.GetName]使用吗？"
 AST_diplomatic_events.7.a: "可以"
 AST_diplomatic_events.7.b: "不行"
 AST_diplomatic_events.8.t: "[USA.GetName]同意我们的请求"
 AST_diplomatic_events.8.desc: "[USA.GetNameDefCap]已同意拨出一定数量的货船以协助[AST.GetName]的补给。"
 AST_diplomatic_events.8.a: "它们将大有用途！"
 AST_diplomatic_events.9.t: "[USA.GetName]拒绝我们的请求"
 AST_diplomatic_events.9.desc: "[USA.GetNameDefCap]没有多余的货船可提供给[AST.GetName]协助补给。"
 AST_diplomatic_events.9.a: "我们只能靠自己管好后勤"
 AST_diplomatic_events.10.t: "战时同盟"
 AST_diplomatic_events.10.desc: "[AST.GetNameDefCap]高度重视与[USA.GetNameDef]的盟友关系，现请求将其正式化，建立一个共同的国际战时联盟。通过联合力量，我们两国可以在当前和未来的冲突中相互协助。"
 AST_diplomatic_events.10.a: "我们必须同意"
 AST_diplomatic_events.10.b: "没有他们，[USA.GetNameDefCap]会更强大"
 AST_diplomatic_events.11.t: "战时同盟"
 AST_diplomatic_events.11.desc: "[USA.GetNameDefCap]已同意联合作战力量。作为[AST.GetFactionName]的成员，[AST.GetName]和[USA.GetName]将在当前和未来的冲突中相互协助。"
 AST_diplomatic_events.11.a: "我们的敌人将畏惧我们"
 AST_diplomatic_events.12.t: "被拒绝的战时同盟"
 AST_diplomatic_events.12.desc: "[USA.GetNameDefCap]拒绝了我们的联合提议。[AST.GetNameDefCap]和[USA.GetName]将在各自的战争努力中保持分裂。"
 AST_diplomatic_events.12.a: "我们必须独自支撑"
 AST_diplomatic_events.13.t: "第六条"
 AST_diplomatic_events.13.desc: "在将澳大利亚各殖民地联合为联邦的过程中，新西兰最终决定不参与。然而，自那时起，《澳大利亚宪法》一直将新西兰定义为其联邦的潜在州之一，并确实允许我们加入。\n\n[AST.GetName]现在声称，当前的世界局势要求团结，请求[NZL.GetName]移交给澳大利亚管辖。我们是否应就此问题举行公投？"
 AST_diplomatic_events.13.a: "我们同意"
 AST_diplomatic_events.13.a.tt: "将举行公投，可能导致§Y[NZL.GetName]§!被§R吞并§!"
 AST_diplomatic_events.13.b: "决不可能！"
 AST_diplomatic_events.14.t: "[NZL.GetNameDefCap]成为澳大利亚的一个地区"
 AST_diplomatic_events.14.desc: "根据最近举行的公投，[NZL.GetName]决定援引《澳大利亚宪法》第六条。新西兰人同意，他们的土地在澳大利亚的治理下更加安全，因此同意加入[AST.GetNameDef]。"
 AST_diplomatic_events.14.a: "澳大利亚扩张了"
 AST_diplomatic_events.15.t: "新西兰公众抵制"
 AST_diplomatic_events.15.desc: "根据最近举行的公投，[NZL.GetName]决定不援引《澳大利亚宪法》第六条。[NZL.GetNameDefCap]将继续作为一个独立国家存在。"
 AST_diplomatic_events.15.a: "澳大利亚将保持现状"
 AST_diplomatic_events.16.t: "[NZL.GetNameDefCap]官员抵制"
 AST_diplomatic_events.16.desc: "尽管受到澳大利亚的压力，[NZL.GetName]决定不举行公投以援引《澳大利亚宪法》第六条。[NZL.GetNameDefCap]将继续作为一个独立国家存在。"
 AST_diplomatic_events.16.a: "澳大利亚保持现状"
 AST_diplomatic_events.17.t: "澳大利亚伙伴关系"
 AST_diplomatic_events.17.desc: "敌人正从北方逼近，它抵达我们家门口只是时间问题——或者至少澳大利亚官员是这么声称的。[AST.GetNameDefCap]提议我们联合起来形成一个单一屏障，首选方案是将[INS.GetName]置于澳大利亚管辖之下，但至少也应得到军事通行权。"
 AST_diplomatic_events.17.a: "同意置于澳大利亚管辖之下"
 AST_diplomatic_events.17.a.tt: "§Y[INS.GetNameDefCap]§!将成为§Y[AST.GetNameDefCap]§!的§Y傀儡国§!。"
 AST_diplomatic_events.17.b: "提供军事通行权"
 AST_diplomatic_events.17.b.tt: "§Y[INS.GetNameDefCap]§!将与§Y[AST.GetNameDefCap]§!达成§Y军事通行权§!协议。"
 AST_diplomatic_events.17.c: "两项均不同意"
 AST_diplomatic_events.18.t: "[INS.GetNameDefCap]接受澳大利亚的要求"
 AST_diplomatic_events.18.desc: "[INS.GetName]已同意我们的请求；我们的合作将极大地影响我们两国的防御能力。"
 AST_diplomatic_events.18.a: "好极了！"
 AST_diplomatic_events.19.t: "[INS.GetNameDefCap]拒绝"
 AST_diplomatic_events.19.desc: "[INS.GetName]已拒绝我们的请求；我们两国将不得不自行负责各自的防御。"
 AST_diplomatic_events.19.a: "[AST.GetNameDefCap]将在没有他们的情况下度过冲突"
 AST_diplomatic_events.20.t: "召集英国战时内阁"
 AST_diplomatic_events.20.desc: "[GET_AST_BWC_COUNT][ENG.GetNameDefCap]召集澳大利亚总理参加英国战时内阁。世界局势严峻，促使英国与其盟友寻求共同战略和军事合作。\n\n然而，澳大利亚有自己的考量。为了取悦英国，我们能抽出总理的一些时间吗？"
 AST_diplomatic_events.20.a: "[AST.GetLeader]将启程前往英国"
 AST_diplomatic_events.20.b: "这里需要他"
 AST_bwc_count_2: "[ENG.GetLeader]第二次请求[AST.GetLeader]与会，声称我们之间的密切合作将决定共同斗争之结局。\n\n"
 AST_bwc_count_3: "又一次，[AST.GetLeader]被要求远渡重洋，以维护英联邦的合作。然而，只要我们明确自己的利益究竟是在于共同努力，还是在于打理好自己的事务，预计就不会再有更多此类要求了。\n\n"
 AST_bwc_accept_effect_tt: "§Y接受3次会议召集的效果：§!"
 AST_bwc_accept_tt: "接受§Y[?var:AST_bwc_accept]§!/§Y3§!次会议召集"
 AST_diplomatic_events.22.t: "对英国战时内阁的成功贡献"
 AST_diplomatic_events.22.desc: "在过去一年里，澳大利亚总理定期出席英国战时内阁。尽管[AST.GetNameDef]本身有时不得不付出代价，但通过英国的军事合作，我们国家现在变得更加强大。"
 AST_diplomatic_events.22.a: "到头来，代价是值得的"
 AST_diplomatic_events.23.t: "[ENG.GetLeader]不再寻求澳大利亚战争影响力"
 AST_diplomatic_events.23.desc: "[ENG.GetNameDefCap]已多次召集澳大利亚总理参加英国战时内阁，但在屡次遭到拒绝后，[ENG.GetLeader]认为没有再继续这样做的理由。"
 AST_diplomatic_events.23.a: "嗯，那好吧"
 AST_diplomatic_events.24.t: "领导权更迭"
 AST_diplomatic_events.24.desc: "澳大利亚总理对英联邦的战时事务影响重大。罗伯特·孟席斯定期访问伦敦期间，在英国首相威信渐失之际，他赢得了英国大臣们的信任。如今，大臣们已向[ENG.GetNameDef]领导人施压，要求其辞职，并让孟席斯取而代之。\n\n尽管[AST.GetName]失去了自己的总理，他们却因此获得了来自宗主国的永久忠诚，受到如今执掌英国政权的澳大利亚同胞的庇护。这片南方大陆渴望更大的自治权，而罗伯特·孟席斯则是首位为此署名之人。"
 AST_diplomatic_events.24.a: "局势正在改变"
 AST_diplomatic_events.25.t: "在堪培拉统治之下"
 AST_diplomatic_events.25.desc: "太平洋国家间日益紧张的局势令人担忧，而英国正忙于应对自身的战事，我们似乎无力救援我们的属地——至少[AST.GetName]如此声称。\n\n他们意图重组英联邦，以便由堪培拉直接管辖太平洋和印度洋诸国。我们是否同意？"
 AST_diplomatic_events.25.a: "我们将如此；太平洋地区将在中央集权下得到加强"
 AST_diplomatic_events.25.b: "绝不！"
 AST_diplomatic_events.26.t: "太平洋联邦"
 AST_diplomatic_events.26.desc: "[ENG.GetNameDefCap]已同意；太平洋地区将在集中管控下得到加强。英国在太平洋的领地现已交由我们管辖。"
 AST_diplomatic_events.26.a: "太平洋诸国联合起来。"
 AST_diplomatic_events.27.t: "英国拒绝我方请求"
 AST_diplomatic_events.27.desc: "[ENG.GetNameDefCap]反对；太平洋地区不会在集权管控下得到强化。太平洋各领地仍将在我们英国的管辖之下。"
 AST_diplomatic_events.27.a: "然而，澳大利亚必将坚持到底"
 AST_diplomatic_events.28.t: "[ENG.GetLeader]挂断电话"
 AST_diplomatic_events.28.desc: "首相与[ENG.GetLeader]通过电话产生的争执，几乎没有给澳大利亚带来任何增援，反而加剧了英国对[AST.GetLeader]为澳大利亚争取利益一事的不满。"
 AST_diplomatic_events.28.a: "澳大利亚必须自行防卫"
 AST_diplomatic_events.29.t: "英国来援"
 AST_diplomatic_events.29.desc: "在澳大利亚向[ENG.GetNameDef]施压，促使其挑起与[JAP.GetName]的冲突之后，英国已同意支持我们的防御工事建设。"
 AST_diplomatic_events.29.a: "援助固然很好，但无法阻止日本发动战争"
 AST_diplomatic_events.30.t: "澳大利亚请求资源开采权"
 AST_diplomatic_events.30.desc: "扩张主义的侵略者觊觎印度支那，不仅是为其领土，更是为其所拥有的资源。如果这些财富落入敌手，战争将继续延长，而由澳大利亚掌握，则可能帮助结束战争——至少澳大利亚政府如此声称。\n\n我们是否同意授予他们在我国境内的资源开采权？"
 AST_diplomatic_events.30.a: "我们同意"
 AST_diplomatic_events.30.b: "这些资源也不该给[AST.GetName]"
 AST_diplomatic_events.31.t: "[FROM.GetNameDefCap]给予[AST.GetName]资源开采权"
 AST_diplomatic_events.31.desc: "扩张主义的侵略者觊觎印度支那，不仅是为其领土，更是为其所拥有的资源。如果这些财富落入敌手，战争将继续延长，而由澳大利亚掌握，则可能帮助结束战争——至少澳大利亚政府如此声称。\n\n[ROOT.OVERLORD.GetNameDefCap]已同意该请求。"
 AST_diplomatic_events.31.a: "这已超出我们的控制范围"
 AST_diplomatic_events.32.t: "[FROM.GetNameDefCap]给予资源开采权"
 AST_diplomatic_events.32.desc: "[FROM.GetNameDefCap]认同印度支那的资源由澳大利亚掌控更为妥当，并已给予我们资源开采权。"
 AST_diplomatic_events.32.a: "他们将大派用场"
 AST_diplomatic_events.33.t: "[FROM.GetNameDefCap]拒绝给予资源开采权"
 AST_diplomatic_events.33.desc: "[FROM.GetNameDefCap]并不认同将印度支那的资源交由澳大利亚掌控会更加妥当，并拒绝给予我们资源开采权。"
 AST_diplomatic_events.33.a: "我们希望它们不会落入敌手"
 AST_diplomatic_events.34.t: "[AST.GetNameDefCap]请求划分太平洋领土"
 AST_diplomatic_events.34.desc: "[AST.GetNameDefCap]提议订立一项协定，旨在化解我们两国之间的潜在冲突。通过划分我们在太平洋的势力范围，双方可规划各自的未来扩张，而无需担心对方干涉。"
 AST_diplomatic_events.34.a: "条约似乎有道理"
 AST_diplomatic_events.34.b: "[JAP.GetNameDefCap]将按自己的意愿扩张"
 AST_diplomatic_events.35.t: "太平洋已划分"
 AST_diplomatic_events.35.desc: "[AST.GetNameDefCap]和[JAP.GetNameDefCap]已就各自可以扩张进入哪些太平洋领土达成一致。希望这能避免我们两国之间未来任何潜在的冲突。"
 AST_diplomatic_events.35.a: "已解决！"
 AST_diplomatic_events.36.t: "太平洋将自行划分"
 AST_diplomatic_events.36.desc: "[JAP.GetNameDefCap]不同意在我们两国之间划分太平洋领土；日本政府将按自己的意愿扩张。"
 AST_diplomatic_events.36.a: "澳大利亚也是如此"
 AST_diplomatic_events.37.t: "宗主权的转移"
 AST_diplomatic_events.37.desc: "出于未知原因，[AST.GetName]决定将我们土地的控制权移交给[JAP.GetNameDef]。幕后正酝酿着某种不祥之事，世界发现真相只是时间问题。"
 AST_diplomatic_events.37.a: "显然，此事我们别无选择"
 AST_diplomatic_events.38.t: "瑙鲁条约"
 AST_diplomatic_events.38.desc: "作为第一次世界大战的结局，太平洋上的几块德国属地曾交由澳大利亚管辖。然而如今，我们或许有望收回其中一处领土：瑙鲁岛。\n\n[AST.GetFascistParty]所秉持的价值观与我国利益不谋而合，其中之一便是推动[AST.GetName]彻底脱离[ENG.GetNameDef]。由于该党目前影响力尚弱，其代表希望获得我方支持以壮大自身势力。他们承诺，一旦完全掌握政权，便将瑙鲁岛的控制权交还我方——前提是我国在其争取独立的进程中能为其提供庇护保障。"
 AST_diplomatic_events.38.a: "我们的领土将回归！"
 AST_diplomatic_events.38.b: "我们不能承诺空洞的诺言"
 AST_diplomatic_events.39.t: "[GER.GetNameDefCap]同意瑙鲁条约"
 AST_diplomatic_events.39.desc: "[GER.GetNameDefCap]与[AST.GetFascistParty]已就共同目标达成一致：[AST.GetName]应当实现独立。鉴于[AST.GetFascistParty]当前政治影响力有限，[GER.GetNameDef]将提供资助以加速其发展，等到我们影响力不再受限时，此项协议将全面落实。"
 AST_diplomatic_events.39.a: "太棒了！"
 AST_diplomatic_events.40.t: "瑙鲁条约破灭"
 AST_diplomatic_events.40.desc: "由于无法承诺尚无法履行的诺言，[GER.GetNameDef]拒绝支持我们掌权。瑙鲁条约还未开始就已结束，[AST.GetFascistParty]的雄心完全落在了我们肩上。"
 AST_diplomatic_events.40.a: "[AST.GetFascistParty]将在没有德国支持的情况下继续。"
 AST_diplomatic_events.41.t: "瑙鲁回归德国之手"
 AST_diplomatic_events.41.desc: "现在已完全掌权的[AST.GetFascistParty]信守承诺，履行了自己一方的约定。瑙鲁已归还[GER.GetNameDef]，我们则将确保澳大利亚的独立。"
 AST_diplomatic_events.41.a: "那就这么定了。"
 AST_diplomatic_events.42.t: "[AST.GetFascistParty]背弃承诺"
 AST_diplomatic_events.42.desc: "承诺有一个致命缺陷——它们可以被打破。现在掌权后，[AST.GetFascistParty]的领导人决定，不仅瑙鲁要归他们所有，其他太平洋岛屿他们也要夺取。\n\n我们的旧太平洋领地仍将和签署《瑙鲁协定》前那般遥不可及。如果我们想要改变这种状况，那就只能诉诸战争。"
 AST_diplomatic_events.42.a: "未来将决定其后果"
 AST_diplomatic_events.43.t: "[AST.GetNameDefCap]索要东南亚"
 AST_diplomatic_events.43.desc: "[AST.GetName]宣称，通过向北扩张，我们能够增强双方在东南亚谈判与冲突中的共同影响力。尽管这并未被明确提出，但[AST.GetLeader]暗示，拒绝并不是一个可以接受的选项。"
 AST_diplomatic_events.43.a: "既然我们的注意力在别处，那这样最好"
 AST_diplomatic_events.43.b: "无论如何，他们得到的将只有拒绝"
 AST_diplomatic_events.44.t: "移交东南亚"
 AST_diplomatic_events.44.desc: "[ENG.GetNameDefCap]明智地同意将其东南亚领土转让予我方。随着澳大利亚疆界的拓展，我们的影响力亦随之延伸，整个世界成为我们的囊中之物只是时间问题。"
 AST_diplomatic_events.44.a: "前途一片光明"
 AST_diplomatic_events.45.t: "东南亚维持现状"
 AST_diplomatic_events.45.desc: "[ENG.GetNameDefCap]拒绝了将其东南亚领土移交给我们。尽管如此，控制该地区的吸引力对我们而言依然显而易见。虽然无法通过请求得手，但我们总有一天能将其收入囊中。"
 AST_diplomatic_events.45.a: "是的，总有一天"
 #AST_diplomatic_events.46.t was removed
 AST_diplomatic_events.47.t: "分担负担"
 AST_diplomatic_events.47.desc: "尽管最近脱离了英联邦，[AST.GetName]仍提出军事合作。[AST.GetName]声称，考虑到[ENG.GetNameDefCap]在全球范围内分身乏术，共同分担责任将对其更有利。"
 AST_diplomatic_events.47.a: "我们同意"
 AST_diplomatic_events.47.b: "我们将自力更生"
 AST_diplomatic_events.48.t: "英澳协定"
 AST_diplomatic_events.48.desc: "[ENG.GetNameDefCap]已同意签署互不侵犯条约，为军事合作奠定基础。"
 AST_diplomatic_events.48.a: "这标志着我们关系的新篇章"
 AST_diplomatic_events.49.t: "未签署的条约"
 AST_diplomatic_events.49.desc: "[ENG.GetNameDefCap]拒绝签署互不侵犯条约。因此，我们试图建立两国军事合作的努力失败了，我们必须独自向外推进。"
 AST_diplomatic_events.49.a: "我们确实必须如此"
 AST_diplomatic_events.50.t: "澳大利亚太平洋驻军"
 AST_diplomatic_events.50.desc: "尽管保护东南亚和太平洋地区符合英国利益，但该地区距离不列颠群岛十分遥远，[FROM.GetName]对此也心知肚明。作为我们提供物资支持的交换，[FROM.GetName]提出由其负责该地区的防务，以便让我们能将注意力转向其他地方。"
 AST_diplomatic_events.50.a: "欢迎[FROM.GetName]的帮助"
 AST_diplomatic_events.50.b: "这地区足够近"
 AST_diplomatic_events.51.t: "[ENG.GetNameDefCap]的太平洋驻军"
 AST_diplomatic_events.51.desc: "[FROM.GetNameDefCap]同意；东南亚海域将由我方负责保护。作为英国提供燃料的交换条件，[ROOT.GetName]将致力于增强在我国邻近海域的制海权。"
 AST_diplomatic_events.51.a: "这片水域属于我们"
 AST_diplomatic_events.52.t: "澳大利亚太平洋驻军"
 AST_diplomatic_events.52.desc: "[FROM.GetNameDefCap]不同意；他们不需要帮助来保卫东南亚水域。但无论有没有英国的支持，[ROOT.GetName]都将致力于增强在邻近水域的海上主导地位。"
 AST_diplomatic_events.52.a: "这片水域属于我们"
 AST_diplomatic_events.53.t: "维希法国退出非洲"
 AST_diplomatic_events.53.desc: "[AST.GetName]推测，维希法国的倒台或合作是[ENG.GetNameDef]的主要目标之一，因此提议参与行动，在压制维希政权前持续追索法国非洲殖民地。虽然这项提议背后可能隐藏着未知的意图，但盟军在该地区增加存在无疑将对我们有利。\n\n若我方予以许可，[AST.GetName]将启动与维希法国的谈判，寻求其殖民地的和平移交，并建立澳大利亚驻防力量。"
 AST_diplomatic_events.53.a: "我们欢迎他们的支持"
 AST_diplomatic_events.53.b: "[AST.GetName]利用它对付我们的风险太大"
 AST_diplomatic_events.54.t: "施以援手"
 AST_diplomatic_events.54.desc: "[ENG.GetNameDefCap]同意：盟军在非洲增加存在将对英联邦有利。\n\n我们将启动与维希法国的谈判，寻求其殖民地的和平移交，并建立澳大利亚驻防力量。"
 AST_diplomatic_events.54.a: "那是自然"
 AST_diplomatic_events.55.t: "无论有无许可"
 AST_diplomatic_events.55.desc: "[ENG.GetNameDefCap]拒绝了澳大利亚在非洲的援助，并将自行处理维希法国事宜。然而，我们的野心并非轻易就能被改变。\n\n若能控制维希法国的非洲领土，澳大利亚将成为与英联邦平起平坐的力量，而非其附庸。尽管违背[ENG.GetNameDef]的意愿，我们必须继续争取这些领土，即便这意味着不得不动用武力。"
 AST_diplomatic_events.55.a: "我们将扩张"
 AST_diplomatic_events.56.t: "[AST.GetName]要求非洲领土"
 AST_diplomatic_events.56.desc: "[AST.GetName]代表[ENG.GetNameDef]前来，要求我们移交非洲领土。\n\n[ENG.GetNameDefCap]决意扩大在非洲的控制范围。若我们不愿屈从于澳大利亚的占领，他们将以武力再次登门。"
 AST_diplomatic_events.56.a: "为避免冲突，相关领土予以移交"
 AST_diplomatic_events.56.b: "那么，就让他们带着武力来"
 AST_diplomatic_events.57.t: "维希法国移交非洲领土"
 AST_diplomatic_events.57.desc: "维希法国已同意移交我们索取的非洲领土，并已允许澳大利亚驻军接管当地的控制权。"
 AST_diplomatic_events.57.a: "继续在非洲扩张！"
 AST_diplomatic_events.58.t: "维希法国拒绝移交[AST.GetName]领土"
 AST_diplomatic_events.58.desc: "维希法国拒绝将非洲领土移交给我们。然而，这并非请求，而是要求。\n\n我们将夺取他们拒绝给予我们的这片地区，尽管只能诉诸武力。"
 AST_diplomatic_events.58.a: "[AST.GetName]必须扩张，无论通过和平还是武力"
 #AST_diplomatic_events.59 was removed
 #AST_diplomatic_events.60 was removed
 #AST_diplomatic_events.61 was removed
 AST_diplomatic_events.62.t: "反英协定？"
 AST_diplomatic_events.62.desc: "来自[AST.GetName]的外交官向我们提出了一项建立反英同盟的提议。这将意味着他们协助我们从盎格鲁人手中收复北爱尔兰，而我们无需直接介入。\n\n作为回报，如果他们成功，我们将加入他们的派系，并在未来与英国的战争发生时协助他们。\n\n虽然与北方统一很有吸引力，但我们必须慎重考虑，我们是否有能力以这种方式与更强大的邻国为敌，更重要的是，若发生冲突，我们能否取得胜利——否则整个爱尔兰将再次沦为英国的殖民地。"
 AST_diplomatic_events.62.a: "统一不能等！签署协定！"
 AST_diplomatic_events.62.b: "这太危险了"
 AST_diplomatic_events.63.t: "爱尔兰拒绝！"
 AST_diplomatic_events.63.desc: "爱尔兰拒绝签署反英协定。"
 AST_diplomatic_events.63.a: "那就让爱尔兰继续分裂吧"
 AST_diplomatic_events.64.t: "爱尔兰同意！"
 AST_diplomatic_events.64.desc: "爱尔兰同意签署反英协定。"
 AST_diplomatic_events.64.a: "前进，到贝尔法斯特！"
 AST_diplomatic_events.65.t: "[FROM.GetName]提供支援" ### Support for the Chinese Communists - Sends event from AST to PRC offering support
 AST_diplomatic_events.65.desc: "[FROM.GetNameDef]国内[FROM.GetCommunistParty]日益增长的影响力如今初见成效——其代表跨越中国，告知我们有一支[FROM.GetAdjective]支援我方部队的志愿部队正在集结。此外，这些志愿者还带来了备用装备，以帮助装备我方军队。"
 AST_diplomatic_events.65.a: "与我们[FROM.GetAdjective]的同志进行合作的良好开端"
 #AST_diplomatic_events.65.b: "They should focus on their own revolution"
 AST_diplomatic_events.66.t: "[FROM.GetName]感谢我们的支援" ### Support for the Chinese Communists - They accept
 AST_diplomatic_events.66.desc: "[FROM.GetLeader]的代表转达了他对我们志愿者的支持及所提供战争物资的感谢。[FROM.GetAdjective]在内战中积累的丰富经验，无疑将确保这些资源得到有效利用。"
 AST_diplomatic_events.66.a: "良好的开端"
 AST_diplomatic_events.67.t: "[FROM.GetName]感谢我们的支援" ### Support for the Chinese Communists - They accept
 AST_diplomatic_events.67.desc: "[FROM.GetLeader]的代表转达了他对我们志愿者的支持及所提供战争物资的感谢。[FROM.GetAdjective]在内战中积累的丰富经验，无疑将确保这些资源得到有效利用。"
 AST_diplomatic_events.67.a: "良好的开端"
 AST_diplomatic_events.68.t: "澳大利亚的要求"
 AST_diplomatic_events.68.desc: "澳大利亚不想独自面对其强敌——[JAP.GetNameDef]。他们正敦促我们迈出第一步，尽早解决这场迫在眉睫的冲突。"
 AST_diplomatic_events.68.a: "风水轮流转"
 AST_diplomatic_events.69.t: "再度联结"
 AST_diplomatic_events.69.desc: "[ENG.GetNameDef]与[AST.GetName]之间的纽带正遭受考验，但后者决心将其重新培育得坚不可摧。[AST.GetName]在英国政府内部拥有如此之多的人脉与盟友，以致于其领导人根本无法拒绝；两国将再度进入同一阵营，英伦列岛与南方大陆将再度携手合作。"
 AST_diplomatic_events.69.a: "理应如此"
 AST_diplomatic_events.71.t: "澳大利亚索要太平洋岛屿"
 AST_diplomatic_events.71.desc: "[AST.GetName]要求控制我们的太平洋岛屿，声称西太平洋不由[USA.GetNameDef]掌控。这些岛屿可能是平息澳大利亚敌意的一个小代价，但终究是代价。我们是否要冒险激怒一个正在崛起的法西斯国家，尽管我们已自顾不暇？"
 AST_diplomatic_events.71.a: "不，我们不应冒险"
 AST_diplomatic_events.71.b: "太平洋岛屿仍将归我所有"
 AST_diplomatic_events.72.t: "[USA.GetNameDef]太平洋岛屿的移交"
 AST_diplomatic_events.72.desc: "鉴于[USA.GetNameDef]已自顾不暇，这些太平洋岛屿对他们来说不过是平息澳大利亚敌意的微小代价。他们的太平洋岛屿现在是我们的了。"
 AST_diplomatic_events.72.a: "太好了"
 AST_diplomatic_events.73.t: "[USA.GetNameDefCap]拒绝"
 AST_diplomatic_events.73.desc: "[USA.GetNameDefCap]拒绝将他们的太平洋岛屿交给我们。尽管我们提出了要求，并且在太平洋地区的影响力不断增长，华盛顿仍然不愿意放弃对这些岛屿的控制。"
 AST_diplomatic_events.73.a: "这些岛屿或许尚不归我方所有，且待来日"
 AST_diplomatic_events.74.t: "澳大利亚要求割让菲律宾"
 AST_diplomatic_events.74.desc: "出于扩张领土的野心，[AST.GetName]要求控制[PHI.GetNameDef]。如果我们拒绝，[AST.GetName]将威胁发动战争，认为[USA.GetNameDef]在[AST.GetName]的势力范围内保留领土是绝对不可接受的。"
 AST_diplomatic_events.74.a: "满足他们的要求，我们不能冒险开战"
 AST_diplomatic_events.74.b: "菲律宾应继续归我们所有！"
 AST_diplomatic_events.75.t: "[PHI.GetNameDef]的移交"
 AST_diplomatic_events.75.desc: "很明显，当各国都如此惧怕我们的怒火时，[AST.GetName]作为一个法西斯国家的崛起已经开始带来了一些好处。[USA.GetNameDefCap]已经同意；[PHI.GetNameDef]是我们的了。"
 AST_diplomatic_events.75.a: "新秩序已然涌现"
 AST_diplomatic_events.76.t: "[USA.GetNameDefCap]拒绝"
 AST_diplomatic_events.76.desc: "[USA.GetNameDefCap]拒绝将[PHI.GetNameDef]交给我们。尽管我们提出了要求，并且在太平洋地区的影响力不断增长，华盛顿仍然不愿意放弃对这些领土的控制。"
 AST_diplomatic_events.76.a: "这意味着战争"
 AST_diplomatic_events.78.t: "[AST.GetName]请求针对霸权的保障"
 AST_diplomatic_events.78.desc: "[AST.GetNameDefCap]向我们阐明了其宏伟目标：\n\n“‘[USA.GetNameDefCap]’的阴影笼罩着我们，一旦我们的行动不符合其利益，它便随时可能横加干涉。有这样一个全球霸权插手澳大利亚与日本的事务，东亚就永远无法真正属于我们。因此，[AST.GetName]将不惜一战。”\n\n总理[AST.GetLeader]明确表达了其意图：[AST.GetName]决心挑战[USA.GetNameDef]，若美国实力过于强大、难以独自战胜，则希望获得我方援助。"
 AST_diplomatic_events.78.a: "我们将保证他们的独立。"
 AST_diplomatic_events.78.b: "[JAP.GetNameDefCap]自有要务在身。"
 AST_diplomatic_events.79.t: "[JAP.GetNameDefCap]保证[AST.GetName]的独立"
 AST_diplomatic_events.79.desc: "我们深知，[USA.GetNameDef]对亚洲及大洋洲事务的干涉既令人反感，也完全不可接受。[JAP.GetNameDefCap]已同意为我国提供安全保障，使我们得以高举旗帜，迎战强敌。因为我们毫不怀疑，若美国势力过于强大而难以抗衡，盟友必将挺身而出，施以援手。"
 AST_diplomatic_events.79.a: "奔赴战场，我们义无反顾。"
 AST_diplomatic_events.80.t: "[JAP.GetNameDefCap]拒绝保障我国独立"
 AST_diplomatic_events.80.desc: "[USA.GetNameDefCap]对亚洲及大洋洲外交事务的干涉既令人反感又不可接受，但似乎只有我们看清了这一点。[JAP.GetNameDefCap]拒绝向我们提供保障，迫使我们不得不在没有他们支持的情况下独自迎敌。"
 AST_diplomatic_events.80.a: "正应如此。"
 AST_diplomatic_events.81.t: "团结的迷人象征"
 AST_diplomatic_events.81.desc: "英国首相对于动物的浓厚兴趣几乎无人不晓，其丰富的收藏更是广为人知。任何新成员加入他那多姿多彩的动物王国，都必将令他欣喜万分；若是珍稀异域的物种，则更会让他倍加珍爱。\n\n[ENG.GetLeader]本人曾明确表示，对澳大利亚的鸭嘴兽颇感兴趣。尽管考虑到运输过程中可能对这种小动物造成的健康风险，我们目前禁止其出口，但或许值得为此破例一次？\n\n作为团结的象征，我们是否应当成全首相的这一愿望？"
 AST_diplomatic_events.81.a: "[ENG.GetLeader]将会得到他的鸭嘴兽。"
 AST_diplomatic_events.81.b: "出口禁令不能解除，即便是首相也不例外。"
 AST_diplomatic_events.82.t: "来自[ENG.GetLeader]的沉痛报告"
 AST_diplomatic_events.82.desc: "六周前从墨尔本港启航、载有完整鸭嘴兽馆的鸭嘴兽运输船已抵达[ENG.GetNameDef]。然而，这艘舰船的到来并未带来喜悦，因为人们发现那只动物已经死亡。[ENG.GetLeader]为他失去的宠物哀叹不已，在等待其抵达期间，他甚至以自己的名字给鸭嘴兽起了名，但他声称敌人的行径才是导致其死亡的罪魁祸首。据称，潜艇袭击引发的爆炸声将这只鸭嘴兽活活吓死了。\n\n不过，鸭嘴兽饲养员的日志却指出了另一种可能的死因：鸭嘴兽馆内的水温和气温均远远超出了可接受的范围。\n\n无论如何，[ENG.GetLeader]的鸭嘴兽已经一命呜呼，这位英国首相也只能继续过着没有鸭嘴兽相伴的日子了。"
 AST_diplomatic_events.82.a: "这确实是个令人悲痛的消息。"
 AST_political_events.1.t: "举行全民公投"
 AST_political_events.1.desc: "作为政府，我们寻求加强联邦控制的两个领域是：航空和市场营销。\n\n关于航空，目标是修改宪法，授予联邦议会制定有关空中航行和飞机法律的权力。\n\n市场营销修正案则是允许联邦与各州在市场营销领域进行合作，这在目前的宪法下是不可能的。\n\n我们应选择哪一项举行公投？"
 AST_political_events.1.a: "航空，以规范[AST.GetName]全境的空中航行"
 AST_political_events.1.a.tt: "一旦改革通过：\n 添加§Y通过航空改革§!，获得：\n 空军研究速度：§G+15%§!\n §Y机场§!建造速度：§G+5.00%§!"
 AST_political_events.1.b: "市场营销，以协调全国性的农业营销计划"
 AST_political_events.1.b.tt: "一旦改革通过：\n 添加§Y通过市场改革§!，获得：\n 生活消费品工厂系数：§Y-10.0%§!"
 AST_political_events.2.t: "公投成功"
 AST_political_events.2.desc.a: "公众已同意让我们的航空改革得以实施。既然在澳大利亚宪法制定之时，航空尚未存在，那么由政府最终掌握航空导航与监管的权力就完全合理。为了安全与效率，统一的全国航空法律现在即将出台。"
 AST_political_events.2.desc.b: "公众已同意让我们的市场营销改革得以实施。凭借规范农产品及其营销的权力，政府现在能够稳定市场，改善各地区之间的合作。农民的收入将变得更加稳定，国民经济亦将如此。"
 AST_political_events.2.a: "联邦控制将加强！"
 AST_political_events.4.t: "总理病逝"
 AST_political_events.4.desc: "[AST.GetName]的领导人长期饱受备战压力的折磨，这份沉重的负担最终夺走了他的生命，首相因心脏病发作不幸逝世。\n\n考虑到当前世界的局势，他的领导才能将令人深切怀念。然而，澳大利亚必须继续前行，由新任领导人[AST.GetLeader]执掌大局。"
 AST_political_events.4.a: "国家的悲剧"
 AST_political_events.5.t: "澳大利亚政府采取强硬措施"
 AST_political_events.5.desc: "一个由反抗和争议声音组成的团体——澳大利亚优先运动——已经形成。政府担心其意图可能不完全民主，因此选择对该团体及其成员进行监视。民主派的干预将削弱我们的组织能力，并阻碍新成员的招募工作。"
 AST_political_events.5.a: "只有时间能说明这场运动的本质"
 AST_political_events.6.t: "1938年一百五十周年纪念"
 AST_political_events.6.desc: "今日早些时候，在纪念1938年建国150周年庆典举行、“澳大利亚迈向民族国家”游行队伍穿过悉尼主要街道之际，一场抗议活动在澳大利亚会堂举行。\n\n原住民权利活动家和团体聚集在一起，呼吁人们关注这样一个事实：150周年纪念不仅标志着英国殖民的开始，也标志着对原住民的宪法性歧视。活动家们要求制定新的法律，以保障原住民的教育和福利，同时制定新政策，允许提升原住民至完全公民身份地位。"
 AST_political_events.6.a: "必须采取行动"
 AST_political_events.7.t: "英联邦施压"
 AST_political_events.7.desc: "鉴于近期事件，无法否认澳大利亚政治格局正在发生变化。[ENG.GetNameDefCap]已采取行动，通过外交手段确保[AST.GetName]继续走在适合英联邦体系下国家的道路上，希望其通过和平引导能让自治领继续保持忠诚。"
 AST_political_events.7.a: "尽管英国努力过，[AST.GetName]仍将自行决定道路"
 AST_political_events.8.t: "战争将至"
 AST_political_events.8.desc: "$AST_war_is_coming_cat_desc$"
 AST_political_events.8.a: "我们必须做好准备"
 AST_political_events.9.t: "达尔弗拉姆争端"
 AST_political_events.9.desc: "起初不过是装运生铁的纠纷，如今已点燃了更大的事件。全澳大利亚的工人纷纷罢工声援，反抗政府与产业界。随着罢工蔓延、紧张局势升级，危机愈演愈烈，并要求当权者辞职。于是，因完全无力控制局势，政府照做了，将执政党的位置让给[AST.GetCommunistParty]。"
 AST_political_events.9.a: "而我们必将占据这位置"
 AST_canberra_air_disaster_events.1.t: "堪培拉空难"
 AST_canberra_air_disaster_events.1.desc: "今天早些时候，一架洛克希德哈德逊飞机在堪培拉郊外坠毁。机上十人中包括陆军司令及其参谋人员，他们正受召集前往参加内阁会议。机组人员与乘客全部不幸遇难。\n\n坠机原因仍旧未知，这次飞行条件良好，而驾驶飞机的澳大利亚皇家空军军官罗伯特·希区柯克空军上尉拥有丰富的飞行经验。\n\n无论原因如何，这都是整个国家的悲剧，尤其是对受害者的家人和朋友来说，澳大利亚现在等待着领导人的回应。"
 AST_canberra_air_disaster_events.1.a: "可怕的悲剧"
 AST_canberra_air_disaster_events.1.a.tt: "解锁§Y“内阁信任”决议§!和§Y任务§!以保留或移除现任政府"
 AST_canberra_air_disaster_events.2.t: "[AST.GetRulingParty]获胜"
 AST_canberra_air_disaster_events.2.desc: "现任政府成功带领澳大利亚度过了堪培拉空难后的全国性动荡。如同指路明灯，[AST.GetRulingParty]在艰难时期证明了其可靠性和力量，最终在全国范围内加强了公众支持。"
 AST_canberra_air_disaster_events.2.a: "未来就在前方"
 AST_canberra_air_disaster_events.3.t: "不信任动议"
 AST_canberra_air_disaster_events.3.desc: "在不信任动议成功后，现任政府终于被替换，不情愿地将权力移交给继任者。经过一段时间的政治不稳定和公众不信任，澳大利亚已准备好迎接新的开始。"
 AST_canberra_air_disaster_events.3.a: "新的领导层来援助澳大利亚"
 AST_canberra_air_disaster_events.4.t: "领导权更迭"
 AST_canberra_air_disaster_events.4.desc: "经过一段时间的政治不稳定和公众不信任后，[AST.GetRulingParty]更换了其领导层。多数票迫使总理下台，并允许其继任者登上讲台。"
 AST_canberra_air_disaster_events.4.a: "希望这将为澳大利亚铺平道路"
 AST_canberra_air_disaster_events.5.t: "澳大利亚的指控"
 AST_canberra_air_disaster_events.5.desc: "在一场新闻发布会上，[AST.GetName]向我们提出了指控，声称我们应该为最近在澳大利亚领土上发生的导致数名政府官员丧生的飞机失事负责。\n\n当然，这些指控完全是虚假的，只会让这种不尊重变得更加恶毒。"
 AST_canberra_air_disaster_events.5.a: "这些说法是虚假的，我们无需采取行动"
 AST_canberra_air_disaster_events.5.b: "必须严惩"
 AST_canberra_air_disaster_events.6.t: "[JAP.GetNameDefCap]的报复"
 AST_canberra_air_disaster_events.6.desc: "[JAP.GetNameDefCap]对我们的指控并未轻轻放下，而是将其视为侵犯行为。[JAP.GetLeader]进一步升级了冲突，表示现在他的国家完全有权入侵我们的土地。"
 AST_canberra_air_disaster_events.6.a: "我们不要再升级紧张局势了"
 AST_canberra_air_disaster_events.6.b: "不能置之不理。"
 INS_limited_war_events.1.t: "粉碎马来亚！"
 INS_limited_war_events.1.desc: "敌人的防线已被突破，我们的部队势如破竹向前推进。海峡对岸，这个英国的附庸国在人民的怒火下土崩瓦解。伦敦的傀儡们以为刺刀能让他们避开历史洪流，他们错了。"
 INS_limited_war_events.1.a: "独立与自由！"
 INS_limited_war_events.1.b: "对共和国而言，这是美好的一天"
 INS_limited_war_events.2.t: "[FROM.GetAdjective]的反击"
 INS_limited_war_events.2.desc: "之前承诺的对傀儡政权发动迅猛一击，已经变了味。得到其帝国主义主子撑腰的[FROM.GetAdjective]部队，将我方人员逐出争议地带，如今盘踞其上。无线电每天传来他们吹嘘的消息。继续进攻只会招致更多羞辱，而撤退则是在整个群岛面前承认失败。"
 INS_limited_war_events.2.a: "把部队撤回来，能救多少是多少"
 INS_limited_war_events.2.b: "我们决不向傀儡屈服！"
 INS_limited_war_events.3.t: "[FROM.GetName]向共和国低头"
 INS_limited_war_events.3.desc: "消息从吉隆坡传来。傀儡政府，在决定性时刻被其伦敦主子抛弃，已接受我方条件，以免其城镇化为焦土。争议之地归我们所有。这个教训，本地区其他附庸国不会忘记。"
 INS_limited_war_events.3.a: "印度尼西亚崛起"
 INS_limited_war_events.4.t: "[FROM.GetName]拒绝我们的条件"
 INS_limited_war_events.4.desc: "[FROM.GetName]将我们的提议甩回我们脸上。傀儡部长们照本宣科，念着白厅写好的稿子，宣称一寸土地都不会交出，在大炮沉寂之前，必须先让共和国屈服。"
 INS_limited_war_events.4.a: "那就让枪炮说话吧"
 INS_limited_war_events.5.t: "[FROM.GetNameDef]呼吁消灭我们"
 INS_limited_war_events.5.desc: "[FROM.GetNameDefCap]抛下了最后一丝有限战争的伪装。他们的广播如今公开谈论肢解共和国，将其岛屿分给从前的殖民主子。此事不会有平静的结局。要么印尼在终局时屹立不倒，要么彻底不复存在。"
 INS_limited_war_events.5.a: "我们同生死，共存亡"
 INS_limited_war_events.6.t: "[FROM.GetAdjective]的攻势受阻"
 INS_limited_war_events.6.desc: "[FROM.GetAdjective]的突袭让我们措手不及，有那么一阵子我们担心最坏的结果。然而，他们的攻势已陷入泥潭。他们的士兵疲惫不堪，战线漫长，伦敦的咆哮随着每一份公报而日渐无力。共和国或许还可以宽宏大量，给傀儡们一个体面退出的机会，尽管许多人会说，一场彻底的胜利比有节制的胜利更有利于事业。"
 INS_limited_war_events.6.a: "向他们提出条件"
 INS_limited_war_events.6.b: "对傀儡毫不留情"
 INS_limited_war_events.7.t: "进攻停滞"
 INS_limited_war_events.7.desc: "我方的进攻已经停滞，更糟糕的是，敌人知晓了这一点。海峡对岸要求我们马上放下武器，接受他们的条件，或者看着伤亡名单越来越长，最终接受他们的条件。我们只能在不同规模的葬礼间进行选择。"
 INS_limited_war_events.7.a: "糟糕的和平胜过更糟糕的战争"
 INS_limited_war_events.7.b: "共和国不会屈服"
 INS_limited_war_events.8.t: "[FROM.GetName]拒绝屈服"
 INS_limited_war_events.8.desc: "[FROM.GetName]轻蔑地回复了我们的提议。他们的官员宣称，他们宁愿让从槟城到柔佛的每一座乡村都化为火海，也不愿向共和国屈服。战争仍将继续。"
 INS_limited_war_events.8.a: "那就如此吧。"
 INS_limited_war_events.9.t: "[FROM.GetName]意图粉碎共和国！"
 INS_limited_war_events.9.desc: "敌方指挥部的无线拦截证实了最糟糕的情况。不会有解决方案，不会有克制的和平，不会回到我们以前的边境线。那些傀儡和他们的伦敦主子要求共和国彻底投降，试图粉碎印度尼西亚，让群岛回到我们奋力抵抗的帝国主义靴下。对此，只有一个回复。"
 INS_limited_war_events.9.a: "印度尼西亚屹立不倒！"
 ### AST - Union Control Events ###
 AST_union_control_events.1.t: "工会内的外国特工"
 AST_union_control_events.1.desc: "情报部门向政府报告了令人不安的消息。澳大利亚的共产主义特工一直在与本地工会领导人联系，分发激进文献，鼓励工人按照革命路线组织起来。目前，这场运动的规模仍然很小，但安全官员警告说，这只是此类事件的开始。必须在它扎根前作出决定。"
 AST_union_control_events.1.a: "严密监视他们。我们暂且等待"
 AST_union_control_events.4.t: "共产主义渗透者夺取[MAL.GetAdjective]领土"
 AST_union_control_events.4.desc: "一份令人震惊的报告已呈交政府。一次协同行动攻占了我方一个地区，并宣布其归属革命政府。此次袭击的速度与组织性引发了令人不安的质疑——我国情报部门怀疑叛乱分子并非单独行动，可能有外国势力在背后操纵，其引至我国境内。那些在占领行动中逃脱的人并未投降。他们重新集结并拿起武器，决心夺回被夺走的一切。"
 AST_union_control_events.4.a: "查出谁在支持。这些反贼没办法长期控制那里"
 AST_union_control_events.4.a.tt: "反共民兵部队已经集结起来抵抗共产主义占领"
 AST_union_control_events.5.t: "[MAL.GetAdjective]的灾难"
 AST_union_control_events.5.desc: "我们的推进已停滞，更糟的是，敌人对此心知肚明。海峡对岸传来要求：立即放下武器接受他们的条件，否则，就在同样的结局下，眼看着伤亡名单越拉越长。他们给出的选择，不过是葬礼规模的大小。"
 AST_union_control_events.5.a: "可怕的挫折。我们必须转向其他途径来支持同志"
 AST_union_control_events.3.t: "[MAL.GetNonIdeologyName]爆发革命"
 AST_union_control_events.3.desc: "[MAL.GetNonIdeologyName]的工人起义了。我们长期以来培育的共产主义细胞已经在该国各地拿起武器，但当地的情况令人不安。革命力量集中在错误的地区，他们与半岛的心脏被水域和丛林分隔。若不能在大陆获得立足点，政府只需等待即可在革命传播前饿死他们。澳大利亚必须秘密且迅速地采取行动，在半岛上部署力量，为革命提供生存所需的基础。"
 AST_union_control_events.3.a: "我们不能让革命失败。为他们提供立足点"
 AST_union_control_events.2.t: "[AST.GetAdjective]支持的煽动者出现在我们街头"
 AST_union_control_events.2.desc: "澳大利亚共产主义政府的特工已抵达我们的城市。他们毫不躲藏——工厂门口分发着小册子，公共广场上发表着演讲，澳大利亚特工与本地激进团体之间建立了团结网络。原有的外国影响网络似乎在一夜之间重获活力。这是一场协调一致的运动，政府必须在民众不满变得难以收拾之前，决定如何应对。"
 AST_union_control_events.2.b: "令人不安的发展"
 ###########################
 ##### ABDACOM EVENTS ######
 ###########################
 ABDA_events.1.t: "受邀加入新的最高指挥部"
 ABDA_events.1.desc: "[FROM.GetNameDef]建立了太平洋战区的联合最高指挥部，并邀请我们加入。这一倡议——被称为美英荷澳司令部——旨在将在该地区行动的盟国的海、空、陆军力量集中到一个统一的指挥体系下。加入意味着能与[FROM.GetNameDef]及其他已承诺参与的伙伴进行更紧密的协调合作。我们必须决定是否接受。"
 ABDA_events.1.a: "我们将并肩作战"
 ABDA_events.1.b: "我们暂时无法对此做出承诺"
 ABDA_events.2.t: "[FROM.GetName]加入美英荷澳司令部"
 ABDA_events.2.desc: "[FROM.GetNameDef]已接受我方邀请，加入美英荷澳司令部最高指挥部。他们的部队现在将在联合指挥体系下行动，增强我们在太平洋战区的地位。"
 ABDA_events.2.a: "令人满意的进展"
 ABDA_events.3.t: "[FROM.GetName]拒绝加入"
 ABDA_events.3.desc: "[FROM.GetNameDef]拒绝了我们加入美英荷澳司令部最高指挥部的邀请。他们的部队暂时不会参与这项联合行动，但大门或许仍然敞开着。"
 ABDA_events.3.a: "很遗憾，已知悉"
 ABDA_events.5.t: "邀请加入美英荷澳司令部"
 ABDA_events.5.desc: "[FROM.GetNameDef]邀请我们加入美英荷澳司令部。司令部已经成为太平洋战区盟军的最高协调机构，将主要盟国的海军和陆军集中在一个指挥下。加入将使我们的部队进入这一联合架构，获得共享情报、协同条令以及盟军的全力支持。我们必须做出决定。"
 ABDA_events.5.a: "我们将并肩作战"
 ABDA_events.5.b: "我们暂时无法对此做出承诺"
 ABDA_events.4.t: "新加坡防务"
 ABDA_events.4.desc: "新加坡已被指定为美英荷澳司令部防御圈的关键枢纽，我们的指挥官必须决定如何投入其防御工事。我们可以优先加强海上通道和港口防御，巩固陆地一侧以抵御地面进攻，或者将资源分散在两个方向。每种选择都将决定敌人来犯时新加坡的防御方式。"
 ABDA_events.4.a: "加强海防，新加坡的优势在于其港口"
 ABDA_events.4.b: "巩固陆地防线，真正的威胁将来自陆地"
 ABDA_events.4.c: "均衡的策略，任何一条进攻路线都不能忽视"
 ABDA_fortress_singapore_choice_tt: "完成该国策后将面临如何加强新加坡防御的选择。"
 ABDA_faction_membership_requirement_tt: "符合条件的阵营成员将收到加入邀请。"
